// ─── Ensure jsPDF is available (lazy-load if CDN blocked) ────────
function ensureJsPDF(){
  return new Promise(function(resolve,reject){
    if(window.jspdf&&window.jspdf.jsPDF){resolve(window.jspdf.jsPDF);return;}


    // Try loading from CDN dynamically
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){
      var s2=document.createElement('script');
      s2.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js';
      s2.onload=function(){
        if(window.jspdf&&window.jspdf.jsPDF)resolve(window.jspdf.jsPDF);
        else reject(new Error('jsPDF loaded but unavailable'));
      };
      s2.onerror=function(){
        // autotable failed but core jsPDF may still work
        if(window.jspdf&&window.jspdf.jsPDF)resolve(window.jspdf.jsPDF);
        else reject(new Error('Could not load jsPDF plugin'));
      };
      document.head.appendChild(s2);
    };
    s.onerror=function(){reject(new Error('No internet — cannot load jsPDF. PDF export needs a connection; use Export JSON instead.'));};
    document.head.appendChild(s);
  });
}

function ensureXLSX(){
  return new Promise(function(resolve, reject){
    if(typeof XLSX !== 'undefined' && XLSX.utils){return resolve(XLSX);}
    if(typeof window !== 'undefined' && window.XLSX && window.XLSX.utils){return resolve(window.XLSX);}
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = function(){
      var x = (typeof XLSX !== 'undefined') ? XLSX : window.XLSX;
      if(x && x.utils) resolve(x);
      else reject(new Error('XLSX library loaded but utils API missing'));
    };
    s.onerror = function(){reject(new Error('Could not load SheetJS (xlsx) from CDN. Are you offline?'));};
    document.head.appendChild(s);
  });
}

// Excel hard limit: 32,767 chars per cell. Clip every string cell safely below it.
function clipRows(rows){
  var MAX = 32000;
  for(var i=0;i<rows.length;i++){
    var row = rows[i];
    for(var j=0;j<row.length;j++){
      var v = row[j];
      if(typeof v === 'string' && v.length > MAX){
        row[j] = v.slice(0, MAX) + ' ...(truncated)';
      }
    }
  }
  return rows;
}

    case 'CM-01': return 'In SCC4, change the production client to CCCATEGORY=P and CCCORACTIV=2 (no changes allowed). Apply the change in production; transport not required.';
    case 'CM-02': return 'In SCC4, set CCNOCLIIND=1 (no changes to repository) or 3 (no changes to customizing or repository) for the production client.';
    case 'CM-03': return 'Inspect roles holding S_DEVELOP ACTVT=02 vs S_CTS_ADMI via SUIM > Roles by Authorization Values. Remove overlapping access; enforce separation between developers and transport admins.';
    case 'LA-01': return 'Use SU01 in every client to lock SAP*, DDIC, EARLYWATCH, TMSADM, SAPCPIC. Set login/no_automatic_user_sapstar=1. Change DDIC password and store in vault.';
    case 'LA-02': return 'In RZ10 edit the default profile: login/min_password_lng=8, login/min_password_specials=1, login/min_password_digits=1, login/fails_to_user_lock=5. Restart instances to activate.';
    case 'LA-03': return 'Run SUIM > Users by Logon Date filter for 90+ days inactive. Use SU10 to mass-lock. After 180+ days, schedule deletion to free licenses.';
    case 'LA-04': return 'Use SUIM > Roles > By Profile Name=SAP_ALL. For every user with SAP_ALL, remove the assignment and grant least-privilege composite roles instead. Track via PFCG.';
    case 'LA-05': return 'Run the SoD Violations report in this platform; for SOX-relevant conflicts, either remove conflicting access or document a formal compensating control approved by Internal Audit.';
    case 'CO-01': return 'In SU01, change USTYP=B (background) and USTYP=S (system) users so they cannot perform dialog logon. Lock the accounts when not in use; rotate passwords via secure secret store.';
    case 'CO-02': return 'Restrict S_BTCH_ADM and S_BTCH_JOB to a dedicated Basis Operations role. Review SM37 job-step authorizations and ensure four-eye approval for newly scheduled production jobs.';
    case 'SD-01': return 'In PFCG, remove S_DEVELOP ACTVT=02 from all production-assigned roles. Developers should work in DEV only and promote via STMS transports.';
    case 'SD-02': return 'In PFCG, remove S_DEVELOP OBJTYPE=DEBUG (or OBJTYPE=DEBUG ACTVT=02) from production roles. Restrict debug to non-productive environments only.';
    case 'DI-01': return 'In RZ10, set rsau/enable=1. Use SM19 to define audit filters covering user-management, role-change, transport, and sensitive-T-code events. Restart instances.';
    case 'DI-02': return 'In RZ10 set rec/client=ALL (or your audit policy value). Use SE13 to enable DBTABLOG for security-sensitive tables (USR02, AGR_*, T000, RFC tables).';
    case 'DI-03': return 'In PFCG, restrict S_TABU_DIS authorizations: limit table-group access (e.g. SC for customizing, SA for application) per role. Remove S_TABU_DIS ACTVT=02 from non-Basis roles.';
    default:
      return 'Follow the cited SAP Note / Security Baseline section to remediate. Open the corresponding finding in the in-app ITGC Compliance page for evidence drill-down.';
  }
}

// ─── Concrete remediation guidance per control area ──
// Returns an array of action strings explaining HOW to fix the gap, populated
// from the actual finding counts so the steps quote real numbers.
function getFixSteps(controlKey, r){
  var s = r.stats;
  switch(controlKey){
    case 'sod':
      var soxC = s.soxCount;
      var critC = (r.sod||[]).filter(function(v){return v.sev==='CRITICAL';}).length;
      return [
        'Run SoD Violations report in-app, sort by user-then-severity, export the top-50 SOX-relevant conflicts to a remediation tracker (Jira / ServiceNow).',
        critC>0 ? ('Convene a workshop with the role owners for the '+critC+' CRITICAL conflicts. For each one, decide: remove side A, remove side B, or document a compensating control with a named approver.') :
                   'Convene a workshop with role owners. For each conflict, decide: remove side A, remove side B, or document a compensating control with a named approver.',
        soxC>0 ? ('Treat the '+soxC+' SOX-relevant conflicts as audit-blocking. They must be remediated or have approved compensating controls before the next SOX 404 testing cycle.') :
                  'Document any compensating controls in the GRC repository and link them to the affected user IDs.',
        'For users with SAP_ALL or wide-open profiles (S_TCODE = *), build derived role assignments instead — never grant SAP_ALL standing.',
        'After remediation, re-run this analysis monthly and track the SoD count trajectory; target >=30% reduction in the first quarter.'
      ];
    case 'sensitive':
      return [
        'For each sensitive transaction (SE38, SU01, PFCG, SM30, F110, etc.) list the current holders via the in-app filter and confirm each is a named owner with documented business need.',
        'Restrict sensitive T-codes to a small "privileged" composite role; remove them from broad job roles.',
        'Enable SM20 / SAL audit filters for sensitive T-code execution so future use is logged and reviewed.',
        'Apply the four-eye principle for any sensitive change: requester != approver, and approver attested in writing.',
        'Reference: SAP Security Baseline v1.8 §4.2; SAP Note 622464 (Sensitive transactions inventory).'
      ];
    case 'dormant':
      var dInact = (r.dormant||[]).filter(function(d){return d.isDormant;}).length;
      var dPwd = (r.dormant||[]).filter(function(d){return d.pwdIssue;}).length;
      return [
        'In SU10 (mass user maintenance) select the '+dInact+' dormant accounts and lock them in a single transaction. Communicate to managers before locking.',
        'Set login/password_expiration_time to 90 (or your policy value) so passwords expire automatically; force '+dPwd+' users with stale passwords to change at next logon.',
        'Configure login/password_max_idle_initial and login/password_max_idle_productive so unused accounts auto-lock after 60 / 180 days respectively.',
        'After lock-out, hold accounts for the configured retention period (e.g. 90 days) then delete to free licenses and clean the user master.',
        'Reference: SAP Note 862989 (Password parameters); ISACA SAP Audit Guide §2.1.'
      ];
    case 'defaultUsers':
      var unlocked = (r.defaultUsers||[]).filter(function(d){return !d.locked;});
      var names = unlocked.map(function(d){return d.user;}).join(', ');
      return [
        'Immediately lock the unlocked default user(s)'+(names?' ('+names+')':'')+' via SU01 in every client of every system in this landscape (000, 066, productive, and all customer clients).',
        'Change SAP* and DDIC passwords away from defaults; store the new passwords in your privileged-access vault.',
        'Set profile parameter login/no_automatic_user_sapstar = 1 to prevent SAP* re-creation if the user record is deleted.',
        'Verify SAP* membership: should not be in any productive role; remove from SAP_ALL or composite roles if present.',
        'Reference: SAP Note 2216306 (Standard user protection); SAP Security Baseline v1.8 §3.1.'
      ];
    case 'params':
      var fails = (r.paramResults||[]).filter(function(p){return p.status==='FAIL';});
      var samples = fails.slice(0,3).map(function(p){return p.name+'='+p.current+' (target '+p.target+')';}).join('; ');
      return [
        'Use RZ10 to edit the default profile of each application server. Set each failing parameter to its target value: '+(samples||'(see Security Parameters page)')+'.',
        'After changing parameters, restart the affected SAP instances to activate them (RZ10 changes do not take effect until restart).',
        'For dynamic-changeable parameters, also use RZ11 to set the live value so it takes effect immediately without a restart.',
        'Validate via RZ11 or PAHI history that the new values are active in production after the restart.',
        'Reference: SAP Note 1731866 (Security Baseline overview); SAP Note 622464 (RZ11 parameter list); SAP Security Baseline v1.8.'
      ];
    case 'unused':
      var totalUnused = (r.unused.detail||[]).filter(function(d){return d.status==='UNUSED';}).length;
      return [
        'For the top-20 users by % unused, schedule a role-review meeting with their line manager and re-derive a least-privilege role set.',
        'Use the User-Role-Transaction Detail tab in-app to identify which roles grant the unused T-codes; consider splitting those roles into smaller functional units.',
        'Decommission unused custom roles ('+totalUnused.toLocaleString()+' unused user-transaction pairs identified) — preserves licensing tier and reduces audit scope.',
        'Implement SU24-based authorization proposals so new roles only carry T-codes that have been observed in use.',
        'Reference: ISACA SAP Audit Guide §2.4; SAP Note 113290 (Role design best practices).'
      ];
    case 'license':
      var prof = s.licenseProf||0;
      return [
        'Review the '+prof+' users classified as Professional (the highest-cost tier). For each, confirm they genuinely use the privileged T-codes that triggered the classification; otherwise restrict access to drop to Functional or Productivity tier.',
        'Cross-check dormant + Professional-licensed users — these are immediate license-reclamation candidates.',
        'Use the License Rule file (PCE format) to test re-classification scenarios before committing role changes.',
        'Run USMM to validate that the classification matches SAP\'s own measurement; reconcile gaps before contract negotiation.',
        'Reference: SAP S/4HANA Named User License Guide; PCE classification rules.'
      ];
    case 'itgc':
      var fails = (r.itgc||[]).filter(function(f){return f.status==='FAIL';});
      var topFails = fails.slice(0,3).map(function(f){return f.id;}).join(', ');
      return [
        'Open the ITGC Compliance page in-app for the per-control evidence; failed controls'+(topFails?' (start with '+topFails+')':'')+' map directly to audit findings.',
        'For each FAIL, follow the SAP Note / ISACA reference cited on the control card; most require either a parameter change, a transport release, or a role modification.',
        'Bundle related ITGC fixes (e.g. all change-management failures) into a single change request so testing happens once.',
        'Re-run this analysis after each remediation batch; the ITGC pass-count is the headline metric for the audit committee.',
        'Reference: ISACA SAP Audit Guide (full framework); SOX §404 IT controls testing methodology.'
      ];
    default:
      return ['Review the in-app detail for this control area.','Cite the listed SAP Note(s) when documenting remediation.'];
  }
}

async function handleExportPDF(){
  const r=App.results;if(!r){toast('Run analysis first','warn');return;}
  const btn=document.getElementById('btn-export-pdf');
  if(btn){btn.disabled=true;btn.textContent='Generating...';}
  try{
    const jsPDF = await ensureJsPDF();
    const doc = new jsPDF({unit:'mm',format:'a4'});
    const W = 210, H = 297, M = 18;          // page, margins
    // ── BCS palette (mirrors the BCS IAM Discovery report) ──
    const PURPLE   = [68, 34, 106];          // header bands / table heads
    const PURPLE2  = [104, 64, 160];         // section titles
    const ROW_A    = [253, 238, 230];        // alternating row (warm)
    const ROW_B    = [244, 238, 250];        // alternating row (lavender)
    const ORANGE   = [235, 110, 35];         // accent rule
    const GREY     = [95, 95, 105];
    const cust = (typeof getActiveCustomer==='function') ? getActiveCustomer() : null;
    const custName = cust ? cust.name : 'Customer';
    const sid = (r.system&&r.system.sid)||'SAP';
    const today = new Date().toISOString().slice(0,10);

    // ASCII-safe (WinAnsi) text
    function tx(s){
      return String(s==null?'':s)
        .replace(/\u2265/g,'>=').replace(/\u2264/g,'<=').replace(/\u2260/g,'!=')
        .replace(/\u2192|\u2794|\u279C/g,'->').replace(/\u2018|\u2019/g,"'")
        .replace(/\u201C|\u201D/g,'"').replace(/[^\x20-\x7E\n\u2013\u2014\u2022]/g,'');
    }
    function footer(){
      const n = doc.getNumberOfPages();
      for(let p=2;p<=n;p++){                 // skip cover
        doc.setPage(p);
        doc.setDrawColor(PURPLE2[0],PURPLE2[1],PURPLE2[2]); doc.setLineWidth(1.2);
        doc.line(M, H-12, W-M, H-12);
        doc.setFontSize(8.5); doc.setTextColor(120);
        doc.text(String(p-1), W-M, H-7, {align:'right'});
        doc.setFontSize(8); doc.setTextColor(PURPLE2[0],PURPLE2[1],PURPLE2[2]);
        doc.text('www.businesscoresolutions.com', W-M, 12, {align:'right'});
        doc.text('BCS SAP Secure Studio', M, 12);
      }
    }
    function sectionTitle(txt, y){
      doc.setFillColor(240,240,245);
      doc.rect(M-3, y-6, W-2*M+6, 9, 'F');
      doc.setDrawColor(PURPLE[0],PURPLE[1],PURPLE[2]); doc.setLineWidth(1.4);

      doc.setTextColor(20,20,30);
      doc.text(tx(txt), M, y);
      return y+10;
    }
    const TBL = {
      headStyles:{fillColor:PURPLE, textColor:255, fontSize:8.6, fontStyle:'bold', cellPadding:1.8},
      bodyStyles:{fontSize:8.2, cellPadding:1.8, textColor:[35,35,45]},
      alternateRowStyles:{fillColor:ROW_B},
      styles:{lineColor:[225,220,235], lineWidth:0.15, overflow:'linebreak'},
      margin:{left:M, right:M},
      didParseCell:function(d){ if(d.section==='body' && d.row.index%2===0){ d.cell.styles.fillColor=ROW_A; } }
    };

    // ════════ COVER ════════
    doc.setFillColor(26,16,46); doc.rect(0,0,W,H,'F');
    try{ doc.addImage(BCS_LOGO_SVG,'JPEG',W/2-30,28,60,22); }catch(e){}
    doc.setTextColor(255); doc.setFont('helvetica','bold'); doc.setFontSize(26);
    doc.text('SAP Security & Compliance', W/2, 88, {align:'center'});
    doc.text('Assessment', W/2, 100, {align:'center'});
    doc.setDrawColor(120,160,255); doc.setLineWidth(0.5);
    doc.line(45,108,W-45,108);
    doc.setFont('helvetica','italic'); doc.setFontSize(11.5);
    doc.text(tx('SoD | Sensitive Access | ITGC | ISO/IEC 27001:2022 | Role Analysis | License Measurement'), W/2, 116, {align:'center'});
    doc.line(45,122,W-45,122);
    doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
    doc.text(tx('Prepared by BCS - Business Core Solutions | Generated by BCS SAP Secure Studio'), W/2, H-30, {align:'center'});
    doc.text(tx(custName+'  -  System '+sid+'  -  '+today), W/2, H-22, {align:'center'});

    // ════════ DOCUMENT CONTROL ════════
    doc.addPage(); let y = 24;
    y = sectionTitle('Document Control', y);
    doc.autoTable(Object.assign({}, TBL, {
      startY:y,
      head:[['Field','Detail']],
      body:[
        ['Purpose','Capture the current security, compliance and role posture of the SAP system, identify gaps against ISO/IEC 27001:2022 access controls, and recommend remediation steps with a phased maturity path.'],
        ['Customer', custName],
        ['System', sid+(r.system&&r.system.env?(' ('+r.system.env+')'):'')+(r.system&&r.system.client?(' client '+r.system.client):'')],
        ['Analysis date', today],
        ['Generated by', 'BCS SAP Secure Studio'+((currentUser()&&currentUser().name)?(' - operator: '+currentUser().name):'')],
        ['Modules executed', Object.keys(r.modulesActive||{}).filter(function(k){return r.modulesActive[k];}).join(', ')||'all'],
        ['Standard referenced','ISO/IEC 27001:2022 Annex A (with ISO/IEC 27002:2022 guidance); SAP Security Baseline v1.8; ISACA SAP Audit Guide; SOX section 404.']
      ].map(function(row){return [tx(row[0]),tx(row[1])];}),
      columnStyles:{0:{cellWidth:42, fontStyle:'bold', textColor:PURPLE}, 1:{cellWidth:W-2*M-42}}

    y = doc.lastAutoTable.finalY + 12;

    y = sectionTitle('1. Executive Summary', y);
    const statsJson = JSON.stringify({
      score:r.score, sod:(r.sod||[]).length, sox:(r.sod||[]).filter(function(v){return v.sox;}).length,
      sensitive:(r.sensitive||[]).length, dormant:(r.dormant||[]).length,
      defaultUnlocked:(r.defaultUsers||[]).filter(function(d){return !d.locked;}).length,

      isoGaps:(r.iso||[]).filter(function(a){return a.status==='GAP';}).length,
      roleFindings:(r.roleAnalysis&&r.roleAnalysis.summary)?r.roleAnalysis.summary.withFindings:0,
      users:(r.license||[]).length,
      roles:(r.roleAnalysis&&r.roleAnalysis.summary)?r.roleAnalysis.summary.total:0
    });
    const narrPrompt = 'Write a concise executive summary (3 short paragraphs) of an SAP security assessment for customer '+custName+', system '+sid+'. STATS: '+statsJson;
    let narrative = '';
    try { narrative = await generateAINarrative(narrPrompt, 'You are a senior SAP security auditor writing the executive summary of a formal assessment report. Plain professional prose, no markdown, no bullet lists.'); } catch(e){}
    if(!narrative && typeof ruleBasedNarrative==='function') narrative = ruleBasedNarrative(narrPrompt);
    doc.setFont('helvetica','normal'); doc.setFontSize(9.6); doc.setTextColor(40,40,50);
    const sumLines = doc.splitTextToSize(tx(narrative), W-2*M);
    sumLines.forEach(function(line){
      if(y > H-22){doc.addPage(); y = 24;}
      doc.text(line, M, y); y += 4.6;
    });

    // Headline KPI strip
    y += 4; if(y > H-40){doc.addPage(); y = 24;}
    doc.autoTable(Object.assign({}, TBL, {
      startY:y,
      head:[['Security Score','SoD Conflicts','SOX-relevant','Sensitive Access','Dormant Accounts','Default Users','ITGC Failures','ISO Gaps','Roles w/ Findings']],
      body:[[ (r.score||0)+' / 100', String((r.sod||[]).length), String((r.sod||[]).filter(function(v){return v.sox;}).length), String((r.sensitive||[]).length), String((r.dormant||[]).length), String((r.defaultUsers||[]).filter(function(d){return !d.locked;}).length), String((r.itgc||[]).filter(function(f){return f.status==='FAIL';}).length), String((r.iso||[]).filter(function(a){return a.status==='GAP';}).length), String((r.roleAnalysis&&r.roleAnalysis.summary)?r.roleAnalysis.summary.withFindings:0) ]],
      headStyles:Object.assign({}, TBL.headStyles, {fontSize:7.4, halign:'center'}),
      bodyStyles:Object.assign({}, TBL.bodyStyles, {fontSize:9.5, halign:'center', fontStyle:'bold'})
    }));

    // ════════ GAP ANALYSIS — the signature BCS table ════════
    doc.addPage(); y = 24;
    y = sectionTitle('2. Gap Analysis against ISO/IEC 27001:2022', y);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(60,60,70);
    const introLines = doc.splitTextToSize(tx('Observations mapped to Annex A controls of ISO/IEC 27001:2022 (with ISO/IEC 27002:2022 guidance). Strengths are noted in the Summary of Key Themes section.'), W-2*M);
    introLines.forEach(function(l){doc.text(l, M, y); y += 4.4;});
    y += 2;

    // Per-category recommendation text (condensed first 2 fix steps)
    function catRec(cats){
      const recMap = {
        sod:'Remediate SoD conflicts: remove one side of each conflict via PFCG or document compensating controls with Internal Audit sign-off.',
        sensitive:'Restrict sensitive transactions to named privileged roles; enable SM19/SAL audit filters and 4-eye approval.',
        dormant:'Lock dormant accounts via SU10 after manager notification; configure login/password_max_idle_* parameters.',
        defaultUsers:'Change default-user passwords, lock the accounts in all clients and set login/no_automatic_user_sapstar=1.',
        params:'Set failing RZ10/RZ11 parameters to SAP Security Baseline targets; restart instances and verify.',
        unused:'Derive least-privilege roles from observed SM20 usage; remove unused assignments to reduce attack surface and license cost.',
        role:'Rebuild the role model: remove wildcard authorisations, split SoD-conflicting roles, align names to the convention.',
        license:'Right-size license tiers from measured usage; reclaim licenses from dormant and downgrade-eligible users.'
      };
      const out = [];
      (cats||[]).forEach(function(c){ if(recMap[c] && out.indexOf(recMap[c])<0) out.push(recMap[c]); });
      return out.join(' ') || 'Remediate the linked findings listed in the application drill-down.';
    }

    const gapItems = (r.iso||[]).filter(function(a){return a.status==='GAP';});
    const gapBody = gapItems.map(function(a, i){
      return [ String(i+1), tx(a.evidence||''), tx(a.id), tx(a.name+': '+(a.desc||'').slice(0,140)), tx(catRec(a.linked)) ];
    });
    doc.autoTable(Object.assign({}, TBL, {
      startY:y,
      head:[['#','Current-State Observation','ISO/IEC 27001:2022 Control','Gap & Risk','Recommendation']],
      body:gapBody,
      columnStyles:{0:{cellWidth:7, halign:'center', fontStyle:'bold'},1:{cellWidth:46},2:{cellWidth:24, fontStyle:'bold', textColor:PURPLE},3:{cellWidth:48},4:{cellWidth:49}}
    }));

    // ════════ ADDRESSING THE GAPS WITH BCS SAP SECURE STUDIO ════════
    doc.addPage(); y = 24;
    y = sectionTitle('3. Addressing the Gaps with BCS SAP Secure Studio', y);
    const addrRows = [];
    function gapRefsFor(cat){
      const refs=[]; gapItems.forEach(function(a,i){ if((a.linked||[]).indexOf(cat)>=0) refs.push(i+1); });
      return refs.length? ('Gaps '+refs.join(', ')) : null;
    }
    [
      ['sod','SoD rule library ('+((typeof SOD_LIBRARY!=='undefined'&&SOD_LIBRARY.length)?SOD_LIBRARY.length:'150')+' rules) evaluates every user; SOX-relevant conflicts flagged; per-finding AI remediation with PFCG steps.','SoD engine; AI recommendations'],
      ['sensitive','Sensitive transaction catalogue scans effective access; drill-down shows granting roles per user.','Sensitive-access engine'],
      ['defaultUsers','Default-user check covers SAP*, DDIC, EARLYWATCH, SAPCPIC with lock-state evidence.','Default-user control'],
      ['dormant','Dormancy detection from USR02 last-logon with configurable thresholds.','Dormant-account engine'],
      ['params','20 security parameters checked against the SAP Security Baseline with current-vs-target evidence.','Parameter baseline check'],
      ['role','Role Analysis module builds the role matrix, derives the naming convention, detects wildcards, display-vs-maintenance and role-level SoD; exports the standard Role Matrix workbook.','Role Analysis module; Excel export'],
      ['unused','Unused-access correlation of AGR_USERS vs SM20 quantifies assigned-but-never-used transactions per user.','Usage correlation engine'],
      ['license','License measurement maps effective authorisations to license tiers; user-level and role-level Excel reports with usage tiers and downgrade recommendations.','License measurement; Excel export']
    ].forEach(function(row){
      const ref = gapRefsFor(row[0]);
      if(ref) addrRows.push([tx(ref), tx(row[1]), tx(row[2])]);
    });
    doc.autoTable(Object.assign({}, TBL, {
      startY:y,
      head:[['Gap ref.','How BCS SAP Secure Studio addresses it','Capability used']],
      body:addrRows,
      columnStyles:{0:{cellWidth:26, fontStyle:'bold', textColor:[20,110,80]},1:{cellWidth:100},2:{cellWidth:48, fontStyle:'bold', textColor:PURPLE}}
    }));

    // ════════ SUMMARY OF KEY THEMES ════════
    y = doc.lastAutoTable.finalY + 12;
    if(y > H-90){doc.addPage(); y = 24;}
    y = sectionTitle('4. Summary of Key Themes', y);
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(PURPLE2[0],PURPLE2[1],PURPLE2[2]);
    doc.text('4.1  Strengths Observed', M, y); y += 6;
    doc.setFont('helvetica','normal'); doc.setFontSize(9.2); doc.setTextColor(40,40,50);
    const strengths = [];
    (r.iso||[]).filter(function(a){return a.status==='PASS';}).slice(0,4).forEach(function(a){ strengths.push(a.id+' '+a.name+' - '+a.evidence); });
    (r.itgc||[]).filter(function(f){return f.status==='PASS';}).slice(0,3).forEach(function(f){ strengths.push('ITGC '+(f.id||'')+' '+(f.name||f.desc||'')+' passing'); });
    if((r.defaultUsers||[]).every(function(d){return d.locked;}) && (r.defaultUsers||[]).length>0) strengths.push('All detected default SAP users are locked.');
    if(strengths.length===0) strengths.push('SAP audit log (SM20) and user master data available for continuous measurement.');
    strengths.forEach(function(s){
      if(y > H-22){doc.addPage(); y = 24;}
      const lines = doc.splitTextToSize(tx('- '+s), W-2*M-4);
      lines.forEach(function(l){doc.text(l, M+2, y); y += 4.4;});
      y += 1;
    });
    y += 4; if(y > H-70){doc.addPage(); y = 24;}
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(PURPLE2[0],PURPLE2[1],PURPLE2[2]);
    doc.text('4.2  Most Material Gaps', M, y); y += 6;
    doc.setFont('helvetica','normal'); doc.setFontSize(9.2); doc.setTextColor(40,40,50);
    const mat = [];
    const soxN = (r.sod||[]).filter(function(v){return v.sox;}).length;
    if((r.sod||[]).length) mat.push((r.sod||[]).length+' SoD conflicts ('+soxN+' SOX-relevant) - initiate-approve-conceal risk across finance processes.');
    const unlockedDef = (r.defaultUsers||[]).filter(function(d){return !d.locked;}).length;
    if(unlockedDef) mat.push(unlockedDef+' default SAP user(s) not locked - well-known credentials exposed.');
    if(r.roleAnalysis&&r.roleAnalysis.summary){
      const rs = r.roleAnalysis.summary;
      if(rs.withWildcards) mat.push(rs.withWildcards+' role(s) with wildcard authorisation including S_TCODE = * - equivalent to SAP_ALL.');
      if(rs.displayWithMaint) mat.push(rs.displayWithMaint+' display-named role(s) carry Change/Create/Delete access - privilege disguised as read-only.');
    }
    const pf = (r.paramResults||[]).filter(function(p){return p.status==='FAIL';}).length;
    if(pf) mat.push(pf+' security parameters below SAP Baseline - weakened authentication and audit controls.');
    if((r.dormant||[]).length) mat.push((r.dormant||[]).length+' dormant accounts - unattended attack surface and wasted licenses.');
    mat.slice(0,6).forEach(function(s){
      if(y > H-22){doc.addPage(); y = 24;}
      const lines = doc.splitTextToSize(tx('- '+s), W-2*M-4);
      lines.forEach(function(l){doc.text(l, M+2, y); y += 4.4;});
      y += 1;
    });

    // ════════ SUGGESTED MATURITY PATH ════════
    doc.addPage(); y = 24;
    y = sectionTitle('5. Suggested Maturity Path', y);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(60,60,70);
    doc.text(tx('A phased remediation keeps quick wins in step with the structural role-model rebuild:'), M, y); y += 7;
    doc.autoTable(Object.assign({}, TBL, {
      startY:y,
      head:[['Phase','Focus','Key Activities']],
      body:[
        ['Phase 1\nFoundation','Quick Wins & Hygiene', tx('Lock or secure the '+unlockedDef+' unlocked default user(s) (SU01, login/no_automatic_user_sapstar=1). Correct the '+pf+' failing security parameters in RZ10 and restart instances. Notify managers and lock the '+(r.dormant||[]).length+' dormant accounts via SU10. Establish the documented access-control policy and role-naming standard.')],
        ['Phase 2\nGovernance','Role Model & SoD Remediation', tx('Remove wildcard authorisations (S_TCODE = *, ACTVT = *) from the flagged roles. Split roles carrying both halves of an SoD conflict; remediate the '+soxN+' SOX-relevant user-level conflicts or document compensating controls. Rename or strip maintenance access from display-named roles. Introduce SoD checks at the point of provisioning and extend recertification beyond SAP.')],
        ['Phase 3\nOptimisation & Intelligence','Least Privilege, License & Continuous Monitoring', tx('Derive least-privilege roles from observed SM20 usage and remove assigned-but-unused access. Right-size license tiers using the License Detail report (downgrade candidates and reclaimable seats). Schedule periodic BCS re-assessment, track KPIs (score trend, SoD count, ISO gaps) and enable AI-assisted remediation guidance for new findings.')]
      ],
      columnStyles:{0:{cellWidth:26, fontStyle:'bold', textColor:PURPLE},1:{cellWidth:40, fontStyle:'bold'},2:{cellWidth:108}}
    }));

    // ════════ DISCLAIMER ════════
    y = doc.lastAutoTable.finalY + 10;
    if(y > H-45){doc.addPage(); y = 24;}
    doc.setFillColor(246,246,250); doc.rect(M-3, y-5, W-2*M+6, 30, 'F');
    doc.setDrawColor(ORANGE[0],ORANGE[1],ORANGE[2]); doc.setLineWidth(1.2);
    doc.line(M-3, y-5, M-3, y+25);
    doc.setFont('helvetica','italic'); doc.setFontSize(8.6); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
    const disc = 'Disclaimer: This assessment is generated automatically from the SAP extracts provided (USR02, AGR_USERS, AGR_1251, SM20, RZ11, T000 and related tables) and reflects the state of those extracts at the time of upload. The ISO/IEC 27001:2022 mapping is an analytical structuring against recognised control objectives, not a certification audit. Recommendations describe remediation options and intended fit, not a delivery commitment. Validation with the customer internal SMEs is required before executing changes in production.';
    const discLines = doc.splitTextToSize(tx(disc), W-2*M-6);
    let dy = y;
    discLines.forEach(function(l){doc.text(l, M+1, dy); dy += 4.2;});

    footer();
    doc.save('BCS_Secure_Studio_Executive_'+sid+'_'+today+'.pdf');
    toast('Executive report generated','ok');
  }catch(e){
    toast('PDF generation failed: '+e.message,'err');

}

function downloadProxy(){
  const code=`#!/usr/bin/env python3
"""SAP OData CORS Proxy - run: python3 sap_proxy.py
Set Proxy URL in app to: http://localhost:3100"""
import json,base64,urllib.request,urllib.error,ssl,sys,os
from http.server import HTTPServer,BaseHTTPRequestHandler
PORT=int(sys.argv[1]) if len(sys.argv)>1 else 3100
CORS={"Access-Control-Allow-Origin":"*","Access-Control-Allow-Methods":"GET,POST,OPTIONS","Access-Control-Allow-Headers":"Content-Type,Authorization"}
class H(BaseHTTPRequestHandler):
    def log_message(self,f,*a):print(f"  {self.log_date_time_string()} {f%a}")
    def send_cors(self,c):self.send_response(c);[self.send_header(k,v) for k,v in CORS.items()];self.send_header("Content-Type","application/json");self.end_headers()
    def do_OPTIONS(self):self.send_cors(204);self.wfile.write(b"")
    def do_GET(self):
        if self.path in("/","/health"):self.send_cors(200);self.wfile.write(json.dumps({"status":"ok","port":PORT}).encode())
        else:self.send_cors(404);self.wfile.write(b"Not found")
    def do_POST(self):
        body=json.loads(self.rfile.read(int(self.headers.get("Content-Length",0))))
        t=body.get("url","");u=body.get("username","");pw=body.get("password","")
        print(f"  -> {t[:80]}")
        try:
            tok=base64.b64encode(f"{u}:{pw}".encode()).decode()
            ctx=ssl.create_default_context();ctx.check_hostname=False;ctx.verify_mode=ssl.CERT_NONE
            req=urllib.request.Request(t,headers={"Authorization":f"Basic {tok}","Accept":"application/json"})
            with urllib.request.urlopen(req,context=ctx,timeout=15) as r:
                d=json.loads(r.read().decode())
                self.send_cors(200);self.wfile.write(json.dumps({"ok":True,"status":r.status,"data":d}).encode())
        except urllib.error.HTTPError as e:
            try:ed=json.loads(e.read())
            except:ed={}
            self.send_cors(200);self.wfile.write(json.dumps({"ok":False,"status":e.code,"data":ed}).encode())
        except Exception as e:self.send_cors(502);self.wfile.write(json.dumps({"ok":False,"error":str(e)}).encode())
print(f"\\n  SAP OData CORS Proxy on http://localhost:{PORT}\\n  Set Proxy URL in app -> http://localhost:{PORT}\\n")
HTTPServer(("0.0.0.0",PORT),H).serve_forever()
`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([code],{type:'text/x-python'}));a.download='sap_proxy.py';a.click();
  toast('sap_proxy.py downloaded — run: python3 sap_proxy.py','ok');
}

async function handleLogin(){
  var email = (document.getElementById('login-email')||{}).value;
  var password = (document.getElementById('login-password')||{}).value;
  var errEl = document.getElementById('login-error');
  var btnEl = document.getElementById('login-btn');
  function showErr(msg){
    if(errEl){errEl.style.display='flex';errEl.innerHTML='<svg width="14" height="14" stroke="currentColor" fill="none"><use href="#ic-alert-triangle"/></svg> '+msg;}
  }
  if(!email||!password){showErr('Enter your email and password.');return;}
  if(btnEl){btnEl.disabled=true;btnEl.innerHTML='<svg width="14" height="14" stroke="currentColor" fill="none" class="spin"><use href="#ic-refresh"/></svg> Signing in...';}
  await ensureDefaultAdmin();
  var users = getUsers();
  var user = users.find(function(u){return u.email.toLowerCase()===email.toLowerCase();});
  if(!user){
    if(errEl){errEl.style.display='block';errEl.textContent='No account found with that email';}
    return;
  }
  var ok = await verifyPassword(password, user.passwordHash);
  if(!ok){
    if(errEl){errEl.style.display='block';errEl.textContent='Incorrect password';}
    return;
  }
  // Record session and mark first-time setup complete on successful login
  user.lastLogin = Date.now();
  if(user.email === 'admin@local') user.setupComplete = true;
  saveUsers(users);
  setSession({userId:user.id, ts:Date.now()});
  // Ensure at least one customer exists
  ensureDefaultCustomer();
  if(!getActiveCustomerId()){
    var c = getCustomers()[0];
    if(c) setActiveCustomerId(c.id);
  }
  // Restore full app shell
  document.body.innerHTML = '<div id="app"></div>';
  buildAppShell();
  loadSystemsFromActiveCustomer();
  App.view = 'customers';
  render();
}

function handleLogout(){
  if(!confirm('Sign out?')) return;
  // Persist customer data before logout
  persistCustomers();
  clearSession();
  location.reload();
}

async function saveUser(editId){
  var g = function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var email = g('uf-email').toLowerCase();
  var name = g('uf-name');
  var role = g('uf-role');
  var password = g('uf-password');
  var custIds = Array.from(document.querySelectorAll('input[name="uf-cust"]:checked')).map(function(el){return el.value;});
  if(!email){toast('Email is required','warn');return;}
  if(!editId && !password){toast('Password is required for new users','warn');return;}
  if(password && password.length<4){toast('Password must be at least 4 characters','warn');return;}
  var users = getUsers();
  if(editId){
    var u = users.find(function(x){return x.id===editId;});
    if(!u){toast('User not found','warn');return;}
    u.name = name;
    u.role = role;
    u.customerIds = custIds;
    if(password){
      u.passwordHash = await hashPassword(password);
      // First-time setup is "complete" once the admin's password has been changed
      if(u.email==='admin@local') u.setupComplete = true;
    }
  } else {
    if(users.find(function(x){return x.email===email;})){toast('Email already exists','warn');return;}
    users.push({
      id: 'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      email: email, name: name, role: role,
      passwordHash: await hashPassword(password),
      created: Date.now(), lastLogin: null,
      customerIds: custIds
    });
    // Once a second account exists, hide the first-time-setup hint
    var admin = users.find(function(x){return x.email==='admin@local';});
    if(admin) admin.setupComplete = true;
  }
  saveUsers(users);
  toast('User '+(editId?'updated':'created'),'ok');
  renderUsers();
}

function deleteUser(id){
  if(!confirm('Delete this user account? This cannot be undone.')) return;
  saveUsers(getUsers().filter(function(u){return u.id!==id;}));
  toast('User deleted','ok');
  renderUsers();
}

  renderCustomers();

// Map BCS finding categories → ISO control IDs
const ISO_MAPPING = {
  sod:           ['A.5.15','A.5.18','A.8.2','A.8.3'],
  sensitive:     ['A.8.2','A.8.3','A.8.18'],
  dormant:       ['A.5.16','A.5.18','A.8.5'],
  defaultUsers:  ['A.5.17','A.8.2','A.8.5'],
  params:        ['A.5.17','A.8.5','A.8.9'],
  unused:        ['A.5.18','A.8.2','A.8.3'],
  license:       ['A.5.18','A.5.36'],
  // ITGC categories → ISO
  'Change Management':   ['A.8.31','A.8.32'],
  'Logical Access':      ['A.5.15','A.5.16','A.5.17','A.5.18','A.8.2','A.8.3','A.8.5'],
  'Computer Operations': ['A.8.9','A.8.18','A.8.19'],
  'System Development':  ['A.8.4','A.8.25','A.8.26','A.8.27','A.8.31'],
  'Data Integrity':      ['A.8.15','A.8.16','A.8.17'],
};

function buildISOAssessment(results){
  // Score each ISO control as PASS / GAP / NOT-ASSESSED based on linked findings
  if(!results) return [];
  const out = [];
  ISO_CONTROLS.forEach(function(c){
    // Which finding categories are linked to this ISO control?
    var linkedKeys = [];
    Object.keys(ISO_MAPPING).forEach(function(k){
      if(ISO_MAPPING[k].indexOf(c.id)>=0) linkedKeys.push(k);
    });
    if(linkedKeys.length===0){
      out.push(Object.assign({}, c, {status:'NOT-ASSESSED', evidence:'No direct mapping from available BCS findings.', linked:[]}));
      return;
    }
    // For each linked finding category, compute a per-control gap level
    var gaps = [];
    var passes = [];
    linkedKeys.forEach(function(k){
      switch(k){
        case 'sod':
          if(results.stats.sodCount>0) gaps.push(results.stats.sodCount+' SoD conflicts');
          else passes.push('No SoD conflicts');
          break;
        case 'sensitive':
          if(results.stats.sensitiveCount>0) gaps.push(results.stats.sensitiveCount+' sensitive-access findings');
          else passes.push('Sensitive access controlled');
          break;
        case 'dormant':
          if(results.stats.dormantCount>0) gaps.push(results.stats.dormantCount+' dormant accounts');
          else passes.push('No dormant accounts');
          break;
        case 'defaultUsers':
          var unlocked = (results.defaultUsers||[]).filter(function(d){return !d.locked;}).length;
          if(unlocked>0) gaps.push(unlocked+' default SAP users not locked');
          else passes.push('All default users locked');
          break;
        case 'params':
          if(results.stats.paramFails>0) gaps.push(results.stats.paramFails+' security parameters fail baseline');
          else passes.push('Security parameters meet baseline');
          break;
        case 'unused':
          if(results.stats.unusedCount>0) gaps.push(results.stats.unusedCount+' users with high unused access');
          break;
        case 'license':
          // informational only
          break;
        default:
          // ITGC category
          var itgcInCat = (results.itgc||[]).filter(function(f){return f.category===k;});
          var itgcFails = itgcInCat.filter(function(f){return f.status==='FAIL';});
          var itgcPasses = itgcInCat.filter(function(f){return f.status==='PASS';});
          if(itgcFails.length>0) gaps.push(itgcFails.length+' '+k+' ITGC failures');
          if(itgcPasses.length>0 && itgcFails.length===0) passes.push(k+' ITGC controls passing');
      }
    });
    var status;
    if(gaps.length>0) status = 'GAP';
    else if(passes.length>0) status = 'PASS';
    else status = 'NOT-ASSESSED';
    out.push(Object.assign({}, c, {
      status: status,
      evidence: (gaps.length>0 ? gaps.join('; ') : (passes.join('; ') || 'No findings')),
      linked: linkedKeys
    }));
  });
  return out;
}

// ═══════════════════════════════════════════════════════════════════════
//  ROLE ANALYSIS ENGINE
//  Builds the role matrix from AGR_DEFINE/AGR_AGRS/AGR_1251/AGR_1252/AGR_USERS,
//  validates naming convention, and scores risk on each role.
// ═══════════════════════════════════════════════════════════════════════

// Common ACTVT values that indicate "maintenance" (write/change/delete)
const MAINTENANCE_ACTVT = new Set(['01','02','06','07','24','39','43','60','65','70','85','95']);
// "Display-style" suffixes/keywords commonly used to mark read-only roles
const DISPLAY_PATTERNS = [/_DISPLAY$/i, /_DISP$/i, /_VIEW$/i, /_READ$/i, /DISPLAY_/i, /_RO$/i, /_REPORTING$/i, /_REPORT$/i, /_QUERY$/i];
// Sensitive transactions to flag inside roles (subset of broader sensitive list)
const ROLE_SENSITIVE_TCODES = new Set([
  'SE38','SE37','SA38','SE93','SE16','SE16N','SE17','SM30','SM31','SM12','SM13','SM21','SM37','SM50','SM51','SM59','SM69',
  'PFCG','SU01','SU10','SUIM','RZ10','RZ11','RZ12','RZ20','RZ21',
  'STMS','SE01','SE09','SE10','SCC4','SCC1','SCC8','SCC9','SCMP','SCU0',
  'F-02','FB01','F110','F-53','MIRO','ME21N','MEK1','MMK1','VK11','VA01','VF01','VL01N',
  'OB52','OBYC','OB28','OB29','OBA7','SARA','S_BCE_68001400','S_BCE_68001403','PA20','PA30','PA40'
]);

function isDisplayRole(roleName){
  for(var i=0;i<DISPLAY_PATTERNS.length;i++) if(DISPLAY_PATTERNS[i].test(roleName)) return true;
  return false;
}

// Derive a candidate naming convention from the role population
function deriveNamingConvention(roleNames){
  // Strip the customer namespace (Z, Y) and underscore-split; analyse position patterns
  var parts = []; // parts[i] = Map(token -> count)
  var totalAnalysed = 0;
  roleNames.forEach(function(r){
    if(!r) return;
    // Skip SAP standard (SAP_) and composite-only roles when detecting
    if(/^SAP_/.test(r)) return;
    var tokens = r.split('_');
    if(tokens.length < 2) return;
    totalAnalysed++;
    tokens.forEach(function(t, idx){
      if(!parts[idx]) parts[idx] = {};
      parts[idx][t] = (parts[idx][t]||0) + 1;
    });
  });
  // For each position, determine the dominant token kind
  var pattern = [];
  parts.forEach(function(p, idx){
    var keys = Object.keys(p);
    var sorted = keys.sort(function(a,b){return p[b]-p[a];});
    var topShare = sorted.length>0 ? (p[sorted[0]]/totalAnalysed) : 0;
    // If one token dominates >70%, it's likely a fixed literal
    if(topShare > 0.7 && sorted[0].length <= 4){
      pattern.push({type:'LITERAL', token:sorted[0], share:topShare, samples:sorted.slice(0,3)});
    } else {
      // Check character profile: short tokens (3-4) often module/area codes
      var avgLen = keys.reduce(function(a,k){return a+k.length;},0)/Math.max(1,keys.length);
      if(avgLen<=4) pattern.push({type:'CODE', samples:sorted.slice(0,5), uniqueValues:keys.length});
      else pattern.push({type:'DESCRIPTOR', samples:sorted.slice(0,5), uniqueValues:keys.length});
    }
  });
  return {totalAnalysed: totalAnalysed, segments: pattern};
}

// Score how well a single role name conforms to the derived pattern
function scoreNamingConformance(roleName, conv){
  if(/^SAP_/.test(roleName)) return {conforms:true, reason:'SAP-delivered (excluded)'};
  if(!roleName || !conv || !conv.segments.length) return {conforms:false, reason:'No pattern derived'};
  var tokens = roleName.split('_');
  var reasons = [];
  // Length check
  if(Math.abs(tokens.length - conv.segments.length) > 2){
    reasons.push('Segment count '+tokens.length+' differs from convention '+conv.segments.length);
  }
  // Check literal positions
  conv.segments.forEach(function(seg, idx){
    if(seg.type==='LITERAL' && tokens[idx] !== seg.token){
      reasons.push('Position '+(idx+1)+' should be "'+seg.token+'" but is "'+(tokens[idx]||'(missing)')+'"');
    }
  });
  return {conforms: reasons.length===0, reason: reasons.join('; ') || 'Conforms to convention'};
}

function roleFindingHuman(kind, detail){
  var labels = {
    'NAMING':                 'Naming convention deviation',
    'DISPLAY_MAINTENANCE':    'Display-named role grants Change/Create/Delete access',
    'WILDCARD_TCODE':         'Role grants every transaction (S_TCODE = *)',
    'WILDCARD_ACTVT':         'Role grants every activity on one or more objects (ACTVT = *)',
    'SENSITIVE_TCODES':       'Role contains sensitive transactions',
    'ROLE_SOD':               'Role contains both halves of an SoD conflict',
  };
  var helpers = {
    'NAMING':              'The role name does not follow the customer naming convention; consistency makes future audits and assignment reviews far easier.',
    'DISPLAY_MAINTENANCE': 'A role whose name suggests read-only access (DISPLAY / DISP / VIEW / READ) actually carries authorities to change, create or delete data. Users believing they have a view-only role can in fact modify records, undermining segregation of duties.',
    'WILDCARD_TCODE':      'The role grants S_TCODE = * which is equivalent to SAP_ALL for transactions. Any user holding this role can execute every transaction in the system.',
    'WILDCARD_ACTVT':      'The role grants ACTVT = * on at least one authorisation object, meaning every activity (create, change, delete, lock, archive, etc.) is allowed on that object.',
    'SENSITIVE_TCODES':    'High-risk transactions (e.g. SE38 ABAP editor, F110 payment run, SU01 user maintenance) are embedded in this role. Every user assigned the role receives privileged access.',
    'ROLE_SOD':            'This role on its own creates a segregation-of-duties conflict. Any user receiving the role automatically violates the rule, regardless of their other assignments.'
  };
  return {label: labels[kind] || kind, plain: helpers[kind] || ''};
}

function runRoleAnalysis(agrDefineRows, agrAgrsRows, agr1251Rows, agr1252Rows, agrUsersRows){
  // Build a role -> {tcodes, authObjects, fields, orgLevels, users, type, displayFlag} map
  var roleMap = {};
  
  // Seed from AGR_DEFINE if available; otherwise from AGR_1251 (every role with any auth value)
  if(agrDefineRows && agrDefineRows.length){
    agrDefineRows.forEach(function(r){
      var name = String(col(r,'AGR_NAME')||'').trim();
      if(!name) return;
      var type = String(col(r,'AGR_TYPE')||'').trim() || 'S';
      roleMap[name] = roleMap[name] || {name:name, type:type, tcodes:new Set(), objects:new Set(), authTriples:[], orgLevels:new Set(), users:new Set(), children:new Set()};
      roleMap[name].type = type;
    });
  }
  
  // Composite -> child relationships
  if(agrAgrsRows && agrAgrsRows.length){
    agrAgrsRows.forEach(function(r){
      var parent = String(col(r,'AGR_NAME')||'').trim();
      var child = String(col(r,'CHILD_AGR')||'').trim();
      if(parent && child){
        if(!roleMap[parent]) roleMap[parent]={name:parent,type:'C',tcodes:new Set(),objects:new Set(),authTriples:[],orgLevels:new Set(),users:new Set(),children:new Set()};
        roleMap[parent].type = 'C';
        roleMap[parent].children.add(child);
      }
    });
  }
  
  // Authorization values
  if(agr1251Rows && agr1251Rows.length){
    agr1251Rows.forEach(function(r){
      var role = String(col(r,'AGR_NAME')||'').trim();
      if(!role) return;
      if(!roleMap[role]) roleMap[role]={name:role,type:'S',tcodes:new Set(),objects:new Set(),authTriples:[],orgLevels:new Set(),users:new Set(),children:new Set(),hasFullTcodeAccess:false};
      var obj = String(col(r,'OBJECT')||'').toUpperCase().trim();
      var field = String(col(r,'FIELD')||'').toUpperCase().trim();
      var low = String(col(r,'LOW')||'').trim();
      if(obj) roleMap[role].objects.add(obj);
      // If S_TCODE = '*', mark wildcard and DO NOT expand; otherwise add the specific tcode
      if(obj==='S_TCODE' && low){
        if(low==='*'){
          roleMap[role].hasFullTcodeAccess = true;
        } else {
          roleMap[role].tcodes.add(low.toUpperCase());
        }
      }
      if(obj && field) roleMap[role].authTriples.push({obj:obj, field:field, value:low});
    });
  }
  
  // Org levels
  if(agr1252Rows && agr1252Rows.length){
    agr1252Rows.forEach(function(r){
      var role = String(col(r,'AGR_NAME')||'').trim();
      var varbl = String(col(r,'VARBL')||'').trim();
      var low = String(col(r,'LOW')||'').trim();
      if(role && varbl){
        if(!roleMap[role]) roleMap[role]={name:role,type:'S',tcodes:new Set(),objects:new Set(),authTriples:[],orgLevels:new Set(),users:new Set(),children:new Set()};
        roleMap[role].orgLevels.add(varbl+'='+low);
      }
    });
  }
  
  // User assignments
  if(agrUsersRows && agrUsersRows.length){
    agrUsersRows.forEach(function(r){
      var role = String(col(r,'AGR_NAME')||'').trim();
      var user = String(col(r,'BNAME')||'').trim();
      if(role && user){
        if(!roleMap[role]) roleMap[role]={name:role,type:'S',tcodes:new Set(),objects:new Set(),authTriples:[],orgLevels:new Set(),users:new Set(),children:new Set()};
        roleMap[role].users.add(user);
      }
    });
  }
  
  var roleList = Object.values(roleMap);
  
  // ── Derive naming convention from the population ──
  var conv = deriveNamingConvention(roleList.map(function(r){return r.name;}));
  
  // ── Build per-role findings ──
  var roles = roleList.map(function(role){
    var name = role.name;
    var findings = [];
    var risk = 0;
    
    // 1. Naming convention conformance
    var nc = scoreNamingConformance(name, conv);
    if(!nc.conforms && !/^SAP_/.test(name)){
      var _h=roleFindingHuman('NAMING'); findings.push({kind:'NAMING', sev:'LOW', label:_h.label, plain:_h.plain, detail:nc.reason});
      risk += 1;
    }
    
    // 2. Display role with maintenance access (only if no S_TCODE = * etc.)
    var isDisplay = isDisplayRole(name);
    if(isDisplay){
      var maintAuths = role.authTriples.filter(function(t){
        return t.field==='ACTVT' && MAINTENANCE_ACTVT.has(t.value);
      });
      if(maintAuths.length>0){
        var sampleAuths = [...new Set(maintAuths.map(function(t){return t.obj+':ACTVT='+t.value;}))].slice(0,3);
        var _h=roleFindingHuman('DISPLAY_MAINTENANCE'); findings.push({kind:'DISPLAY_MAINTENANCE', sev:'HIGH', label:_h.label, plain:_h.plain, detail:'Display-named role carries maintenance ACTVT: '+sampleAuths.join(', ')});
        risk += 5;
      }
    }
    
    // 3. Wildcards (S_TCODE=* / ACTVT=*)
    var hasTcodeStar = role.authTriples.some(function(t){return t.obj==='S_TCODE' && t.value==='*';});
    if(hasTcodeStar){
      var _h=roleFindingHuman('WILDCARD_TCODE'); findings.push({kind:'WILDCARD_TCODE', sev:'CRITICAL', label:_h.label, plain:_h.plain, detail:'Grants S_TCODE = * (any transaction)'});
      risk += 10;
    }
    var wildcardActivities = role.authTriples.filter(function(t){return t.field==='ACTVT' && t.value==='*';});
    if(wildcardActivities.length>0){
      var wo = [...new Set(wildcardActivities.map(function(t){return t.obj;}))];
      var _h=roleFindingHuman('WILDCARD_ACTVT'); findings.push({kind:'WILDCARD_ACTVT', sev:'HIGH', label:_h.label, plain:_h.plain, detail:'Wildcard ACTVT on objects: '+wo.slice(0,4).join(', ')});
      risk += 4;
    }
    
    // 4. Sensitive transactions
    var senTcodes = role.hasFullTcodeAccess
      ? [...ROLE_SENSITIVE_TCODES]  // a wildcard role contains every sensitive transaction by definition
      : [...role.tcodes].filter(function(t){return ROLE_SENSITIVE_TCODES.has(t);});
    if(senTcodes.length>0){
      var _h=roleFindingHuman('SENSITIVE_TCODES'); findings.push({kind:'SENSITIVE_TCODES', sev: senTcodes.length>5?'HIGH':'MEDIUM', label:_h.label, plain:_h.plain, detail:'Contains '+senTcodes.length+' sensitive transaction(s): '+senTcodes.slice(0,6).join(', ')+(senTcodes.length>6?'...':'')});
      risk += Math.min(6, senTcodes.length);
    }
    
    // 5. SoD conflicts at role level: does the role itself contain both halves of any SoD rule?
    var roleSod = [];
    if(typeof SOD_LIBRARY !== 'undefined'){
      var roleTcSet = role.tcodes;
      SOD_LIBRARY.forEach(function(rule){
        // Get tcode lists from rule.a / rule.b OR from rule.aTCodes / rule.bTCodes
        var aTc = rule.aTCodes || rule.a_tcodes || rule.aT || rule.tcodes_a;
        var bTc = rule.bTCodes || rule.b_tcodes || rule.bT || rule.tcodes_b;
        if(Array.isArray(aTc) && Array.isArray(bTc)){
          var aHit = aTc.find(function(t){return roleTcSet.has(t.toUpperCase());});
          var bHit = bTc.find(function(t){return roleTcSet.has(t.toUpperCase());});
          if(aHit && bHit) roleSod.push({rule:rule.id||rule.name, a:aHit, b:bHit, sev:rule.sev||'HIGH', sox:!!rule.sox});
        }
      });
    }
    if(roleSod.length>0){
      var soxCnt = roleSod.filter(function(s){return s.sox;}).length;
      var _h=roleFindingHuman('ROLE_SOD'); findings.push({kind:'ROLE_SOD', sev: soxCnt>0?'CRITICAL':'HIGH', label:_h.label, plain:_h.plain, detail:roleSod.length+' SoD conflict(s) at role level'+(soxCnt>0?' ('+soxCnt+' SOX-relevant)':'')+': '+roleSod.slice(0,3).map(function(s){return s.rule+' ['+s.a+' vs '+s.b+']';}).join('; ')});
      risk += Math.min(10, 2 * roleSod.length);
    }
    
    return {
      name: name,
      type: role.type,
      hasFullTcodeAccess: !!role.hasFullTcodeAccess,
      tcodeCount: role.hasFullTcodeAccess ? -1 : role.tcodes.size,
      objectCount: role.objects.size,
      orgLevelCount: role.orgLevels.size,
      userCount: role.users.size,
      users: [...role.users],
      childCount: role.children.size,
      tcodes: [...role.tcodes],  // full set (used by Excel export role-to-tcode matrix)
      authTriples: role.authTriples,  // auth-object level detail per role
      children: [...role.children],   // composite -> children (single roles)
      isDisplay: isDisplay,
      findings: findings,
      sodCount: roleSod.length,
      risk: risk
    };
  });
  
  // Sort by risk descending
  roles.sort(function(a,b){return b.risk - a.risk;});
  
  return {
    roles: roles,
    convention: conv,
    summary: {
      total: roles.length,
      single: roles.filter(function(r){return r.type==='S';}).length,
      composite: roles.filter(function(r){return r.type==='C';}).length,
      sap: roles.filter(function(r){return /^SAP_/.test(r.name);}).length,
      customZ: roles.filter(function(r){return /^Z/.test(r.name);}).length,
      customY: roles.filter(function(r){return /^Y/.test(r.name);}).length,
      withFindings: roles.filter(function(r){return r.findings.length>0;}).length,
      displayWithMaint: roles.filter(function(r){return r.findings.some(function(f){return f.kind==='DISPLAY_MAINTENANCE';});}).length,
      withWildcards: roles.filter(function(r){return r.findings.some(function(f){return f.kind==='WILDCARD_TCODE'||f.kind==='WILDCARD_ACTVT';});}).length,
      withSensitive: roles.filter(function(r){return r.findings.some(function(f){return f.kind==='SENSITIVE_TCODES';});}).length,
      withRoleSod: roles.filter(function(r){return r.sodCount>0;}).length,
      nameDeviations: roles.filter(function(r){return r.findings.some(function(f){return f.kind==='NAMING';});}).length,
    }
  };
}

//  ITGC COMPLIANCE ENGINE

  {id:'LA-02', category:'Logical Access', name:'Password policy meets baseline',

function runITGC(results, usr02, agr1251, params, t000){
  // Evaluate each control against the available data
  const findings = [];
  function fail(c, evidence){findings.push(Object.assign({}, c, {status:'FAIL', evidence:evidence}));}
  function pass(c, evidence){findings.push(Object.assign({}, c, {status:'PASS', evidence:evidence}));}
  function warn(c, evidence){findings.push(Object.assign({}, c, {status:'WARN', evidence:evidence}));}
  function skip(c, reason){findings.push(Object.assign({}, c, {status:'SKIP', evidence:reason}));}

  // Helpers
  function paramVal(name){
    var p = params.find(function(x){return (col(x,'PARNAME')||'').toLowerCase()===name.toLowerCase();});
    return p ? col(p,'PARVAL') : null;
  }
  function t000Field(field){
    var first = t000 && t000[0];
    if(!first) return null;
    return col(first, field) || first[field] || first[field.toUpperCase()] || null;
  }

  // ── CHANGE MANAGEMENT ──
  // CM-01: production client locked
  var cm01 = ITGC_CONTROLS.find(function(c){return c.id==='CM-01';});
  if(!t000 || !t000.length){
    skip(cm01, 'T000 client settings not uploaded');
  } else {
    var category = t000Field('CCCATEGORY') || '';
    var activ = t000Field('CCCORACTIV') || '';
    if(category==='P' && (activ==='2' || activ==='3'))
      pass(cm01, 'CCCATEGORY=P, CCCORACTIV='+activ+' (changes restricted)');
    else
      fail(cm01, 'CCCATEGORY='+(category||'(blank)')+', CCCORACTIV='+(activ||'(blank)')+' — production should be P/2');
  }

  // CM-02: production rejects cross-client
  var cm02 = ITGC_CONTROLS.find(function(c){return c.id==='CM-02';});
  if(!t000 || !t000.length){
    skip(cm02, 'T000 not uploaded');
  } else {
    var ind = t000Field('CCNOCLIIND') || '';
    if(ind==='1' || ind==='3')
      pass(cm02, 'CCNOCLIIND='+ind);
    else
      fail(cm02, 'CCNOCLIIND='+(ind||'(blank)')+' — should be 1 or 3 in PRD');
  }

  // CM-03: transport role separation — skip without auth dump
  skip(ITGC_CONTROLS.find(function(c){return c.id==='CM-03';}), 'Manual review — verify S_DEVELOP ACTVT=02 holders vs S_CTS_ADMI');

  // ── LOGICAL ACCESS ──
  // LA-01: default users
  var la01 = ITGC_CONTROLS.find(function(c){return c.id==='LA-01';});
  if(results.defaultUsers){
    var unlocked = results.defaultUsers.filter(function(d){return !d.locked;});
    if(unlocked.length===0)
      pass(la01, 'All default users locked');
    else
      fail(la01, unlocked.length+' default user(s) NOT LOCKED: '+unlocked.map(function(d){return d.user;}).join(', '));
  } else skip(la01, 'USR02 not uploaded');

  // LA-02: password policy
  var la02 = ITGC_CONTROLS.find(function(c){return c.id==='LA-02';});
  if(params && params.length){
    var checks = [
      ['login/min_password_lng', 8, '>='],
      ['login/min_password_specials', 1, '>='],
      ['login/min_password_digits', 1, '>='],
      ['login/fails_to_user_lock', 5, '<='],
    ];
    var fails = checks.map(function(ck){
      var v = paramVal(ck[0]);
      if(v===null) return ck[0]+'=not set';
      var n = parseInt(v);
      if(isNaN(n)) return ck[0]+'='+v;
      var ok = (ck[2]==='>=')?(n>=ck[1]):(n<=ck[1]);
      return ok ? null : (ck[0]+'='+v+' (target '+ck[2]+' '+ck[1]+')');
    }).filter(Boolean);
    if(fails.length===0) pass(la02, 'All password parameters meet baseline');
    else fail(la02, fails.join('; '));
  } else skip(la02, 'PARAMS not uploaded');

  // LA-03: dormant accounts
  var la03 = ITGC_CONTROLS.find(function(c){return c.id==='LA-03';});
  if(results.dormant){
    var stillActive = results.dormant.filter(function(d){return d.isDormant && !d.locked;});
    if(stillActive.length===0)
      pass(la03, 'All dormant users locked');
    else
      fail(la03, stillActive.length+' dormant user(s) still active (not locked)');
  } else skip(la03, 'USR02 not uploaded');

  // LA-04: SAP_ALL
  var la04 = ITGC_CONTROLS.find(function(c){return c.id==='LA-04';});
  if(agr1251 && agr1251.length){
    var sapAllUsers = new Set();
    // Look at AGR_USERS to find roles named SAP_ALL or that grant unlimited S_TCODE/*
    // Simplified: flag any auth row with OBJECT='S_TCODE' and LOW='*'
    agr1251.forEach(function(r){
      if((col(r,'OBJECT')||'').toUpperCase()==='S_TCODE' && (col(r,'LOW')||'')==='*'){
        // We'd need AGR_USERS to find the actual users; for now just count the roles
      }
    });
    // Better: look at the auth map built during analysis
    if(results._authMap){
      Object.keys(results._authMap).forEach(function(u){
        if([...results._authMap[u].tcodes].indexOf('*')>=0) sapAllUsers.add(u);
      });
    }
    if(sapAllUsers.size===0)
      pass(la04, 'No SAP_ALL / S_TCODE=* assignments detected');
    else
      fail(la04, sapAllUsers.size+' user(s) appear to hold SAP_ALL / S_TCODE=*: '+[...sapAllUsers].slice(0,5).join(', '));
  } else skip(la04, 'AGR_1251 not uploaded');

  // LA-05: SoD
  var la05 = ITGC_CONTROLS.find(function(c){return c.id==='LA-05';});
  if(results.sod){
    var soxCount = results.sod.filter(function(s){return s.sox;}).length;
    if(results.sod.length===0)
      pass(la05, 'No SoD violations detected');
    else if(soxCount===0)
      warn(la05, results.sod.length+' SoD violations (none SOX-flagged)');
    else
      fail(la05, soxCount+' SOX-relevant SoD violations (of '+results.sod.length+' total)');
  } else skip(la05, 'AGR data not uploaded');

  // ── COMPUTER OPERATIONS ──
  // CO-01: batch users with dialog logon
  var co01 = ITGC_CONTROLS.find(function(c){return c.id==='CO-01';});
  if(usr02 && usr02.length){
    var batchWithDialog = usr02.filter(function(u){
      var t = (col(u,'USTYP')||'').toUpperCase();
      return (t==='B' || t==='S' || t==='C') && !col(u,'UFLAG');
    });
    if(batchWithDialog.length===0)
      pass(co01, 'No batch/system users with active dialog capability');
    else
      warn(co01, batchWithDialog.length+' batch/service users not locked: '+batchWithDialog.slice(0,5).map(function(u){return col(u,'BNAME');}).join(', '));
  } else skip(co01, 'USR02 not uploaded');

  // CO-02: SM36/SM37 restricted — manual review without role inventory
  skip(ITGC_CONTROLS.find(function(c){return c.id==='CO-02';}), 'Manual review — verify S_BTCH_ADM/S_BTCH_JOB role holders');

  // ── SYSTEM DEVELOPMENT ──
  // SD-01: dev in production
  var sd01 = ITGC_CONTROLS.find(function(c){return c.id==='SD-01';});
  if(agr1251 && agr1251.length){
    // Find roles with S_DEVELOP ACTVT=02
    var devRoles = new Set();
    agr1251.forEach(function(r){
      if((col(r,'OBJECT')||'').toUpperCase()==='S_DEVELOP' &&
         (col(r,'FIELD')||'').toUpperCase()==='ACTVT' &&
         (col(r,'LOW')||'')==='02'){
        devRoles.add(col(r,'AGR_NAME'));
      }
    });
    if(devRoles.size===0)
      pass(sd01, 'No roles with S_DEVELOP ACTVT=02');
    else
      fail(sd01, devRoles.size+' role(s) grant ABAP change: '+[...devRoles].slice(0,5).join(', '));
  } else skip(sd01, 'AGR_1251 not uploaded');

  // SD-02: debug-replace
  var sd02 = ITGC_CONTROLS.find(function(c){return c.id==='SD-02';});
  if(agr1251 && agr1251.length){
    var debugRoles = new Set();
    agr1251.forEach(function(r){
      if((col(r,'OBJECT')||'').toUpperCase()==='S_DEVELOP' &&
         (col(r,'FIELD')||'').toUpperCase()==='OBJTYPE' &&
         (col(r,'LOW')||'').toUpperCase().indexOf('DEBUG')>=0){
        debugRoles.add(col(r,'AGR_NAME'));
      }
    });
    if(debugRoles.size===0)
      pass(sd02, 'No roles grant DEBUG object access');
    else
      fail(sd02, debugRoles.size+' role(s) grant debug authorization: '+[...debugRoles].slice(0,5).join(', '));
  } else skip(sd02, 'AGR_1251 not uploaded');

  // ── DATA INTEGRITY ──
  // DI-01: security audit log enabled
  var di01 = ITGC_CONTROLS.find(function(c){return c.id==='DI-01';});
  if(params && params.length){
    var v = paramVal('rsau/enable');
    if(v==='1') pass(di01, 'rsau/enable=1 (audit log enabled)');
    else if(v===null) warn(di01, 'rsau/enable not found in parameter dump');
    else fail(di01, 'rsau/enable='+v+' (audit log DISABLED)');
  } else skip(di01, 'PARAMS not uploaded');

  // DI-02: table logging
  var di02 = ITGC_CONTROLS.find(function(c){return c.id==='DI-02';});
  if(params && params.length){
    var v = paramVal('rec/client');
    if(v==='ALL' || v==='all') pass(di02, 'rec/client=ALL (all clients logged)');
    else if(v && v!=='OFF' && v!=='off') warn(di02, 'rec/client='+v+' (selective logging — verify scope)');
    else fail(di02, 'rec/client='+(v||'(not set)')+' (table logging may be off)');
  } else skip(di02, 'PARAMS not uploaded');

  // DI-03: direct table access — flagged via Sensitive Access already
  var di03 = ITGC_CONTROLS.find(function(c){return c.id==='DI-03';});
  if(results.sensitive){
    var tabAccess = results.sensitive.filter(function(s){
      return ['SE16N','SM30','SE16','SE17','SM31'].indexOf((s.tcode||'').toUpperCase())>=0;
    });
    if(tabAccess.length===0)
      pass(di03, 'No flagged direct-table access');
    else
      warn(di03, tabAccess.length+' users with SE16N/SM30/SE16 access — verify S_TABU_DIS restriction');
  } else skip(di03, 'AGR data not uploaded');

  return findings;
}

function renderResITGC(){
  var r = App.results;
  if(!r){document.getElementById('content').innerHTML=noResults();return;}
  var findings = r.itgc || [];
  if(findings.length===0){
    document.getElementById('content').innerHTML = '<div class="fade" style="padding:40px;text-align:center;color:var(--txt3)"><h3 style="color:var(--orange)">ITGC analysis not run</h3><p>Re-run the analysis to populate ITGC results.</p></div>';
    return;
  }
  var byStatus = {FAIL:0,WARN:0,PASS:0,SKIP:0};
  findings.forEach(function(f){byStatus[f.status]=(byStatus[f.status]||0)+1;});
  var byCat = {};
  findings.forEach(function(f){if(!byCat[f.category])byCat[f.category]=[];byCat[f.category].push(f);});

  var h = [];
  h.push('<div class="fade">');
  h.push('<p style="font-size:12.5px;color:var(--txt2);margin-bottom:14px">IT General Controls assessment based on ISACA SAP Audit Guide, COBIT, and SOX §404 framework. '+findings.length+' controls evaluated across '+Object.keys(byCat).length+' domains.</p>');
  // KPI tiles
  h.push('<div class="g4" style="margin-bottom:16px">');
  [['FAIL','var(--red)'],['WARN','var(--orange)'],['PASS','var(--green)'],['SKIP','var(--txt3)']].forEach(function(it){
    h.push('<div class="kpi-card"><div class="kpi-label">'+it[0]+'</div><div class="kpi-value" style="color:'+it[1]+'">'+(byStatus[it[0]]||0)+'</div></div>');
  });
  h.push('</div>');
  // Controls by category
  Object.keys(byCat).forEach(function(cat){
    h.push('<div style="margin-bottom:14px"><div style="font-weight:700;font-size:13px;color:var(--txt);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bd)">'+cat+'</div>');
    byCat[cat].forEach(function(f){
      var c = f.status==='FAIL'?'var(--red)':f.status==='WARN'?'var(--orange)':f.status==='PASS'?'var(--green)':'var(--txt3)';
      var bg = f.status==='FAIL'?'rgba(240,60,60,.05)':f.status==='WARN'?'rgba(240,120,32,.05)':f.status==='PASS'?'rgba(24,200,120,.04)':'var(--bg3)';
      h.push('<div style="display:flex;gap:10px;padding:10px 14px;margin-bottom:6px;background:'+bg+';border:1px solid '+c+'30;border-radius:9px">');
      h.push('<div style="width:4px;border-radius:3px;background:'+c+';flex-shrink:0"></div>');
      h.push('<div style="flex:1">');
      h.push('<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px">');
      h.push('<span style="font-family:var(--mono);color:var(--txt3);font-size:10.5px;font-weight:700">'+f.id+'</span>');
      h.push('<span style="font-weight:700;font-size:13px;color:var(--txt)">'+f.name+'</span>');
      h.push('<span class="tag" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'55;padding:1px 7px;border-radius:9px;font-size:10px;font-weight:700">'+f.status+'</span>');
      if(f.sox)h.push('<span style="font-size:9.5px;color:var(--red);background:rgba(240,60,60,.1);padding:1px 6px;border-radius:9px;border:1px solid rgba(240,60,60,.25)">SOX</span>');
      h.push('</div>');
      h.push('<div style="font-size:11.5px;color:var(--txt2);margin-bottom:4px">'+f.desc+'</div>');
      h.push('<div style="font-size:11px;color:'+(f.status==='PASS'?'var(--green2)':'var(--orange2)')+';margin-bottom:3px"><strong>Evidence:</strong> '+f.evidence+'</div>');
      h.push('<div style="font-size:10px;color:var(--txt3);font-style:italic">Ref: '+f.ref+'</div>');
      // Drill-down: AI rec button for FAIL/WARN
      if(f.status==='FAIL' || f.status==='WARN'){
        var enc = encodeURIComponent(JSON.stringify(f));
        var rid = 'dd_itgc_'+f.id;
        h.push('<div style="margin-top:6px"><button class="btn btn-ghost btn-sm" data-cat="itgc" data-fid="'+enc+'" data-rid="'+rid+'" onclick="toggleDrillDown(this.dataset.rid,this.dataset.cat,this.dataset.fid)">Get AI Recommendation</button></div>');
        h.push('<div id="'+rid+'" style="display:none;margin-top:8px"></div>');
      }
      h.push('</div></div>');
    });
    h.push('</div>');
  });
  h.push('</div>');
  document.getElementById('content').innerHTML = h.join('');
}

function render(){
  // Auth check — bounce to login if no session
  if(!App.authChecked){
    App.authChecked = true;
    var u = currentUser();
    if(!u){
      renderLogin();
      return;
    }
    // Have session — make sure shell exists
    if(!document.getElementById('sidebar')) buildAppShell();
    if(App.systems.length===0) loadSystemsFromActiveCustomer();
  } else {
    // Subsequent renders: ensure user is still logged in
    if(!currentUser()){renderLogin();return;}
  }
  renderNav();renderTopbar();
  const v=App.view;
  if(v==='dashboard')renderDashboard();
  else if(v==='customers')renderCustomers();
  else if(v==='users')renderUsers();
  else if(v==='connect')renderConnect();
  else if(v==='ingest')renderIngest();
  else if(v==='risklibrary')renderRiskLibrary();
  else if(v==='analyze')renderAnalyze();
  else if(v==='res-sod')renderResSoD();
  else if(v==='res-sensitive')renderResSensitive();
  else if(v==='res-dormant')renderResDormant();
  else if(v==='res-default')renderResDefault();
  else if(v==='res-params')renderResParams();
  else if(v==='res-unused')renderResUnused();
  else if(v==='res-license')renderResLicense();
  else if(v==='res-itgc')renderResITGC();
  else if(v==='res-iso')renderResISO();
  else if(v==='res-role')renderResRole();
  else if(v==='modules')renderModules();
  else if(v==='ai-config')renderAIConfig();
  else if(v==='reports')renderReports();
  else renderDashboard();
}

// Save customer data periodically and before unload
window.addEventListener('beforeunload', function(){try{persistCustomers();}catch(e){}});

// Boot
document.addEventListener('DOMContentLoaded', async function(){
  await ensureDefaultAdmin();
  ensureDefaultCustomer();
  render();
});

</script>
</body>
