<style>
:root{
  /* ── BCS Secure Studio: Dark Navy + Gold/Yellow action theme ── */
  --bg:   #070c18;   /* deep navy canvas       */
  --bg2:  #0c1322;   /* sidebar / card base    */
  --bg3:  #111b2f;   /* panel / input base     */
  --bg4:  #172035;   /* elevated surface       */
  --bg5:  #1c2840;   /* subtle hover surface   */
  --bd:   #1e2e47;
  --bd2:  #263a56;
  --bd3:  #2e4668;   /* focus rings            */

  /* Text */
  --txt:  #e4edf8;
  --txt2: #7b96bb;
  --txt3: #3f5878;
  --txt4: #253349;

  /* Brand accent — Gold/Yellow (primary action) */
  --gold:   #f5c518;      /* primary CTA, active nav, focus rings   */
  --gold2:  #f0b800;      /* pressed/hover state                    */
  --gold-dim: rgba(245,197,24,.12);
  --gold-rim: rgba(245,197,24,.35);

  /* Semantic colours */
  --red:    #ef4444;
  --red2:   #ff7070;
  --orange: #f97316;
  --yellow: #fbbf24;
  --green:  #22c55e;
  --green2: #4ade80;
  --blue:   #3b82f6;
  --purple: #a855f7;
  --cyan:   #22d3ee;   /* kept for legacy refs — use --gold for actions */

  /* Typography */
  --font: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Consolas', monospace;

  /* Spacing / radius */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);font-family:var(--font);color:var(--txt);height:100%;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fade{animation:fadeIn .25s ease}
.spin{animation:spin .9s linear infinite}
.pulse{animation:pulse 2s ease-in-out infinite}

/* Layout */
#app{display:flex;height:100vh}
#sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
#main{flex:1;overflow:auto;display:flex;flex-direction:column}
#topbar{padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{padding:20px 24px;flex:1;overflow-y:auto}

/* Sidebar */
.sb-logo{padding:14px 13px 12px;border-bottom:1px solid var(--bd)}
.sb-logo .mark{width:34px;height:34px;border-radius:9px;background:var(--gold-dim);border:1px solid var(--gold-rim);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:var(--gold)}
.sb-logo .title{font-weight:700;font-size:13px;color:var(--txt)}
.sb-logo .sub{font-size:9.5px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.sb-sys{margin:8px 8px 2px;padding:7px 10px;border-radius:8px;transition:all .2s}
nav{flex:1;overflow-y:auto;padding:5px}
.nav-group{font-size:9px;font-weight:700;color:var(--txt4);text-transform:uppercase;letter-spacing:.12em;padding:6px 9px 3px}
.nav-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:7px;border:none;background:transparent;color:var(--txt2);font-size:12.5px;font-family:var(--font);cursor:pointer;text-align:left;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:rgba(245,197,24,.06)}
.nav-item.active{background:var(--gold-dim);color:var(--gold);font-weight:700;border-right:2px solid var(--gold)}
.nav-item .badge{margin-left:auto;background:var(--gold-dim);color:var(--gold);border-radius:10px;font-size:9px;padding:1px 5px;font-weight:700;font-family:var(--mono)}
.nav-item .dot{width:3px;height:14px;background:var(--gold);border-radius:2px;margin-left:auto}
.sb-bottom{padding:6px 7px 10px;border-top:1px solid var(--bd)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-weight:600;font-size:13px;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--gold);color:#0a0e1a;font-weight:700;letter-spacing:.02em}
.btn-primary:hover:not(:disabled){background:var(--gold2);box-shadow:0 0 0 3px var(--gold-rim)}
.btn-secondary{background:var(--bg4);border:1px solid var(--bd2);color:var(--txt2)}
.btn-secondary:hover{background:var(--bg3)}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--txt3)}
.btn-danger{background:rgba(240,60,60,.1);border:1px solid rgba(240,60,60,.3);color:var(--red)}
.btn-success{background:rgba(24,200,120,.1);border:1px solid rgba(24,200,120,.3);color:var(--green)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-lg);padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold-dim),transparent);pointer-events:none}
.panel{background:var(--bg3);border:1px solid var(--bd);border-radius:11px;padding:14px}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.full{grid-column:1/-1}

/* Form */
label{display:block;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--bd2);color:var(--txt);border-radius:9px;padding:8px 12px;font-size:12px;font-family:var(--mono);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
textarea{resize:vertical;min-height:60px}

/* Table */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:11.5px;font-family:var(--mono)}
thead tr{background:var(--bg3);border-bottom:1px solid var(--bd2)}
th{padding:8px 12px;text-align:left;color:var(--txt3);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
td{padding:7px 12px;color:var(--txt);vertical-align:middle;border-bottom:1px solid rgba(26,38,64,.5)}
tr:nth-child(even) td{background:rgba(9,14,26,.4)}
tr:hover td{background:rgba(0,200,240,.03)}

/* Tags / badges */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);white-space:nowrap}
.env-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;font-family:var(--mono)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px;gap:2px}
.tab{padding:8px 15px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt3);font-size:12.5px;font-weight:400;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.tab.active{border-bottom-color:var(--gold);color:var(--gold);font-weight:700}
.tab .tbadge{background:rgba(240,120,32,.2);color:var(--orange);border-radius:10px;font-size:9px;padding:1px 5px;font-weight:700}

/* Sev colours */
.sev-CRITICAL,.sev-CRIT{background:rgba(240,60,60,.15);color:#ff9090;border:1px solid rgba(240,60,60,.3)}
.sev-HIGH{background:rgba(240,120,32,.14);color:#ffb060;border:1px solid rgba(240,120,32,.28)}
.sev-MEDIUM,.sev-MED{background:rgba(232,192,32,.14);color:#f8e060;border:1px solid rgba(232,192,32,.25)}
.sev-LOW{background:rgba(24,200,120,.12);color:#70efb0;border:1px solid rgba(24,200,120,.22)}
.sev-PASS{background:rgba(24,200,120,.12);color:#70efb0;border:1px solid rgba(24,200,120,.22)}
.sev-FAIL{background:rgba(240,120,32,.14);color:#ffb060;border:1px solid rgba(240,120,32,.28)}
.sev-WARN{background:rgba(232,192,32,.14);color:#f8e060;border:1px solid rgba(232,192,32,.25)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9990;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:100%;max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;backdrop-filter:blur(12px);box-shadow:0 6px 28px rgba(0,0,0,.5);display:none;align-items:center;gap:8px;animation:fadeIn .2s ease}

/* System cards */
.sys-card{padding:12px 14px;border-radius:12px;border:2px solid var(--bd);background:var(--bg2);cursor:pointer;transition:all .2s;min-width:145px;position:relative}
.sys-card:hover{transform:translateY(-1px)}
.sys-card.active{border-color-opacity:.7}
.sys-env-ribbon{position:absolute;top:0;right:0;font-size:8px;font-weight:800;font-family:var(--mono);padding:2px 8px;border-radius:0 10px 0 8px}
.sys-dot-row{display:flex;align-items:center;gap:5px;margin-top:7px}
.sys-dot{width:7px;height:7px;border-radius:2px;background:var(--bd2)}

/* Progress */
.progress-track{height:4px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:4px;transition:width .4s ease}

/* Gauge */
.kpi-card{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:15px 17px;cursor:default;transition:border-color .15s}
.kpi-card.clickable{cursor:pointer}
.kpi-card.clickable:hover{border-color:var(--gold-rim);box-shadow:0 2px 12px rgba(245,197,24,.08)}
.kpi-label{font-size:9.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.kpi-value{font-size:34px;font-weight:700;font-family:var(--mono);line-height:1}
.kpi-sub{font-size:10.5px;color:var(--txt3);margin-top:5px}

/* Collapsible */
.collapse-hdr{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer;user-select:none;border-radius:10px 10px 0 0}
.collapse-body{padding:14px}

/* File drop */
.file-drop-label{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;border:1px dashed var(--bd2);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;margin-top:8px;color:var(--txt3)}
.file-drop-label:hover{border-color:var(--gold);color:var(--gold)}

/* Connection status dot */
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}

/* Scrollable log */
.log-box{background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:12px;font-family:var(--mono);font-size:11px;max-height:200px;overflow-y:auto}
.log-ok{color:var(--green)}.log-warn{color:var(--yellow)}.log-err{color:var(--red)}.log-info{color:var(--txt3)}

/* Bar chart */
.bar-wrap{display:flex;align-items:flex-end;gap:7px;height:100px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.bar-val{font-size:9px;color:var(--txt3);font-family:var(--mono)}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s ease}
.bar-lbl{font-size:9px;color:var(--txt3);text-align:center}

/* Risk library */
.risk-row{border:1px solid var(--bd);border-radius:10px;padding:11px 14px;margin-bottom:7px;transition:all .15s}
.risk-row.enabled{border-color:rgba(240,60,60,.2);background:rgba(240,60,60,.04)}
.toggle-btn{width:32px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle-knob{width:14px;height:14px;border-radius:50%;background:white;position:absolute;top:2px;transition:left .2s}

/* SAP connect form */
.conn-card{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:11px;margin-bottom:7px}

/* ── Compliance Dashboard ─────────────────────────────────────────── */
.compliance-dash{display:flex;flex-direction:column;gap:14px}

/* Demo + customer bars */
.demo-pill{padding:7px 14px;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.22);border-radius:var(--r-sm);font-size:12px;color:var(--purple);display:flex;align-items:center;gap:7px}
.system-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r-md);gap:12px}
.sys-id{display:flex;align-items:center;gap:10px}
.sys-sid{font-family:var(--mono);font-weight:800;font-size:16px}
.sys-meta{font-size:12px;color:var(--txt3)}
.sys-meta-right{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3)}
.customer-context-bar{display:flex;align-items:center;gap:9px;padding:9px 16px;background:var(--gold-dim);border:1px solid var(--gold-rim);border-radius:var(--r-md);margin-bottom:14px;font-size:12.5px;font-weight:600;color:var(--gold)}
.ctx-name{flex:1;font-weight:700}

/* Score hero row */
.score-hero-row{display:grid;grid-template-columns:160px 1fr;gap:14px;align-items:start}
.score-ring-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;min-height:190px}
.score-ring-card .card-eyebrow{margin-bottom:10px}
.score-svg{overflow:visible}
.score-grade{font-size:22px;font-weight:800;font-family:var(--mono);margin-top:4px}
.score-label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.08em}

/* Summary strip */
.summary-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.summary-card{display:flex;align-items:center;gap:12px;padding:14px;min-height:0}
.summary-icon-wrap{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.summary-body{flex:1;min-width:0}
.summary-card .kpi-value{font-size:26px}
.summary-card .kpi-label{font-size:9.5px;margin-bottom:1px;margin-top:3px}
.summary-card .kpi-sub{font-size:9px;color:var(--txt3)}

/* Card header utility */
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-eyebrow{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.09em}

/* Row 2 */
.dash-row-2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.dash-violators,.dash-roles,.dash-iso{min-height:230px}

/* Violator list */
.violator-list{display:flex;flex-direction:column;gap:4px}
.violator-row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--r-sm);background:var(--bg3);transition:background .15s}
.violator-row:hover{background:var(--bg4)}
.rank-badge{width:22px;height:22px;border-radius:6px;background:rgba(239,68,68,.12);color:var(--red);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.violator-info{flex:1;min-width:0}
.violator-user{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.violator-meta{font-size:10px;color:var(--txt3)}
.violator-count{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--red)}

/* Role risk breakdown */
.risk-breakdown{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.risk-row-item{display:flex;align-items:center;gap:8px}
.risk-row-label{width:58px;font-size:10.5px;font-weight:600;flex-shrink:0}
.risk-row-bar{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.risk-row-fill{height:100%;border-radius:3px;transition:width .5s ease}
.risk-row-count{width:38px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--txt2)}
.role-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding-top:10px;border-top:1px solid var(--bd)}
.role-stat{text-align:center}
.role-stat-v{font-family:var(--mono);font-size:20px;font-weight:700}
.role-stat-l{font-size:9px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

/* ISO donut */
.iso-donut-wrap{display:flex;align-items:center;gap:16px;margin-bottom:10px}
.iso-legend{display:flex;flex-direction:column;gap:5px}
.iso-leg-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--txt2)}
.iso-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.iso-gap-list{display:flex;flex-direction:column;gap:4px}
.iso-gap-item{display:flex;align-items:baseline;gap:8px;padding:5px 8px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:var(--r-sm)}
.iso-control-id{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--red);flex-shrink:0}
.iso-control-name{font-size:11px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Row 3 */
.dash-row-3{display:grid;grid-template-columns:2fr 1fr;gap:14px}

/* ITGC grid */
.itgc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.itgc-item{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg3);border-radius:var(--r-sm)}
.itgc-name{flex:1;font-size:11px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.itgc-status{font-size:9.5px;font-weight:700;font-family:var(--mono);flex-shrink:0}

/* Quick links / recommendations */
.quicklink-list{display:flex;flex-direction:column;gap:8px}
.quicklink-item{display:flex;align-items:flex-start;gap:8px;padding:8px;background:var(--bg3);border-radius:var(--r-sm);border:1px solid var(--bd)}
.quicklink-body{flex:1;min-width:0}
.quicklink-title{font-size:12px;font-weight:600;color:var(--txt)}
.quicklink-sub{font-size:10.5px;color:var(--txt3);margin-top:2px}

/* Empty states */
.empty-state-sm{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;color:var(--txt3);font-size:12px;text-align:center}
.compliance-empty{display:flex;align-items:center;justify-content:center;min-height:60vh}
.empty-hero{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;max-width:380px}
.empty-hero h2{font-size:20px;font-weight:700;color:var(--txt)}
.empty-hero p{font-size:13.5px;color:var(--txt3);line-height:1.5}
.empty-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* Nav icon alignment */
.nav-item{gap:9px}
.nav-ic{opacity:.65;transition:opacity .15s}
.nav-item.active .nav-ic{opacity:1}
.nav-item:hover .nav-ic{opacity:.9}
.nav-label{flex:1}
</style>

function getActiveModules(){
  var cust = getActiveCustomer();
  if(!cust) return Object.keys(ANALYSIS_MODULES).filter(function(k){return ANALYSIS_MODULES[k].default;});
  if(!cust.activeModules){
    cust.activeModules = Object.keys(ANALYSIS_MODULES).filter(function(k){return ANALYSIS_MODULES[k].default;});
  } else {
    // Backward-compat: merge any newly-introduced default-on modules that aren't yet in the saved list.
    // (e.g. 'role' module was default:false initially; now default:true)
    Object.keys(ANALYSIS_MODULES).forEach(function(k){
      if(ANALYSIS_MODULES[k].default && cust.activeModules.indexOf(k)<0){
        cust.activeModules.push(k);
      }
    });
  }
  return cust.activeModules;
}
function setActiveModules(arr){
  var cust = getActiveCustomer();
  if(!cust) return;
  cust.activeModules = arr;
  // persist
  var custs = getCustomers();
  var found = custs.find(function(c){return c.id===cust.id;});
  if(found) found.activeModules = arr;
  saveCustomers(custs);
}
function isModuleActive(key){return getActiveModules().indexOf(key)>=0;}

// ─── AI configuration (LLM API keys, stored per-user in localStorage) ──
function getAIConfig(){
  var u = currentUser(); if(!u) return {provider:'none'};
  var key = 'sapssa.aiconfig.'+u.id;
  try{var v=localStorage.getItem(key);return v?JSON.parse(v):{provider:'none'};}catch(e){return {provider:'none'};}
}
function saveAIConfig(cfg){
  var u = currentUser(); if(!u) return false;
  try{localStorage.setItem('sapssa.aiconfig.'+u.id, JSON.stringify(cfg));return true;}catch(e){return false;}
}

// ─── Call an LLM to generate a narrative; falls back to deterministic template ──
async function generateAINarrative(prompt, systemMsg){
  var cfg = getAIConfig();
  if(cfg.provider==='openai' && cfg.apiKey){
    try{
      var resp = await fetch('https://api.openai.com/v1/chat/completions', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey},
        body: JSON.stringify({
          model: cfg.model || 'gpt-4o-mini',
          messages: [
            {role:'system', content: systemMsg || 'You are a SAP security and audit advisor producing concise executive-level narratives.'},
            {role:'user', content: prompt}
          ],
          temperature: 0.3,
          max_tokens: 800
        })
      });
      if(!resp.ok){throw new Error('OpenAI '+resp.status);}
      var data = await resp.json();
      return data.choices?.[0]?.message?.content || '';
    }catch(e){return '[AI call failed: '+e.message+'. Falling back to rule-based narrative.]\n\n'+ruleBasedNarrative(prompt);}
  }
  if(cfg.provider==='anthropic' && cfg.apiKey){
    try{
      var resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':cfg.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({
          model: cfg.model || 'claude-3-5-haiku-latest',
          max_tokens: 800,
          system: systemMsg || 'You are a SAP security and audit advisor producing concise executive-level narratives.',
          messages: [{role:'user', content: prompt}]
        })
      });
      if(!resp.ok){throw new Error('Anthropic '+resp.status);}
      var data = await resp.json();
      return data.content?.[0]?.text || '';
    }catch(e){return '[AI call failed: '+e.message+'. Falling back to rule-based narrative.]\n\n'+ruleBasedNarrative(prompt);}
  }
  // No AI configured — use rule-based generator
  return ruleBasedNarrative(prompt);
}


// ─── AI per-finding recommendation ─────────────────────────────────
// Generate a focused remediation recommendation for ONE specific finding.
// Returns a Promise resolving to a string. Uses the configured LLM if available,
// otherwise produces a deterministic rule-based recommendation.
async function generateFindingRecommendation(category, finding){
  var cfg = getAIConfig();
  // Build the prompt
  var sys = 'You are a senior SAP security and audit advisor. For ONE specific finding, produce a concise remediation in this exact format:\n\n' +
            'ROOT CAUSE: one or two sentences explaining what is wrong technically.\n' +
            'BUSINESS RISK: one short sentence describing the impact.\n' +
            'REMEDIATION STEPS:\n' +
            '  1. <step with SAP T-code or parameter>\n' +
            '  2. <step>\n' +
            '  3. <step>\n' +
            '  4. <validation step>\n' +
            'REFERENCE: cite the SAP Note or framework section.';
  var prompt = 'FINDING CATEGORY: ' + category + '\n\nFINDING DETAIL (JSON):\n' + JSON.stringify(finding, null, 2);
  if(cfg.provider==='openai' || cfg.provider==='anthropic'){
    try { return await generateAINarrative(prompt, sys); }
    catch(e){ /* fallthrough to rule-based */ }
  }
  return ruleBasedFindingRec(category, finding);
}

function ruleBasedFindingRec(category, f){
  // Curated, deterministic recommendations keyed by category + finding kind
  var lines = [];
  var c = (category||'').toLowerCase();
  
  if(c==='sod'){
    lines.push('ROOT CAUSE: User '+(f.user||'-')+' holds transactions on both sides of the SoD rule "'+(f.name||f.ruleId||'-')+'" — '+(f.aTcodes||f.aT||'(side A)')+' AND '+(f.bTcodes||f.bT||'(side B)')+'.');
    lines.push('BUSINESS RISK: This combination allows the user to initiate, approve and conceal '+(f.sox?'SOX-relevant ':'')+'financial transactions without independent oversight.');
    lines.push('REMEDIATION STEPS:');
    lines.push('  1. In SU01, inspect the affected user\'s role list. Identify which role grants side A vs side B (use SUIM > Users by Authorization Object).');
    lines.push('  2. Determine which side is the user\'s primary function. Remove the secondary side via PFCG role re-assignment.');
    lines.push('  3. If both sides are operationally required, document a compensating control (e.g. monthly variance review) and route it through Internal Audit for sign-off.');
    lines.push('  4. Re-run the BCS analysis to confirm the conflict no longer appears under this user.');
    lines.push('REFERENCE: SOX §404; ISACA SAP Audit Guide §4; SAP Note 1488406.');
  }
  else if(c==='sensitive' || c==='sensitive_access' || c==='sensitiveaccess'){
    lines.push('ROOT CAUSE: User '+(f.user||'-')+' has access to '+(f.tcode||'-')+' ('+(f.name||f.desc||'sensitive transaction')+') which can modify code, configuration or master data outside normal change management.');
    lines.push('BUSINESS RISK: Sensitive transactions bypass standard controls; misuse can lead to unauthorised changes, fraud, or audit findings.');
    lines.push('REMEDIATION STEPS:');
    lines.push('  1. Confirm whether this user has a documented business need for '+(f.tcode||'this transaction')+'. If not, remove via PFCG.');
    lines.push('  2. If access is required, restrict via S_TCODE field-level authorisation to a single named composite role.');
    lines.push('  3. Enable SM19/SAL audit filters for '+(f.tcode||'this transaction')+' so every execution is logged.');
    lines.push('  4. Implement a 4-eye approval workflow for any change made through '+(f.tcode||'this transaction')+'.');
    lines.push('REFERENCE: SAP Security Baseline v1.8 §4.2; SAP Note 622464.');
  }
  else if(c==='dormant'){
    lines.push('ROOT CAUSE: User '+(f.user||'-')+' has been inactive for '+(f.daysLogin||'unknown')+' days'+(f.pwdIssue?' and has a stale password ('+(f.daysPwd||'?')+' days)':'')+'. Account is still unlocked.');
    lines.push('BUSINESS RISK: Dormant accounts are prime targets for credential theft and lateral movement; they also consume license entitlements.');
    lines.push('REMEDIATION STEPS:');
    lines.push('  1. Notify the user\'s line manager 7 days in advance.');
    lines.push('  2. In SU01 (or SU10 for mass action) lock the account by setting UFLAG.');
    lines.push('  3. Retain the locked account for 90 days; then delete via SU01 to free the user master entry and license seat.');
    lines.push('  4. Configure login/password_max_idle_initial=60 and login/password_max_idle_productive=180 to automate this going forward.');
    lines.push('REFERENCE: ISACA SAP Audit Guide §2.1; SAP Note 862989.');
  }
  else if(c==='defaultusers' || c==='default'){
    lines.push('ROOT CAUSE: Standard SAP user '+(f.user||'-')+' is present and '+(f.locked?'locked':'NOT LOCKED')+' in this client.');
    lines.push('BUSINESS RISK: Default users have well-known credentials; any attacker with network access can attempt logon.');
    lines.push('REMEDIATION STEPS:');
    lines.push('  1. In SU01, change '+(f.user||'this user')+'\'s password to a long random value stored only in your privileged-access vault.');
    lines.push('  2. Lock the account (UFLAG) in every client (000, 066, productive, all customer clients).');
    lines.push('  3. Set RZ10 parameter login/no_automatic_user_sapstar=1 to prevent SAP* re-creation if the entry is deleted.');
    lines.push('  4. Verify membership: '+(f.user||'this user')+' should not be in SAP_ALL or any productive composite role.');
    lines.push('REFERENCE: SAP Note 2216306; SAP Security Baseline v1.8 §3.1.');
  }
  else if(c==='params' || c==='parameter'){
    lines.push('ROOT CAUSE: Parameter '+(f.name||'-')+' is currently '+(f.current||'(unset)')+' but the SAP baseline target is '+(f.target||'-')+'.');
    lines.push('BUSINESS RISK: '+(f.desc||'Weak parameter values reduce the strength of authentication or audit controls.'));
    lines.push('REMEDIATION STEPS:');
    lines.push('  1. In RZ10, edit the default profile of each application server and set '+(f.name||'this parameter')+' to '+(f.target||'the target value')+'.');
    lines.push('  2. Save the profile and restart the affected SAP instances to activate.');
    lines.push('  3. For dynamic parameters, also use RZ11 to set the live value pending restart.');
    lines.push('  4. Verify via RZ11 or PAHI history after restart; document the change in your change-control system.');
    lines.push('REFERENCE: SAP Note 1731866 (Security Baseline overview); SAP Note 622464; SAP Security Baseline v1.8.');
  }
  else if(c==='unused'){
    lines.push('ROOT CAUSE: User '+(f.user||'-')+' is assigned '+(f.assigned||'?')+' transactions but has only used '+(f.used||0)+'. The remaining '+(f.unused||'?')+' transactions ('+(f.pct||'?')+'%) represent unused privilege.');
    lines.push('BUSINESS RISK: Unused access widens the attack surface and may push the user into a higher license tier than necessary.');
    lines.push('REMEDIATION STEPS:');
    lines.push('  1. Use the User-Role-Transaction Detail tab to identify which roles grant the unused transactions.');
    lines.push('  2. Meet with the user\'s line manager to confirm the truly required functions.');
    lines.push('  3. In PFCG, derive a smaller composite role using SU24 proposals based on observed usage.');
    lines.push('  4. Replace the broad role assignment with the new derived role; test in QAS first.');
    lines.push('REFERENCE: SAP Note 113290; ISACA SAP Audit Guide §2.4.');
  }
  else if(c==='role' || c==='roleanalysis'){
    // Role-level finding: use finding.kind to differentiate
    var k = f.kind || '';
    lines.push('ROOT CAUSE: Role "'+(f.role||f.name||'-')+'" — '+(f.detail||'finding').replace(/^/,''));
    if(k==='DISPLAY_MAINTENANCE'){
      lines.push('BUSINESS RISK: A role named like a display/view role actually carries CREATE/CHANGE/DELETE authority. Users believing they have read-only access can in fact modify data, defeating the design intent.');
      lines.push('REMEDIATION STEPS:');
      lines.push('  1. In PFCG, open the role and inspect every authorisation object containing ACTVT field.');
      lines.push('  2. Remove ACTVT values 01/02/06/etc., leaving only 03 (display) and 08 (print) where appropriate.');
      lines.push('  3. Re-generate the role profile and re-test in QAS before promoting via STMS.');
      lines.push('  4. If maintenance access is truly required, rename the role to reflect its real privilege level (drop the *_DISP suffix).');
    } else if(k==='WILDCARD_TCODE'){
      lines.push('BUSINESS RISK: Role grants S_TCODE = * — equivalent to SAP_ALL for transactions. Any user holding this role can execute any T-code.');
      lines.push('REMEDIATION STEPS:');
      lines.push('  1. In PFCG, replace S_TCODE = * with an explicit list of required transaction codes from the role description.');
      lines.push('  2. Cross-reference against SM20 usage to confirm which T-codes are actually used by holders of this role.');
      lines.push('  3. Re-generate the profile; retest in QAS.');
      lines.push('  4. Add a control to detect future S_TCODE = * via SUIM and alert.');
    } else if(k==='WILDCARD_ACTVT'){
      lines.push('BUSINESS RISK: Wildcard ACTVT grants every activity (create, change, delete, lock, archive...) on the affected objects, bypassing fine-grained control.');
      lines.push('REMEDIATION STEPS:');
      lines.push('  1. In PFCG, for each affected object, replace ACTVT = * with the minimum list of activities required (typically 03 for display, 01/02 only when justified).');
      lines.push('  2. Validate against SU24 proposals.');
      lines.push('  3. Re-generate and test.');
      lines.push('  4. Lock this role until the wildcard is removed.');
    } else if(k==='SENSITIVE_TCODES'){
      lines.push('BUSINESS RISK: Sensitive transactions (SE38, F110, OB52 etc.) baked into a role spread privileged access to everyone holding the role.');
      lines.push('REMEDIATION STEPS:');
      lines.push('  1. In PFCG, remove the listed sensitive T-codes from this role.');
      lines.push('  2. Create a dedicated privileged composite role (e.g. Z_BASIS_SENSITIVE_ACCESS) and assign only to named individuals.');
      lines.push('  3. Audit-filter all execution of the affected transactions in SM19.');
      lines.push('  4. Require 4-eye approval for assignment of the privileged composite role.');
    } else if(k==='ROLE_SOD'){
      lines.push('BUSINESS RISK: Both sides of an SoD conflict are within the same role. Every user holding this role automatically violates the rule.');
      lines.push('REMEDIATION STEPS:');
      lines.push('  1. Split this role into two: one carrying side A of the conflict, one carrying side B.');
      lines.push('  2. Assign at most one of the two split roles to any user; document the assignment policy.');
      lines.push('  3. If both sides are operationally needed by the same user, escalate to formal compensating-control review with Internal Audit.');
      lines.push('  4. Re-run BCS analysis to confirm the role-level SoD no longer appears.');
    } else if(k==='NAMING'){
      lines.push('BUSINESS RISK: Inconsistent naming makes role inventory hard to audit and increases the chance of mis-assignment.');
      lines.push('REMEDIATION STEPS:');
      lines.push('  1. Document the customer\'s actual naming convention based on the derived pattern shown in the Naming Convention tab.');
      lines.push('  2. For each deviating role, plan a rename in DEV and transport through STMS — this preserves history.');
      lines.push('  3. Update role documentation and role-owner registry to reflect the new names.');
      lines.push('  4. Going forward, enforce the convention via PFCG naming-convention checks or a custom transport-time validation.');
    } else {
      lines.push('BUSINESS RISK: '+(f.detail||'See finding detail.'));
      lines.push('REMEDIATION STEPS:');
      lines.push('  1. Open the role in PFCG and inspect the authorisations flagged.');
      lines.push('  2. Apply least-privilege adjustments.');
      lines.push('  3. Re-generate and test in QAS.');
      lines.push('  4. Re-run BCS analysis to confirm closure.');
    }
    lines.push('REFERENCE: SAP Note 1488406 (Role design best practices); ISACA SAP Audit Guide §4.');
  }
  else if(c==='itgc'){
    lines.push('ROOT CAUSE: '+(f.desc||f.detail||'-')+' Evidence: '+(f.evidence||'-'));
    lines.push('BUSINESS RISK: ITGC failure typically translates into an audit qualification or a SOX deficiency.');
    lines.push('REMEDIATION STEPS:');
    if(typeof itgcFixText === 'function'){
      var guide = itgcFixText(f);
      var steps = guide.split(/(?<=\.)\s+/).filter(function(s){return s.trim();});
      steps.slice(0,4).forEach(function(s,i){lines.push('  '+(i+1)+'. '+s);});
    } else {
      lines.push('  1. Follow the cited SAP Note and Security Baseline section.');
      lines.push('  2. Apply the configuration change in QAS first.');
      lines.push('  3. Promote via STMS to PRD.');
      lines.push('  4. Re-run BCS to confirm pass.');
    }
    lines.push('REFERENCE: '+(f.ref||'ISACA SAP Audit Guide; SOX §404.'));
  }
  else if(c==='iso'){
    lines.push('ROOT CAUSE: ISO 27001:2022 control '+(f.id||'-')+' ("'+(f.name||'-')+'") is currently in GAP status: '+(f.evidence||'-'));
    lines.push('BUSINESS RISK: ISMS gap; control objective is not being met by the current SAP configuration.');
    lines.push('REMEDIATION STEPS:');
    lines.push('  1. Identify which BCS finding categories are linked to this ISO control (see Linked findings list).');
    lines.push('  2. Remediate the underlying BCS findings (SoD, ITGC, sensitive access, etc.).');
    lines.push('  3. Update the ISMS evidence register to reflect the new control state.');
    lines.push('  4. Schedule re-assessment in the next audit cycle.');
    lines.push('REFERENCE: ISO/IEC 27001:2022 Annex A '+(f.id||'')+'; ISO/IEC 27002:2022 control objective.');
  }
  else {
    lines.push('ROOT CAUSE: '+JSON.stringify(f).slice(0,200));
    lines.push('BUSINESS RISK: See finding detail for context.');
    lines.push('REMEDIATION STEPS:');
    lines.push('  1. Inspect the affected entity in the relevant SAP transaction.');
    lines.push('  2. Apply least-privilege correction.');
    lines.push('  3. Test in QAS and promote via STMS.');
    lines.push('  4. Re-run BCS to confirm closure.');
    lines.push('REFERENCE: SAP Security Baseline v1.8; ISACA SAP Audit Guide.');
  }
  return lines.join('\n');
}

// Cache AI recommendations so we don\'t regenerate on every render
if(!window.__aiRecCache) window.__aiRecCache = {};

function aiRecKey(category, finding){
  // Build a stable key from the finding's identifying fields
  if(finding.user && finding.tcode) return category+'|'+finding.user+'|'+finding.tcode;
  if(finding.user && finding.ruleId) return category+'|'+finding.user+'|'+finding.ruleId;
  if(finding.role && finding.kind) return category+'|'+finding.role+'|'+finding.kind;
  if(finding.id) return category+'|'+finding.id;
  if(finding.user) return category+'|'+finding.user;
  if(finding.name) return category+'|'+finding.name;
  return category+'|'+JSON.stringify(finding).slice(0,80);
}

async function showAIRec(category, findingJson, targetId){
  var target = document.getElementById(targetId);
  if(!target) return;
  var finding = (typeof findingJson === 'string') ? JSON.parse(decodeURIComponent(findingJson)) : findingJson;
  var key = aiRecKey(category, finding);

function formatAIRec(text, category, finding){
  var cfg = getAIConfig();
  var src = (cfg.provider==='openai' || cfg.provider==='anthropic') ? cfg.provider+' '+(cfg.model||'') : 'rule-based';
  var html = ['<div style="margin-top:8px;padding:12px 14px;background:linear-gradient(180deg,rgba(0,200,240,.04),rgba(0,200,240,.01));border:1px solid rgba(0,200,240,.25);border-radius:9px">'];
  html.push('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)">');
  html.push('<span style="font-size:10.5px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.08em">Recommendation</span>');
  html.push('<span style="font-size:9.5px;color:var(--txt3);font-style:italic">'+src+'</span>');
  html.push('</div>');
  // Render formatted text
  var sections = text.split(/\n(?=ROOT CAUSE:|BUSINESS RISK:|REMEDIATION STEPS:|REFERENCE:)/);
  sections.forEach(function(sec){
    var trimmed = sec.trim();
    if(!trimmed) return;
    var headerMatch = trimmed.match(/^(ROOT CAUSE|BUSINESS RISK|REMEDIATION STEPS|REFERENCE):\s*([\s\S]*)/);
    if(headerMatch){
      var hdr = headerMatch[1];
      var body = headerMatch[2];
      var color = hdr==='ROOT CAUSE'?'var(--orange)':hdr==='BUSINESS RISK'?'var(--red)':hdr==='REMEDIATION STEPS'?'var(--cyan)':'var(--txt3)';
      html.push('<div style="margin:6px 0"><div style="font-size:10px;font-weight:700;color:'+color+';text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">'+hdr+'</div>');
      html.push('<div style="font-size:11.5px;color:var(--txt2);line-height:1.55;white-space:pre-wrap">'+escapeHtml(body)+'</div></div>');
    } else {
      html.push('<div style="font-size:11.5px;color:var(--txt2);line-height:1.55;white-space:pre-wrap">'+escapeHtml(trimmed)+'</div>');
    }
  });
  html.push('</div>');
  return html.join('');
}

function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});
}

// Deterministic, rule-based narrative generator (mimics AI tone, runs offline)
function ruleBasedNarrative(prompt){
  // The prompt contains the JSON stats; we parse them out and produce a structured narrative
  try {
    var m = prompt.match(/STATS:\s*(\{[^}]+\})/);
    var stats = m ? JSON.parse(m[1]) : null;
    if(!stats) return 'A rule-based narrative could not be generated because the analysis statistics were not recognised.';
    var grade = stats.score>=80?'A':stats.score>=60?'B':stats.score>=40?'C':stats.score>=20?'D':'F';
    var verdict = stats.score>=60?'a generally healthy posture':'material weaknesses that require immediate attention';
    var lines = [];
    lines.push('CURRENT STATE');
    lines.push('The analysis of '+stats.users+' users and '+stats.roles+' roles produced a risk score of '+stats.score+'/100 (Grade '+grade+'), indicating '+verdict+'.');
    if(stats.sodCount>0) lines.push('Segregation-of-duties analysis found '+stats.sodCount+' conflicts, '+stats.soxCount+' of which are SOX-relevant and audit-blocking.');
    if(stats.dormantCount>0) lines.push('User-master hygiene shows '+stats.dormantCount+' dormant or password-stale accounts that need to be locked under current policy.');
    if(stats.defaultCount>0) lines.push(stats.defaultCount+' default SAP accounts are present in the user master — these must be locked across all clients.');
    if(stats.paramFails>0) lines.push(stats.paramFails+' security parameters fall below the SAP Security Baseline v1.8 targets.');
    if(stats.itgcCount>0) lines.push(stats.itgcCount+' IT General Controls failed evaluation, with '+stats.itgcWarn+' additional warnings.');

    lines.push('');
    lines.push('GAP ANALYSIS');
    var gaps = [];
    if(stats.sodCount>0) gaps.push('SoD conflicts (especially the '+stats.soxCount+' SOX-relevant ones)');
    if(stats.defaultCount>0) gaps.push('default-user lockdown');
    if(stats.paramFails>0) gaps.push('security parameter hardening');
    if(stats.itgcCount>0) gaps.push('ITGC control remediation');
    if(stats.dormantCount>0) gaps.push('dormant account cleanup');
    lines.push('The most material gaps are: '+(gaps.length?gaps.join(', ')+'.':'none material at this point.'));

    lines.push('');
    lines.push('WHAT IS WORKING WELL');
    var goods = [];
    if(stats.itgcPass>0) goods.push(stats.itgcPass+' ITGC controls are passing');
    if(stats.defaultCount===0) goods.push('default SAP users are appropriately locked');
    if(stats.paramFails===0 && stats.params) goods.push('security parameters meet baseline');
    if(stats.sodCount===0) goods.push('no SoD conflicts detected');
    lines.push(goods.length>0 ? goods.join('; ')+'.' : 'Limited positives at this stage — the foundational controls need attention before strengths can be highlighted.');

    lines.push('');
    lines.push('REMEDIATION PLAN');
    lines.push('Stage 1 (Weeks 0-2 — Stabilise): action the P1 items in the recommendations — default users, critical SoD, debug authorisations.');
    lines.push('Stage 2 (Weeks 2-6 — Remediate): work through P2 items — passwords, dormant accounts, SOX-flagged SoD with compensating controls.');
    lines.push('Stage 3 (Weeks 6-12 — Harden): close P3 items — parameter alignment, role right-sizing, license optimisation.');
    lines.push('Stage 4 (Quarterly — Sustain): re-run BCS SAP Secure Studio each cycle; track risk-score trajectory and brief the CIO.');
    return lines.join('\n');
  } catch(e){
    return 'Narrative generation failed: '+e.message;
  }
}

// ── SHA-256 password hashing (browser SubtleCrypto) ──
async function hashPassword(password, salt){
  if(!salt) salt = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  const enc = new TextEncoder().encode(salt + ':' + password);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hex = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  return salt + '$' + hex;
}
async function verifyPassword(password, stored){
  const parts = (stored||'').split('$');
  if(parts.length !== 2) return false;
  const test = await hashPassword(password, parts[0]);
  return test === stored;
}

      // Strip File objects/etc. — only persist structural data + parsed rows

          Object.keys(s.files).forEach(function(k){
            var f = s.files[k];
            // Only keep small files in localStorage; large ones aren't persisted (size limit ~5MB)
            if(f && f.rowCount){
              safeFiles[k] = {fileName:f.fileName, rowCount:f.rowCount, size:f.size||0, loaded:f.loaded, diagnostic:f.diagnostic};
              // Persist rows ONLY if small enough; otherwise mark as needing re-upload
              if(f.rows && JSON.stringify(f.rows).length < 2_000_000){
                safeFiles[k].rows = f.rows;
              } else {
                safeFiles[k]._tooLarge = true;
              }
            }
          });
        }
        return Object.assign({}, s, {files: safeFiles, password:''}); // never persist SAP passwords
      });
    }
    return c;
  }));
}

// ─── CSV parser ─────────────────────────────────────────────────
// ─── parseCSV — handles standard CSV/TSV, semicolon, and SAP "pipe-table" formats ──
function parseCSV(text){
  if(!text)return[];
  // Strip UTF-8 BOM
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  if(!text.trim())return[];
  // Pre-process: split lines, drop carriage returns
  let rawLines=text.split(/\r?\n/);

  // ── FORMAT DETECTION ───────────────────────────────────────
  // Detect SAP "pipe table" format: lots of lines that start AND end with |,
  // interspersed with --- separator lines (SE16/SE16N "ALV Grid" download)
  let pipeLineCount=0, dashLineCount=0;
  for(let i=0;i<Math.min(rawLines.length,40);i++){
    const t=rawLines[i].trim();
    if(/^\|.*\|$/.test(t)) pipeLineCount++;
    else if(/^-{20,}$/.test(t)) dashLineCount++;
  }
  const isPipeTable = pipeLineCount>=3 && dashLineCount>=1;

  let lines, sep;

  if(isPipeTable){
    // SAP pipe-table: keep only lines that look like | col | col | col |
    // First such line after the first --- separator is the header
    lines = rawLines.filter(function(l){
      const t=l.trim();
      return /^\|.*\|$/.test(t) && !/^[-|\s]+$/.test(t);
    });
    sep = '|';
  } else {
    // Strip blank lines, BUT preserve order for separator-row detection
    lines = rawLines.filter(function(l){return l.trim();});
    if(lines.length<2) return [];
    // Detect separator from first non-blank line
    const h0=lines[0];
    sep = h0.includes('\t')?'\t' : h0.includes(';')?';' : h0.includes('|')?'|' : ',';
  }

  if(lines.length<2)return[];

  // ── Parse helper: split a row honouring quotes ──
  function splitRow(line){
    const vals=[];let cur='',inQ=false;
    if(sep==='|'){
      // For pipe tables: split on |, drop the leading/trailing empties from the
      // outer | characters, and trim each cell
      const parts=line.split('|');
      // First and last element are typically empty (from leading/trailing |)
      for(let i=1;i<parts.length-1;i++) vals.push(parts[i].trim());
      return vals;
    }
    for(const c of line+sep){
      if(c==='"'){inQ=!inQ;}
      else if(c===sep && !inQ){
        vals.push(cur.replace(/^["']+|["']+$/g,'').trim());
        cur='';
      } else cur+=c;
    }
    return vals;
  }

  // ── HEADER DETECTION ──
  // Look at the first few rows; the "real" header is the first row where:
  //   • >= 2 cells are non-empty, AND
  //   • cells look like SAP column names (mostly uppercase, no spaces, no numbers-only)
  // This skips junk like ";;;;;" separator rows and "5740 Entries" banners.
  function looksLikeHeader(cells){
    const nonEmpty = cells.filter(function(c){return c && c.length>0;});
    if(nonEmpty.length<2) return false;
    // Reject lines that are mostly numeric (data row)
    const looksColumn = nonEmpty.filter(function(c){
      // A column name is short, no spaces in the middle, alpha-leading
      const u=c.trim();
      if(!u) return false;
      if(/^\d+$/.test(u)) return false;             // pure numbers
      if(/^[\d.,/-]+$/.test(u)) return false;       // dates / numbers
      if(/^[-=_*#]+$/.test(u)) return false;         // separator chars
      return /^[A-Z_][A-Z0-9_./-]*$/i.test(u) || /[A-Z]/i.test(u);
    }).length;
    return looksColumn >= Math.max(2, nonEmpty.length*0.6);
  }

  let headerIdx=0;
  for(let i=0;i<Math.min(lines.length,6);i++){
    const cells=splitRow(lines[i]);
    if(looksLikeHeader(cells)){headerIdx=i;break;}
  }

  // Parse headers, uppercase + strip whitespace/BOM/quotes
  const rawHdrs = splitRow(lines[headerIdx]);
  const hdrs = rawHdrs.map(function(h){
    return (h||'').replace(/^[\uFEFF\s"']+|[\s"']+$/g,'').toUpperCase();
  });
  // If the FIRST column is empty (e.g. AGR_USERS.csv: ";MANDT;AGR_NAME;..."),
  // we leave it as "" — the col() helper just skips empty keys
  // Note: header names with dots (e.g. "AUTH.OBJECT" -> "AUTH.OBJECT") are kept
  //       as-is; COL_ALIASES handles common variants

  // ── Parse data rows ──
  const out = [];
  for(let i=headerIdx+1;i<lines.length;i++){
    const line=lines[i];
    if(!line || !line.trim()) continue;
    // Skip separator lines (---, ===, all-pipes, all-semicolons)
    const t=line.trim();
    if(/^[-=_]+$/.test(t)) continue;
    if(/^[;,\t|]+$/.test(t)) continue;   // empty/separator row (";;;;" etc.)
    const vals = splitRow(line);
    // Skip rows that have nothing meaningful
    if(vals.every(function(v){return !v;})) continue;
    const row = {};
    for(let k=0;k<hdrs.length;k++){
      if(hdrs[k]) row[hdrs[k]] = (vals[k]||'').trim();
    }
    out.push(row);
  }
  return out;
}

// ─── Normalise a date that may be in European DD.MM.YYYY format ──
function normalizeDate(v){
  if(!v) return '';
  const s = String(v).trim();
  // Already SAP-internal YYYYMMDD?
  if(/^\d{8}$/.test(s)) return s;
  // DD.MM.YYYY
  let m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(m) return m[3] + m[2].padStart(2,'0') + m[1].padStart(2,'0');
  // YYYY-MM-DD
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1] + m[2].padStart(2,'0') + m[3].padStart(2,'0');
  // DD/MM/YYYY (UK)
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) return m[3] + m[2].padStart(2,'0') + m[1].padStart(2,'0');
  // MM/DD/YYYY (US) — ambiguous, only use if it doesn't fit DD/MM
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m && parseInt(m[1])>12) return m[3] + m[1].padStart(2,'0') + m[2].padStart(2,'0');
  return s;
}

// ─── COLUMN ALIASES — handle SAP export variations (UNAME vs BNAME, ROLE vs AGR_NAME, etc.) ──
const COL_ALIASES = {
  BNAME:      ['BNAME','USER','USERNAME','USER_ID','USERID','UNAME','BENUTZER','USR'],
  AGR_NAME:   ['AGR_NAME','ROLE','ROLENAME','ROLE_NAME','AGR','PROFILE','ROLLENNAME'],
  OBJECT:     ['OBJECT','AUTH_OBJECT','OBJ','AUTHOBJECT','AUTHORIZATION_OBJECT','BERECHTIGUNGSOBJEKT'],
  FIELD:      ['FIELD','AUTH_FIELD','FIELDNAME','FELDNAME'],
  LOW:        ['LOW','VALUE','VAL','FROM_VALUE','LOW_VALUE','VON','WERT'],
  HIGH:       ['HIGH','TO','TO_VALUE','HIGH_VALUE','BIS'],
  TRDAT:      ['TRDAT','LAST_LOGON','LAST_LOGIN','LOGON_DATE','LSTLGD','LTLDA','LASTLOGIN','LAST_LOGON_DATE','LETZTE_ANMELDUNG'],
  PWDLGNDATE: ['PWDLGNDATE','PWD_CHG_DATE','LAST_PWD_CHG','PASSWORD_DATE','PWDCNGDATE','PASS_LAST_CHG','LAST_PASSWORD_CHANGE','PASSWORT_GEAENDERT'],
  USTYP:      ['USTYP','USER_TYPE','TYPE','USRTYP','TYP'],
  UFLAG:      ['UFLAG','LOCKED','LOCK_FLAG','LOCKFLAG','LOCK','USER_LOCKED','GESPERRT'],
  PARNAME:    ['PARNAME','PARAMETER','PARAM','NAME','PARAM_NAME','PARAMETERNAME'],
  PARVAL:     ['PARVAL','PVALUE','VALUE','VAL','PARAM_VALUE','SETTING','PARAM_VAL','WERT'],
  TCODE:      ['TCODE','T_CODE','TCD','TRANSACTION','TRANSACTION_CODE','TX','REPID','TCODE_NAME'],
  FROM_DAT:   ['FROM_DAT','FROMDAT','VALID_FROM','VFROM','START','BEGDA'],
  TO_DAT:     ['TO_DAT','TODAT','VALID_TO','VTO','END','ENDDA'],
};

// Resolve a canonical column value across alias variations
function col(row, canonical){
  if(!row) return '';
  // Direct match first
  if(row[canonical] !== undefined && row[canonical] !== '') return row[canonical];
  const aliases = COL_ALIASES[canonical];
  if(!aliases) return '';
  for(const a of aliases){
    if(row[a] !== undefined && row[a] !== '') return row[a];
  }
  return '';
}

// Detect which key columns were found in a parsed table (for diagnostics)
function detectColumns(rows, expected){
  if(!rows||!rows.length) return {found:[],missing:expected,sample:{}};
  const headers = Object.keys(rows[0]);
  const found = [], missing = [];
  expected.forEach(function(canonical){
    const aliases = COL_ALIASES[canonical] || [canonical];
    var hit = headers.find(function(h){return aliases.indexOf(h.toUpperCase())>=0;});
    if(hit) found.push(canonical+' (as '+hit+')');
    else missing.push(canonical);
  });
  return {found:found, missing:missing, sample:rows[0], headers:headers};
}

function daysSince(ds){
  if(!ds) return 9999;
  const n = normalizeDate(ds);
  if(!n || n.length<8) return 9999;
  try{
    const d=new Date(n.slice(0,4)+'-'+n.slice(4,6)+'-'+n.slice(6,8));
    return isNaN(d)?9999:Math.floor((Date.now()-d)/86400000);
  }catch(e){return 9999;}
}
function getRows(fileObj){
  if(!fileObj)return[];
  if(Array.isArray(fileObj))return fileObj;
  if(fileObj.rows)return fileObj.rows;
  return[];
}

// ─── SAP OData fetcher via CORS proxy ───────────────────────────
async function sapFetch(sys, entity, params=''){
  if(sys.mode==='demo')throw new Error('DEMO_MODE');
  const baseUrl=`http://${sys.host}:${sys.port}/sap/opu/odata/sap/ZTEST_TABLE_SRV/${entity}?$format=json&${params}`;
  if(sys.mode==='proxy'){
    const proxyUrl=(sys.proxyUrl||'http://localhost:3100').replace(/\/$/,'');
    const resp=await fetch(`${proxyUrl}/proxy`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:baseUrl,username:sys.user,password:sys.password}),
      signal:AbortSignal.timeout(20000)
    });
    if(!resp.ok)throw new Error(`Proxy HTTP ${resp.status}`);
    const env=await resp.json();
    if(!env.ok)throw new Error(`SAP HTTP ${env.status}`);
    const d=env.data;
    return d?.d?.results||d?.value||(Array.isArray(d)?d:[]);
  }
  // Direct
  const r=await fetch(baseUrl,{headers:{'Authorization':'Basic '+btoa(`${sys.user}:${sys.password}`)},signal:AbortSignal.timeout(15000)});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const j=await r.json();
  return j?.d?.results||j?.value||[];
}

async function testConnection(sys){
  if(sys.mode==='demo')return{ok:true,msg:'Demo mode — using built-in data'};
  if(sys.mode==='proxy'){
    const proxyBase=(sys.proxyUrl||'http://localhost:3100').replace(/\/$/,'');
    try{
      const ctrl=new AbortController();
      setTimeout(()=>ctrl.abort(),5000);
      const hr=await fetch(`${proxyBase}/health`,{signal:ctrl.signal});
      if(!hr.ok)return{ok:false,msg:`Proxy HTTP ${hr.status}`};
    }catch(e){return{ok:false,msg:`Proxy unreachable: ${e.name==='AbortError'?'timeout':e.message}. Run: python3 sap_proxy.py`};}
  }
  if(!sys.host)return{ok:false,msg:'No host configured'};
  try{
    await sapFetch(sys,'InputsSet','$top=1');
    return{ok:true,msg:`Connected to ${sys.sid} via ${sys.mode}`};
  }catch(e){
    if(e.message.includes('DEMO_MODE'))return{ok:true,msg:'Demo mode'};
    return{ok:false,msg:e.message};
  }
}

// ─── ANALYSIS ENGINE ────────────────────────────────────────────
function buildAuthMap(agrUsers,agrAuth){
  const roleMap={};
  agrAuth.forEach(function(r){
    const role=String(col(r,'AGR_NAME')||'').trim();
    const obj=String(col(r,'OBJECT')||'').toUpperCase().trim();
    const field=String(col(r,'FIELD')||'').toUpperCase().trim();
    const low=String(col(r,'LOW')||'').toUpperCase().trim();
    if(!role||!obj) return;
    if(!roleMap[role])roleMap[role]={tcodes:new Set(),aobjs:new Set(),triples:[]};
    if(obj==='S_TCODE' && low) roleMap[role].tcodes.add(low);
    else roleMap[role].aobjs.add(obj);
    roleMap[role].triples.push({obj,field,value:low});
  });
  const umap={};
  agrUsers.forEach(function(r){
    const u=String(col(r,'BNAME')||'').trim();
    const role=String(col(r,'AGR_NAME')||'').trim();
    if(!u||!role)return;
    if(!umap[u])umap[u]={roles:new Set(),tcodes:new Set(),aobjs:new Set(),triples:[]};
    umap[u].roles.add(role);
    const rm=roleMap[role];
    if(rm){
      rm.tcodes.forEach(function(t){umap[u].tcodes.add(t);});
      rm.aobjs.forEach(function(o){umap[u].aobjs.add(o);});
      rm.triples.forEach(function(tr){umap[u].triples.push(tr);});
    }
  });
  return umap;
}

// ─── LICENSE ANALYSIS: map each user to a license type via rule file ──
function runLicense(umap, rules){
  // Build quick lookup of user authorizations (tcodes + obj/field/value)
  const out=[];
  Object.entries(umap).forEach(function(entry){
    var user=entry[0], auth=entry[1];
    var matched=null, matchedRule=null;
    // Evaluate every rule; keep the highest-ranked (lowest priority number)
    rules.forEach(function(rule){
      var ruleObj=(rule.obj||'').toUpperCase();
      var ruleField=(rule.field||'').toUpperCase();
      var ruleVal=(rule.value||'').toUpperCase();
      var hit=false;
      if(ruleObj==='S_TCODE'){
        hit = auth.tcodes.has(ruleVal) || auth.tcodes.has('*');
      } else {
        // match obj + (field optional) + value (or wildcard)
        hit = auth.triples.some(function(t){
          if(t.obj!==ruleObj) return false;
          if(ruleField && t.field && t.field!==ruleField) return false;
          if(ruleVal==='*' ) return true;
          return t.value===ruleVal || t.value==='*';
        });
      }
      if(hit){
        var rank=LICENSE_RANK[rule.ltype]||99;
        if(matched===null || rank < (LICENSE_RANK[matched]||99)){
          matched=rule.ltype; matchedRule=rule;
        }
      }
    });
    out.push({
      user:user,
      license: matched||'GE',
      licenseName: matched?(LICENSE_NAMES[matched]||matched):'Employee Self-Service',
      licenseDesc: matchedRule?matchedRule.ldesc:'No privileged authorizations matched — default minimal license',
      matchedOn: matchedRule?(matchedRule.obj+(matchedRule.value?(' = '+matchedRule.value):'')):'—',
      roles:[...auth.roles].slice(0,3).join(', '),
      tcodeCount:auth.tcodes.size
    });
  });
  // sort by license rank (most privileged first)
  out.sort(function(a,b){return (LICENSE_RANK[a.license]||99)-(LICENSE_RANK[b.license]||99);});
  return out;
}

function runSoD(umap, enabledRules){
  const violations=[];
  SOD_LIBRARY.filter(r=>!r.type&&enabledRules.has(r.id)).forEach(rule=>{
    const t1=new Set(rule.f1.tcodes.map(t=>t.toUpperCase()));
    const t2=new Set(rule.f2.tcodes.map(t=>t.toUpperCase()));
    Object.entries(umap).forEach(([user,auth])=>{
      const has1=[...t1].some(t=>auth.tcodes.has(t)||auth.tcodes.has('*'));
      const has2=[...t2].some(t=>auth.tcodes.has(t)||auth.tcodes.has('*'));
      if(has1&&has2){
        violations.push({
          user,ruleId:rule.id,name:rule.name,area:rule.area,sev:rule.sev,sox:rule.sox,
          f1:rule.f1.name,f2:rule.f2.name,
          tc1:[...t1].filter(t=>auth.tcodes.has(t)||auth.tcodes.has('*')).slice(0,4).join(', '),
          tc2:[...t2].filter(t=>auth.tcodes.has(t)||auth.tcodes.has('*')).slice(0,4).join(', '),
          roles:[...auth.roles].slice(0,3).join(', '),
          mitigation:rule.mitigation,
        });
      }
    });
  });
  return violations.sort((a,b)=>{const o={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};return(o[a.sev]||9)-(o[b.sev]||9);});
}

function runSensitive(umap, enabledRules){
  const out=[];
  SOD_LIBRARY.filter(r=>r.type==='SENSITIVE'&&enabledRules.has(r.id)).forEach(rule=>{
    (rule.tcodes||[]).forEach(tc=>{
      const tcUp=tc.toUpperCase();
      Object.entries(umap).forEach(([user,auth])=>{
        if(auth.tcodes.has(tcUp)||auth.tcodes.has('*')){
          out.push({user,ruleId:rule.id,name:rule.name,tcode:tc,sev:rule.sev,area:rule.area,sox:rule.sox,
            roles:[...auth.roles].slice(0,2).join(', '),mitigation:rule.mitigation});
        }
      });
    });
  });
  return out;
}

function runDormant(usr02, threshold=90){
  return usr02.map(function(u){
    const trdat = col(u,'TRDAT')||'';
    const pwddat = col(u,'PWDLGNDATE')||'';
    const ustyp = col(u,'USTYP')||'A';
    const days = daysSince(trdat);
    const pdDays = daysSince(pwddat);
    const locked = !!col(u,'UFLAG');
    return{
      user: col(u,'BNAME')||'',
      type: ustyp,
      lastLogin: trdat||'Never',
      daysLogin: days,
      lastPwd: pwddat||'Never',
      daysPwd: pdDays,
      locked: locked,
      isDormant: days>threshold,
      pwdIssue: pdDays>90 && ustyp==='A',
    };
  }).filter(function(u){return u.isDormant||u.pwdIssue;});
}

function runParamCheck(paramRows){
  return SAP_PARAMS.map(bp=>{
    const row=paramRows.find(function(p){return (col(p,'PARNAME')||'').toLowerCase()===bp.name.toLowerCase();});
    const current=row?(col(row,'PARVAL')||'—'):'Not retrieved';
    let status='WARN';
    if(!row){status='UNKNOWN';}
    else{
      const cur=(current||'').toString().trim().toLowerCase();
      const tgt=(bp.target||'').toString().trim().toLowerCase();
      if(cur===tgt){status='PASS';}
      else{
        // Numeric comparison where possible
        const cN=parseFloat(cur),tN=parseFloat(tgt);
        if(!isNaN(cN)&&!isNaN(tN)){
          const lessIsBetter=['login/min_password_lng','login/min_password_specials','login/min_password_digits','login/min_password_letters','login/password_history_size','rsau/max_diskspace/local','rdisp/gui_auto_logout'].some(n=>bp.name.startsWith(n.split('/')[0]));
          status=cN>=tN?'PASS':'FAIL';
          if(['login/fails_to_user_lock'].includes(bp.name))status=cN<=tN?'PASS':'FAIL';
          if(['login/failed_user_auto_unlock','login/disable_multi_gui_login','snc/enable','rsau/enable','auth/rfc_authority_check','login/no_automatic_user_sapstar','login/password_change_for_SSO','icm/https/verify_client'].includes(bp.name))status=cN===tN?'PASS':'FAIL';
          if(['login/accept_sso2_ticket'].includes(bp.name))status=cN===tN?'PASS':'FAIL';
        } else {status=cur===tgt?'PASS':'FAIL';}
      }
    }
    return{...bp,current,status};
  });
}

function runUnused(umap, sm20, roleTcodeMap){
  // Build set of (user, tcode) actually used from SM20 + per-(user,tcode) usage counts
  const used={};
  const tcodeUsage={};  // user -> tcode -> count of executions in SM20 window
  sm20.forEach(function(r){
    const u=col(r,'BNAME')||'';
    const t=(col(r,'TCODE')||'').toUpperCase();
    if(u&&t){
      if(!used[u])used[u]=new Set();
      used[u].add(t);
      if(!tcodeUsage[u])tcodeUsage[u]={};
      tcodeUsage[u][t]=(tcodeUsage[u][t]||0)+1;
    }
  });
  // Aggregate per-user totals (for backwards-compatible summary)
  const summary=[];
  // Detailed per-user-per-tcode rows
  const detail=[];
  Object.keys(umap).forEach(function(user){
    const auth=umap[user];
    const usedSet=used[user]||new Set();
    const tcodes=[...auth.tcodes].filter(function(t){return t!=='*';});
    const usedCount=tcodes.filter(function(t){return usedSet.has(t);}).length;
    const unusedTcodes=tcodes.filter(function(t){return !usedSet.has(t);});
    if(tcodes.length===0) return;
    summary.push({
      user:user,
      assigned:tcodes.length,
      used:usedCount,
      unused:unusedTcodes.length,
      unusedList:unusedTcodes.slice(0,6).join(', '),
      pct:Math.round(unusedTcodes.length/tcodes.length*100)
    });
    // Detail rows: for each tcode the user has, find which role(s) granted it
    tcodes.forEach(function(t){
      const wasUsed=usedSet.has(t);
      // Find which of this user's roles include this tcode
      const grantingRoles=[];
      [...auth.roles].forEach(function(role){
        const rm=roleTcodeMap&&roleTcodeMap[role];
        if(rm&&rm.has(t)) grantingRoles.push(role);
      });
      detail.push({
        user:user,
        roles:grantingRoles.slice(0,3).join(', ')||[...auth.roles].slice(0,2).join(', '),
        tcode:t,
        status: wasUsed ? 'USED' : 'UNUSED',
        usageCount: (tcodeUsage[user] && tcodeUsage[user][t]) ? tcodeUsage[user][t] : 0,
      });
    });
  });
  summary.sort(function(a,b){return b.pct-a.pct;});
  // Sort detail: unused first (more interesting), then by user
  detail.sort(function(a,b){
    if(a.status!==b.status) return a.status==='UNUSED'?-1:1;
    return a.user.localeCompare(b.user);
  });
  // Return summary on the array itself (legacy) but also stash detail + per-user usage counts
  summary.detail = detail;
  summary.usedCount = tcodeUsage;  // user -> tcode -> count (per-execution count from SM20)
  return summary;
}

    };
  });
}

function calcScore(sod,dormant,params,sensitive){
  let sc=0;
  sc+=Math.min(sod.filter(s=>s.sev==='CRITICAL').length*12,30);
  sc+=Math.min(sod.filter(s=>s.sev==='HIGH').length*5,14);
  sc+=Math.min(dormant.filter(d=>d.daysLogin>365).length*4,10);
  sc+=Math.min(params.filter(p=>p.status==='FAIL').length*2,16);
  sc+=Math.min(sensitive.filter(s=>s.sev==='CRITICAL').length*4,14);
  return Math.min(Math.round(sc),100);
}
