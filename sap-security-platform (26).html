// ─── RECOMMENDATIONS ENGINE — derives prioritized, finding-specific actions ──
function buildRecommendations(res){
  const recs=[];
  const sodCrit=res.sod.filter(function(s){return s.sev==='CRITICAL';});
  const sodSox=res.sod.filter(function(s){return s.sox;});
  const dormantOld=res.dormant.filter(function(d){return d.isDormant&&d.daysLogin>365;});
  const dormant180=res.dormant.filter(function(d){return d.isDormant&&d.daysLogin>180;});
  const pwdOld=res.dormant.filter(function(d){return d.pwdIssue;});
  const defNotLocked=res.defaultUsers.filter(function(d){return !d.locked;});
  const sensCrit=res.sensitive.filter(function(s){return s.sev==='CRITICAL';});
  const paramFail=res.paramResults.filter(function(p){return p.status==='FAIL';});
  const unusedHigh=res.unused.filter(function(u){return u.pct>80;});
  const overLic=res.license?res.license.filter(function(l){return l.license==='GB';}):[];

  function add(prio,area,title,detail,refs,steps){
    recs.push({prio:prio,area:area,title:title,detail:detail,refs:refs||'',steps:steps||null});
  }

  // ── P1 — Immediate (critical exposure) ──
  if(defNotLocked.length>0)
    add('P1','Default Users','Lock '+defNotLocked.length+' unlocked default user(s): '+defNotLocked.map(function(d){return d.user;}).join(', '),
        'Default SAP accounts with known credentials are an immediate breach risk.','SAP Note 2216306',
        [
          'In SU01 (every client of every system in this landscape) set USR02-UFLAG to "locked" for each named default user.',
          'Change SAP* and DDIC passwords away from defaults; store the new value in your privileged-access vault.',
          'Set profile parameter login/no_automatic_user_sapstar=1 (RZ10) to prevent SAP* re-creation if deleted.',
          'Confirm no productive role currently assigns SAP_ALL to a default user; remove if present.'
        ]);
  if(sodCrit.length>0)
    add('P1','SoD','Remediate '+sodCrit.length+' CRITICAL segregation-of-duties conflict(s)',
        'Users hold mutually exclusive critical functions (e.g. '+sodCrit.slice(0,3).map(function(s){return s.user+' -> '+s.name;}).join('; ')+').','',
        [
          'Open the SoD Violations report; sort by severity then user; export the top-50 CRITICAL conflicts to a remediation tracker.',
          'For each conflict, decide: remove side A, remove side B, or document an approved compensating control with a named control owner.',
          'For SAP_ALL holders, replace with a derived role set that grants only what is actually used (use the Unused Access detail tab as a guide).',
          'Re-run this analysis after each remediation batch; target >=30% reduction in SoD count per month until cleared.'
        ]);
  var sapAll=res.sod.filter(function(s){return (s.roles||'').indexOf('SAP_ALL')>=0;});
  if(sapAll.length>0)
    add('P1','Privileged Access','Remove SAP_ALL / wide-open profiles from '+new Set(sapAll.map(function(s){return s.user;})).size+' user(s)',
        'SAP_ALL grants every authorization and defeats every SoD control.','',
        [
          'List SAP_ALL holders via SUIM > Users > By Profile Name=SAP_ALL.',
          'For each user, build a least-privilege composite role using their actual T-code usage (Unused Access report).',
          'In PFCG, assign the new composite role; in SU01 remove the SAP_ALL profile.',
          'For emergency access, use a time-limited firefighter (GRAC_EAM) instead of standing SAP_ALL.'
        ]);
  if(sensCrit.length>0)
    add('P1','Sensitive Access','Review '+sensCrit.length+' CRITICAL sensitive-transaction assignment(s)',
        'Transactions such as '+[...new Set(sensCrit.map(function(s){return s.tcode;}))].slice(0,6).join(', ')+' must be restricted to named owners with logging.','',
        [
          'Filter the Sensitive Access page by CRITICAL severity; group by T-code to identify over-distributed transactions.',
          'Restrict each sensitive T-code to a small "privileged" composite role; remove from broad job roles.',
          'Enable SM19/SM20 audit filters for all sensitive T-code execution events.',
          'Apply four-eye principle: requester != approver, with documented approval workflow.'
        ]);

  // ── P2 — Short-term (30 days) ──
  if(sodSox.length>0)
    add('P2','SOX Compliance','Document or remediate '+sodSox.length+' SOX-relevant SoD violation(s)',
        'SOX-flagged conflicts must be remediated or have approved compensating controls before the next testing cycle.','SOX §404',
        [
          'Cross-reference each SOX-flagged conflict to the affected SOX process (P2P, O2C, R2R, payroll).',
          'For each, document the compensating control (e.g. monthly variance review, dual approval) in the GRC system.',
          'Have Internal Audit attest the control design; record the attestation date and approver.',
          'Schedule control testing in the next SOX cycle and include the evidence in the test workpapers.'
        ]);
  if(pwdOld.length>0)
    add('P2','Passwords','Force password reset for '+pwdOld.length+' user(s) with passwords older than 90 days',
        'Stale passwords increase credential-theft risk.','SAP Note 862989',
        [
          'In SU10, select the affected user IDs and execute "Force Password Change at Next Logon".',
          'In RZ10, set login/password_expiration_time=90 so passwords expire automatically going forward.',
          'Set login/password_history_size=5 to prevent immediate reuse of old passwords.',
          'Notify affected users 7 days before forced reset to avoid lockouts on shared service accounts.'
        ]);
  if(dormant180.length>0)
    add('P2','Dormant Users','Lock '+dormant180.length+' user(s) inactive for 180+ days',
        'Dormant accounts are prime targets for misuse.','ISACA SAP Audit Guide §2.1',
        [
          'In SUIM > Users by Logon Date, filter for last logon > 180 days; export the list.',
          'Notify business owners 7 days before locking (avoids surprise lockouts for sabbatical/medical leave).',
          'In SU10, mass-lock the confirmed dormant accounts.',
          'Set login/password_max_idle_initial=60 and login/password_max_idle_productive=180 so future inactivity is auto-locked.'
        ]);
  var critParams=paramFail.filter(function(p){return ['login/min_password_lng','login/fails_to_user_lock','login/failed_user_auto_unlock','login/no_automatic_user_sapstar'].indexOf(p.name)>=0;});
  if(critParams.length>0)
    add('P2','Security Parameters','Harden '+critParams.length+' critical login parameter(s)',
        critParams.map(function(p){return p.name+' is '+p.current+', target '+p.target;}).join('; ')+'.','SAP Security Baseline v1.8',
        [
          'In RZ10, edit the default profile; set each failing parameter to its target value.',
          'Save and activate the profile; restart all application servers to apply.',
          'For dynamic parameters, use RZ11 to set the live value pending the restart.',
          'Verify post-restart via RZ11 or PAHI parameter history; document the change in your change-control system.'
        ]);

  // ── P3 — Medium-term (90 days) ──
  if(paramFail.length>critParams.length)
    add('P3','Security Parameters','Align remaining '+(paramFail.length-critParams.length)+' parameter(s) to SAP baseline',
        'Bring session, network and audit parameters in line with SAP Security Baseline v1.8.','SAP Security Baseline v1.8',
        [
          'Group remaining parameter gaps by category (audit, network, session) and bundle into a single transport.',
          'Test the changes in QAS for at least 1 week before promoting to PRD.',
          'Update the SAP profile documentation to reflect the new baseline-aligned values.',
          'Schedule a quarterly review to catch any regression.'
        ]);
  if(unusedHigh.length>0)
    add('P3','Access Optimization','Right-size roles for '+unusedHigh.length+' user(s) using <20% of assigned t-codes',
        'Remove unused transactions to shrink the attack surface and simplify future audits.','',
        [
          'Use the User-Role-Transaction Detail tab; for each user with >80% unused, list the granting roles.',
          'For each over-broad role, derive a smaller functional role using SU24 authorization proposals based on observed usage.',
          'In PFCG, replace the broad role with the new derived role; test in QAS first.',
          'After deployment, re-run this analysis to confirm the unused-% has dropped below 20%.'
        ]);
  if(overLic.length>0)
    add('P3','License Optimization','Validate '+overLic.length+' user(s) classified as Professional (GB) license',
        'Professional licenses are the most expensive tier.','SAP Named User License Guide',
        [
          'Review the License Optimization page; sort users by license-trigger (matched-on rule).',
          'For each user, confirm they truly need the privileged T-code (e.g. SE38) that triggered the classification; otherwise restrict access.',
          'Run USMM after role adjustments to validate the new classification matches SAP\'s measurement.',
          'Reconcile any remaining over-licensing before contract renewal.'
        ]);
  if(dormantOld.length>0)
    add('P3','License Optimization','Reclaim licenses from '+dormantOld.length+' user(s) inactive 365+ days',
        'Long-dormant users still consume license entitlements.','',
        [
          'Filter the Dormant Users page for 365+ days inactive AND License = Professional/Functional.',
          'Lock the accounts (P2 action already covers this) and remove license assignment via USMM.',
          'After retention period (typically 180 days post-lock) delete the user master to free the license seat permanently.',
          'Reconcile freed licenses against current SAP contract entitlement; document savings.'
        ]);

    // ── ITGC-driven additions (with control-specific fix steps) ──
  var itgc = res.itgc||[];
  var itgcFails = itgc.filter(function(f){return f.status==='FAIL';});
  itgcFails.forEach(function(f){
    var prio = f.sev==='CRITICAL'?'P1':f.sev==='HIGH'?'P2':'P3';
    var fixGuide = (typeof itgcFixText==='function') ? itgcFixText(f) : '';
    var steps = fixGuide ? fixGuide.split(/(?<=\.)\s+/).filter(function(s){return s.trim();}) : null;
    add(prio, 'ITGC: '+f.category, f.id+' — '+f.name, f.desc+' Evidence: '+f.evidence, f.ref, steps);
  });

  return recs;
}

async function runFullAnalysis(sys, enabledRules, onProgress, onLog){
  const steps=[
    ['Connecting to SAP / loading data',null],
    ['Reading USR02 (user master)',     'USR02'],
    ['Reading AGR_USERS (role assignments)','AGR_USERS'],
    ['Reading AGR_1251 (auth values)', 'AGR_1251'],
    ['Reading profile parameters',     'PARAMS'],
    ['Reading SM20 (security audit log)','SM20'],
    ['Reading Fiori metering',         'FIORI'],
    ['Reading T000 (client settings)',   'T000'],
    ['Building user-authorization map', null],
    ['Running SoD conflict detection', null],
    ['Checking sensitive transactions', null],
    ['Scanning dormant users',         null],
    ['Checking default users',         null],
    ['Auditing security parameters',   null],
    ['Calculating risk score',         null],
  ];
  const data={};
  const demoMap={USR02:DEMO_USR02,AGR_USERS:DEMO_AGR_USERS,AGR_1251:DEMO_AGR_1251,PARAMS:DEMO_PARAMS,FIORI:DEMO_FIORI,SM20:[],T000:[]};
  // Track where each table's data came from, for transparency in the report
  const sources={};
  // Determine if user uploaded ANY file for this system. If yes, this is a "real"
  // analysis — we must NOT mix in demo data for the missing tables (would produce
  // misleading results that mix the user's records with demo records).
  const hasAnyUpload = Object.values(sys.files||{}).some(function(f){return getRows(f).length>0;});
  let anyUploaded=hasAnyUpload, anyLive=false;
  for(let i=0;i<steps.length;i++){
    onProgress(Math.round(i/steps.length*100));
    const [label,tableKey]=steps[i];
    onLog(label,'info');
    await new Promise(r=>setTimeout(r,100+Math.random()*150));
    if(!tableKey) continue;

    // PRIORITY 1 — uploaded file for this system
    const fd=sys.files?.[tableKey];
    const uploaded=getRows(fd);
    if(uploaded.length>0){
      data[tableKey]=uploaded;
      sources[tableKey]='Uploaded file: '+(fd.fileName||tableKey);
      anyUploaded=true;
      onLog(`  ${tableKey}: ${uploaded.length} records from uploaded file`,'ok');
      continue;
    }

    // PRIORITY 2 — live SAP via OData (proxy/direct)
    if(sys.mode!=='demo'){
      try{
        const rows=await sapFetch(sys, ODATA_ENTITIES[tableKey]?.entity||tableKey+'Set',
                                  ODATA_ENTITIES[tableKey]?.params||'$top=5000');
        if(rows&&rows.length>0){
          data[tableKey]=rows;
          sources[tableKey]='Live SAP ('+sys.mode+')';
          anyLive=true;
          onLog(`  ${tableKey}: ${rows.length} records from SAP`,'ok');
          continue;
        }
        onLog(`  ${tableKey}: SAP returned 0 records`,'warn');
      }catch(e){
        if(e.message!=='DEMO_MODE')
          onLog(`  ${tableKey}: ${e.message}`,'warn');
      }
    }

    // PRIORITY 3 — demo fallback ONLY when no real data exists for this system
    if(hasAnyUpload || (sys.mode!=='demo' && sys.host)){
      // Real-data run: leave empty, do not mix demo records with real records
      data[tableKey]=[];
      sources[tableKey]='Not provided';
      onLog(`  ${tableKey}: not uploaded — analyses needing this table will be skipped`,'warn');
    } else {
      // Pure demo run (no uploads, no live connection)
      data[tableKey]=demoMap[tableKey]||[];
      sources[tableKey]='Demo data';
      if(data[tableKey].length>0)
        onLog(`  ${tableKey}: ${data[tableKey].length} records (demo fallback)`,'warn');
    }
  }

  // Resolve each dataset. Empty stays empty when uploads are missing — the engine
  // simply skips dependent analyses rather than producing misleading mixed results.
  const usr02   = getRows(data.USR02);
  const agrUsers= getRows(data.AGR_USERS);
  const agr1251 = getRows(data.AGR_1251);
  const params  = getRows(data.PARAMS);
  const sm20    = getRows(data.SM20);

  // ── DIAGNOSTIC: log key columns detected per table ──
  const diag = {};
  [['USR02',usr02,['BNAME','TRDAT','PWDLGNDATE','USTYP']],
   ['AGR_USERS',agrUsers,['BNAME','AGR_NAME']],
   ['AGR_1251',agr1251,['AGR_NAME','OBJECT','FIELD','LOW']],
   ['PARAMS',params,['PARNAME','PARVAL']],
   ['SM20',sm20,['BNAME','TCODE']]].forEach(function(spec){
    const name=spec[0], rows=spec[1], expected=spec[2];
    if(rows.length===0)return;
    const det=detectColumns(rows, expected);
    diag[name]=det;
    if(det.missing.length>0){
      onLog('  ! '+name+': '+rows.length+' rows but MISSING key columns: '+det.missing.join(', '),'err');
      onLog('     Headers found: '+det.headers.join(', '),'warn');
    } else {
      onLog('  ✓ '+name+': '+rows.length+' rows, columns OK: '+det.found.join(', '),'ok');
    }
  });

  // ── Validate the auth map actually got built ──
  const _testMap = buildAuthMap(agrUsers, agr1251);
  const _userCount = Object.keys(_testMap).length;
  if(agrUsers.length>0 && agr1251.length>0 && _userCount===0){
    onLog('! WARNING: AGR_USERS + AGR_1251 loaded but 0 users mapped. Check column names match.','err');
  } else if(_userCount>0){
    onLog('  ✓ Auth map built: '+_userCount+' users with '+Object.keys(_testMap).reduce(function(a,u){return a+_testMap[u].tcodes.size;},0)+' total t-code grants','ok');
  }
  const usr02FromReal = usr02.length>0 && sources.USR02 && sources.USR02.indexOf('Demo')!==0;
  // Track which analyses have the data they need (used for empty-state messaging)
  const analysisAvailable = {
    sod:        agrUsers.length>0 && agr1251.length>0,
    sensitive:  agrUsers.length>0 && agr1251.length>0,
    license:    agrUsers.length>0 && agr1251.length>0,
    dormant:    usr02.length>0,
    defaultUsers: usr02.length>0,
    params:     params.length>0,
    unused:     agrUsers.length>0 && agr1251.length>0 && sm20.length>0,
  };

  const umap=buildAuthMap(agrUsers,agr1251);
  // Honour the customer's module-selector toggles
  const _mods = (typeof isModuleActive==='function') ? {
    security: isModuleActive('security'),
    itgc:     isModuleActive('itgc'),
    iso:      isModuleActive('iso'),
    unused:   isModuleActive('unused'),
    license:  isModuleActive('license'),
    role:     isModuleActive('role')
  } : {security:true,itgc:true,iso:true,unused:true,license:true,role:false};
  const sod          = _mods.security ? runSoD(umap,enabledRules) : [];
  const sensitive    = _mods.security ? runSensitive(umap,enabledRules) : [];
  const dormant      = _mods.security ? runDormant(usr02) : [];
  const defaultUsers = _mods.security ? runDefaultUsers(usr02) : [];
  const paramResults = _mods.security ? runParamCheck(params) : [];
  // Build role->tcodes map for the detailed unused-access report
  const _roleTcodeMap={};
  agr1251.forEach(function(r){
    const role=String(col(r,'AGR_NAME')||'').trim();
    const obj=String(col(r,'OBJECT')||'').toUpperCase().trim();
    const low=String(col(r,'LOW')||'').toUpperCase().trim();
    if(obj==='S_TCODE'&&role&&low){
      if(!_roleTcodeMap[role])_roleTcodeMap[role]=new Set();
      _roleTcodeMap[role].add(low);
    }
  });
  const unused = _mods.unused ? runUnused(umap,sm20,_roleTcodeMap) : Object.assign([],{detail:[]});
  let fiori=getRows(data.FIORI);
  if(fiori.length===0 && !hasAnyUpload && (sys.mode==='demo'||!sys.host)) fiori=DEMO_FIORI;
  const license = _mods.license ? runLicense(umap, LICENSE_RULES) : [];
  const score=calcScore(sod,dormant,paramResults,sensitive);

  onProgress(100);
  onLog(`Analysis complete — Risk Score: ${score}/100`,'ok');
  onLog(`SoD: ${sod.length} violations | Dormant: ${dormant.length} | Params: ${paramResults.filter(p=>p.status==='FAIL').length} FAIL`,'ok');
  onLog(`License: ${license.length} users classified | ${license.filter(l=>l.license==='GB').length} Professional`,'ok');

  // ── ITGC Compliance ──
  // Grab T000 from uploaded files if present
  const t000Data = getRows(data.T000||(sys.files&&sys.files.T000));
  const _resForITGC = {sod:sod,sensitive:sensitive,dormant:dormant,defaultUsers:defaultUsers,paramResults:paramResults,_authMap:umap};
  const itgc = _mods.itgc ? runITGC(_resForITGC, usr02, agr1251, params, t000Data) : [];

  // ── Role Analysis ──
  const agrDefine = getRows(data.AGR_DEFINE||(sys.files&&sys.files.AGR_DEFINE));
  const agrAgrs   = getRows(data.AGR_AGRS  ||(sys.files&&sys.files.AGR_AGRS));
  const agr1252   = getRows(data.AGR_1252  ||(sys.files&&sys.files.AGR_1252));
  const roleAnalysis = _mods.role
    ? runRoleAnalysis(agrDefine, agrAgrs, agr1251, agr1252, agrUsers)
    : null;

  const recommendations=buildRecommendations({sod,sensitive,dormant,defaultUsers,paramResults,unused,license,itgc});
    // ── ISO 27001:2022 mapping ──
  const isoAssessment = (_mods.iso && typeof buildISOAssessment==='function') ? buildISOAssessment({sod:sod,sensitive:sensitive,dormant:dormant,defaultUsers:defaultUsers,paramResults:paramResults,unused:unused,license:license,itgc:itgc,stats:{sodCount:sod.length,sensitiveCount:sensitive.length,dormantCount:dormant.length,defaultCount:defaultUsers.length,paramFails:(paramResults||[]).filter(function(p){return p.status==='FAIL';}).length,unusedCount:unused.length}}) : [];
  const isoGap = isoAssessment.filter(function(a){return a.status==='GAP';}).length;
  const isoPass = isoAssessment.filter(function(a){return a.status==='PASS';}).length;
return{sod,sensitive,dormant,defaultUsers,paramResults,unused,license,fiori,score,recommendations,sources,analysisAvailable,itgc,iso:isoAssessment,roleAnalysis:roleAnalysis,modulesActive:_mods,
    isDemo:!usr02FromReal,
    _raw:{AGR_DEFINE:(sys.files&&sys.files.AGR_DEFINE)||null, AGR_AGRS:(sys.files&&sys.files.AGR_AGRS)||null},
    system:{sid:sys.sid,client:sys.client,env:sys.env,name:sys.name},
    stats:{users:usr02.length,roles:new Set(agrUsers.map(r=>r.AGR_NAME||r.agr_name)).size,
      sodCount:sod.length,sensitiveCount:sensitive.length,dormantCount:dormant.length,
      defaultCount:defaultUsers.length,paramFails:paramResults.filter(p=>p.status==='FAIL').length,
      unusedCount:unused.length,soxCount:sod.filter(s=>s.sox).length,
      licenseCount:license.length,
      licenseProf:license.filter(l=>l.license==='GB').length,
      licenseFunc:license.filter(l=>l.license==='GC').length,
      itgcCount:itgc.filter(function(f){return f.status==='FAIL';}).length,
      isoGap:isoGap,isoPass:isoPass,
      roleCount: (roleAnalysis&&roleAnalysis.summary&&roleAnalysis.summary.total) || 0,
      roleHighRisk: (roleAnalysis&&roleAnalysis.summary&&roleAnalysis.summary.withFindings) || 0,
      itgcWarn:itgc.filter(function(f){return f.status==='WARN';}).length,
      itgcPass:itgc.filter(function(f){return f.status==='PASS';}).length},
    ts:Date.now()};
}

// ─── Toast ───────────────────────────────────────────────────────
function toast(msg,type='info'){
  const el=document.getElementById('toast');
  const colors={ok:'rgba(24,200,120,.1)',err:'rgba(240,60,60,.1)',warn:'rgba(232,192,32,.1)',info:'rgba(56,120,240,.1)'};
  const bcolors={ok:'rgba(24,200,120,.3)',err:'rgba(240,60,60,.3)',warn:'rgba(232,192,32,.3)',info:'rgba(56,120,240,.3)'};
  const tcolors={ok:'var(--green)',err:'var(--red)',warn:'var(--yellow)',info:'var(--blue)'};
  el.style.cssText=`position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;backdrop-filter:blur(12px);box-shadow:0 6px 28px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;background:${colors[type]||colors.info};border:1px solid ${bcolors[type]||bcolors.info};color:${tcolors[type]||tcolors.info}`;
  el.textContent=msg;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',3800);
}

function navigate(v){
  if(v === '__back'){backToCustomers();return;}
  if(v === 'customers'){App.inCustomer = false; App.results = null;}
  App.view = v;
  render();
}

  // Critical finding summary cards (5-column strip)

      '</div>'+
      '<div class="summary-body">'+
        '<div class="kpi-value" style="color:'+card.c+';font-size:28px">'+card.v.toLocaleString()+'</div>'+
        '<div class="kpi-label">'+card.label+'</div>'+

      '</div>'+
      ic('chevron-right',13,'var(--txt4)')+

  h.push('</div>'); // score-hero-row

  // ── Second row: 3 panels ─────────────────────────────────────────

  h.push('<div class="card dash-violators">'+

  if(!r.sod||r.sod.length===0){

        '<div class="rank-badge">'+(i+1)+'</div>'+
        '<div class="violator-info">'+
          '<div class="violator-user">'+uv[0]+'</div>'+

          '</div>'+
        '</div>'+
        '<div class="violator-count" style="color:var(--red)">'+uv[1]+'</div>'+

    });
    h.push('</div>');
  }
  h.push('</div>');

  h.push('<div class="card dash-roles">'+

    var ra=r.roleAnalysis;
    var riskBuckets={Critical:0,High:0,Medium:0,Low:0,Clean:0};
    ra.roles.forEach(function(role){
      if(role.risk>=10)riskBuckets.Critical++;
      else if(role.risk>=5)riskBuckets.High++;
      else if(role.risk>=2)riskBuckets.Medium++;
      else if(role.risk>=1)riskBuckets.Low++;
      else riskBuckets.Clean++;
    });
    var total=ra.roles.length||1;
    var bucketDef=[
      {k:'Critical',c:'var(--red)'},
      {k:'High',c:'var(--orange)'},
      {k:'Medium',c:'var(--yellow)'},
      {k:'Low',c:'var(--green)'},
      {k:'Clean',c:'var(--txt3)'},
    ];
    h.push('<div class="risk-breakdown">');
    bucketDef.forEach(function(b){
      var n=riskBuckets[b.k];
      var pct=Math.round(n/total*100);
      h.push('<div class="risk-row-item">'+
        '<div class="risk-row-label" style="color:'+b.c+'">'+b.k+'</div>'+
        '<div class="risk-row-bar"><div class="risk-row-fill" style="width:'+Math.max(pct,1)+'%;background:'+b.c+'"></div></div>'+

        '<div class="role-stat-l">Total Roles</div>'+
      '</div>'+

      (function(){
        var total=Math.max((r.iso||[]).length,1);
        var passAngle=isoPass/total*360, gapAngle=isoGap/total*360;
        function polarToXY(deg,r2){var rad=(deg-90)*Math.PI/180;return {x:40+r2*Math.cos(rad),y:40+r2*Math.sin(rad)};}

          if(sweep<=0)return '';
          var s=polarToXY(start,32),e=polarToXY(start+sweep-0.1,32),lg=sweep>180?1:0;

        }
        return arc(0,passAngle,'var(--green)')+arc(passAngle,gapAngle,'var(--red)');
      })()+
      '<text x="40" y="38" text-anchor="middle" font-size="14" font-weight="800" font-family="Montserrat,sans-serif" fill="var(--txt)">'+isoGap+'</text>'+
      '<text x="40" y="52" text-anchor="middle" font-size="7" fill="var(--txt3)" font-family="Montserrat,sans-serif">GAPS</text>'+

    h.push('<div class="itgc-item">'+
      '<svg width="13" height="13" stroke="'+c+'" fill="none"><use href="#ic-'+ic2+'"/></svg>'+
      '<span class="itgc-name">'+((f.name||f.id||'').slice(0,22))+'</span>'+
      '<span class="itgc-status" style="color:'+c+'">'+f.status+'</span>'+
    '</div>');

  h.push('</div></div>');

  // Quick-action card
  var rr=r.recommendations||[];
  h.push('<div class="card dash-quicklinks">'+
    '<div class="card-hdr"><div class="card-eyebrow">'+ic('trending-up',13,'var(--gold)')+' Recommendations</div></div>'+
    '<div class="quicklink-list">');

function setActiveSys(id){App.activeSysId=id;renderSysCards();renderNav();}

function showAddSystem(){
  document.getElementById('sys-form-area').innerHTML=systemForm(null);
}
function showEditSystem(id){
  const sys=App.systems.find(s=>s.id===id);
  if(sys)document.getElementById('sys-form-area').innerHTML=systemForm(sys);
}
function deleteSystem(id){
  App.systems=App.systems.filter(s=>s.id!==id);
  if(App.activeSysId===id)App.activeSysId=App.systems[0]?.id;
  renderConnect();renderNav();

  h.push('<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px">');
  modes.forEach(function(m){
    var active=(s.mode||'proxy')===m;
    var labels={proxy:'Via local proxy (recommended)',direct:'Direct SAP call (needs CORS)',demo:'Built-in sample data'};
    var icons={proxy:'Proxy',direct:'Direct',demo:'Demo'};

function togglePwd(){const i=document.getElementById('sf-pwd');const b=document.getElementById('pwd-toggle');if(i){i.type=i.type==='password'?'text':'password';if(b)b.textContent=i.type==='password'?'Show':'Hide';}}
function pickEnv(e){document.getElementById('sf-env').value=e;const ec=SYS_COLOR;['PRD','QAS','DEV','SANDBOX','UAT'].forEach(v=>{const el=document.getElementById('ep-'+v);if(el){el.style.borderColor=v===e?(ec[v]||'#7a9abf'):'var(--bd)';el.style.background=v===e?(ec[v]||'#7a9abf')+'12':'transparent';el.querySelector('div').style.color=v===e?(ec[v]||'#7a9abf'):'var(--txt3)';}});}
function pickMode(m){document.getElementById('sf-mode').value=m;['proxy','direct','demo'].forEach(v=>{const el=document.getElementById('mp-'+v);if(el){el.style.borderColor=v===m?'rgba(0,200,240,.4)':'var(--bd)';el.style.background=v===m?'rgba(0,200,240,.07)':'transparent';el.querySelector('div').style.color=v===m?'var(--cyan)':'var(--txt3)';}});
  const cf=document.getElementById('conn-fields');if(cf)cf.style.opacity=m==='demo'?'.4':'1';
  const pf=document.getElementById('proxy-url-field');if(pf)pf.style.display=m==='proxy'?'':'none';
  ['sf-host','sf-port','sf-user','sf-pwd'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=m==='demo';});}
function cancelSysForm(){const a=document.getElementById('sys-form-area');if(a)a.innerHTML='';}
function saveSysForm(){
  const g=id=>document.getElementById(id)?.value||'';
  const id=g('sf-id');
  const sys={id:id||'sys'+Date.now(),name:g('sf-name'),sid:g('sf-sid').toUpperCase(),client:g('sf-client'),env:g('sf-env'),description:g('sf-desc'),host:g('sf-host'),port:g('sf-port'),user:g('sf-user'),password:g('sf-pwd'),proxyUrl:g('sf-proxyurl')||'http://localhost:3100',mode:g('sf-mode'),files:{},lastSync:null,status:'unchecked'};
  if(!sys.name||!sys.sid){toast('Name and SID are required','warn');return;}
  const existing=App.systems.find(s=>s.id===id);
  if(existing){const files=existing.files||{};sys.files=files;App.systems=App.systems.map(s=>s.id===id?sys:s);}
  else App.systems.push(sys);
  App.activeSysId=sys.id;
  cancelSysForm();renderConnect();renderNav();
  toast(`System "${sys.name}" saved`,'ok');
}
async function handleTestConn(id){
  const sys=App.systems.find(s=>s.id===id);
  if(!sys)return;
  toast(`Testing ${sys.sid}...`,'info');
  const r=await testConnection(sys);
  sys.status=r.ok?'ok':'err';
  toast((r.ok?'✓ ':'✗ ')+r.msg,r.ok?'ok':'err');
  renderSysCards();
}
async function handleTestConnForm(){
  const g=id=>document.getElementById(id)?.value||'';
  const sys={id:'test',name:'test',sid:g('sf-sid'),client:g('sf-client'),env:g('sf-env'),host:g('sf-host'),port:g('sf-port'),user:g('sf-user'),password:g('sf-pwd'),proxyUrl:g('sf-proxyurl')||'http://localhost:3100',mode:g('sf-mode')};
  const tr=document.getElementById('test-result');
  if(tr)tr.innerHTML='<span style="color:var(--txt3);font-size:12px">Testing...</span>';
  const r=await testConnection(sys);
  if(tr)tr.innerHTML=`<div style="padding:8px 12px;border-radius:8px;font-size:12.5px;background:${r.ok?'rgba(24,200,120,.08)':'rgba(240,60,60,.08)'};border:1px solid ${r.ok?'rgba(24,200,120,.25)':'rgba(240,60,60,.25)'};color:${r.ok?'var(--green)':'var(--red)'};">${r.ok?'✓':'✗'} ${r.msg}</div>`;
}

function loadFileInput(input,tableId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSV(e.target.result);
    const sys=App.activeSys;
    sys.files=sys.files||{};
    sys.files[tableId]={rows,fileName:file.name,size:file.size,rowCount:rows.length,loaded:Date.now()};
    // ── Column detection diagnostic (per uploaded table) ──
    const expectedMap={
      USR02:['BNAME','TRDAT','PWDLGNDATE','USTYP'],
      AGR_USERS:['BNAME','AGR_NAME'],
      AGR_1251:['AGR_NAME','OBJECT','FIELD','LOW'],
      PARAMS:['PARNAME','PARVAL'],
      SM20:['BNAME','TCODE']
    };
    const expected=expectedMap[tableId];
    if(expected && rows.length>0){
      const det=detectColumns(rows, expected);
      sys.files[tableId].diagnostic=det;
      if(det.missing.length>0){
        toast(tableId+': '+rows.length+' rows BUT missing column(s): '+det.missing.join(', ')+'. Check headers.','warn');
      }
    }
    // Special: license rule file is parsed into global LICENSE_RULES
    if(tableId==='LICENSE_RULES'){
      const parsed=rows.map(function(r){
        // Accept many naming conventions, incl. PCE format (Rule id, Auth.Object, Auth.Field, Auth.Value)
        var ltype=(r.LICENSE_TYPE||r.LICENSE_ID||r.LTYPE||r['RULE ID']||r.RULE_ID||r['RULE.ID']||r.RULEID||'').toUpperCase().trim();
        var ldesc=(r.LICENSE_DESC||r['RULE DESCRIPTION']||r.RULE_DESCRIPTION||r['RULE.DESCRIPTION']||r.LDESC||r.DESCRIPTION||'').trim();
        var obj  =(r.AUTH_OBJECT||r['AUTH.OBJECT']||r.OBJECT||r.OBJ||'').toUpperCase().trim();
        var field=(r.AUTH_FIELD||r['AUTH.FIELD']||r.FIELD||'').toUpperCase().trim();
        var value=(r.AUTH_VALUE||r['AUTH.VALUE']||r.VALUE||r.VAL||r.LOW||'').toUpperCase().trim();
        return {ltype:ltype, ldesc:ldesc, obj:obj, field:field, value:value};
      }).filter(function(r){return r.ltype&&r.obj;});
      if(parsed.length>0){
        LICENSE_RULES=parsed;
        toast('License rule file loaded: '+parsed.length+' rules active','ok');
      } else {
        toast('License file parsed but no valid rules found. Check columns: LICENSE_TYPE, LICENSE_DESC, AUTH_OBJECT, FIELD, VALUE','warn');
      }
    } else {
      toast(tableId+': '+rows.length.toLocaleString()+' rows loaded','ok');
    }
    renderIngest();
  };
  reader.readAsText(file);
}

  rules=rules.slice().sort(function(a,b){

  });

    if(r.sox) h.push('<span style="font-size:9.5px;color:var(--red);background:rgba(240,60,60,.1);padding:1px 6px;border-radius:10px;border:1px solid rgba(240,60,60,.25)">SOX</span>');
    h.push('</div>');

      h.push('<span style="color:var(--orange2)">'+r.f1.name+'</span> ['+(r.f1.tcodes||[]).slice(0,4).join(", ")+'] ');

function saveNewRisk(){
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var type=g('rf-type');
  var id=g('rf-id')||('CUSTOM-'+Date.now());
  var name=g('rf-name');
  if(!name){toast('Risk name is required','warn');return;}
  var rule={id:id,name:name,area:g('rf-area')||'CUSTOM',sev:g('rf-sev')||'HIGH',
            sox:document.getElementById('rf-sox')&&document.getElementById('rf-sox').checked,
            desc:g('rf-desc'),mitigation:g('rf-mit')};
  if(type==='SoD'){
    rule.f1={name:g('rf-f1name')||'Function 1',tcodes:g('rf-f1tc').split(',').map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
    rule.f2={name:g('rf-f2name')||'Function 2',tcodes:g('rf-f2tc').split(',').map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
  } else {
    rule.type='SENSITIVE';
    rule.tcodes=g('rf-senstc').split(',').map(function(x){return x.trim();}).filter(Boolean);
    rule.aobjs=[];
  }
  SOD_LIBRARY.push(rule);
  App.enabledRules.add(rule.id);
  toast('Rule "'+name+'" added','ok');

function uploadRiskLibrary(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var rows=parseCSV(e.target.result);
    var added=0;
    rows.forEach(function(r){
      var rid=(r.RULE_ID||r.rule_id||r.ID||r.id||'').trim();
      var name=(r.RISK_NAME||r.risk_name||r.NAME||r.name||'').trim();
      var type=(r.TYPE||r.type||'SoD').trim();
      if(!name)return;
      if(!rid)rid='IMPORT-'+Date.now()+'-'+added;
      var rule={id:rid,name:name,area:(r.AREA||r.area||'IMPORT').trim(),
                sev:(r.SEVERITY||r.severity||r.SEV||'HIGH').toUpperCase().trim(),
                sox:(r.SOX||r.sox||'').toString().toUpperCase().indexOf('Y')===0||((r.SOX||'')+'')==='true',
                desc:(r.DESCRIPTION||r.description||r.DESC||'').trim(),
                mitigation:(r.MITIGATION||r.mitigation||'').trim()};
      if(type.toUpperCase().indexOf('SEN')===0){
        rule.type='SENSITIVE';
        rule.tcodes=((r.TCODES||r.tcodes||r.TCODE||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean);
        rule.aobjs=[];
      } else {
        rule.f1={name:(r.FUNC1||r.func1||'Function 1').trim(),tcodes:((r.FUNC1_TCODES||r.func1_tcodes||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
        rule.f2={name:(r.FUNC2||r.func2||'Function 2').trim(),tcodes:((r.FUNC2_TCODES||r.func2_tcodes||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
      }
      SOD_LIBRARY.push(rule);
      App.enabledRules.add(rule.id);
      added++;
    });
    toast(added>0?(added+' rules imported'):'No valid rules found. Check column headers.',added>0?'ok':'warn');
    renderRiskLibrary();renderNav();
  };
  reader.readAsText(file);
}

async function handleRun(){
  const sys=App.activeSys;
  App.running=true;App.log=[];
  const btn=document.getElementById('run-btn');
  if(btn){btn.disabled=true;btn.textContent='Analyzing...';}
  const pa=document.getElementById('progress-area');if(pa)pa.style.display='block';
  const la=document.getElementById('analysis-log');if(la)la.style.display='block';

  function onProgress(p){App.progress=p;const pf=document.getElementById('prog-fill');if(pf)pf.style.width=p+'%';}
  function onLog(msg,type){
    App.log.push({msg,type});
    const la=document.getElementById('analysis-log');
    if(la){la.innerHTML+=`<div class="log-${type==='ok'?'ok':type==='warn'?'warn':type==='err'?'err':'info'}">${msg}</div>`;la.scrollTop=la.scrollHeight;}
  }
  try{
    App.results=await runFullAnalysis(sys,App.enabledRules,onProgress,onLog);
    toast(`Analysis complete! Risk score: ${App.results.score}/100`,'ok');
    navigate('dashboard');
  }catch(e){
    onLog('Analysis failed: '+e.message,'err');
    toast('Analysis failed: '+e.message,'err');
  }
  App.running=false;
  if(btn){btn.disabled=false;btn.innerHTML='&#9654; Run Security Analysis';}
}

function needsUploadMsg(tables, results){
  var fileLabels={USR02:'USR02 (user master)',AGR_USERS:'AGR_USERS (role assignments)',AGR_1251:'AGR_1251 (auth values)',PARAMS:'RZ11/PAHI (security parameters)',SM20:'SM20 (audit log)',FIORI:'Fiori metering'};
  var src=(results&&results.sources)||{};
  var missing=tables.filter(function(t){return !src[t]||src[t]==='Not provided';});
  if(missing.length===0)return '';
  var listed=missing.map(function(t){return '<strong style="color:var(--cyan)">'+(fileLabels[t]||t)+'</strong>';}).join(', ');
  var h=[];
  h.push('<div style="text-align:center;padding:40px 24px;color:var(--txt3);background:rgba(232,192,32,.05);border:1px dashed rgba(232,192,32,.3);border-radius:12px">');

  h.push('<p style="font-size:12.5px;color:var(--txt2);margin:0 0 14px">This analysis requires '+listed+'. Upload the file(s) below for your system, then run the analysis again.</p>');

  h.push('</div>');
  return h.join('');
}

function renderResLicense(){
  var r=App.results;
  if(!r){document.getElementById('content').innerHTML=noResults();return;}
  var _msg=needsUploadMsg(['AGR_USERS','AGR_1251'],r);
  if(_msg){document.getElementById('content').innerHTML='<div class="fade">'+_msg+'</div>';return;}

  // ── Merge license + usage data into enriched user objects ──
  var licArr = r.license||[];
  var unusedSummary = r.unused||[];
  var usedCount = unusedSummary.usedCount||{};   // user -> tcode -> execCount
  var unusedMap  = {};                             // user -> summary item
  unusedSummary.forEach(function(s){unusedMap[s.user]=s;});

  var LIC_COLORS = {GB:'var(--red)',GC:'var(--orange)',GD:'var(--yellow)',GE:'var(--green)'};
  var LIC_NAMES  = {GB:'Professional',GC:'Functional',GD:'Productivity',GE:'ESS'};
  var USAGE_COLORS = {Heavy:'var(--green)',Medium:'var(--yellow)',Light:'var(--orange)',Unused:'var(--txt3)'};
  var REC_COLORS = {retain:'var(--green)',review:'var(--yellow)',downgrade:'var(--orange)',remove:'var(--red)',trim:'var(--purple)'};

  function usageTier(count){
    if(count>=10)return 'Heavy'; if(count>=3)return 'Medium'; if(count>=1)return 'Low'; return 'Unused';
  }
  function userRec(l, usum){
    var pct = usum ? usum.pct : 100;
    var tier = usum ? usageTier(usum.used>0 ? Math.round(usum.used/(usum.assigned||1)*10) : 0) : 'Unused';
    // Use avg executions if available
    var maxExec=0;
    if(usedCount[l.user]){
      var vals=Object.values(usedCount[l.user]);
      maxExec=vals.length>0?Math.max.apply(null,vals):0;
    }
    var ut = usageTier(maxExec);
    if(pct<10||ut==='Unused') return {level:'remove',  text:'Fewer than 10% of assigned t-codes used — consider removing role assignments or locking the account.'};
    if(l.license==='GB'&&ut==='Low')   return {level:'downgrade',text:'Professional license but only low-frequency usage detected. Downgrade to Functional may be possible.'};
    if(l.license==='GB'&&ut==='Medium')return {level:'review',   text:'Professional license with medium usage. Confirm that Professional-tier transactions are genuinely required.'};
    if(ut==='Heavy')                    return {level:'retain',   text:'Heavy usage justifies current license tier and role assignments.'};
    return {level:'retain',text:'Usage pattern appears appropriate for the current license tier.'};
  }
  function roleRec(roleUsers, roleId){
    var total=roleUsers.length;
    if(total===0) return {level:'remove',text:'No users assigned — remove role.'};
    var unused=roleUsers.filter(function(u){return u.usageTier==='Unused';}).length;
    var heavy =roleUsers.filter(function(u){return u.usageTier==='Heavy';}).length;
    var med   =roleUsers.filter(function(u){return u.usageTier==='Medium';}).length;
    if(unused/total>0.7)  return {level:'remove', text:unused+' of '+total+' users never use this role — remove unused assignments.'};
    if(heavy+med===0)     return {level:'downgrade',text:'No heavy/medium users — all assignments may be downgradeable.'};
    if(unused/total>0.4)  return {level:'review', text:unused+' users unused ('+Math.round(unused/total*100)+'%) — review and clean up.'};
    if(heavy/total>0.5)   return {level:'retain', text:Math.round(heavy/total*100)+'% heavy users — role is actively used.'};
    return {level:'retain',text:'Role usage is appropriate.'};
  }

  // ── Build enriched user list ──
  var users = licArr.map(function(l){
    var usum=unusedMap[l.user];
    var maxExec=0;
    if(usedCount[l.user]){
      var vals=Object.values(usedCount[l.user]);
      maxExec=vals.length>0?Math.max.apply(null,vals):0;
    }
    var ut=usageTier(maxExec);
    var rec=userRec(l,usum);
    var pctUsed=usum?Math.max(0,100-usum.pct):50;
    return {
      user:l.user, license:l.license, licenseName:l.licenseName,
      licenseDesc:l.licenseDesc, matchedOn:l.matchedOn,
      roles:l.roles, tcodeCount:l.tcodeCount,
      assigned:usum?usum.assigned:l.tcodeCount,
      used:usum?usum.used:0, pctUsed:pctUsed,
      usageTier:ut, maxExec:maxExec, rec:rec
    };
  });

  // ── Build role list from AGR data ──
  // Group detail rows by role
  var roleMap={};
  var detail=(r.unused&&r.unused.detail)||[];
  detail.forEach(function(d){
    var rolesArr=(d.roles||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
    rolesArr.forEach(function(role){
      if(!roleMap[role])roleMap[role]={id:role,users:{},tcodeCounts:{}};
      if(!roleMap[role].users[d.user]){
        var maxE=0;
        if(usedCount[d.user]){var vals=Object.values(usedCount[d.user]);maxE=vals.length?Math.max.apply(null,vals):0;}
        roleMap[role].users[d.user]={user:d.user,usageTier:usageTier(maxE),maxExec:maxE,license:(licArr.find(function(l){return l.user===d.user;})||{}).license||'GE'};
      }
    });
  });
  var roles=Object.values(roleMap).map(function(rm){
    var ru=Object.values(rm.users);
    var total=ru.length;
    var heavy=ru.filter(function(u){return u.usageTier==='Heavy';}).length;
    var med  =ru.filter(function(u){return u.usageTier==='Medium';}).length;
    var low  =ru.filter(function(u){return u.usageTier==='Low';}).length;
    var unu  =ru.filter(function(u){return u.usageTier==='Unused';}).length;
    var actPct=total>0?Math.round((heavy+med+low)/total*100):0;
    var rec=roleRec(ru,rm.id);
    return {id:rm.id,totalUsers:total,heavy:heavy,med:med,low:low,unused:unu,actPct:actPct,rec:rec,users:ru};
  }).sort(function(a,b){return b.totalUsers-a.totalUsers;});

  // ── Summary stats ──
  var counts={GB:0,GC:0,GD:0,GE:0};
  users.forEach(function(u){counts[u.license]=(counts[u.license]||0)+1;});
  var recCounts={retain:0,review:0,downgrade:0,remove:0};
  users.forEach(function(u){recCounts[u.rec.level]=(recCounts[u.rec.level]||0)+1;});
  var usageCounts={Heavy:0,Medium:0,Low:0,Unused:0};
  users.forEach(function(u){usageCounts[u.usageTier]=(usageCounts[u.usageTier]||0)+1;});
  var roleRecCounts={retain:0,review:0,downgrade:0,remove:0};
  roles.forEach(function(rl){roleRecCounts[rl.rec.level]=(roleRecCounts[rl.rec.level]||0)+1;});

  // Store in App for modal access
  App._licUsers=users; App._licRoles=roles; App._licUsedCount=usedCount;
  App._licUsageCounts=usageCounts; App._licCounts=counts; App._licRecCounts=recCounts; App._licRoleRecCounts=roleRecCounts;
  App._licTab=App._licTab||'overview';
  App._licModal=App._licModal||null;
  App._licUserSearch=App._licUserSearch||'';
  App._licTierFilter=App._licTierFilter||'all';
  App._licUsageFilter=App._licUsageFilter||'all';
  App._licRoleSearch=App._licRoleSearch||'';
  App._licRecFilter=App._licRecFilter||'all';
  App._licPage=App._licPage||0;
  App._licRolePage=App._licRolePage||0;

  // ── Render ──
  renderLicensePage();
}

// ─── Generic drill-down toggle (used by every result page) ───────────
// Each finding row gets a unique id; clicking the Investigate button toggles
// the detail panel below it. The panel shows structured detail + a button to
// request an AI / rule-based recommendation.
if(!window.__drilldownOpen) window.__drilldownOpen = {};

function toggleDrillDown(rowId, category, findingEncoded){
  var open = window.__drilldownOpen[rowId];
  var panel = document.getElementById(rowId);
  if(!panel) return;
  if(open){
    panel.style.display = 'none';
    window.__drilldownOpen[rowId] = false;
  } else {
    var finding = JSON.parse(decodeURIComponent(findingEncoded));
    panel.innerHTML = renderDrillDownBody(rowId, category, finding);
    panel.style.display = '';
    window.__drilldownOpen[rowId] = true;
  }
}

function renderDrillDownBody(rowId, category, finding){
  var h = [];
  h.push('<div style="padding:14px 18px;background:var(--bg3);border-left:3px solid var(--cyan);border-radius:0 0 8px 8px">');
  // Structured detail table
  h.push('<div style="font-size:10.5px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Finding Detail</div>');
  h.push('<table style="width:100%;font-size:11.5px;margin-bottom:10px"><tbody>');
  Object.keys(finding).forEach(function(k){
    var v = finding[k];
    if(v===null||v===undefined||v==='') return;
    if(typeof v === 'object'){ try { v = JSON.stringify(v); } catch(e){v='[object]';} }
    var vs = String(v);
    if(vs.length>200) vs = vs.slice(0,200)+' ...';
    h.push('<tr><td style="padding:3px 8px 3px 0;color:var(--txt3);font-family:var(--mono);font-size:10.5px;white-space:nowrap;vertical-align:top;font-weight:700">'+escapeHtml(k)+'</td>');
    h.push('<td style="padding:3px 0;color:var(--txt);font-family:var(--mono);font-size:11px;word-break:break-word">'+escapeHtml(vs)+'</td></tr>');
  });
  h.push('</tbody></table>');
  // AI rec button + target div
  var recId = rowId+'_rec';
  var enc = encodeURIComponent(JSON.stringify(finding));
  h.push('<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">');
  h.push('<button class="btn btn-primary btn-sm" data-cat="'+category+'" data-fid="'+enc+'" data-rid="'+recId+'" onclick="showAIRec(this.dataset.cat,this.dataset.fid,this.dataset.rid)">Get Recommendation</button>');
  h.push('<span style="font-size:10.5px;color:var(--txt3)">'+((getAIConfig().provider==='none')?'Uses rule-based generator (configure an AI key under API Configuration for live LLM responses)':'Uses '+getAIConfig().provider+' '+(getAIConfig().model||''))+'</span>');
  h.push('</div>');
  h.push('<div id="'+recId+'"></div>');
  h.push('</div>');
  return h.join('');
}

// Helper: produces a button + target row for a result table to include drill-down.
// Returns {btn:HTML, rowHtml:HTML} given a row index, category and finding.
function drillBtn(idx, category, finding, colSpan){
  var rowId = 'dd_'+category+'_'+idx;
  var enc = encodeURIComponent(JSON.stringify(finding));
  return {
    btn: '<button class="btn btn-ghost btn-sm" data-cat="'+category+'" data-fid="'+enc+'" data-rid="'+rowId+'" onclick="toggleDrillDown(this.dataset.rid,this.dataset.cat,this.dataset.fid)" title="Investigate"><svg width="13" height="13" style="flex-shrink:0"><use href="#ic-search"/></svg></button>',
    rowHtml: '<tr class="dd-row"><td colspan="'+(colSpan||8)+'" style="padding:0;background:transparent"><div id="'+rowId+'" style="display:none"></div></td></tr>'
  };
}

      ['', '', 'Composite Roles:', ra.summary.composite],
      ['', '', 'Roles with Risk Findings:', ra.summary.withFindings],
      [],[],[],[],[],
      [],
      ['', '', 'Change Control'],
      [],
      ['', '', 'Date', 'Updated By', 'BCS Reference', 'Update Comment'],
      ['', '', new Date().toISOString().slice(0,10), (currentUser()&&currentUser().name)||'BCS', 'Auto-generated', 'Initial export from BCS SAP Secure Studio']
    ];
    var ws1 = XLSX.utils.aoa_to_sheet(clipRows(coverData), {dense:true});
    ws1['!cols'] = [{wch:3},{wch:3},{wch:24},{wch:36},{wch:20},{wch:40}];
    XLSX.utils.book_append_sheet(wb, ws1, 'Cover');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 2: PROCESS OWNER MATRIX (template — manual fill)
    // ═══════════════════════════════════════════════════════════════════
    var ws2 = XLSX.utils.aoa_to_sheet(clipRows([
      ['Business Process','Process Owner','Owner Email ID','Secondary Owner','Email ID','Role Approver','Email ID']
    ]), {dense:true});
    ws2['!cols'] = [{wch:30},{wch:24},{wch:30},{wch:24},{wch:30},{wch:24},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws2, 'Process Owner Matrix');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 3: IAM ROLE - SAP ROLE MAPPING (composite-role registry)
    // ═══════════════════════════════════════════════════════════════════
    var iamRows = [['Application','SID','IAM Role','Description','SAP Composite Role','Description','Role Approver(s)','Email ID']];
    ra.roles.filter(function(role){return role.type==='C';}).forEach(function(role){
      iamRows.push(['S4HANA', sid, '', '', role.name, role.isDisplay?'(display/view role)':'', '', '']);
    });
    var ws3 = XLSX.utils.aoa_to_sheet(clipRows(iamRows), {dense:true});
    ws3['!cols'] = [{wch:12},{wch:6},{wch:32},{wch:40},{wch:32},{wch:40},{wch:24},{wch:30}];
    ws3['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws3, 'IAM Role - SAP Role Mapping');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 4: ROLE MAPPING (long format — the auditor's primary view)
    // Columns: Business Process | System ID | Composite Role | Description |
    //          Single Role | Description | Transaction/Fiori App - LOW | Description |
    //          Transaction/Fiori App - HIGH | Description | Type | Sensitive | Status | Topdesk | Comment
    // ═══════════════════════════════════════════════════════════════════
    var rmHeaders = ['Business Process','System ID','Composite Role','Description','Single Role','Description','Transaction/Fiori App - LOW','Description','Transaction/Fiori App - HIGH','Description','Type','Sensitive','Status','Topdesk','Comment'];
    var rmRows = [rmHeaders];

    // Build mapping of single role -> composite parents
    var singleToComposites = {};
    ra.roles.filter(function(r){return r.type==='C';}).forEach(function(composite){
      (composite.children||[]).forEach(function(child){
        if(!singleToComposites[child]) singleToComposites[child]=[];
        singleToComposites[child].push(composite.name);
      });
    });

    ra.roles.forEach(function(role){
      // For each transaction this role grants, emit one row.
      // Skip composite roles in this iteration — single roles carry the actual auth.
      if(role.type==='C') return;
      var compositeParents = singleToComposites[role.name] || [''];
      var tcodesToEmit;
      if(role.hasFullTcodeAccess){
        tcodesToEmit = [{tc:'*', desc:'ALL TRANSACTIONS — wildcard S_TCODE = *', sensitive:'Yes (wildcard)'}];
      } else {
        tcodesToEmit = (role.tcodes||[]).map(function(t){
          var isSensitive = (typeof ROLE_SENSITIVE_TCODES !== 'undefined' && ROLE_SENSITIVE_TCODES.has(t)) ? 'Yes' : '';
          return {tc:t, desc:'', sensitive:isSensitive};
        });
      }
      // Cap per-role emission to keep file sane: 500 t-codes max per single role
      if(tcodesToEmit.length > 500) tcodesToEmit = tcodesToEmit.slice(0,500);
      compositeParents.forEach(function(compName){
        tcodesToEmit.forEach(function(t){
          rmRows.push([
            '',                            // Business Process — for manual fill
            sid,                           // System ID
            compName,                      // Composite Role (or '' if standalone single)
            '',                            // Composite Description
            role.name,                     // Single Role
            role.isDisplay?'(display/view role)':'',  // Single Description
            t.tc,                          // T-code
            t.desc,                        // T-code Description (would need TSTC upload)
            '',                            // High
            '',                            // High Description
            'Transaction',                 // Type
            t.sensitive,                   // Sensitive
            '',                            // Status
            '',                            // Topdesk
            ''                             // Comment
          ]);
        });
      });
    });

    var ws4 = XLSX.utils.aoa_to_sheet(clipRows(rmRows), {dense:true});
    ws4['!cols'] = [{wch:22},{wch:8},{wch:30},{wch:32},{wch:36},{wch:32},{wch:22},{wch:36},{wch:14},{wch:22},{wch:13},{wch:11},{wch:10},{wch:10},{wch:24}];
    ws4['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws4, 'Role Mapping');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 5: ROLE MATRIX (WIDE — T-codes as rows, single roles as columns)
    // Row 0: blank, blank, role names...
    // Row 1: "Transaction", "Description", blanks
    // Row 2+: tcode, desc, X marks
    // CAP at top 250 roles (by user count or risk) and top 5000 distinct t-codes
    // to keep the file manageable.
    // ═══════════════════════════════════════════════════════════════════
    var singleRoles = ra.roles.filter(function(r){return r.type==='S';});
    // Order: roles with most users first, then roles with most t-codes
    singleRoles.sort(function(a,b){
      if(b.userCount !== a.userCount) return b.userCount - a.userCount;
      return (b.tcodeCount===-1?99999:b.tcodeCount) - (a.tcodeCount===-1?99999:a.tcodeCount);
    });
    var roleCap = Math.min(250, singleRoles.length);
    var rolesForMatrix = singleRoles.slice(0, roleCap);

    // Build the universe of t-codes appearing across the chosen roles
    var tcodeSet = new Set();
    rolesForMatrix.forEach(function(role){
      if(role.hasFullTcodeAccess) return;  // wildcard roles don't contribute specific t-codes
      (role.tcodes||[]).forEach(function(t){tcodeSet.add(t);});
    });
    var allTcodes = [...tcodeSet].sort();
    if(allTcodes.length > 5000) allTcodes = allTcodes.slice(0, 5000);

    // Header rows
    var matrixRows = [];
    var headerRow = ['', ''];
    rolesForMatrix.forEach(function(role){headerRow.push(role.name);});
    matrixRows.push(headerRow);
    var secondRow = ['Transaction', 'Description'];
    rolesForMatrix.forEach(function(){secondRow.push('');});
    matrixRows.push(secondRow);

    // Special wildcard row at the top: t-code "*" with X under any wildcard-access role
    var hasAnyWildcard = rolesForMatrix.some(function(r){return r.hasFullTcodeAccess;});
    if(hasAnyWildcard){
      var wildRow = ['*', 'ALL TRANSACTIONS (S_TCODE = *)'];
      rolesForMatrix.forEach(function(role){wildRow.push(role.hasFullTcodeAccess ? 'X' : '');});
      matrixRows.push(wildRow);
    }

    // Build a per-role t-code Set lookup for fast membership tests
    var roleTcodeSets = rolesForMatrix.map(function(role){
      if(role.hasFullTcodeAccess) return null;  // null means "wildcard, every tcode is X"
      return new Set(role.tcodes||[]);
    });

    allTcodes.forEach(function(tc){
      var row = [tc, ''];  // description column — could fill from TSTC if uploaded
      rolesForMatrix.forEach(function(role, idx){
        var set = roleTcodeSets[idx];
        row.push(set===null ? 'X' : (set.has(tc) ? 'X' : ''));
      });
      matrixRows.push(row);
    });

    var ws5 = XLSX.utils.aoa_to_sheet(clipRows(matrixRows), {dense:true});
    var cols5 = [{wch:18},{wch:32}];
    for(var i=0;i<rolesForMatrix.length;i++) cols5.push({wch:11});
    ws5['!cols'] = cols5;
    ws5['!freeze'] = {xSplit:2, ySplit:2};
    XLSX.utils.book_append_sheet(wb, ws5, 'Role Matrix');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 6: OBJECT LEVEL MAPPING — auth detail per single role
    // Columns: Single Role | Description | Authorization OBJECT | Description |
    //          FIELD | LOW | HIGH | MODIFIED | DELETED | COPIED | NEU | NODE
    // ═══════════════════════════════════════════════════════════════════
    var OBJ_ROW_CAP = 100000;  // keep the sheet within browser memory limits
    var objRows = [['Single Role','Description','Authorization OBJECT','Description','FIELD','LOW','HIGH','MODIFIED','DELETED','COPIED','NEU','NODE']];
    var objTruncated = false;
    // Prioritise: roles WITH findings first (the audit-relevant ones), then the rest
    var orderedRoles = ra.roles.filter(function(r){return r.type==='S' && r.findings.length>0;})
      .concat(ra.roles.filter(function(r){return r.type==='S' && r.findings.length===0;}));
    outer:
    for(var ri=0; ri<orderedRoles.length; ri++){
      var role = orderedRoles[ri];
      var triples = role.authTriples||[];
      for(var ti=0; ti<triples.length; ti++){
        if(objRows.length > OBJ_ROW_CAP){objTruncated = true; break outer;}
        var t = triples[ti];
        objRows.push([
          role.name, role.isDisplay?'(display/view role)':'',
          t.obj, '',
          t.field, t.value,
          '', '', '', '', '', ''
        ]);
      }
    }
    if(objTruncated){
      objRows.push(['... TRUNCATED at '+OBJ_ROW_CAP.toLocaleString()+' rows. Roles with findings are included first. Re-export with fewer roles or request the full extract via JSON export.','','','','','','','','','','','']);
    }
    var ws6 = XLSX.utils.aoa_to_sheet(clipRows(objRows), {dense:true});
    ws6['!cols'] = [{wch:36},{wch:28},{wch:18},{wch:30},{wch:14},{wch:20},{wch:18},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
    ws6['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws6, 'Object Level Mapping');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 7: SENSITIVE TRANSACTION list
    // ═══════════════════════════════════════════════════════════════════
    var senTcodeRows = [['Transaction','Description','Sensitivity Reason']];
    if(typeof ROLE_SENSITIVE_TCODES !== 'undefined'){
      [...ROLE_SENSITIVE_TCODES].sort().forEach(function(tc){
        senTcodeRows.push([tc, '', 'Standard SAP sensitive transaction (privileged access / audit-tracked)']);
      });
    }
    var ws7 = XLSX.utils.aoa_to_sheet(clipRows(senTcodeRows), {dense:true});
    ws7['!cols'] = [{wch:18},{wch:36},{wch:60}];
    ws7['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws7, 'Sensitive Transaction');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 8: SENSITIVE OBJECTS — auth objects that warrant extra scrutiny
    // ═══════════════════════════════════════════════════════════════════
    var sensitiveObjects = ['B_BUPA_GRP','F_BKPF_BLA','F_BKPF_BUK','F_BKPF_GSB','F_BKPF_KOA','F_KNA1_APP','F_KNA1_BED','F_LFA1_APP','F_LFA1_BEK','F_LFA1_BUK','F_REGU_BUK','F_REGU_KOA','M_BANF_BSA','M_BANF_EKG','M_BANF_EKO','M_BANF_FRG','M_BANF_WRK','M_BEST_BSA','M_BEST_EKG','M_BEST_EKO','M_BEST_WRK','M_MATE_BUK','M_MATE_MAR','M_MATE_MAT','M_MATE_STA','M_MATE_VKO','M_MATE_WRK','M_MSEG_BMB','M_MSEG_BWA','M_MSEG_BWE','M_MSEG_LGO','M_MSEG_WMB','M_MSEG_WWA','M_MSEG_WWE','S_DEVELOP','S_TCODE','S_TABU_DIS','S_TABU_NAM','S_TABU_LIN','S_TABU_CLI','S_USER_AGR','S_USER_AUT','S_USER_GRP','S_USER_OBJ','S_USER_PRO','S_USER_SAS','S_USER_SYS','S_USER_TCD','S_USER_VAL'];
    var senObjRows = [['Authorization Object'], ...sensitiveObjects.map(function(o){return [o];})];
    var ws8 = XLSX.utils.aoa_to_sheet(clipRows(senObjRows), {dense:true});
    ws8['!cols'] = [{wch:22}];
    ws8['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws8, 'Sensitive Objects');

    // ═══════════════════════════════════════════════════════════════════
    // Additional BCS sheets (kept for our own findings)
    // ═══════════════════════════════════════════════════════════════════
    // BCS Findings (plain English)
    var fdgRows = [['Role','Role Type','Users Affected','Severity','Issue (plain English)','What This Means','Detected Evidence']];
    ra.roles.forEach(function(role){
      role.findings.forEach(function(f){
        fdgRows.push([role.name, role.type==='C'?'Composite':'Single', role.userCount, f.sev, f.label || f.kind, f.plain||'', f.detail||'']);
      });
    });
    var ws9 = XLSX.utils.aoa_to_sheet(clipRows(fdgRows), {dense:true});
    ws9['!cols'] = [{wch:36},{wch:11},{wch:11},{wch:9},{wch:48},{wch:80},{wch:80}];
    ws9['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws9, 'BCS Findings');

    // Naming Convention
    var conv = ra.convention;
    var convRows = [['Segment Position','Kind','Dominant Token','Dominance %','Unique Values','Sample Values']];
    if(conv && conv.segments){
      conv.segments.forEach(function(seg, idx){
        convRows.push([idx+1, seg.type, seg.token||'', seg.share?Math.round(seg.share*100):'', seg.uniqueValues||'', (seg.samples||[]).join(', ')]);
      });
    }
    var ws10 = XLSX.utils.aoa_to_sheet(clipRows(convRows), {dense:true});
    ws10['!cols'] = [{wch:16},{wch:14},{wch:18},{wch:13},{wch:14},{wch:60}];
    XLSX.utils.book_append_sheet(wb, ws10, 'Naming Convention');

    // Summary
    var s = ra.summary;
    var summaryRows = [
      ['Metric','Value'],
      ['Total roles analysed', s.total],
      ['Single roles', s.single],
      ['Composite roles', s.composite],
      ['SAP-delivered roles', s.sap],
      ['Customer Z-namespace roles', s.customZ],
      ['Customer Y-namespace roles', s.customY],
      ['Roles with any finding', s.withFindings],
      ['Display-named roles with maintenance access', s.displayWithMaint],
      ['Roles granting full transaction access (S_TCODE = *)', s.withWildcards],
      ['Roles containing sensitive transactions', s.withSensitive],
      ['Roles with role-level SoD conflicts', s.withRoleSod],
      ['Roles deviating from naming convention', s.nameDeviations],
    ];
    var ws11 = XLSX.utils.aoa_to_sheet(clipRows(summaryRows), {dense:true});
    ws11['!cols'] = [{wch:55},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws11, 'Summary');

    var fname = 'BCS_Role_Matrix_'+custLabel+'_'+stamp+'.xlsx';
    XLSX.writeFile(wb, fname, {bookSST:true, compression:true});
    toast('Role matrix exported: '+fname,'ok');
  } catch(e){
    toast('Excel export failed: '+e.message,'err');
    console.error(e);
  }
}

// ───────────────────────────────────────────────────────────────────────
// License Detail Report — User-level + Role-level Excel export
// ───────────────────────────────────────────────────────────────────────
async function exportLicenseReportXLSX(){
  var r = App.results;
  if(!r){toast('Run an analysis first','warn');return;}
  if(!r.license || r.license.length===0){toast('No license analysis available — enable the License module and re-run.','warn');return;}
  toast('Building License Detail Excel...','info');
  try {
    var XLSX = await ensureXLSX();
    var wb = XLSX.utils.book_new();

    var cust = (typeof getActiveCustomer==='function') ? getActiveCustomer() : null;
    var custName = cust ? cust.name : 'Customer';
    var custLabel = cust ? cust.name.replace(/[^A-Za-z0-9]/g,'_') : 'customer';
    var stamp = new Date().toISOString().slice(0,10);
    var sid = r.system && r.system.sid ? r.system.sid : 'SAP';

    // Index license tier by user
    var userLicense = {};
    r.license.forEach(function(l){userLicense[l.user]=l;});

    // Get the user-role-tcode detail (already produced by runUnused)
    var detail = (r.unused && r.unused.detail) || [];
    // Get per-user-per-tcode usage counts
    var usedCount = (r.unused && r.unused.usedCount) || {};

    // Build AGR_DEFINE lookup for derived role -> master role (PARENT_AGR)
    // Also AGR_AGRS for composite -> children
    var data = r._raw || {};
    var agrDefineRows = (data.AGR_DEFINE && data.AGR_DEFINE.rows) || [];
    var agrAgrsRows   = (data.AGR_AGRS && data.AGR_AGRS.rows)   || [];

    // Map: single role -> parent (derived from / master role)
    var derivedToMaster = {};
    agrDefineRows.forEach(function(row){
      var name = String(col(row,'AGR_NAME')||'').trim();
      var parent = String(col(row,'PARENT_AGR')||col(row,'PARENT')||'').trim();
      if(name && parent) derivedToMaster[name] = parent;
    });

    // Map: single role -> composite parent
    var singleToComposite = {};
    agrAgrsRows.forEach(function(row){
      var parent = String(col(row,'AGR_NAME')||'').trim();
      var child  = String(col(row,'CHILD_AGR')||'').trim();
      if(parent && child){
        if(!singleToComposite[child]) singleToComposite[child] = [];
        singleToComposite[child].push(parent);
      }
    });

    // ═══════════════════════════════════════════════════════════════════
    // Helper: usage tier classification
    //   High >= 10 executions, Med 3-9, Low 1-2, None = 0 (unused)
    // ═══════════════════════════════════════════════════════════════════
    function usageTier(count){
      if(count >= 10) return 'High';
      if(count >= 3)  return 'Medium';
      if(count >= 1)  return 'Low';
      return 'Unused';
    }

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 1: USER-LEVEL DETAIL
    // One row per (user, granting role, t-code).
    // Cols: User ID | User Name | Email ID | Composite Role | Derived Role | Transaction | Auth Object | Value | Usage | License | Recommendation | Master Role
    // ═══════════════════════════════════════════════════════════════════
    var userHeaders = ['User ID','User Name','Email ID','Composite Role','Single Role / Derived Role','Transaction','Authorization Object','Value','Usage (High/Medium/Low)','Execution Count','License','License Tier Description','Recommendation','Master Role'];
    var userRows = [userHeaders];

    // Build per-user aggregated stats first (for recommendation reasoning)
    var userStats = {};  // user -> {total, high, med, low, unused, license}
    detail.forEach(function(d){
      if(!userStats[d.user]) userStats[d.user] = {total:0,high:0,med:0,low:0,unused:0,user:d.user};
      var t = usageTier(d.usageCount||0);
      userStats[d.user].total++;
      if(t==='High')   userStats[d.user].high++;
      else if(t==='Medium') userStats[d.user].med++;
      else if(t==='Low') userStats[d.user].low++;
      else userStats[d.user].unused++;
    });

    // Per-user recommendation
    function userRecommendation(stat, license){
      if(!stat) return 'Insufficient usage data — review manually';
      var pct = stat.total>0 ? Math.round(((stat.high+stat.med+stat.low) / stat.total)*100) : 0;
      var hasActiveUse = (stat.high + stat.med) > 0;
      if(license==='GB' || license==='Professional'){
        if(!hasActiveUse) return 'Downgrade — Professional license but zero High/Medium usage observed; consider Functional/Productivity tier';
        if(stat.high < 3) return 'Review — Professional license with only '+stat.high+' frequently-used transactions; downgrade may be possible';
        return 'Retain — Professional license justified by '+stat.high+' high-usage transactions';
      }
      if(license==='GC' || license==='Functional'){
        if(!hasActiveUse) return 'Downgrade — Functional license but no observed usage; consider Productivity or ESS tier';
        return 'Retain — Functional license justified by current usage';
      }
      if(!hasActiveUse) return 'Review — assigned but unused; lock dormant account or remove role assignment';
      return 'Retain — license appears appropriate for observed usage';
    }

    // Emit rows. For each detail row, look up license + roles + master.
    detail.forEach(function(d){
      var lic = userLicense[d.user];
      var licenseCode = lic ? lic.license : 'GE';
      var licenseName = lic ? lic.licenseName : 'Employee Self-Service';
      var licenseDesc = lic ? lic.licenseDesc : '';
      var stat = userStats[d.user];
      var tier = usageTier(d.usageCount||0);
      var rec = userRecommendation(stat, licenseCode);
      // Role-side: d.roles is a comma-joined list. Pick the first granting role.
      var firstRole = (d.roles||'').split(',').map(function(s){return s.trim();}).filter(Boolean)[0] || '';
      // Determine composite parent for the granting role
      var composites = singleToComposite[firstRole] || [];
      var compositeRole = composites.length>0 ? composites[0] : '';  // primary composite only — full mapping in Composite-Single sheet
      // Determine master role (if firstRole is derived)
      var masterRole = derivedToMaster[firstRole] || '';
      userRows.push([
        d.user,                            // User ID
        '',                                // User Name (not in USR02)
        '',                                // Email ID (would need ADR6/USR21)
        compositeRole,                     // Composite Role
        firstRole,                         // Single / Derived Role (the role that granted this t-code to this user)
        d.tcode,                           // Transaction
        'S_TCODE',                         // Auth Object (this row is about transaction access)
        d.tcode,                           // Value (the t-code value itself)
        tier,                              // Usage tier
        d.usageCount || 0,                 // raw execution count
        licenseCode,                       // License code
        licenseName + (licenseDesc?(' — '+licenseDesc):''),  // License tier description
        rec,                               // Recommendation
        masterRole                         // Master Role (PARENT_AGR if this is a derived role)
      ]);
    });

    // If no detail rows (no SM20 / no AGR_USERS uploaded), fall back to a per-user summary
    if(userRows.length === 1){
      r.license.forEach(function(l){
        userRows.push([l.user,'','','',(l.roles||'').split(',')[0]||'','','','','','','',l.license,l.licenseName,'No SM20/AGR_USERS data — usage tier not derivable','']);
      });
    }

    var ws1 = XLSX.utils.aoa_to_sheet(clipRows(userRows), {dense:true});
    ws1['!cols'] = [
      {wch:14},{wch:22},{wch:28},{wch:32},{wch:32},{wch:18},
      {wch:18},{wch:20},{wch:14},{wch:13},{wch:9},{wch:36},{wch:60},{wch:32}
    ];
    ws1['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws1, 'User-Level License Detail');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 2: ROLE-LEVEL CONSOLIDATED
    // Cols: Composite Role | Single Role | Derived Role (parent) | # Users Assigned | Usage Consolidated | License | Recommendation
    // ═══════════════════════════════════════════════════════════════════
    var roleHeaders = ['Composite Role','Single Role','Master Role (if Derived)','# Users Assigned','Usage (Consolidated)','High Usage Users','Medium Usage Users','Low Usage Users','Unused Users','License Tier (most-privileged user)','Recommendation'];
    var roleRows = [roleHeaders];

    // Build per-role aggregation. For each role in the role analysis:
    //   - Count assigned users
    //   - For each user on the role, look up their (user, tcode) detail rows for THIS role
    //     and aggregate the usage tier of the highest-used t-code that came from this role
    //   - Determine most-privileged license tier among users on the role
    var ra = r.roleAnalysis;
    if(ra && ra.roles){
      // Build role -> userList (already on each role object as role.users)
      // Pre-index detail by (user, role) to know which tcodes came from which role
      var byUserRole = {};  // "user|role" -> [{tcode, usageCount}]
      detail.forEach(function(d){
        (d.roles||'').split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(role){
          var k = d.user+'|'+role;
          if(!byUserRole[k]) byUserRole[k] = [];
          byUserRole[k].push({tcode:d.tcode, usageCount:d.usageCount||0});
        });
      });

      ra.roles.forEach(function(role){
        if(!role.users || role.users.length===0) return;  // skip unassigned roles
        var composites = singleToComposite[role.name] || [];
        var master = derivedToMaster[role.name] || '';
        var singleCell = role.type==='C' ? '' : role.name;

        // Aggregate per user
        var userBuckets = {High:0, Medium:0, Low:0, Unused:0};
        var maxLicenseRank = 999, maxLicense = 'GE', maxLicenseName = 'Employee Self-Service';
        role.users.forEach(function(u){
          var lic = userLicense[u];
          if(lic){
            var rank = LICENSE_RANK[lic.license] || 99;
            if(rank < maxLicenseRank){maxLicenseRank=rank; maxLicense=lic.license; maxLicenseName=lic.licenseName;}
          }
          var rowsForUserRole = byUserRole[u+'|'+role.name] || [];
          // Per-user usage tier on this role = the MAX usage tier across the tcodes this role granted
          var maxTier = 'Unused';
          var maxCount = 0;
          rowsForUserRole.forEach(function(d){if(d.usageCount > maxCount) maxCount = d.usageCount;});
          maxTier = usageTier(maxCount);
          userBuckets[maxTier]++;
        });

        // Consolidated tier label
        var consolidated;
        if(userBuckets.High >= userBuckets.Medium && userBuckets.High >= userBuckets.Low && userBuckets.High > 0) consolidated = 'High (predominantly)';
        else if(userBuckets.Medium > 0 && userBuckets.Medium >= userBuckets.Low) consolidated = 'Medium (predominantly)';
        else if(userBuckets.Low > 0) consolidated = 'Low (predominantly)';
        else consolidated = 'Unused';

        // Role-level recommendation
        var rec;
        var totalUsers = role.users.length;
        var activeUsers = userBuckets.High + userBuckets.Medium + userBuckets.Low;
        if(activeUsers === 0){
          rec = 'Remove or lock — role has '+totalUsers+' assignees but none actively use the transactions it grants';
        } else if(userBuckets.Unused > 0.5 * totalUsers){
          rec = 'Review assignments — '+userBuckets.Unused+' of '+totalUsers+' users do not use this role; consider removing from inactive users';
        } else if(maxLicense==='GB' && userBuckets.High < 2){
          rec = 'Downgrade candidate — role triggers Professional license but only '+userBuckets.High+' high-usage user(s)';
        } else if(role.hasFullTcodeAccess){
          rec = 'CRITICAL — role grants S_TCODE = * (universal access); restrict to a small named privileged group only';
        } else if(role.findings && role.findings.some(function(f){return f.kind==='DISPLAY_MAINTENANCE';})){
          rec = 'Rename or restrict — display-named role actually grants Change/Create/Delete; users may not realize the privilege level';
        } else {
          rec = 'Retain — role usage and license tier appear appropriate';
        }

        // ONE ROW PER (COMPOSITE, SINGLE) PAIR — never club composites into one cell.
        // A single role inside 3 composites gets 3 rows; standalone roles get one row with blank composite.
        var emitComposites = composites.length>0 ? composites : [role.type==='C' ? role.name : ''];
        emitComposites.forEach(function(compName){
          roleRows.push([
            compName, singleCell, master,
            totalUsers, consolidated,
            userBuckets.High, userBuckets.Medium, userBuckets.Low, userBuckets.Unused,
            maxLicense + ' — ' + maxLicenseName,
            rec
          ]);
        });
      });
    }

    var ws2 = XLSX.utils.aoa_to_sheet(clipRows(roleRows), {dense:true});
    ws2['!cols'] = [
      {wch:32},{wch:36},{wch:32},{wch:9},{wch:22},{wch:8},{wch:8},{wch:8},{wch:8},{wch:36},{wch:80}
    ];
    ws2['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws2, 'Role-Level License Consolidated');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 3: COVER / metadata
    // ═══════════════════════════════════════════════════════════════════
    var coverData = [
      [],[],
      ['', 'License Measurement Report'],
      [],
      ['', 'Customer:', custName],
      ['', 'System:', sid],
      ['', 'Environment:', (r.system && r.system.env) || ''],
      ['', 'Generated:', new Date().toLocaleString()],
      ['', 'Generated by:', 'BCS SAP Secure Studio'],
      [],
      ['', 'Total users analysed:', r.license.length],
      ['', 'Total user-role-tcode rows:', detail.length],
      ['', 'Total roles consolidated:', (ra && ra.roles)?ra.roles.filter(function(rl){return rl.users && rl.users.length>0;}).length:0],
      [],
      ['', 'Usage tier definition:'],
      ['', '', 'High',   '≥ 10 executions in SM20 audit window'],
      ['', '', 'Medium', '3–9 executions'],
      ['', '', 'Low',    '1–2 executions'],
      ['', '', 'Unused', '0 executions (assigned but never used)'],
      [],
      ['', 'Caveats:'],
      ['', '', 'User Name and Email ID columns are blank if ADR6 / USR21 data is not uploaded.'],
      ['', '', 'Master Role column is populated only if AGR_DEFINE.PARENT_AGR is uploaded.'],
      ['', '', 'Composite Role column is populated only if AGR_AGRS is uploaded.'],
      ['', '', 'Usage data requires SM20 audit log upload.']
    ];
    var ws3 = XLSX.utils.aoa_to_sheet(clipRows(coverData), {dense:true});
    ws3['!cols'] = [{wch:3},{wch:30},{wch:30},{wch:60}];
    XLSX.utils.book_append_sheet(wb, ws3, 'Cover');

    // Move Cover to be first sheet
    var names = wb.SheetNames;
    var coverIdx = names.indexOf('Cover');
    if(coverIdx > 0){
      names.splice(coverIdx,1);
      names.unshift('Cover');
      wb.SheetNames = names;
    }

    var fname = 'BCS_License_Detail_'+custLabel+'_'+stamp+'.xlsx';
    XLSX.writeFile(wb, fname, {bookSST:true, compression:true});
    toast('License detail exported: '+fname,'ok');
  } catch(e){
    toast('License export failed: '+e.message,'err');
    console.error(e);
  }
}


function exportRoleFindingsCSV(){
  var r = App.results;
  if(!r || !r.roleAnalysis){toast('No role analysis to export','warn');return;}
  var ra = r.roleAnalysis;
  var rows = [['Role','Type','Users','Finding Kind','Severity','Detail']];
  ra.roles.forEach(function(role){
    role.findings.forEach(function(f){
      rows.push([role.name, role.type, role.userCount, f.kind, f.sev, (f.detail||'').replace(/"/g,'""')]);
    });
  });
  var csv = rows.map(function(r){return r.map(function(c){var s=String(c); return s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0 ? '"'+s+'"' : s;}).join(',');}).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var cust = (typeof getActiveCustomer==='function') ? getActiveCustomer() : null;
  var custLabel = cust ? cust.name.replace(/[^A-Za-z0-9]/g,'_') : 'customer';
  a.download = 'BCS_Role_Findings_'+custLabel+'_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('Role findings exported','ok');
}

function handleExistingMatrixUpload(ev){
  var f = ev.target.files && ev.target.files[0];
  if(!f) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var rows = parseCSV(e.target.result);
      if(rows.length===0){toast('No rows found in file','warn');return;}
      var headers = Object.keys(rows[0]);
      App.existingMatrix = {rows:rows, headers:headers, length:rows.length, fileName:f.name};
      toast('Role matrix loaded: '+rows.length+' rows','ok');
      renderResRole();
    } catch(err){toast('Failed to parse: '+err.message,'err');}
  };
  reader.readAsText(f);
}
