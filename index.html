function downloadProxy(){
  const code=`#!/usr/bin/env python3
"""SAP OData CORS Proxy - run: python3 sap_proxy.py
Set Proxy URL in app to: http://localhost:3100"""
import json,base64,urllib.request,urllib.error,ssl,sys,os
from http.server import HTTPServer,BaseHTTPRequestHandler
PORT=int(sys.argv[1]) if len(sys.argv)>1 else 3100
CORS={"Access-Control-Allow-Origin":"*","Access-Control-Allow-Methods":"GET,POST,OPTIONS","Access-Control-Allow-Headers":"Content-Type,Authorization"}
class H(BaseHTTPRequestHandler):
    def log_message(self,f,*a):print(f"  {self.log_date_time_string()} {f%a}")
    def send_cors(self,c):self.send_response(c);[self.send_header(k,v) for k,v in CORS.items()];self.send_header("Content-Type","application/json");self.end_headers()
    def do_OPTIONS(self):self.send_cors(204);self.wfile.write(b"")
    def do_GET(self):
        if self.path in("/","/health"):self.send_cors(200);self.wfile.write(json.dumps({"status":"ok","port":PORT}).encode())
        else:self.send_cors(404);self.wfile.write(b"Not found")
    def do_POST(self):
        body=json.loads(self.rfile.read(int(self.headers.get("Content-Length",0))))
        t=body.get("url","");u=body.get("username","");pw=body.get("password","")
        print(f"  -> {t[:80]}")
        try:
            tok=base64.b64encode(f"{u}:{pw}".encode()).decode()
            ctx=ssl.create_default_context();ctx.check_hostname=False;ctx.verify_mode=ssl.CERT_NONE
            req=urllib.request.Request(t,headers={"Authorization":f"Basic {tok}","Accept":"application/json"})
            with urllib.request.urlopen(req,context=ctx,timeout=15) as r:
                d=json.loads(r.read().decode())
                self.send_cors(200);self.wfile.write(json.dumps({"ok":True,"status":r.status,"data":d}).encode())
        except urllib.error.HTTPError as e:
            try:ed=json.loads(e.read())
            except:ed={}
            self.send_cors(200);self.wfile.write(json.dumps({"ok":False,"status":e.code,"data":ed}).encode())
        except Exception as e:self.send_cors(502);self.wfile.write(json.dumps({"ok":False,"error":str(e)}).encode())
print(f"\\n  SAP OData CORS Proxy on http://localhost:{PORT}\\n  Set Proxy URL in app -> http://localhost:{PORT}\\n")
HTTPServer(("0.0.0.0",PORT),H).serve_forever()
`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([code],{type:'text/x-python'}));a.download='sap_proxy.py';a.click();
  toast('sap_proxy.py downloaded — run: python3 sap_proxy.py','ok');
}

function handleMicrosoftLogin(){
  // Microsoft SSO — requires MSAL configuration (Azure AD App Registration)
  // In a deployed environment, configure with your tenant ID and client ID via:
  //   msalConfig = { auth: { clientId:'YOUR_CLIENT_ID', authority:'https://login.microsoftonline.com/YOUR_TENANT' }}
  // For now, show a configuration notice
  var errEl=document.getElementById('login-error');
  if(errEl){
    errEl.style.display='flex';
    errEl.style.background='rgba(59,130,246,.08)';
    errEl.style.color='#93c5fd';
    errEl.style.borderColor='rgba(59,130,246,.25)';
    errEl.innerHTML='<svg width="14" height="14" stroke="currentColor" fill="none"><use href="#ic-info"/></svg>&nbsp;Microsoft SSO requires Azure AD App Registration. Configure your Tenant ID and Client ID in Settings → Authentication.';
  }
  // When MSAL is configured:
  // const msalApp = new msal.PublicClientApplication(msalConfig);
  // msalApp.loginPopup({scopes:['User.Read']}).then(function(resp){
  //   handleMicrosoftLoginResponse(resp);
  // });
}

// ── Azure MSAL Configuration ──────────────────────────────────────
function getMsalConfig(){return loadStore('bcs_msal_config',{tenantId:'',clientId:'',enabled:false,redirectUri:window.location&&window.location.origin?window.location.origin:''});}
function saveMsalConfig(cfg){localStorage.setItem('bcs_msal_config',JSON.stringify(cfg));}

function handleMicrosoftLogin(){
  var cfg=getMsalConfig();
  var errEl=document.getElementById('login-error');
  function showInfo(msg,isErr){
    if(errEl){
      errEl.style.display='flex';
      errEl.style.background=isErr?'rgba(239,68,68,.08)':'rgba(59,130,246,.08)';
      errEl.style.color=isErr?'#ff8080':'#93c5fd';
      errEl.style.borderColor=isErr?'rgba(239,68,68,.25)':'rgba(59,130,246,.25)';
      errEl.innerHTML=(isErr?'<svg width="14" height="14" stroke="currentColor" fill="none"><use href="#ic-alert-triangle"/></svg>':'<svg width="14" height="14" stroke="currentColor" fill="none"><use href="#ic-info"/></svg>')+' '+msg;
    }
  }
  if(!cfg.enabled||!cfg.tenantId||!cfg.clientId){
    showInfo('Microsoft SSO not configured. Go to Settings → Azure Authentication to set up your Tenant ID and Client ID.');
    return;
  }
  // Build MSAL auth URL (implicit/code flow)
  var authUrl='https://login.microsoftonline.com/'+cfg.tenantId+'/oauth2/v2.0/authorize'+
    '?client_id='+encodeURIComponent(cfg.clientId)+
    '&response_type=code'+
    '&redirect_uri='+encodeURIComponent(cfg.redirectUri||window.location.origin)+
    '&scope=openid+profile+email+User.Read'+
    '&response_mode=query'+
    '&state='+btoa(JSON.stringify({ts:Date.now(),app:'bcs-secure-studio'}));
  // For SPA context, open popup
  var popup=window.open(authUrl,'msal-login','width=480,height=640,scrollbars=yes');
  if(!popup){
    showInfo('Popup blocked. Please allow popups for this site and try again.',true);
    return;
  }
  showInfo('Microsoft sign-in window opened. Complete authentication there.');
  // Listen for redirect back (postMessage or URL check)
  var pollTimer=setInterval(function(){
    try{
      if(popup.closed){clearInterval(pollTimer);showInfo('Microsoft sign-in window was closed.',true);return;}
      var url=popup.location.href;
      if(url.indexOf('code=')>=0||url.indexOf('error=')>=0){
        clearInterval(pollTimer);
        popup.close();
        var params=new URLSearchParams(url.split('?')[1]||'');
        if(params.get('error')){showInfo('Microsoft auth error: '+params.get('error_description'),true);return;}
        var code=params.get('code');
        if(code){
          showInfo('Authenticated via Microsoft. Completing sign-in...');
          // In a full deployment, exchange code for token server-side
          // For now, confirm the MS identity and auto-create/login a local account
          setTimeout(function(){
            var msEmail='ms_user@'+cfg.tenantId;
            handleMsAutoLogin(msEmail);
          },800);
        }
      }
    }catch(e){}
  },500);
}

async function handleMsAutoLogin(email){
  await ensureDefaultAdmin();
  var users=getUsers();
  var user=users.find(function(u){return u.email.toLowerCase()===email.toLowerCase();});
  if(!user){
    users.push({id:'usr_ms_'+Date.now(),email:email,name:email.split('@')[0],role:'auditor',password:'',provider:'microsoft',created:Date.now()});
    saveUsers(users);
    user=users[users.length-1];
  }
  setSession({userId:user.id,ts:Date.now()});
  toast('Signed in with Microsoft as '+user.name,'ok');
  renderApp();
}

function toggleMsalEnabled(){

function testMsalConfig(){
  var cfg=getMsalConfig();
  if(!cfg.tenantId||!cfg.clientId){toast('Enter Tenant ID and Client ID first','warn');return;}
  var metaUrl='https://login.microsoftonline.com/'+cfg.tenantId+'/v2.0/.well-known/openid-configuration';
  toast('Checking Azure tenant...','info');
  fetch(metaUrl,{method:'GET'}).then(function(r){
    if(r.ok){toast('✓ Azure tenant found and reachable','ok');}
    else{toast('Azure tenant check failed ('+r.status+')','err');}
  }).catch(function(e){toast('Cannot reach Azure (network/CORS) — check manually','warn');});

async function handleLogin(){
  var email = (document.getElementById('login-email')||{}).value;
  var password = (document.getElementById('login-password')||{}).value;
  var errEl = document.getElementById('login-error');
  var btnEl = document.getElementById('login-btn');
  function showErr(msg){
    if(errEl){errEl.style.display='flex';errEl.innerHTML=msg;}
  }
  if(!email||!password){showErr('Enter your email and password.');return;}
  if(btnEl){btnEl.disabled=true;btnEl.innerHTML='Signing in…';btnEl.style.opacity='.7';}
  await ensureDefaultAdmin();
  var users = getUsers();
  var user = users.find(function(u){return u.email.toLowerCase()===email.toLowerCase();});
  if(!user){
    if(errEl){errEl.style.display='block';errEl.textContent='No account found with that email';}
    return;
  }
  var ok = await verifyPassword(password, user.passwordHash);
  if(!ok){
    if(errEl){errEl.style.display='block';errEl.textContent='Incorrect password';}
    return;
  }
  // Record session and mark first-time setup complete on successful login
  user.lastLogin = Date.now();
  if(user.email === 'admin@local') user.setupComplete = true;
  saveUsers(users);
  setSession({userId:user.id, ts:Date.now()});
  // Ensure at least one customer exists
  ensureDefaultCustomer();
  if(!getActiveCustomerId()){
    var c = getCustomers()[0];
    if(c) setActiveCustomerId(c.id);
  }
  // Restore full app shell
  document.body.innerHTML = '<div id="app"></div>';
  buildAppShell();
  loadSystemsFromActiveCustomer();
  App.view = 'customers';
  render();
}

function handleLogout(){
  if(!confirm('Sign out?')) return;
  // Persist customer data before logout
  persistCustomers();
  clearSession();
  renderLogin();
}

async function saveUser(editId){
  var g = function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var email = g('uf-email').toLowerCase();
  var name = g('uf-name');
  var role = g('uf-role');
  var password = g('uf-password');
  var custIds = Array.from(document.querySelectorAll('input[name="uf-cust"]:checked')).map(function(el){return el.value;});
  if(!email){toast('Email is required','warn');return;}
  if(!editId && !password){toast('Password is required for new users','warn');return;}
  if(password && password.length<4){toast('Password must be at least 4 characters','warn');return;}
  var users = getUsers();
  if(editId){
    var u = users.find(function(x){return x.id===editId;});
    if(!u){toast('User not found','warn');return;}
    u.name = name;
    u.role = role;
    u.customerIds = custIds;
    if(password){
      u.passwordHash = await hashPassword(password);
      // First-time setup is "complete" once the admin's password has been changed
      if(u.email==='admin@local') u.setupComplete = true;
    }
  } else {
    if(users.find(function(x){return x.email===email;})){toast('Email already exists','warn');return;}
    users.push({
      id: 'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      email: email, name: name, role: role,
      passwordHash: await hashPassword(password),
      created: Date.now(), lastLogin: null,
      customerIds: custIds
    });
    // Once a second account exists, hide the first-time-setup hint
    var admin = users.find(function(x){return x.email==='admin@local';});
    if(admin) admin.setupComplete = true;
  }
  saveUsers(users);
  toast('User '+(editId?'updated':'created'),'ok');
  renderUsers();
}

function deleteUser(id){
  if(!confirm('Delete this user account? This cannot be undone.')) return;
  saveUsers(getUsers().filter(function(u){return u.id!==id;}));
  toast('User deleted','ok');
  renderUsers();
}

// Time-since helper
function timeSince(ts){
  var d=Date.now()-ts;
  var m=Math.floor(d/60000);
  if(m<60) return m<=1?'Just now':m+'m ago';
  var hr=Math.floor(m/60);
  if(hr<24) return hr+'h ago';
  var dy=Math.floor(hr/24);
  if(dy<7) return dy+'d ago';
  if(dy<30) return Math.floor(dy/7)+'w ago';
  return Math.floor(dy/30)+'mo ago';
}

function saveCustomer(editId){
  var g = function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var name = g('cf-name');
  var contact = g('cf-contact');
  if(!name){toast('Name is required','warn');return;}
  var custs = getCustomers();
  if(editId){
    var c = custs.find(function(x){return x.id===editId;});
    if(!c){toast('Customer not found','warn');return;}
    c.name = name; c.contact = contact;
    var tm=document.getElementById('cf-team');
    if(tm) c.teamMembers=(tm.value||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
  } else {
    var newTeam=document.getElementById('cf-team');
    custs.push({
      id: 'cust_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      name: name, contact: contact,
      created: Date.now(),
      lastScan: null, securityScore: null,
      teamMembers: newTeam?(newTeam.value||'').split(',').map(function(s){return s.trim();}).filter(Boolean):[],
      systems: [
        {id:'sys'+Date.now(),name:'Production',sid:'PRD',client:'100',env:'PRD',host:'',port:'8080',user:'',password:'',proxyUrl:'http://localhost:3100',mode:'demo',files:{},lastSync:null,status:'demo'},
      ]
    });
  }
  saveCustomers(custs);
  toast('Customer '+(editId?'updated':'created'),'ok');
  renderCustomers();
  renderNav();
}

function deleteCustomer(id){
  if(!confirm('Delete this customer and ALL its systems, files, and analysis history? This cannot be undone.')) return;
  var custs = getCustomers().filter(function(c){return c.id!==id;});
  saveCustomers(custs);
  if(getActiveCustomerId()===id){
    setActiveCustomerId(custs[0]?custs[0].id:'');
    loadSystemsFromActiveCustomer();
  }
  toast('Customer deleted','ok');
  renderCustomers();
  renderNav();
}

function switchCustomer(id){
  // Switch active customer (used by the sidebar dropdown — stay on current page)
  persistCustomers();  // save current first
  setActiveCustomerId(id);
  loadSystemsFromActiveCustomer();
  App.results = null;
  toast('Switched to '+getActiveCustomer().name,'ok');
  // Re-render whatever page we're on (so the customer-specific data refreshes)
  render();
}

function openCustomer(id){
  // Open a customer (card click / Open button) → enter customer workspace, land on dashboard
  persistCustomers();
  setActiveCustomerId(id);
  loadSystemsFromActiveCustomer();
  App.results = null;
  App.inCustomer = true;
  App.view = 'dashboard';
  toast('Opened '+getActiveCustomer().name,'ok');
  render();
}

function backToCustomers(){
  // Exit the customer workspace, return to outer Customers page
  persistCustomers();
  App.inCustomer = false;
  App.results = null;
  App.view = 'customers';
  render();
}

//  ISO 27001:2022 / 27002:2022 CONTROL CATALOG (selected SAP-relevant)
//  Source: ISO/IEC 27001:2022 Annex A; ISO/IEC 27002:2022 control set.
//  We embed the subset relevant to SAP security so the app works offline.
// ═══════════════════════════════════════════════════════════════════════
const ISO_CONTROLS = [
  // ── A.5 Organizational controls ──
  {id:'A.5.15', name:'Access control',                category:'Organizational', area:'Access',
   desc:'Rules to control physical and logical access shall be established based on business and information security requirements.'},
  {id:'A.5.16', name:'Identity management',           category:'Organizational', area:'Access',
   desc:'The full lifecycle of identities shall be managed.'},
  {id:'A.5.17', name:'Authentication information',    category:'Organizational', area:'Access',
   desc:'Allocation and management of authentication information shall be controlled by a management process.'},
  {id:'A.5.18', name:'Access rights',                 category:'Organizational', area:'Access',
   desc:'Access rights to information and other associated assets shall be provisioned, reviewed, modified and removed.'},
  {id:'A.5.23', name:'Information security for use of cloud services', category:'Organizational', area:'Cloud'},
  {id:'A.5.31', name:'Legal, statutory, regulatory and contractual requirements', category:'Organizational', area:'Compliance'},
  {id:'A.5.36', name:'Compliance with policies, rules and standards for information security', category:'Organizational', area:'Compliance'},
  // ── A.6 People controls ──
  {id:'A.6.3',  name:'Information security awareness, education and training', category:'People', area:'HR'},
  // ── A.8 Technological controls ──
  {id:'A.8.2',  name:'Privileged access rights',      category:'Technological', area:'Access',
   desc:'The allocation and use of privileged access rights shall be restricted and managed.'},
  {id:'A.8.3',  name:'Information access restriction',category:'Technological', area:'Access',
   desc:'Access to information and other associated assets shall be restricted in accordance with the established access control policy.'},
  {id:'A.8.4',  name:'Access to source code',         category:'Technological', area:'Development',
   desc:'Read and write access to source code, development tools and software libraries shall be appropriately managed.'},
  {id:'A.8.5',  name:'Secure authentication',         category:'Technological', area:'Access',
   desc:'Secure authentication technologies and procedures shall be implemented based on access restrictions and the topic-specific policy.'},
  {id:'A.8.9',  name:'Configuration management',      category:'Technological', area:'Operations',
   desc:'Configurations, including security configurations, of hardware, software, services and networks shall be established, documented, implemented, monitored and reviewed.'},
  {id:'A.8.12', name:'Data leakage prevention',       category:'Technological', area:'Data'},
  {id:'A.8.15', name:'Logging',                       category:'Technological', area:'Operations',
   desc:'Logs that record activities, exceptions, faults and other relevant events shall be produced, stored, protected and analysed.'},
  {id:'A.8.16', name:'Monitoring activities',         category:'Technological', area:'Operations'},
  {id:'A.8.17', name:'Clock synchronization',         category:'Technological', area:'Operations'},
  {id:'A.8.18', name:'Use of privileged utility programs', category:'Technological', area:'Operations',
   desc:'The use of utility programs that may be capable of overriding system and application controls shall be restricted and tightly controlled.'},
  {id:'A.8.19', name:'Installation of software on operational systems', category:'Technological', area:'Operations'},
  {id:'A.8.25', name:'Secure development life cycle', category:'Technological', area:'Development'},
  {id:'A.8.26', name:'Application security requirements', category:'Technological', area:'Development'},
  {id:'A.8.27', name:'Secure system architecture and engineering principles', category:'Technological', area:'Development'},
  {id:'A.8.30', name:'Outsourced development',        category:'Technological', area:'Development'},
  {id:'A.8.31', name:'Separation of development, test and production environments', category:'Technological', area:'Development',
   desc:'Development, testing and production environments shall be separated and secured.'},

// Map BCS finding categories → ISO control IDs
const ISO_MAPPING = {
  sod:           ['A.5.15','A.5.18','A.8.2','A.8.3'],
  sensitive:     ['A.8.2','A.8.3','A.8.18'],
  dormant:       ['A.5.16','A.5.18','A.8.5'],
  defaultUsers:  ['A.5.17','A.8.2','A.8.5'],
  params:        ['A.5.17','A.8.5','A.8.9'],
  unused:        ['A.5.18','A.8.2','A.8.3'],
  license:       ['A.5.18','A.5.36'],
  // ITGC categories → ISO
  'Change Management':   ['A.8.31','A.8.32'],
  'Logical Access':      ['A.5.15','A.5.16','A.5.17','A.5.18','A.8.2','A.8.3','A.8.5'],
  'Computer Operations': ['A.8.9','A.8.18','A.8.19'],
  'System Development':  ['A.8.4','A.8.25','A.8.26','A.8.27','A.8.31'],
  'Data Integrity':      ['A.8.15','A.8.16','A.8.17'],
};

function buildISOAssessment(results){
  // Score each ISO control as PASS / GAP / NOT-ASSESSED based on linked findings
  if(!results) return [];
  const out = [];
  ISO_CONTROLS.forEach(function(c){
    // Which finding categories are linked to this ISO control?
    var linkedKeys = [];
    Object.keys(ISO_MAPPING).forEach(function(k){
      if(ISO_MAPPING[k].indexOf(c.id)>=0) linkedKeys.push(k);
    });
    if(linkedKeys.length===0){
      out.push(Object.assign({}, c, {status:'NOT-ASSESSED', evidence:'No direct mapping from available BCS findings.', linked:[]}));
      return;
    }
    // For each linked finding category, compute a per-control gap level
    var gaps = [];
    var passes = [];
    linkedKeys.forEach(function(k){
      switch(k){
        case 'sod':
          if(results.stats.sodCount>0) gaps.push(results.stats.sodCount+' SoD conflicts');
          else passes.push('No SoD conflicts');
          break;
        case 'sensitive':
          if(results.stats.sensitiveCount>0) gaps.push(results.stats.sensitiveCount+' sensitive-access findings');
          else passes.push('Sensitive access controlled');
          break;
        case 'dormant':
          if(results.stats.dormantCount>0) gaps.push(results.stats.dormantCount+' dormant accounts');
          else passes.push('No dormant accounts');
          break;
        case 'defaultUsers':
          var unlocked = (results.defaultUsers||[]).filter(function(d){return !d.locked;}).length;
          if(unlocked>0) gaps.push(unlocked+' default SAP users not locked');
          else passes.push('All default users locked');
          break;
        case 'params':
          if(results.stats.paramFails>0) gaps.push(results.stats.paramFails+' security parameters fail baseline');
          else passes.push('Security parameters meet baseline');
          break;
        case 'unused':
          if(results.stats.unusedCount>0) gaps.push(results.stats.unusedCount+' users with high unused access');
          break;
        case 'license':
          // informational only
          break;
        default:
          // ITGC category
          var itgcInCat = (results.itgc||[]).filter(function(f){return f.category===k;});
          var itgcFails = itgcInCat.filter(function(f){return f.status==='FAIL';});
          var itgcPasses = itgcInCat.filter(function(f){return f.status==='PASS';});
          if(itgcFails.length>0) gaps.push(itgcFails.length+' '+k+' ITGC failures');
          if(itgcPasses.length>0 && itgcFails.length===0) passes.push(k+' ITGC controls passing');
      }
    });
    var status;
    if(gaps.length>0) status = 'GAP';
    else if(passes.length>0) status = 'PASS';
    else status = 'NOT-ASSESSED';
    out.push(Object.assign({}, c, {
      status: status,
      evidence: (gaps.length>0 ? gaps.join('; ') : (passes.join('; ') || 'No findings')),
      linked: linkedKeys
    }));
  });
  return out;
}

function renderResISO(){
  var r=App.results, el=document.getElementById('content');
  if(!r||!r.iso){el.innerHTML='<div class="compliance-empty fade"><div class="empty-hero">'+ic('shield',40,'var(--accent)')+'<h2>No ISO 27001 data</h2><p>Run security analysis first.</p></div></div>';return;}
  var iso=r.iso||[];
  var pass=iso.filter(function(a){return a.status==='PASS';}).length;
  var gap=iso.filter(function(a){return a.status==='GAP';}).length;
  var partial=iso.filter(function(a){return a.status==='PARTIAL';}).length;
  var total=Math.max(iso.length,1);
  var pct=Math.round(pass/total*100);
  var pctColor=pct>=80?'#34D399':pct>=60?'#F5C147':'#F4524D';

  var h=[];
  h.push('<div class="fade" style="display:grid;grid-template-columns:308px 1fr;gap:20px;align-items:start">');

  // Score panel
  h.push('<div class="card" style="display:flex;flex-direction:column;align-items:center;gap:16px">');
  h.push('<div style="font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-4);align-self:flex-start">Compliance Score</div>');
  h.push('<div style="position:relative;width:150px;height:150px;border-radius:50%;background:conic-gradient('+pctColor+' 0% '+pct+'%,#18222E '+pct+'% 100%);display:flex;align-items:center;justify-content:center">');
  h.push('<div style="width:118px;height:118px;border-radius:50%;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:center">');
  h.push('<span style="font-family:var(--mono);font-weight:600;font-size:40px;color:'+pctColor+';line-height:1">'+pct+'</span>');
  h.push('<span style="font-size:11px;color:var(--tx-4)">of 100</span>');
  h.push('</div></div>');
  h.push('<div class="badge pill '+(pct>=80?'badge-green':pct>=60?'badge-yellow':'badge-red')+'">'+(pct>=80?'Audit-ready':pct>=60?'Needs improvement':'Critical gaps')+'</div>');
  h.push('<div class="divider" style="width:100%"></div>');
  h.push('<div style="width:100%;display:flex;flex-direction:column;gap:10px;font-size:12.5px">');
  [['Controls passing',pass+' / '+total],['Partial',partial],['Gaps identified',gap]].forEach(function(row){
    h.push('<div style="display:flex;justify-content:space-between"><span style="color:var(--tx-4)">'+row[0]+'</span><span style="color:var(--tx-2);font-family:var(--mono)">'+row[1]+'</span></div>');
  });
  h.push('</div>');
  h.push('<button class="btn btn-ghost btn-sm" style="width:100%" onclick="exportISOReport()">'+ic('download',11)+' Export ISO Report</button>');
  h.push('</div>');

  // Controls list
  h.push('<div style="display:flex;flex-direction:column;gap:10px">');
  var domains={};
  iso.forEach(function(a){var d=a.domain||a.control||'General';if(!domains[d])domains[d]=[];domains[d].push(a);});

  Object.entries(domains).forEach(function(kv){
    var dName=kv[0]; var items=kv[1];
    var allPass=items.every(function(x){return x.status==='PASS';});
    var anyGap=items.some(function(x){return x.status==='GAP';});
    h.push('<div class="card" style="padding:16px 18px">');
    h.push('<div style="display:flex;align-items:flex-start;gap:12px;'+(items.length>1?'margin-bottom:10px':'')+'">');
    h.push('<span style="font-weight:600;font-size:13.5px;color:var(--tx-1);flex:1">'+dName+'</span>');
    h.push('<span class="badge '+(allPass?'badge-green':anyGap?'badge-red':'badge-yellow')+'">'+( allPass?'PASS':anyGap?'GAP':'PARTIAL')+'</span>');
    if(items.length===1&&items[0].finding) h.push('<span style="font-size:11.5px;color:var(--tx-5);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+items[0].finding+'</span>');
    h.push('</div>');
    if(items.length>1){
      items.forEach(function(item){
        var ic2=item.status==='PASS'?'#34D399':item.status==='GAP'?'#F4524D':'#F5C147';
        h.push('<div style="display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-top:1px solid var(--bd)">');
        h.push('<span class="dot" style="background:'+ic2+';margin-top:4px;flex-shrink:0"></span>');
        h.push('<span style="flex:1;font-size:12px;color:var(--tx-3)">'+( item.name||item.control||dName)+'</span>');
        if(item.finding) h.push('<span style="font-size:11px;color:var(--tx-5);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+item.finding+'</span>');
        h.push('</div>');
      });
    }
    h.push('</div>');
  });
  h.push('</div>');
  h.push('</div>');
  el.innerHTML=h.join('');
}

//  ROLE ANALYSIS ENGINE
//  Builds the role matrix from AGR_DEFINE/AGR_AGRS/AGR_1251/AGR_1252/AGR_USERS,
//  validates naming convention, and scores risk on each role.
// ═══════════════════════════════════════════════════════════════════════

// Common ACTVT values that indicate "maintenance" (write/change/delete)
const MAINTENANCE_ACTVT = new Set(['01','02','06','07','24','39','43','60','65','70','85','95']);
// "Display-style" suffixes/keywords commonly used to mark read-only roles
const DISPLAY_PATTERNS = [/_DISPLAY$/i, /_DISP$/i, /_VIEW$/i, /_READ$/i, /DISPLAY_/i, /_RO$/i, /_REPORTING$/i, /_REPORT$/i, /_QUERY$/i];
// Sensitive transactions to flag inside roles (subset of broader sensitive list)
const ROLE_SENSITIVE_TCODES = new Set([
  'SE38','SE37','SA38','SE93','SE16','SE16N','SE17','SM30','SM31','SM12','SM13','SM21','SM37','SM50','SM51','SM59','SM69',
  'PFCG','SU01','SU10','SUIM','RZ10','RZ11','RZ12','RZ20','RZ21',
  'STMS','SE01','SE09','SE10','SCC4','SCC1','SCC8','SCC9','SCMP','SCU0',
  'F-02','FB01','F110','F-53','MIRO','ME21N','MEK1','MMK1','VK11','VA01','VF01','VL01N',
  'OB52','OBYC','OB28','OB29','OBA7','SARA','S_BCE_68001400','S_BCE_68001403','PA20','PA30','PA40'
]);

function isDisplayRole(roleName){
  for(var i=0;i<DISPLAY_PATTERNS.length;i++) if(DISPLAY_PATTERNS[i].test(roleName)) return true;
  return false;
}

// Derive a candidate naming convention from the role population
function deriveNamingConvention(roleNames){
  // Strip the customer namespace (Z, Y) and underscore-split; analyse position patterns
  var parts = []; // parts[i] = Map(token -> count)
  var totalAnalysed = 0;
  roleNames.forEach(function(r){
    if(!r) return;
    // Skip SAP standard (SAP_) and composite-only roles when detecting
    if(/^SAP_/.test(r)) return;
    var tokens = r.split('_');
    if(tokens.length < 2) return;
    totalAnalysed++;
    tokens.forEach(function(t, idx){
      if(!parts[idx]) parts[idx] = {};
      parts[idx][t] = (parts[idx][t]||0) + 1;
    });
  });
  // For each position, determine the dominant token kind
  var pattern = [];
  parts.forEach(function(p, idx){
    var keys = Object.keys(p);
    var sorted = keys.sort(function(a,b){return p[b]-p[a];});
    var topShare = sorted.length>0 ? (p[sorted[0]]/totalAnalysed) : 0;
    // If one token dominates >70%, it's likely a fixed literal
    if(topShare > 0.7 && sorted[0].length <= 4){
      pattern.push({type:'LITERAL', token:sorted[0], share:topShare, samples:sorted.slice(0,3)});
    } else {
      // Check character profile: short tokens (3-4) often module/area codes
      var avgLen = keys.reduce(function(a,k){return a+k.length;},0)/Math.max(1,keys.length);
      if(avgLen<=4) pattern.push({type:'CODE', samples:sorted.slice(0,5), uniqueValues:keys.length});
      else pattern.push({type:'DESCRIPTOR', samples:sorted.slice(0,5), uniqueValues:keys.length});
    }
  });
  return {totalAnalysed: totalAnalysed, segments: pattern};
}

// Score how well a single role name conforms to the derived pattern
function scoreNamingConformance(roleName, conv){
  if(/^SAP_/.test(roleName)) return {conforms:true, reason:'SAP-delivered (excluded)'};
  if(!roleName || !conv || !conv.segments.length) return {conforms:false, reason:'No pattern derived'};
  var tokens = roleName.split('_');
  var reasons = [];
  // Length check
  if(Math.abs(tokens.length - conv.segments.length) > 2){
    reasons.push('Segment count '+tokens.length+' differs from convention '+conv.segments.length);
  }
  // Check literal positions
  conv.segments.forEach(function(seg, idx){
    if(seg.type==='LITERAL' && tokens[idx] !== seg.token){
      reasons.push('Position '+(idx+1)+' should be "'+seg.token+'" but is "'+(tokens[idx]||'(missing)')+'"');
    }
  });
  return {conforms: reasons.length===0, reason: reasons.join('; ') || 'Conforms to convention'};
}

function roleFindingHuman(kind, detail){
  var labels = {
    'NAMING':                 'Naming convention deviation',
    'DISPLAY_MAINTENANCE':    'Display-named role grants Change/Create/Delete access',
    'WILDCARD_TCODE':         'Role grants every transaction (S_TCODE = *)',
    'WILDCARD_ACTVT':         'Role grants every activity on one or more objects (ACTVT = *)',
    'SENSITIVE_TCODES':       'Role contains sensitive transactions',
    'ROLE_SOD':               'Role contains both halves of an SoD conflict',
  };
  var helpers = {
    'NAMING':              'The role name does not follow the customer naming convention; consistency makes future audits and assignment reviews far easier.',
    'DISPLAY_MAINTENANCE': 'A role whose name suggests read-only access (DISPLAY / DISP / VIEW / READ) actually carries authorities to change, create or delete data. Users believing they have a view-only role can in fact modify records, undermining segregation of duties.',
    'WILDCARD_TCODE':      'The role grants S_TCODE = * which is equivalent to SAP_ALL for transactions. Any user holding this role can execute every transaction in the system.',
    'WILDCARD_ACTVT':      'The role grants ACTVT = * on at least one authorisation object, meaning every activity (create, change, delete, lock, archive, etc.) is allowed on that object.',
    'SENSITIVE_TCODES':    'High-risk transactions (e.g. SE38 ABAP editor, F110 payment run, SU01 user maintenance) are embedded in this role. Every user assigned the role receives privileged access.',
    'ROLE_SOD':            'This role on its own creates a segregation-of-duties conflict. Any user receiving the role automatically violates the rule, regardless of their other assignments.'
  };
  return {label: labels[kind] || kind, plain: helpers[kind] || ''};
}

function runRoleAnalysis(agrDefineRows, agrAgrsRows, agr1251Rows, agr1252Rows, agrUsersRows){
  // Build a role -> {tcodes, authObjects, fields, orgLevels, users, type, displayFlag} map
  var roleMap = {};
  
  // Seed from AGR_DEFINE if available; otherwise from AGR_1251 (every role with any auth value)
  if(agrDefineRows && agrDefineRows.length){
    agrDefineRows.forEach(function(r){
      var name = String(col(r,'AGR_NAME')||'').trim();
      if(!name) return;
      var type = String(col(r,'AGR_TYPE')||'').trim() || 'S';
      roleMap[name] = roleMap[name] || {name:name, type:type, tcodes:new Set(), objects:new Set(), authTriples:[], orgLevels:new Set(), users:new Set(), children:new Set(), hasFullTcodeAccess:false, hasFioriAccess:false, fioriApps:new Set(), fioriServices:new Set(), fioriServiceClasses:new Set()};
      roleMap[name].type = type;
    });
  }
  
  // Composite -> child relationships
  if(agrAgrsRows && agrAgrsRows.length){
    agrAgrsRows.forEach(function(r){
      var parent = String(col(r,'AGR_NAME')||'').trim();
      var child = String(col(r,'CHILD_AGR')||'').trim();
      if(parent && child){
        if(!roleMap[parent]) roleMap[parent]={name:parent,type:'C',tcodes:new Set(),objects:new Set(),authTriples:[],orgLevels:new Set(),users:new Set(),children:new Set()};
        roleMap[parent].type = 'C';
        roleMap[parent].children.add(child);
      }
    });
  }
  
  // Authorization values
  if(agr1251Rows && agr1251Rows.length){
    agr1251Rows.forEach(function(r){
      var role = String(col(r,'AGR_NAME')||'').trim();
      if(!role) return;
      if(!roleMap[role]) roleMap[role]={name:role,type:'S',tcodes:new Set(),objects:new Set(),authTriples:[],orgLevels:new Set(),users:new Set(),children:new Set(),hasFullTcodeAccess:false,hasFioriAccess:false,fioriApps:new Set(),fioriServices:new Set(),fioriServiceClasses:new Set()};
      var obj = String(col(r,'OBJECT')||'').toUpperCase().trim();
      var field = String(col(r,'FIELD')||'').toUpperCase().trim();
      var low = String(col(r,'LOW')||'').trim();
      if(obj) roleMap[role].objects.add(obj);
      // If S_TCODE = '*', mark wildcard and DO NOT expand; otherwise add the specific tcode
      if(obj==='S_TCODE' && low){
        if(low==='*'){
          roleMap[role].hasFullTcodeAccess = true;
        } else {
          roleMap[role].tcodes.add(low.toUpperCase());
        }
      }
      // Fiori: detect Fiori Launchpad access (/UI2/FLP tcode)
      if(obj==='S_TCODE' && low && (low.toUpperCase()==='/UI2/FLP'||low.toUpperCase()==='FIORILAUNCHPAD')){
        roleMap[role].hasFioriAccess = true;
      }
      // Fiori: /UI2/SRVC = OData/REST service, field CLASSNAME or /UI2/KEY* = app component
      if(obj==='/UI2/SRVC' && field==='/UI2/KEY4'){
        if(low && low!=='*') roleMap[role].fioriApps.add(low.trim());
      }
      // Fiori: S_SERVICE = ICF service node (Fiori tile catalog tile services)
      if(obj==='S_SERVICE' && field==='SRVID'){
        if(low && low!=='*') roleMap[role].fioriServices.add(low.trim());
      }
      // Fiori: /UI2/SRVC CLASSNAME — OData service class name
      if(obj==='/UI2/SRVC' && field==='CLASSNAME'){
        if(low && low!=='*') roleMap[role].fioriServiceClasses.add(low.trim());
      }
      if(obj && field) roleMap[role].authTriples.push({obj:obj, field:field, value:low});
    });
  }
  
  // Org levels
  if(agr1252Rows && agr1252Rows.length){
    agr1252Rows.forEach(function(r){
      var role = String(col(r,'AGR_NAME')||'').trim();
      var varbl = String(col(r,'VARBL')||'').trim();
      var low = String(col(r,'LOW')||'').trim();
      if(role && varbl){
        if(!roleMap[role]) roleMap[role]={name:role,type:'S',tcodes:new Set(),objects:new Set(),authTriples:[],orgLevels:new Set(),users:new Set(),children:new Set()};
        roleMap[role].orgLevels.add(varbl+'='+low);
      }
    });
  }
  
  // User assignments
  if(agrUsersRows && agrUsersRows.length){
    agrUsersRows.forEach(function(r){
      var role = String(col(r,'AGR_NAME')||'').trim();
      var user = String(col(r,'BNAME')||'').trim();
      if(role && user){
        if(!roleMap[role]) roleMap[role]={name:role,type:'S',tcodes:new Set(),objects:new Set(),authTriples:[],orgLevels:new Set(),users:new Set(),children:new Set()};
        roleMap[role].users.add(user);
      }
    });
  }
  
  var roleList = Object.values(roleMap);
  
  // ── Derive naming convention from the population ──
  var conv = deriveNamingConvention(roleList.map(function(r){return r.name;}));
  
  // ── Build per-role findings ──
  var roles = roleList.map(function(role){
    var name = role.name;
    var findings = [];
    var risk = 0;
    
    // 1. Naming convention conformance
    var nc = scoreNamingConformance(name, conv);
    if(!nc.conforms && !/^SAP_/.test(name)){
      var _h=roleFindingHuman('NAMING'); findings.push({kind:'NAMING', sev:'LOW', label:_h.label, plain:_h.plain, detail:nc.reason});
      risk += 1;
    }
    
    // 2. Display role with maintenance access (only if no S_TCODE = * etc.)
    var isDisplay = isDisplayRole(name);
    if(isDisplay){
      var maintAuths = role.authTriples.filter(function(t){
        return t.field==='ACTVT' && MAINTENANCE_ACTVT.has(t.value);
      });
      if(maintAuths.length>0){
        var sampleAuths = [...new Set(maintAuths.map(function(t){return t.obj+':ACTVT='+t.value;}))].slice(0,3);
        var _h=roleFindingHuman('DISPLAY_MAINTENANCE'); findings.push({kind:'DISPLAY_MAINTENANCE', sev:'HIGH', label:_h.label, plain:_h.plain, detail:'Display-named role carries maintenance ACTVT: '+sampleAuths.join(', ')});
        risk += 5;
      }
    }
    
    // 3. Wildcards (S_TCODE=* / ACTVT=*)
    var hasTcodeStar = role.authTriples.some(function(t){return t.obj==='S_TCODE' && t.value==='*';});
    if(hasTcodeStar){
      var _h=roleFindingHuman('WILDCARD_TCODE'); findings.push({kind:'WILDCARD_TCODE', sev:'CRITICAL', label:_h.label, plain:_h.plain, detail:'Grants S_TCODE = * (any transaction)'});
      risk += 10;
    }
    var wildcardActivities = role.authTriples.filter(function(t){return t.field==='ACTVT' && t.value==='*';});
    if(wildcardActivities.length>0){
      var wo = [...new Set(wildcardActivities.map(function(t){return t.obj;}))];
      var _h=roleFindingHuman('WILDCARD_ACTVT'); findings.push({kind:'WILDCARD_ACTVT', sev:'HIGH', label:_h.label, plain:_h.plain, detail:'Wildcard ACTVT on objects: '+wo.slice(0,4).join(', ')});
      risk += 4;
    }
    
    // 4. Sensitive transactions
    var senTcodes = role.hasFullTcodeAccess
      ? [...ROLE_SENSITIVE_TCODES]  // a wildcard role contains every sensitive transaction by definition
      : [...role.tcodes].filter(function(t){return ROLE_SENSITIVE_TCODES.has(t);});
    if(senTcodes.length>0){
      var _h=roleFindingHuman('SENSITIVE_TCODES'); findings.push({kind:'SENSITIVE_TCODES', sev: senTcodes.length>5?'HIGH':'MEDIUM', label:_h.label, plain:_h.plain, detail:'Contains '+senTcodes.length+' sensitive transaction(s): '+senTcodes.slice(0,6).join(', ')+(senTcodes.length>6?'...':'')});
      risk += Math.min(6, senTcodes.length);
    }
    
    // 5. SoD conflicts at role level: does the role itself contain both halves of any SoD rule?
    var roleSod = [];
    if(typeof SOD_LIBRARY !== 'undefined'){
      var roleTcSet = role.tcodes;
      SOD_LIBRARY.forEach(function(rule){
        // Get tcode lists from rule.a / rule.b OR from rule.aTCodes / rule.bTCodes
        var aTc = rule.aTCodes || rule.a_tcodes || rule.aT || rule.tcodes_a;
        var bTc = rule.bTCodes || rule.b_tcodes || rule.bT || rule.tcodes_b;
        if(Array.isArray(aTc) && Array.isArray(bTc)){
          var aHit = aTc.find(function(t){return roleTcSet.has(t.toUpperCase());});
          var bHit = bTc.find(function(t){return roleTcSet.has(t.toUpperCase());});
          if(aHit && bHit) roleSod.push({rule:rule.id||rule.name, a:aHit, b:bHit, sev:rule.sev||'HIGH', sox:!!rule.sox});
        }
      });
    }
    if(roleSod.length>0){
      var soxCnt = roleSod.filter(function(s){return s.sox;}).length;
      var _h=roleFindingHuman('ROLE_SOD'); findings.push({kind:'ROLE_SOD', sev: soxCnt>0?'CRITICAL':'HIGH', label:_h.label, plain:_h.plain, detail:roleSod.length+' SoD conflict(s) at role level'+(soxCnt>0?' ('+soxCnt+' SOX-relevant)':'')+': '+roleSod.slice(0,3).map(function(s){return s.rule+' ['+s.a+' vs '+s.b+']';}).join('; ')});
      risk += Math.min(10, 2 * roleSod.length);
    }
    
    return {
      name: name,
      type: role.type,
      hasFullTcodeAccess: !!role.hasFullTcodeAccess,
      tcodeCount: role.hasFullTcodeAccess ? -1 : role.tcodes.size,
      objectCount: role.objects.size,
      orgLevelCount: role.orgLevels.size,
      userCount: role.users.size,
      users: [...role.users],
      childCount: role.children.size,
      tcodes: [...role.tcodes],  // full set (used by Excel export role-to-tcode matrix)
      authTriples: role.authTriples,  // auth-object level detail per role
      children: [...role.children],   // composite -> children (single roles)
      hasFioriAccess: !!role.hasFioriAccess,
      fioriApps: [...(role.fioriApps||[])],
      fioriServices: [...(role.fioriServices||[])],
      fioriServiceClasses: [...(role.fioriServiceClasses||[])],
      isDisplay: isDisplay,
      findings: findings,
      sodCount: roleSod.length,
      risk: risk
    };
  });
  
  // Sort by risk descending
  roles.sort(function(a,b){return b.risk - a.risk;});
  
  return {
    roles: roles,
    convention: conv,
    summary: {
      total: roles.length,
      single: roles.filter(function(r){return r.type==='S';}).length,
      composite: roles.filter(function(r){return r.type==='C';}).length,
      sap: roles.filter(function(r){return /^SAP_/.test(r.name);}).length,
      customZ: roles.filter(function(r){return /^Z/.test(r.name);}).length,
      customY: roles.filter(function(r){return /^Y/.test(r.name);}).length,
      withFindings: roles.filter(function(r){return r.findings.length>0;}).length,
      displayWithMaint: roles.filter(function(r){return r.findings.some(function(f){return f.kind==='DISPLAY_MAINTENANCE';});}).length,
      withWildcards: roles.filter(function(r){return r.findings.some(function(f){return f.kind==='WILDCARD_TCODE'||f.kind==='WILDCARD_ACTVT';});}).length,
      withSensitive: roles.filter(function(r){return r.findings.some(function(f){return f.kind==='SENSITIVE_TCODES';});}).length,
      withRoleSod: roles.filter(function(r){return r.sodCount>0;}).length,
      nameDeviations: roles.filter(function(r){return r.findings.some(function(f){return f.kind==='NAMING';});}).length,
    }
  };
}

function runITGC(results, usr02, agr1251, params, t000){
  // Evaluate each control against the available data
  const findings = [];
  function fail(c, evidence){findings.push(Object.assign({}, c, {status:'FAIL', evidence:evidence}));}
  function pass(c, evidence){findings.push(Object.assign({}, c, {status:'PASS', evidence:evidence}));}
  function warn(c, evidence){findings.push(Object.assign({}, c, {status:'WARN', evidence:evidence}));}
  function skip(c, reason){findings.push(Object.assign({}, c, {status:'SKIP', evidence:reason}));}

  // Helpers
  function paramVal(name){
    var p = params.find(function(x){return (col(x,'PARNAME')||'').toLowerCase()===name.toLowerCase();});
    return p ? col(p,'PARVAL') : null;
  }
  function t000Field(field){
    var first = t000 && t000[0];
    if(!first) return null;
    return col(first, field) || first[field] || first[field.toUpperCase()] || null;
  }

  // ── CHANGE MANAGEMENT ──
  // CM-01: production client locked
  var cm01 = ITGC_CONTROLS.find(function(c){return c.id==='CM-01';});
  if(!t000 || !t000.length){
    skip(cm01, 'T000 client settings not uploaded');
  } else {
    var category = t000Field('CCCATEGORY') || '';
    var activ = t000Field('CCCORACTIV') || '';
    if(category==='P' && (activ==='2' || activ==='3'))
      pass(cm01, 'CCCATEGORY=P, CCCORACTIV='+activ+' (changes restricted)');
    else
      fail(cm01, 'CCCATEGORY='+(category||'(blank)')+', CCCORACTIV='+(activ||'(blank)')+' — production should be P/2');
  }

  // CM-02: production rejects cross-client
  var cm02 = ITGC_CONTROLS.find(function(c){return c.id==='CM-02';});
  if(!t000 || !t000.length){
    skip(cm02, 'T000 not uploaded');
  } else {
    var ind = t000Field('CCNOCLIIND') || '';
    if(ind==='1' || ind==='3')
      pass(cm02, 'CCNOCLIIND='+ind);
    else
      fail(cm02, 'CCNOCLIIND='+(ind||'(blank)')+' — should be 1 or 3 in PRD');
  }

  // CM-03: transport role separation — skip without auth dump
  skip(ITGC_CONTROLS.find(function(c){return c.id==='CM-03';}), 'Manual review — verify S_DEVELOP ACTVT=02 holders vs S_CTS_ADMI');

  // ── LOGICAL ACCESS ──
  // LA-01: default users
  var la01 = ITGC_CONTROLS.find(function(c){return c.id==='LA-01';});
  if(results.defaultUsers){
    var unlocked = results.defaultUsers.filter(function(d){return !d.locked;});
    if(unlocked.length===0)
      pass(la01, 'All default users locked');
    else
      fail(la01, unlocked.length+' default user(s) NOT LOCKED: '+unlocked.map(function(d){return d.user;}).join(', '));
  } else skip(la01, 'USR02 not uploaded');

  // LA-02: password policy
  var la02 = ITGC_CONTROLS.find(function(c){return c.id==='LA-02';});
  if(params && params.length){
    var checks = [
      ['login/min_password_lng', 8, '>='],
      ['login/min_password_specials', 1, '>='],
      ['login/min_password_digits', 1, '>='],
      ['login/fails_to_user_lock', 5, '<='],
    ];
    var fails = checks.map(function(ck){
      var v = paramVal(ck[0]);
      if(v===null) return ck[0]+'=not set';
      var n = parseInt(v);
      if(isNaN(n)) return ck[0]+'='+v;
      var ok = (ck[2]==='>=')?(n>=ck[1]):(n<=ck[1]);
      return ok ? null : (ck[0]+'='+v+' (target '+ck[2]+' '+ck[1]+')');
    }).filter(Boolean);
    if(fails.length===0) pass(la02, 'All password parameters meet baseline');
    else fail(la02, fails.join('; '));
  } else skip(la02, 'PARAMS not uploaded');

  // LA-03: dormant accounts
  var la03 = ITGC_CONTROLS.find(function(c){return c.id==='LA-03';});
  if(results.dormant){
    var stillActive = results.dormant.filter(function(d){return d.isDormant && !d.locked;});
    if(stillActive.length===0)
      pass(la03, 'All dormant users locked');
    else
      fail(la03, stillActive.length+' dormant user(s) still active (not locked)');
  } else skip(la03, 'USR02 not uploaded');

  // LA-04: SAP_ALL
  var la04 = ITGC_CONTROLS.find(function(c){return c.id==='LA-04';});
  if(agr1251 && agr1251.length){
    var sapAllUsers = new Set();
    // Look at AGR_USERS to find roles named SAP_ALL or that grant unlimited S_TCODE/*
    // Simplified: flag any auth row with OBJECT='S_TCODE' and LOW='*'
    agr1251.forEach(function(r){
      if((col(r,'OBJECT')||'').toUpperCase()==='S_TCODE' && (col(r,'LOW')||'')==='*'){
        // We'd need AGR_USERS to find the actual users; for now just count the roles
      }
    });
    // Better: look at the auth map built during analysis
    if(results._authMap){
      Object.keys(results._authMap).forEach(function(u){
        if([...results._authMap[u].tcodes].indexOf('*')>=0) sapAllUsers.add(u);
      });
    }
    if(sapAllUsers.size===0)
      pass(la04, 'No SAP_ALL / S_TCODE=* assignments detected');
    else
      fail(la04, sapAllUsers.size+' user(s) appear to hold SAP_ALL / S_TCODE=*: '+[...sapAllUsers].slice(0,5).join(', '));
  } else skip(la04, 'AGR_1251 not uploaded');

  // LA-05: SoD
  var la05 = ITGC_CONTROLS.find(function(c){return c.id==='LA-05';});
  if(results.sod){
    var soxCount = results.sod.filter(function(s){return s.sox;}).length;
    if(results.sod.length===0)
      pass(la05, 'No SoD violations detected');
    else if(soxCount===0)
      warn(la05, results.sod.length+' SoD violations (none SOX-flagged)');
    else
      fail(la05, soxCount+' SOX-relevant SoD violations (of '+results.sod.length+' total)');
  } else skip(la05, 'AGR data not uploaded');

  // ── COMPUTER OPERATIONS ──
  // CO-01: batch users with dialog logon
  var co01 = ITGC_CONTROLS.find(function(c){return c.id==='CO-01';});
  if(usr02 && usr02.length){
    var batchWithDialog = usr02.filter(function(u){
      var t = (col(u,'USTYP')||'').toUpperCase();
      return (t==='B' || t==='S' || t==='C') && !col(u,'UFLAG');
    });
    if(batchWithDialog.length===0)
      pass(co01, 'No batch/system users with active dialog capability');
    else
      warn(co01, batchWithDialog.length+' batch/service users not locked: '+batchWithDialog.slice(0,5).map(function(u){return col(u,'BNAME');}).join(', '));
  } else skip(co01, 'USR02 not uploaded');

  // CO-02: SM36/SM37 restricted — manual review without role inventory
  skip(ITGC_CONTROLS.find(function(c){return c.id==='CO-02';}), 'Manual review — verify S_BTCH_ADM/S_BTCH_JOB role holders');

  // ── SYSTEM DEVELOPMENT ──
  // SD-01: dev in production
  var sd01 = ITGC_CONTROLS.find(function(c){return c.id==='SD-01';});
  if(agr1251 && agr1251.length){
    // Find roles with S_DEVELOP ACTVT=02
    var devRoles = new Set();
    agr1251.forEach(function(r){
      if((col(r,'OBJECT')||'').toUpperCase()==='S_DEVELOP' &&
         (col(r,'FIELD')||'').toUpperCase()==='ACTVT' &&
         (col(r,'LOW')||'')==='02'){
        devRoles.add(col(r,'AGR_NAME'));
      }
    });
    if(devRoles.size===0)
      pass(sd01, 'No roles with S_DEVELOP ACTVT=02');
    else
      fail(sd01, devRoles.size+' role(s) grant ABAP change: '+[...devRoles].slice(0,5).join(', '));
  } else skip(sd01, 'AGR_1251 not uploaded');

  // SD-02: debug-replace
  var sd02 = ITGC_CONTROLS.find(function(c){return c.id==='SD-02';});
  if(agr1251 && agr1251.length){
    var debugRoles = new Set();
    agr1251.forEach(function(r){
      if((col(r,'OBJECT')||'').toUpperCase()==='S_DEVELOP' &&
         (col(r,'FIELD')||'').toUpperCase()==='OBJTYPE' &&
         (col(r,'LOW')||'').toUpperCase().indexOf('DEBUG')>=0){
        debugRoles.add(col(r,'AGR_NAME'));
      }
    });
    if(debugRoles.size===0)
      pass(sd02, 'No roles grant DEBUG object access');
    else
      fail(sd02, debugRoles.size+' role(s) grant debug authorization: '+[...debugRoles].slice(0,5).join(', '));
  } else skip(sd02, 'AGR_1251 not uploaded');

  // ── DATA INTEGRITY ──
  // DI-01: security audit log enabled
  var di01 = ITGC_CONTROLS.find(function(c){return c.id==='DI-01';});
  if(params && params.length){
    var v = paramVal('rsau/enable');
    if(v==='1') pass(di01, 'rsau/enable=1 (audit log enabled)');
    else if(v===null) warn(di01, 'rsau/enable not found in parameter dump');
    else fail(di01, 'rsau/enable='+v+' (audit log DISABLED)');
  } else skip(di01, 'PARAMS not uploaded');

  // DI-02: table logging
  var di02 = ITGC_CONTROLS.find(function(c){return c.id==='DI-02';});
  if(params && params.length){
    var v = paramVal('rec/client');
    if(v==='ALL' || v==='all') pass(di02, 'rec/client=ALL (all clients logged)');
    else if(v && v!=='OFF' && v!=='off') warn(di02, 'rec/client='+v+' (selective logging — verify scope)');
    else fail(di02, 'rec/client='+(v||'(not set)')+' (table logging may be off)');
  } else skip(di02, 'PARAMS not uploaded');

  // DI-03: direct table access — flagged via Sensitive Access already
  var di03 = ITGC_CONTROLS.find(function(c){return c.id==='DI-03';});
  if(results.sensitive){
    var tabAccess = results.sensitive.filter(function(s){
      return ['SE16N','SM30','SE16','SE17','SM31'].indexOf((s.tcode||'').toUpperCase())>=0;
    });
    if(tabAccess.length===0)
      pass(di03, 'No flagged direct-table access');
    else
      warn(di03, tabAccess.length+' users with SE16N/SM30/SE16 access — verify S_TABU_DIS restriction');
  } else skip(di03, 'AGR data not uploaded');

  return findings;
}

function renderResITGC(){
  var r=App.results, el=document.getElementById('content');
  if(!r||!r.itgc){el.innerHTML='<div class="compliance-empty fade"><div class="empty-hero">'+ic('check-circle',40,'var(--accent)')+'<h2>No ITGC data</h2><p>Run security analysis first.</p></div></div>';return;}
  var itgc=r.itgc||[];
  var pass=itgc.filter(function(f){return f.status==='PASS';}).length;
  var fail=itgc.filter(function(f){return f.status==='FAIL';}).length;
  var warn=itgc.filter(function(f){return f.status==='WARN';}).length;
  var passRate=itgc.length?Math.round(pass/itgc.length*100):0;

  var h=[];
  h.push('<div class="fade" style="display:flex;flex-direction:column;gap:20px">');
  h.push('<div style="font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-4)">IT General Controls Validation</div>');

  h.push('<div class="g4">');
  [{l:'Pass Rate',v:passRate+'%',c:'#34D399'},{l:'Passing',v:pass,c:'#34D399'},{l:'Failing',v:fail,c:'#F4524D'},{l:'Warning',v:warn,c:'#F5C147'}].forEach(function(k){
    h.push('<div class="stat-card" style="border-top-color:'+k.c+'"><div class="stat-label">'+k.l+'</div><div class="stat-value" style="font-size:28px;color:'+k.c+'">'+k.v+'</div></div>');
  });
  h.push('</div>');

  // Group controls by category
  var groups={};
  itgc.forEach(function(f){
    var g=f.category||f.control||'General';
    if(!groups[g])groups[g]=[];
    groups[g].push(f);
  });

  Object.entries(groups).forEach(function(kv){
    var gName=kv[0]; var items=kv[1];
    var gPass=items.filter(function(x){return x.status==='PASS';}).length;
    var gTotal=items.length;
    var gPct=Math.round(gPass/gTotal*100);
    var gColor=gPct>=80?'#34D399':gPct>=50?'#F5C147':'#F4524D';

    h.push('<div class="card">');
    h.push('<div style="display:flex;align-items:center;gap:22px">');
    h.push('<div style="flex:1;min-width:0">');
    h.push('<div style="display:flex;align-items:center;gap:11px;margin-bottom:11px">');
    h.push('<span style="font-weight:600;font-size:14px;color:var(--tx-1)">'+gName+'</span>');
    h.push('<span class="badge '+(gPct>=80?'badge-green':gPct>=50?'badge-yellow':'badge-red')+'">'+( gPct>=80?'PASS':gPct>=50?'PARTIAL':'FAIL')+'</span>');
    h.push('</div>');
    h.push('<div class="progress"><div class="progress-fill" style="width:'+gPct+'%;background:'+gColor+'"></div></div>');
    h.push('</div>');
    h.push('<div style="text-align:right;flex:none;width:130px">');
    h.push('<div style="font-family:var(--mono);font-weight:600;font-size:22px;color:var(--tx-1)">'+gPass+'<span style="color:var(--tx-5);font-size:15px">/'+gTotal+'</span></div>');
    if(fail>0) h.push('<div style="font-size:11.5px;color:#FF8A3D;margin-top:2px">'+( gTotal-gPass)+' failing</div>');
    h.push('</div></div>');

    items.forEach(function(f){
      var dc=f.status==='PASS'?'#34D399':f.status==='FAIL'?'#F4524D':'#F5C147';
      h.push('<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--bd)">');
      h.push('<span class="dot" style="background:'+dc+'"></span>');
      h.push('<span style="flex:1;font-size:12.5px;color:var(--tx-2)">'+( f.name||f.finding||'Control')+'</span>');
      if(f.detail) h.push('<span style="font-size:11.5px;color:var(--tx-5);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+f.detail+'</span>');
      h.push('<span class="badge '+(f.status==='PASS'?'badge-green':f.status==='FAIL'?'badge-red':'badge-yellow')+'">'+f.status+'</span>');
      h.push('</div>');
    });
    h.push('</div>');
  });
  h.push('</div>');
  el.innerHTML=h.join('');
}

// ─── MASTER RENDER ───────────────────────────────────────────────
function render(){
  // Auth check — bounce to login if no session
  if(!App.authChecked){
    App.authChecked = true;
    var u = currentUser();
    if(!u){
      renderLogin();
      return;
    }
    // Have session — show app shell
    buildAppShell();
    if(App.systems.length===0) loadSystemsFromActiveCustomer();
  } else {
    // Subsequent renders: ensure user is still logged in
    if(!currentUser()){renderLogin();return;}
  }
  // Always ensure app is visible and login is hidden
  var _app=document.getElementById('app');
  var _ls=document.getElementById('login-screen');
  if(_app) _app.style.display='flex';
  if(_ls)  _ls.style.display='none';
  renderNav();renderTopbar();
  const v=App.view;
  if(v==='dashboard')renderDashboard();
  else if(v==='customers')renderCustomers();
  else if(v==='users')renderUsers();
  else if(v==='connect')renderConnect();
  else if(v==='ingest')renderIngest();
  else if(v==='risklibrary')renderRiskLibrary();
  else if(v==='analyze')renderAnalyze();
  else if(v==='res-sod')renderResSoD();
  else if(v==='res-sensitive')renderResSensitive();
  else if(v==='res-dormant')renderResDormant();
  else if(v==='res-default')renderResDefault();
  else if(v==='res-params')renderResParams();
  else if(v==='res-unused')renderResUnused();
  else if(v==='res-license')renderResLicense();
  else if(v==='res-itgc')renderResITGC();
  else if(v==='res-iso')renderResISO();
  else if(v==='res-role')renderResRole();
  else if(v==='res-user-sec')renderResUserSecurity();
  else if(v==='res-pwd-audit')renderResPwdAudit();
  else if(v==='res-sensitive-prof')renderResSensitiveProfiles();
  else if(v==='role-mgmt')renderRoleMgmt();
  else if(v==='api-config')renderApiConfig();
  else if(v==='modules')renderModules();
  else if(v==='ai-config')renderAIConfig();
  else if(v==='integrations')renderIntegrations();
  else if(v==='reports')renderReports();
  else renderDashboard();
}

function saveMongoSettings(){
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var cfg=typeof DataStore!=='undefined'?DataStore.getConfig():{};
  cfg.url=g('mongo-url'); cfg.apiKey=g('mongo-key');
  cfg.database=g('mongo-db')||'bcs_secure_studio';
  cfg.dataSource=g('mongo-ds')||'Cluster0';
  if(typeof DataStore!=='undefined') DataStore.saveConfig(cfg);
  toast('MongoDB settings saved','ok');
  App._aiTab='database';render();
}
function toggleMongoEnabled(){
  var cfg=typeof DataStore!=='undefined'?DataStore.getConfig():{};
  cfg.enabled=!cfg.enabled;
  if(typeof DataStore!=='undefined') DataStore.saveConfig(cfg);
  App._aiTab='database';render();
}
function testMongoConnection(){
  var cfg=typeof DataStore!=='undefined'?DataStore.getConfig():{};
  if(!cfg.url||!cfg.apiKey){toast('Enter Data API URL and API key first','warn');return;}
  toast('Testing MongoDB connection...','info');
  fetch(cfg.url+'/action/find',{
    method:'POST',
    headers:{'Content-Type':'application/json','api-key':cfg.apiKey,'Access-Control-Request-Headers':'*'},
    body:JSON.stringify({dataSource:cfg.dataSource||'Cluster0',database:cfg.database||'bcs_secure_studio',collection:'_ping',filter:{},limit:1}),
  }).then(function(r){
    if(r.ok){toast('✓ MongoDB Atlas connected successfully','ok');}
    else{toast('MongoDB returned '+r.status+' — check API key and endpoint','err');}
  }).catch(function(e){toast('Cannot reach MongoDB (network/CORS) — verify URL and try from a server context','warn');});
}
