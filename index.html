//  DataStore — localStorage now, MongoDB-ready abstraction
//  When a MongoDB backend URL is configured, all reads/writes go there.
//  localStorage is used as a cache / offline fallback.
// ════════════════════════════════════════════════════════════════════════

var DataStore = (function(){
  var _mongoUrl = null;   // Set via Settings → Database
  var _apiKey   = null;
  var _useRemote = false;

  function getMongoConfig(){
    try{ return JSON.parse(localStorage.getItem('bcs_mongo_config')||'{}'); }catch(e){return {};}
  }
  function saveMongoConfig(cfg){
    localStorage.setItem('bcs_mongo_config', JSON.stringify(cfg));
    var c=getMongoConfig();
    _mongoUrl=c.url||null; _apiKey=c.apiKey||null; _useRemote=!!(c.url&&c.enabled);
  }

  // ── REST helpers for MongoDB Atlas Data API ──
  async function mongoFind(collection, filter){
    var cfg=getMongoConfig();
    if(!cfg.url||!cfg.enabled) return null;
    try{
      var resp=await fetch(cfg.url+'/action/find',{
        method:'POST',
        headers:{'Content-Type':'application/json','api-key':cfg.apiKey||'','Access-Control-Request-Headers':'*'},
        body:JSON.stringify({dataSource:cfg.dataSource||'Cluster0',database:cfg.database||'bcs_secure_studio',collection:collection,filter:filter||{},limit:1000}),
      });
      if(!resp.ok) return null;
      var data=await resp.json();
      return data.documents||[];
    }catch(e){return null;}
  }
  async function mongoUpsert(collection, filter, doc){
    var cfg=getMongoConfig();
    if(!cfg.url||!cfg.enabled) return false;
    try{
      var resp=await fetch(cfg.url+'/action/updateOne',{
        method:'POST',
        headers:{'Content-Type':'application/json','api-key':cfg.apiKey||'','Access-Control-Request-Headers':'*'},
        body:JSON.stringify({dataSource:cfg.dataSource||'Cluster0',database:cfg.database||'bcs_secure_studio',collection:collection,filter:filter,update:{$set:doc},upsert:true}),
      });
      return resp.ok;
    }catch(e){return false;}
  }

  // ── Public API ──
  return {
    // Initialise from saved config
    init: function(){ var c=getMongoConfig(); _mongoUrl=c.url||null; _apiKey=c.apiKey||null; _useRemote=!!(c.url&&c.enabled); },

    getConfig: getMongoConfig,
    saveConfig: saveMongoConfig,
    isRemoteEnabled: function(){ return _useRemote; },

    // Save analysis results to MongoDB (async, non-blocking)
    saveAnalysisResult: async function(customerId, systemId, results){
      var doc={customerId:customerId,systemId:systemId,score:results.score,ts:results.ts,
               sodCount:(results.sod||[]).length,sensitiveCount:(results.sensitive||[]).length,
               dormantCount:(results.dormant||[]).length,isoGaps:(results.iso||[]).filter(function(a){return a.status==='GAP';}).length,
               itgcFails:(results.itgc||[]).filter(function(f){return f.status==='FAIL';}).length,
               savedAt:Date.now()};
      // Always save locally
      var key='bcs_result_'+customerId+'_'+systemId;
      try{localStorage.setItem(key,JSON.stringify(doc));}catch(e){}
      // Also push to MongoDB if configured
      if(_useRemote){
        try{await mongoUpsert('analysis_results',{customerId:customerId,systemId:systemId},doc);}
        catch(e){console.warn('MongoDB save failed:',e.message);}
      }
      return doc;
    },

    // Load customers from MongoDB (with localStorage fallback)
    loadCustomers: async function(){
      if(!_useRemote) return null;
      var docs=await mongoFind('customers',{});
      return docs;
    },

    // Save customer to MongoDB
    saveCustomerRemote: async function(customer){
      if(!_useRemote) return false;
      return mongoUpsert('customers',{id:customer.id},customer);
    },

    // Save analysis files (API-pulled data) to MongoDB for persistence
    saveApiData: async function(customerId, systemId, files){
      if(!_useRemote) return false;
      var doc={customerId:customerId,systemId:systemId,files:files,savedAt:Date.now()};
      return mongoUpsert('api_data',{customerId:customerId,systemId:systemId},doc);
    },

    // Retrieve previously saved API data
    loadApiData: async function(customerId, systemId){
      if(!_useRemote) return null;
      var docs=await mongoFind('api_data',{customerId:customerId,systemId:systemId});
      return docs&&docs.length>0?docs[0]:null;
    },
  };
})();

// Auto-init DataStore on load
(function(){ try{ DataStore.init(); }catch(e){} })();

async function runFullAnalysis(sys, enabledRules, onProgress, onLog){
  const steps=[
    ['Connecting to SAP / loading data',null],
    ['Reading USR02 (user master)',     'USR02'],
    ['Reading AGR_USERS (role assignments)','AGR_USERS'],
    ['Reading AGR_1251 (auth values)', 'AGR_1251'],
    ['Reading profile parameters',     'PARAMS'],
    ['Reading SM20 (security audit log)','SM20'],
    ['Reading Fiori metering',         'FIORI'],
    ['Reading T000 (client settings)',   'T000'],
    ['Building user-authorization map', null],
    ['Running SoD conflict detection', null],
    ['Checking sensitive transactions', null],
    ['Scanning dormant users',         null],
    ['Checking default users',         null],
    ['Auditing security parameters',   null],
    ['Calculating risk score',         null],
  ];
  const data={};
  const demoMap={USR02:DEMO_USR02,AGR_USERS:DEMO_AGR_USERS,AGR_1251:DEMO_AGR_1251,PARAMS:DEMO_PARAMS,FIORI:DEMO_FIORI,SM20:[],T000:[]};
  // Track where each table's data came from, for transparency in the report
  const sources={};
  // Determine if user uploaded ANY file for this system. If yes, this is a "real"
  // analysis — we must NOT mix in demo data for the missing tables (would produce
  // misleading results that mix the user's records with demo records).
  // For public cloud, try to restore from localStorage cache if files are empty
  if(sys.cloudType==='public' && Object.keys(sys.files||{}).length===0){
    if(typeof restorePublicCloudCache==='function') restorePublicCloudCache(sys);
  }
  // A "pulled" file counts as real data even with 0 rows (API call succeeded, table was empty)
  const hasAnyUpload = Object.values(sys.files||{}).some(function(f){
    return getRows(f).length>0 || f.pulledAt;  // pulledAt = API pull was attempted
  });
  const hasPulledFiles = Object.values(sys.files||{}).some(function(f){return f.pulledAt;});
  let anyUploaded=hasAnyUpload, anyLive=false;
  for(let i=0;i<steps.length;i++){
    onProgress(Math.round(i/steps.length*100));
    const [label,tableKey]=steps[i];
    onLog(label,'info');
    await new Promise(r=>setTimeout(r,100+Math.random()*150));
    if(!tableKey) continue;

    // PRIORITY 1 — file uploaded OR API-pulled data in sys.files
    const fd=sys.files?.[tableKey];
    const uploaded=getRows(fd);
    if(uploaded.length>0){
      data[tableKey]=uploaded;
      const srcLabel=sys.cloudType==='public'?'SAP Public Cloud API':'Uploaded file';
      sources[tableKey]=srcLabel+': '+(fd.fileName||tableKey);
      anyUploaded=true;
      onLog(`  ${tableKey}: ${uploaded.length} records from ${srcLabel}`,'ok');
      continue;
    }

    // PRIORITY 2 — live SAP via OData (proxy/direct) — skip for public cloud API mode
    if(sys.mode!=='demo' && sys.cloudType!=='public'){
      try{
        const rows=await sapFetch(sys, ODATA_ENTITIES[tableKey]?.entity||tableKey+'Set',
                                  ODATA_ENTITIES[tableKey]?.params||'$top=5000');
        if(rows&&rows.length>0){
          data[tableKey]=rows;
          sources[tableKey]='Live SAP ('+sys.mode+')';
          anyLive=true;
          onLog(`  ${tableKey}: ${rows.length} records from SAP`,'ok');
          continue;
        }
        onLog(`  ${tableKey}: SAP returned 0 records`,'warn');
      }catch(e){
        if(e.message!=='DEMO_MODE')
          onLog(`  ${tableKey}: ${e.message}`,'warn');
      }
    }

    // PRIORITY 3 — demo fallback
    // For public cloud: if no data pulled yet, use demo; otherwise leave empty
    // For private cloud with uploads: leave empty (don't mix real + demo)
    // For public cloud: if pull was attempted (pulledAt set), treat as real-data run
    // even if 0 rows were returned — avoids mixing demo data with "empty" API results
    var isPublicCloudNoPull = sys.cloudType==='public' && !hasPulledFiles;
    var isRealDataRun = hasAnyUpload || hasPulledFiles || (sys.mode!=='demo' && sys.host && sys.cloudType!=='public');
    if(isRealDataRun && !isPublicCloudNoPull){
      data[tableKey]=[];
      sources[tableKey]='Not provided';
      onLog(`  ${tableKey}: not provided — analyses needing this table will be skipped`,'warn');
    } else {
      // Pure demo run (no uploads, no live connection)
      data[tableKey]=demoMap[tableKey]||[];
      sources[tableKey]='Demo data';
      if(data[tableKey].length>0)
        onLog(`  ${tableKey}: ${data[tableKey].length} records (demo fallback)`,'warn');
    }
  }

  // Resolve each dataset. Empty stays empty when uploads are missing — the engine
  // simply skips dependent analyses rather than producing misleading mixed results.
  const usr02   = getRows(data.USR02);
  const agrUsers= getRows(data.AGR_USERS);
  const agr1251 = getRows(data.AGR_1251);
  const params  = getRows(data.PARAMS);
  const sm20    = getRows(data.SM20);

  // ── DIAGNOSTIC: log key columns detected per table ──
  const diag = {};
  [['USR02',usr02,['BNAME','TRDAT','PWDLGNDATE','USTYP']],
   ['AGR_USERS',agrUsers,['BNAME','AGR_NAME']],
   ['AGR_1251',agr1251,['AGR_NAME','OBJECT','FIELD','LOW']],
   ['PARAMS',params,['PARNAME','PARVAL']],
   ['SM20',sm20,['BNAME','TCODE']]].forEach(function(spec){
    const name=spec[0], rows=spec[1], expected=spec[2];
    if(rows.length===0)return;
    const det=detectColumns(rows, expected);
    diag[name]=det;
    if(det.missing.length>0){
      onLog('  ! '+name+': '+rows.length+' rows but MISSING key columns: '+det.missing.join(', '),'err');
      onLog('     Headers found: '+det.headers.join(', '),'warn');
    } else {
      onLog('  ✓ '+name+': '+rows.length+' rows, columns OK: '+det.found.join(', '),'ok');
    }
  });

  // ── Validate the auth map actually got built ──
  const _testMap = buildAuthMap(agrUsers, agr1251);
  const _userCount = Object.keys(_testMap).length;
  if(agrUsers.length>0 && agr1251.length>0 && _userCount===0){
    onLog('! WARNING: AGR_USERS + AGR_1251 loaded but 0 users mapped. Check column names match.','err');
  } else if(_userCount>0){
    onLog('  ✓ Auth map built: '+_userCount+' users with '+Object.keys(_testMap).reduce(function(a,u){return a+_testMap[u].tcodes.size;},0)+' total t-code grants','ok');
  }
  const usr02FromReal = usr02.length>0 && sources.USR02 && sources.USR02.indexOf('Demo')!==0;
  // Track which analyses have the data they need (used for empty-state messaging)
  const analysisAvailable = {
    sod:        agrUsers.length>0 && agr1251.length>0,
    sensitive:  agrUsers.length>0 && agr1251.length>0,
    license:    agrUsers.length>0 && agr1251.length>0,
    dormant:    usr02.length>0,
    defaultUsers: usr02.length>0,
    params:     params.length>0,
    unused:     agrUsers.length>0 && agr1251.length>0 && sm20.length>0,
  };

  const umap=buildAuthMap(agrUsers,agr1251);
  // Honour the customer's module-selector toggles
  const _mods = (typeof isModuleActive==='function') ? {
    security: isModuleActive('security'),
    itgc:     isModuleActive('itgc'),
    iso:      isModuleActive('iso'),
    unused:   isModuleActive('unused'),
    license:  isModuleActive('license'),
    role:     isModuleActive('role')
  } : {security:true,itgc:true,iso:true,unused:true,license:true,role:false};
  const sod          = _mods.security ? runSoD(umap,enabledRules) : [];
  const sensitive    = _mods.security ? runSensitive(umap,enabledRules) : [];
  const dormant      = _mods.security ? runDormant(usr02) : [];
  const defaultUsers = _mods.security ? runDefaultUsers(usr02) : [];
  const paramResults = _mods.security ? runParamCheck(params) : [];
  // Build role->tcodes map for the detailed unused-access report
  const _roleTcodeMap={};
  agr1251.forEach(function(r){
    const role=String(col(r,'AGR_NAME')||'').trim();
    const obj=String(col(r,'OBJECT')||'').toUpperCase().trim();
    const low=String(col(r,'LOW')||'').toUpperCase().trim();
    if(obj==='S_TCODE'&&role&&low){
      if(!_roleTcodeMap[role])_roleTcodeMap[role]=new Set();
      _roleTcodeMap[role].add(low);
    }
  });
  const unused = _mods.unused ? runUnused(umap,sm20,_roleTcodeMap) : Object.assign([],{detail:[]});
  let fiori=getRows(data.FIORI);
  if(fiori.length===0 && !hasAnyUpload && (sys.mode==='demo'||!sys.host)) fiori=DEMO_FIORI;
  const license = _mods.license ? runLicense(umap, LICENSE_RULES) : [];
  const score=calcScore(sod,dormant,paramResults,sensitive);

  onProgress(100);
  onLog(`Analysis complete — Risk Score: ${score}/100`,'ok');
  onLog(`SoD: ${sod.length} violations | Dormant: ${dormant.length} | Params: ${paramResults.filter(p=>p.status==='FAIL').length} FAIL`,'ok');
  onLog(`License: ${license.length} users classified | ${license.filter(l=>l.license==='GB').length} Professional`,'ok');

  // ── ITGC Compliance ──
  // Grab T000 from uploaded files if present
  const t000Data = getRows(data.T000||(sys.files&&sys.files.T000));
  const _resForITGC = {sod:sod,sensitive:sensitive,dormant:dormant,defaultUsers:defaultUsers,paramResults:paramResults,_authMap:umap};
  const itgc = _mods.itgc ? runITGC(_resForITGC, usr02, agr1251, params, t000Data) : [];

  // ── Role Analysis ──
  const agrDefine = getRows(data.AGR_DEFINE||(sys.files&&sys.files.AGR_DEFINE));
  const agrAgrs   = getRows(data.AGR_AGRS  ||(sys.files&&sys.files.AGR_AGRS));
  const agr1252   = getRows(data.AGR_1252  ||(sys.files&&sys.files.AGR_1252));
  const roleAnalysis = _mods.role
    ? runRoleAnalysis(agrDefine, agrAgrs, agr1251, agr1252, agrUsers)
    : null;

  const recommendations=buildRecommendations({sod,sensitive,dormant,defaultUsers,paramResults,unused,license,itgc});
    // ── ISO 27001:2022 mapping ──
  const isoAssessment = (_mods.iso && typeof buildISOAssessment==='function') ? buildISOAssessment({sod:sod,sensitive:sensitive,dormant:dormant,defaultUsers:defaultUsers,paramResults:paramResults,unused:unused,license:license,itgc:itgc,stats:{sodCount:sod.length,sensitiveCount:sensitive.length,dormantCount:dormant.length,defaultCount:defaultUsers.length,paramFails:(paramResults||[]).filter(function(p){return p.status==='FAIL';}).length,unusedCount:unused.length}}) : [];
  const isoGap = isoAssessment.filter(function(a){return a.status==='GAP';}).length;
  const isoPass = isoAssessment.filter(function(a){return a.status==='PASS';}).length;
const passwordAudit=_mods.security?runPasswordAudit(usr02):[];
  const sensitiveProfiles=_mods.security?runSensitiveProfiles(usr02,umap):[];
  return{sod,sensitive,dormant,defaultUsers,paramResults,unused,license,fiori,score,recommendations,sources,analysisAvailable,itgc,iso:isoAssessment,roleAnalysis:roleAnalysis,passwordAudit:passwordAudit,sensitiveProfiles:sensitiveProfiles,modulesActive:_mods,
    isDemo:!usr02FromReal,
    _raw:{AGR_DEFINE:(sys.files&&sys.files.AGR_DEFINE)||null, AGR_AGRS:(sys.files&&sys.files.AGR_AGRS)||null},
    system:{sid:sys.sid,client:sys.client,env:sys.env,name:sys.name},
    stats:{users:usr02.length,roles:new Set(agrUsers.map(r=>r.AGR_NAME||r.agr_name)).size,
      sodCount:sod.length,sensitiveCount:sensitive.length,dormantCount:dormant.length,
      defaultCount:defaultUsers.length,paramFails:paramResults.filter(p=>p.status==='FAIL').length,
      unusedCount:unused.length,soxCount:sod.filter(s=>s.sox).length,
      licenseCount:license.length,
      licenseProf:license.filter(l=>l.license==='GB').length,
      licenseFunc:license.filter(l=>l.license==='GC').length,
      itgcCount:itgc.filter(function(f){return f.status==='FAIL';}).length,
      isoGap:isoGap,isoPass:isoPass,
      roleCount: (roleAnalysis&&roleAnalysis.summary&&roleAnalysis.summary.total) || 0,
      roleHighRisk: (roleAnalysis&&roleAnalysis.summary&&roleAnalysis.summary.withFindings) || 0,
      itgcWarn:itgc.filter(function(f){return f.status==='WARN';}).length,
      itgcPass:itgc.filter(function(f){return f.status==='PASS';}).length},
    ts:Date.now()};
}

// ─── Toast ───────────────────────────────────────────────────────
function toast(msg,type='info'){
  const el=document.getElementById('toast');
  const colors={ok:'rgba(24,200,120,.1)',err:'rgba(240,60,60,.1)',warn:'rgba(232,192,32,.1)',info:'rgba(56,120,240,.1)'};
  const bcolors={ok:'rgba(24,200,120,.3)',err:'rgba(240,60,60,.3)',warn:'rgba(232,192,32,.3)',info:'rgba(56,120,240,.3)'};
  const tcolors={ok:'var(--green)',err:'var(--red)',warn:'var(--yellow)',info:'var(--blue)'};
  el.style.cssText=`position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;backdrop-filter:blur(12px);box-shadow:0 6px 28px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;background:${colors[type]||colors.info};border:1px solid ${bcolors[type]||bcolors.info};color:${tcolors[type]||tcolors.info}`;
  el.textContent=msg;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',3800);
}

// ─── DASHBOARD ──────────────────────────────────────────────────
function renderDashboard(){
  var r=App.results, el=document.getElementById('content');
  if(!r){
    el.innerHTML='<div class="compliance-empty fade"><div class="empty-hero">'+
      ic('shield',46,'var(--accent)')+
      '<h2>No analysis data</h2>'+
      '<p>Connect your SAP system and run the security analysis engine to populate this dashboard.</p>'+
      '<div class="empty-actions">'+
        '<button class="btn btn-ghost btn-sm" onclick="navigate(\'connect\')">'+ic('cpu',12)+' Connect System</button>'+
        '<button class="btn btn-accent btn-sm" onclick="navigate(\'analyze\')">'+ic('zap',12)+' Run Analysis</button>'+
      '</div>'+
    '</div></div>';
    return;
  }
  var s=r.stats, sc=r.score;
  var riskColor=sc>=75?'#34D399':sc>=50?'#F5C147':sc>=25?'#FF8A3D':'#F4524D';
  var riskLabel=sc>=75?'Low Risk':sc>=50?'Medium Risk':sc>=25?'High Risk':'Critical Risk';
  var cust=typeof getActiveCustomer==='function'?getActiveCustomer():null;
  var me=typeof currentUser==='function'?currentUser():null;
  var soxCount=(r.sod||[]).filter(function(v){return v.sox;}).length;
  var critPwd=(r.passwordAudit||[]).filter(function(u){return u.criticalPwd;}).length;
  var critProf=(r.sensitiveProfiles||[]).filter(function(u){return u.risk==='CRITICAL';}).length;

  var h=[];
  // Optional customer bar
  if(cust) h.push('<div class="customer-context-bar">'+ic('building',12,'var(--accent)')+'<span style="flex:1;font-weight:600">'+cust.name+'</span>'+ic('chevron-right',11,'var(--accent)')+'</div>');
  if(r.isDemo) h.push('<div class="demo-pill" style="margin-bottom:14px">'+ic('info',12)+' Demo analysis — connect a real SAP system for live results</div>');

  h.push('<div class="fade" style="display:flex;flex-direction:column;gap:20px">');

  // ── Row 1: Score card + Finding summary ──
  h.push('<div style="display:grid;grid-template-columns:310px 1fr;gap:20px">');

  // Score card (left)
  h.push('<div class="card">');
  h.push('<div class="card-label" style="margin-bottom:14px">Overall Risk Score</div>');
  h.push('<div style="display:flex;align-items:flex-end;gap:9px;margin-bottom:12px">');
  h.push('<div class="risk-score-big" style="color:'+riskColor+'">'+sc+'</div>');
  h.push('<div style="font-family:var(--mono);font-weight:500;font-size:16px;color:var(--tx-5);padding-bottom:8px">/ 100</div>');
  h.push('</div>');
  h.push('<div class="risk-label-pill badge '+(sc>=75?'badge-green':sc>=50?'badge-yellow':sc>=25?'badge-orange':'badge-red')+'" style="margin-bottom:14px">'+riskLabel+'</div>');
  h.push('<div class="divider"></div>');
  h.push('<div style="display:flex;flex-direction:column;gap:11px;font-size:12.5px">');
  [
    ['Customer', cust?cust.name:'—'],
    ['Last scan', r.ts?new Date(r.ts).toLocaleDateString()+' · '+new Date(r.ts).toLocaleTimeString([],(function(){return{hour:'2-digit',minute:'2-digit'};})()):  '—'],
    ['Data source', r.isDemo?'Demo data':r.sources&&r.sources.USR02||'SAP extract'],
    ['Scope', (r.stats&&r.stats.userCount||0).toLocaleString()+' users · '+(r.stats&&r.stats.roleCount||0).toLocaleString()+' roles'],
  ].forEach(function(row){
    h.push('<div style="display:flex;justify-content:space-between">'+
      '<span style="color:var(--tx-4)">'+row[0]+'</span>'+
      '<span style="color:var(--tx-2);font-family:'+(row[0]==='Last scan'||row[0]==='Scope'?'var(--mono)':'inherit')+'">'+row[1]+'</span>'+
    '</div>');
  });
  h.push('</div></div>');

  // Finding cards (right) — 6-up grid matching design stat tiles
  h.push('<div style="display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:14px">');
  var findings=[
    {label:'SoD Violations',      val:(r.sod||[]).length,      sub:soxCount+' SOX-relevant',          color:'#F4524D',  nav:'res-sod'},
    {label:'Sensitive Access',     val:(r.sensitive||[]).length,sub:'Privileged transactions',           color:'#FF8A3D',  nav:'res-sensitive'},
    {label:'Dormant Accounts',     val:(r.dormant||[]).length,  sub:'Inactive >90 days',                color:'#F5C147',  nav:'res-dormant'},
    {label:'Pwd Overdue',          val:critPwd,                 sub:'>1 year unchanged',                 color:'#F4524D',  nav:'res-pwd-audit'},
    {label:'Sensitive Profiles',   val:critProf,                sub:'Critical privilege',               color:'#B98AFF',  nav:'res-sensitive-prof'},
    {label:'ITGC Pass Rate',       val:Math.round((r.itgc||[]).filter(function(f){return f.status==='PASS';}).length/Math.max((r.itgc||[]).length,1)*100)+'%',sub:(r.itgc||[]).filter(function(f){return f.status==='FAIL';}).length+' controls failing', color:'#34D399', nav:'res-itgc'},
  ];
  findings.forEach(function(f){
    h.push('<div class="stat-card" style="border-top-color:'+f.color+';cursor:pointer" onclick="navigate(\''+f.nav+'\')" onmouseenter="this.style.borderColor=\''+f.color+'55\'" onmouseleave="this.style.borderColor=\'var(--bd-card)\'">');
    h.push('<div class="stat-label">'+f.label+'</div>');
    h.push('<div class="stat-value" style="color:'+f.color+'">'+f.val+'</div>');
    h.push('<div class="stat-sub">'+f.sub+'</div>');
    h.push('</div>');
  });
  h.push('</div>');
  h.push('</div>'); // row 1

  // ── Row 2: SoD top violators | ISO status | Role risk ──
  h.push('<div style="display:grid;grid-template-columns:1fr 300px 280px;gap:20px">');

  // SoD top violators table
  h.push('<div class="tbl-wrap">');
  h.push('<div class="tbl-hdr">');
  h.push('<span style="font-weight:600;font-size:14px;color:var(--tx-1)">Top SoD Violators</span>');
  h.push('<button class="btn btn-ghost btn-sm" onclick="navigate(\'res-sod\')">View all →</button>');
  h.push('</div>');
  h.push('<div class="tbl-col-hdr" style="grid-template-columns:1fr 80px 90px"><span>User</span><span style="text-align:right">Conflicts</span><span style="text-align:right">SOX</span></div>');
  var userViol={};
  (r.sod||[]).forEach(function(v){userViol[v.user]=(userViol[v.user]||{count:0,sox:0});userViol[v.user].count++;if(v.sox)userViol[v.user].sox++;});
  var topViol=Object.entries(userViol).sort(function(a,b){return b[1].count-a[1].count;}).slice(0,6);
  if(!topViol.length){
    h.push('<div class="empty-state-sm">'+ic('check-circle',20,'var(--green)')+'<span>No SoD violations detected</span></div>');
  } else {
    topViol.forEach(function(uv){
      h.push('<button class="tbl-row" style="grid-template-columns:1fr 80px 90px;font-family:inherit;border-radius:0;text-align:left;background:transparent;border-left:none">');
      h.push('<span style="font-family:var(--mono);font-size:12.5px;font-weight:500;color:var(--tx-2)">'+uv[0]+'</span>');
      h.push('<span style="text-align:right;font-family:var(--mono);font-weight:600;font-size:13px;color:'+(uv[1].count>=5?'var(--red)':'var(--tx-1)')+'">'+uv[1].count+'</span>');
      h.push('<span style="text-align:right"><span class="badge '+(uv[1].sox>0?'badge-red':'badge-grey')+'">'+uv[1].sox+'</span></span>');
      h.push('</button>');
    });
  }
  h.push('</div>');

  // ISO compliance score
  var isoGap=(r.iso||[]).filter(function(a){return a.status==='GAP';}).length;
  var isoPass=(r.iso||[]).filter(function(a){return a.status==='PASS';}).length;
  var isoTotal=Math.max((r.iso||[]).length,1);
  var isoPct=Math.round(isoPass/isoTotal*100);
  h.push('<div class="card" style="display:flex;flex-direction:column;align-items:center;gap:14px">');
  h.push('<div class="card-label" style="align-self:flex-start">ISO 27001 Compliance</div>');
  // Conic donut
  h.push('<div style="position:relative;width:140px;height:140px;border-radius:50%;background:conic-gradient('+(isoPct>=75?'#34D399':isoPct>=50?'#F5C147':'#F4524D')+' 0% '+isoPct+'%,#18222E '+isoPct+'% 100%);display:flex;align-items:center;justify-content:center">');
  h.push('<div style="width:110px;height:110px;border-radius:50%;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:center">');
  h.push('<span style="font-family:var(--mono);font-weight:600;font-size:36px;color:'+(isoPct>=75?'#34D399':isoPct>=50?'#F5C147':'#F4524D')+';line-height:1">'+isoPct+'</span>');
  h.push('<span style="font-size:11px;color:var(--tx-4)">of 100</span>');
  h.push('</div></div>');
  h.push('<div class="badge '+(isoPct>=75?'badge-green':isoPct>=50?'badge-yellow':'badge-red')+' pill">'+(isoPct>=75?'Audit-ready':isoPct>=50?'Needs improvement':'Critical gaps')+'</div>');
  h.push('<div style="width:100%;display:flex;flex-direction:column;gap:8px;font-size:12.5px">');
  h.push('<div style="display:flex;justify-content:space-between"><span style="color:var(--tx-4)">Controls passing</span><span style="color:var(--tx-2);font-family:var(--mono)">'+isoPass+' / '+isoTotal+'</span></div>');
  h.push('<div style="display:flex;justify-content:space-between"><span style="color:var(--tx-4)">Gaps</span><span style="color:#F4524D;font-family:var(--mono)">'+isoGap+'</span></div>');
  h.push('</div>');
  h.push('<button class="btn btn-ghost btn-sm" style="width:100%" onclick="navigate(\'res-iso\')">View ISO detail →</button>');
  h.push('</div>');

  // Role risk distribution
  h.push('<div class="card">');
  h.push('<div style="font-weight:600;font-size:14px;color:var(--tx-1);margin-bottom:14px">Role Risk</div>');
  if(r.roleAnalysis&&r.roleAnalysis.roles){
    var ra=r.roleAnalysis;
    var buckets={Critical:0,High:0,Medium:0,Low:0,Clean:0};
    var bColors={Critical:'#F4524D',High:'#FF8A3D',Medium:'#F5C147',Low:'#34D399',Clean:'#4DA3FF'};
    ra.roles.forEach(function(role){
      if(role.risk>=10)buckets.Critical++;
      else if(role.risk>=5)buckets.High++;
      else if(role.risk>=2)buckets.Medium++;
      else if(role.risk>=1)buckets.Low++;
      else buckets.Clean++;
    });
    var total=ra.roles.length||1;
    Object.entries(buckets).forEach(function(kv){
      var k=kv[0]; var n=kv[1]; var pct=Math.round(n/total*100);
      h.push('<div style="margin-bottom:10px">');
      h.push('<div style="display:flex;justify-content:space-between;margin-bottom:4px">');
      h.push('<span style="font-size:12px;color:var(--tx-3)">'+k+'</span>');
      h.push('<span style="font-family:var(--mono);font-size:12px;font-weight:600;color:'+bColors[k]+'">'+n+'</span>');
      h.push('</div>');
      h.push('<div class="progress"><div class="progress-fill" style="width:'+Math.max(pct,n?1:0)+'%;background:'+bColors[k]+'"></div></div>');
      h.push('</div>');
    });
  } else {
    h.push('<div class="empty-state-sm">'+ic('info',16,'var(--tx-5)')+'<span>Enable Role Analysis</span></div>');
  }
  h.push('<button class="btn btn-ghost btn-sm" style="width:100%;margin-top:4px" onclick="navigate(\'res-role\')">View role detail →</button>');
  h.push('</div>');
  h.push('</div>'); // row 2

  // ── Row 3: Recommendations ──
  var recs=r.recommendations||[];
  if(recs.length>0){
    h.push('<div class="tbl-wrap">');
    h.push('<div class="tbl-hdr"><span style="font-weight:600;font-size:14px;color:var(--tx-1)">Top Recommendations</span><span style="font-size:12px;color:var(--tx-5)">'+recs.length+' actions identified</span></div>');
    recs.slice(0,4).forEach(function(rec){
      h.push('<div style="display:flex;align-items:flex-start;gap:14px;padding:14px 20px;border-bottom:1px solid var(--bd)">');
      h.push('<div style="width:8px;height:8px;border-radius:50%;background:'+(rec.sev==='critical'?'#F4524D':rec.sev==='high'?'#FF8A3D':'#F5C147')+';flex-shrink:0;margin-top:4px"></div>');
      h.push('<div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:600;color:var(--tx-1)">'+rec.title+'</div><div style="font-size:12px;color:var(--tx-4);margin-top:2px">'+rec.why+'</div></div>');
      h.push('<span class="badge '+(rec.sev==='critical'?'badge-red':rec.sev==='high'?'badge-orange':'badge-yellow')+'">'+rec.sev+'</span>');
      h.push('</div>');
    });
    h.push('</div>');
  }

  h.push('</div>'); // main flex

  el.innerHTML=h.join('');
}

function showAddSystemForm(){App._connectForm='add';App._editSysIdx=null;renderConnect();}
function editSystem(idx){App._connectForm='edit';App._editSysIdx=idx;renderConnect();}
function testSystem(idx){
  var s=(App.systems||[])[idx];
  if(!s) return;
  var btn=document.getElementById('test-btn-'+idx);
  if(btn){btn.disabled=true;btn.textContent='Testing…';}
  var sysLike={authMethod:s.authMethod,tokenUrl:s.tokenUrl,clientId:s.clientId,clientSecret:s.clientSecret,commUser:s.commUser,commPass:s.commPass,apiUrl:s.apiUrl};
  (s.cloudType==='public'?getOAuthToken(sysLike):Promise.resolve({})).then(function(){
    s.status='ok';toast('System connected','ok');saveSystemsForActiveCustomer(App.systems);renderConnect();
  }).catch(function(e){s.status='err';toast('Connection failed: '+e.message.slice(0,60),'err');if(btn){btn.disabled=false;btn.textContent='Retry';}});
}

    return`<div class="sys-card${iA?' active':''}" onclick="setActiveSys('${sys.id}')" style="border-color:${iA?c:'var(--bd)'}">
      <div class="sys-env-ribbon" style="background:${c};color:#000">${sys.env}</div>
      <div style="font-family:var(--mono);font-weight:800;font-size:18px;color:${c};margin-bottom:2px">${sys.sid}</div>
      <div style="font-size:12.5px;font-weight:600;color:${iA?'var(--tx-1)':'var(--tx-3)'}">${sys.name}</div>
      <div style="font-size:10.5px;color:var(--tx-5)">Client: <span style="color:var(--tx-3);font-family:var(--mono)">${sys.client||'—'}</span></div>
      <div style="font-size:10px;color:var(--tx-5)">${sys.mode==='demo'?'Demo Mode':(sys.host||'No host')+':'+sys.port}</div>

  }).join('')+'<div class="sys-card" onclick="showAddSystem()" style="display:flex;align-items:center;justify-content:center;min-height:120px;border-style:dashed;cursor:pointer;color:var(--tx-5)">+ Add System</div>';
}

function setActiveSys(id){App.activeSysId=id;renderSysCards();renderNav();}

function showAddSystem(){
  document.getElementById('sys-form-area').innerHTML=systemForm(null);
}
function showEditSystem(id){
  const sys=App.systems.find(s=>s.id===id);

function deleteSystem(id){
  App.systems=App.systems.filter(s=>s.id!==id);

  renderConnect();renderNav();

function pickAuthMethod(method){
  document.getElementById('sf-auth-method').value=method;
  ['oauth','basic'].forEach(function(m){
    var el=document.getElementById('am-'+m);
    if(!el)return;
    var active=m===method;
    el.style.border='1.5px solid '+(active?'var(--accent)':'var(--bd)');
    el.style.background=active?'var(--accent-dim)':'var(--bg-hover)';
    var svgs=el.querySelectorAll('svg');
    svgs.forEach(function(s){s.setAttribute('stroke',active?'var(--accent)':'var(--tx-5)');});
    var titleEl=el.querySelector('div div:nth-child(2)');
    if(titleEl)titleEl.style.color=active?'var(--accent)':'var(--tx-1)';
  });
  var oauthDiv=document.getElementById('oauth-fields');
  var basicDiv=document.getElementById('basic-fields');
  if(oauthDiv)oauthDiv.style.display=method==='oauth'?'':'none';
  if(basicDiv)basicDiv.style.display=method==='basic'?'':'none';
}

function pickCloudType(type){
  document.getElementById('sf-cloud-type').value=type;
  ['private','public'].forEach(function(ct){
    var el=document.getElementById('ct-'+ct);
    if(!el)return;
    var active=ct===type;
    el.style.border='1.5px solid '+(active?'var(--accent)':'var(--bd)');
    el.style.background=active?'var(--accent-dim)':'var(--bg-hover)';
    var title=el.querySelector('div div:first-child');
    // find SVG stroke and title
    var svgs=el.querySelectorAll('svg');
    svgs.forEach(function(s){s.setAttribute('stroke',active?'var(--accent)':'var(--tx-5)');});
  });
  var priv=document.getElementById('private-cloud-fields');
  var pub=document.getElementById('public-cloud-fields');
  if(priv) priv.style.display=type==='private'?'':'none';
  if(pub)  pub.style.display=type==='public'?'':'none';
}

  const pf=document.getElementById('proxy-url-field');if(pf)pf.style.display=m==='proxy'?'':'none';

function cancelSysForm(){const a=document.getElementById('sys-form-area');if(a)a.innerHTML='';}
function saveSysForm(){
  const g=id=>{const el=document.getElementById(id);return el?el.value||'':'';}
  const id=g('sf-id');
  const cloudType=g('sf-cloud-type')||'private';
  var base={id:id||'sys'+Date.now(),name:g('sf-name'),sid:g('sf-sid').toUpperCase(),client:g('sf-client'),env:g('sf-env'),description:g('sf-desc'),cloudType:cloudType,files:{},lastSync:null,status:'unchecked'};
  if(cloudType==='public'){
    var authMethod=g('sf-auth-method')||'oauth';
    var pubFields={apiUrl:g('sf-api-url'),authMethod:authMethod,mode:'api'};
    if(authMethod==='oauth'){
      Object.assign(pubFields,{tokenUrl:g('sf-token-url'),clientId:g('sf-client-id'),clientSecret:g('sf-client-secret'),scopes:g('sf-scopes')});
    } else {
      Object.assign(pubFields,{commUser:g('sf-comm-user'),commPass:g('sf-comm-pass')});
    }
    Object.assign(base,pubFields);
  } else {
    Object.assign(base,{host:g('sf-host'),port:g('sf-port')||'8080',user:g('sf-user'),password:g('sf-pass'),proxyUrl:g('sf-proxy')||'http://localhost:3100',mode:g('sf-mode')||'proxy'});
  }
  if(!base.name||!base.sid){toast('Name and SID are required','warn');return;}
  const existing=App.systems.find(function(s){return s.id===id;});
  if(existing){base.files=existing.files||{};App.systems=App.systems.map(function(s){return s.id===id?base:s;});}
  else App.systems.push(base);
  App.activeSysId=base.id;
  cancelSysForm();renderConnect();renderNav();
  toast('System "'+base.name+'" saved','ok');
  // Also add a button on the connect page to run API pull for public cloud
  if(cloudType==='public') toast('Public Cloud system saved — use "Pull from API" to fetch live data','info');
}

function saveSystem(){ saveSysForm(); }
async function handleTestConn(id){
  const sys=App.systems.find(s=>s.id===id);
  if(!sys)return;
  toast(`Testing ${sys.sid}...`,'info');
  const r=await testConnection(sys);
  sys.status=r.ok?'ok':'err';
  toast((r.ok?'✓ ':'✗ ')+r.msg,r.ok?'ok':'err');
  renderSysCards();
}

function loadFileInput(input,tableId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSV(e.target.result);
    const sys=App.activeSys;
    sys.files=sys.files||{};
    sys.files[tableId]={rows,fileName:file.name,size:file.size,rowCount:rows.length,loaded:Date.now()};
    // ── Column detection diagnostic (per uploaded table) ──
    const expectedMap={
      USR02:['BNAME','TRDAT','PWDLGNDATE','USTYP'],
      AGR_USERS:['BNAME','AGR_NAME'],
      AGR_1251:['AGR_NAME','OBJECT','FIELD','LOW'],
      PARAMS:['PARNAME','PARVAL'],
      SM20:['BNAME','TCODE']
    };
    const expected=expectedMap[tableId];
    if(expected && rows.length>0){
      const det=detectColumns(rows, expected);
      sys.files[tableId].diagnostic=det;
      if(det.missing.length>0){
        toast(tableId+': '+rows.length+' rows BUT missing column(s): '+det.missing.join(', ')+'. Check headers.','warn');
      }
    }
    // Special: license rule file is parsed into global LICENSE_RULES
    if(tableId==='LICENSE_RULES'){
      const parsed=rows.map(function(r){
        // Accept many naming conventions, incl. PCE format (Rule id, Auth.Object, Auth.Field, Auth.Value)
        var ltype=(r.LICENSE_TYPE||r.LICENSE_ID||r.LTYPE||r['RULE ID']||r.RULE_ID||r['RULE.ID']||r.RULEID||'').toUpperCase().trim();
        var ldesc=(r.LICENSE_DESC||r['RULE DESCRIPTION']||r.RULE_DESCRIPTION||r['RULE.DESCRIPTION']||r.LDESC||r.DESCRIPTION||'').trim();
        var obj  =(r.AUTH_OBJECT||r['AUTH.OBJECT']||r.OBJECT||r.OBJ||'').toUpperCase().trim();
        var field=(r.AUTH_FIELD||r['AUTH.FIELD']||r.FIELD||'').toUpperCase().trim();
        var value=(r.AUTH_VALUE||r['AUTH.VALUE']||r.VALUE||r.VAL||r.LOW||'').toUpperCase().trim();
        return {ltype:ltype, ldesc:ldesc, obj:obj, field:field, value:value};
      }).filter(function(r){return r.ltype&&r.obj;});
      if(parsed.length>0){
        LICENSE_RULES=parsed;
        toast('License rule file loaded: '+parsed.length+' rules active','ok');
      } else {
        toast('License file parsed but no valid rules found. Check columns: LICENSE_TYPE, LICENSE_DESC, AUTH_OBJECT, FIELD, VALUE','warn');
      }
    } else {
      toast(tableId+': '+rows.length.toLocaleString()+' rows loaded','ok');
    }
    renderIngest();
  };
  reader.readAsText(file);
}

    h.push('<input style="width:100%;background:var(--bg-input);border:1px solid var(--bd-input);color:var(--tx-1);border-radius:7px;padding:7px 10px 7px 32px;font-size:12.5px;font-family:var(--sans);outline:none" '+

function switchRLTab(g, btn){
  App.rlTab=g||App.rlTab;
  var grouped={};
  SOD_LIBRARY.forEach(function(r){var gr=r.type||'SoD';if(!grouped[gr])grouped[gr]=[];grouped[gr].push(r);});
  // Full re-render keeps toolbar filter state in sync
  renderRiskLibrary();
}

function renderRLTab(g, grouped){
  var rules=(grouped&&grouped[g])||[];
  var search=(App._rlSearch||'').toLowerCase();
  var sevFilter=App._rlSev||'all';

  if(rules.length===0) return '<div style="text-align:center;padding:48px;color:var(--tx-5)">'+
    '<div style="font-size:13px">No rules in this category.</div>'+
    '<div style="font-size:12px;margin-top:5px">Use <strong>+ Add Rule</strong> to create one or upload a library file.</div></div>';

  // Sort
  var sevOrder={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};
  var sorted=rules.slice().sort(function(a,b){
    var so=(sevOrder[a.sev]||9)-(sevOrder[b.sev]||9);
    return so!==0?so:String(a.id).localeCompare(String(b.id));
  });

  // Filter
  var filtered=sorted.filter(function(r){
    if(search){
      var hay=(r.id+' '+r.name+' '+(r.desc||'')+' '+(r.f1&&r.f1.tcodes?r.f1.tcodes.join(' '):'')+(r.f2&&r.f2.tcodes?r.f2.tcodes.join(' '):'')+(r.tcodes?r.tcodes.join(' '):'')).toLowerCase();
      if(hay.indexOf(search)<0) return false;
    }
    if(sevFilter==='SOX') return r.sox;
    if(sevFilter!=='all'&&sevFilter!==r.sev) return false;
    return true;
  });

  var h=[];
  // Container matching tbl-wrap
  h.push('<div style="border-left:1px solid var(--bd-card);border-right:1px solid var(--bd-card);border-bottom:1px solid var(--bd-card);border-radius:0 0 var(--r-md) var(--r-md);overflow:hidden">');

  if(!filtered.length){
    h.push('<div style="padding:32px;text-align:center;color:var(--tx-5);font-size:12.5px">No rules match your filter.</div>');
    h.push('</div>');
    return h.join('');
  }

  var sevColors={CRITICAL:'#F4524D',HIGH:'#FF8A3D',MEDIUM:'#F5C147',LOW:'#34D399'};

  filtered.forEach(function(r, ri){
    var en=App.enabledRules.has(r.id);
    var sc=sevColors[r.sev]||'var(--tx-5)';
    var isLast=ri===filtered.length-1;

    h.push('<div id="rr-'+r.id+'" style="'+
      'display:flex;align-items:flex-start;gap:14px;'+
      'padding:14px 18px 13px;'+
      'border-bottom:'+(isLast?'none':'1px solid var(--bd)')+';'+
      'background:'+(en?sc+'06':'transparent')+';'+
      'transition:background .12s;'+
      '" onmouseenter="this.style.background=\''+(en?sc+'0E':'var(--bg-hover)')+'\';" '+
         'onmouseleave="this.style.background=\''+(en?sc+'06':'transparent')+'\';">');

    // ── Left: severity stripe ──
    h.push('<div style="width:3px;border-radius:2px;background:'+(en?sc:'var(--bd-strong)')+';align-self:stretch;flex-shrink:0;margin-left:-2px"></div>');

    // ── Toggle ──
    h.push('<div style="padding-top:2px;flex-shrink:0">');
    h.push('<button data-rid="'+r.id+'" onclick="toggleRule(this.dataset.rid)" style="'+
      'width:34px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .18s;'+
      'background:'+(en?'var(--accent)':'var(--bd-strong)')+'">'+
      '<div style="position:absolute;top:2px;left:'+(en?'15':'2')+'px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.3)"></div>'+
    '</button>');
    h.push('</div>');

    // ── Body ──
    h.push('<div style="flex:1;min-width:0">');

    // Row 1: ID + name + badges
    h.push('<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:'+(r.desc||r.f1||r.tcodes?'5':'0')+'px">');
    h.push('<span style="font-family:var(--mono);font-weight:600;font-size:11px;color:var(--tx-5);flex-shrink:0">'+r.id+'</span>');
    h.push('<span style="font-weight:600;font-size:13.5px;color:'+(en?'var(--tx-1)':'var(--tx-3)')+'" >'+r.name+'</span>');

    // Severity badge
    h.push('<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.04em;text-transform:uppercase;'+
      'color:'+sc+';background:'+sc+'18;border:1px solid '+sc+'33;flex-shrink:0">'+r.sev+'</span>');

    // Area badge
    if(r.area) h.push('<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;'+
      'color:var(--tx-4);background:var(--bg-input);border:1px solid var(--bd-input);flex-shrink:0">'+r.area+'</span>');

    // SOX badge
    if(r.sox) h.push('<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.04em;'+
      'color:#F4524D;background:#F4524D18;border:1px solid #F4524D40;flex-shrink:0">SOX</span>');

    h.push('</div>');

    // Row 2: description (function conflict detail)
    if(r.f1&&r.f2){
      var tc1=(r.f1.tcodes||[]).slice(0,5).join(', ')+(r.f1.tcodes&&r.f1.tcodes.length>5?' +'+( r.f1.tcodes.length-5)+'…':'');
      var tc2=(r.f2.tcodes||[]).slice(0,5).join(', ')+(r.f2.tcodes&&r.f2.tcodes.length>5?' +'+( r.f2.tcodes.length-5)+'…':'');
      h.push('<div style="font-size:11px;color:var(--tx-5);font-family:var(--mono);line-height:1.5">');
      h.push('<span style="color:var(--tx-4)">'+r.f1.name+'</span>');
      h.push(' <span style="color:var(--tx-6)">['+tc1+']</span>');
      h.push(' <span style="color:var(--tx-6)"> vs </span>');
      h.push('<span style="color:var(--tx-4)">'+r.f2.name+'</span>');
      h.push(' <span style="color:var(--tx-6)">['+tc2+']</span>');
      h.push('</div>');
    } else if(r.tcodes&&r.tcodes.length){
      h.push('<div style="font-size:11px;color:var(--tx-5);font-family:var(--mono);margin-top:1px">');
      h.push('T-Codes: <span style="color:var(--orange)">'+r.tcodes.slice(0,10).join(', ')+(r.tcodes.length>10?' +'+( r.tcodes.length-10)+'…':'')+'</span>');
      h.push('</div>');
    } else if(r.desc){
      h.push('<div style="font-size:11.5px;color:var(--tx-5);margin-top:1px;line-height:1.4">'+r.desc+'</div>');
    }

    // Mitigation (collapsed by default)
    if(r.mitigation){
      h.push('<div style="font-size:11px;color:var(--tx-5);margin-top:4px">'+
        '<span style="color:var(--green);font-weight:600">Mitigation: </span>'+r.mitigation+'</div>');
    }

    h.push('</div>');

    // ── Delete button ──
    h.push('<button data-rid="'+r.id+'" onclick="deleteRisk(this.dataset.rid)" '+
      'title="Delete rule" '+
      'style="width:26px;height:26px;border-radius:6px;border:none;background:transparent;'+
      'color:var(--tx-6);cursor:pointer;display:flex;align-items:center;justify-content:center;'+
      'flex-shrink:0;font-size:14px;transition:all .12s" '+
      'onmouseenter="this.style.background=\'rgba(244,82,77,.12)\';this.style.color=\'#F4524D\'" '+
      'onmouseleave="this.style.background=\'transparent\';this.style.color=\'var(--tx-6)\'">✕</button>');

    h.push('</div>'); // row
  });

  // Footer
  h.push('<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 18px;'+
    'background:var(--bg-card);border-top:1px solid var(--bd-card);font-size:11.5px;color:var(--tx-5)">');
  h.push('<span>'+filtered.length+' of '+rules.length+' rules'+(sevFilter!=='all'?' (filtered)':'')+'</span>');
  h.push('<div style="display:flex;gap:9px">');
  h.push('<span>Enabled: '+filtered.filter(function(r){return App.enabledRules.has(r.id);}).length+'</span>');
  h.push('<span>Disabled: '+filtered.filter(function(r){return !App.enabledRules.has(r.id);}).length+'</span>');
  h.push('</div></div>');

  h.push('</div>');
  return h.join('');
}


function renderParamBaseline(){
  var h=[];
  h.push('<div style="border-left:1px solid var(--bd-card);border-right:1px solid var(--bd-card);border-bottom:1px solid var(--bd-card);border-radius:0 0 var(--r-md) var(--r-md);overflow:hidden">');
  h.push('<div style="padding:12px 18px;background:var(--bg-hover);border-bottom:1px solid var(--bd);font-size:12px;color:var(--tx-4);line-height:1.5">');
  h.push('Target values per <strong style="color:var(--tx-2)">SAP Security Baseline v1.8</strong>. Each parameter is checked against the value retrieved from SAP (or uploaded RZ11/PAHI export).');
  h.push('</div>');

  // Group by category
  var cats={};
  SAP_PARAMS.forEach(function(p){
    var c=p.cat||'General';
    if(!cats[c])cats[c]=[];
    cats[c].push(p);
  });

  h.push('<table style="width:100%;border-collapse:collapse">');
  h.push('<thead><tr style="background:var(--bg-card)">');
  ['Category','Parameter','Description','Target Value','Note'].forEach(function(col){
    h.push('<th style="padding:9px 14px;text-align:left;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx-5);border-bottom:1px solid var(--bd-card)">'+col+'</th>');
  });
  h.push('</tr></thead><tbody>');

  var ri=0;
  Object.entries(cats).forEach(function(kv){
    var cat=kv[0]; var params=kv[1];
    params.forEach(function(p, pi){
      ri++;
      h.push('<tr style="border-bottom:1px solid var(--bd);transition:background .1s" onmouseenter="this.style.background=\'var(--bg-hover)\'" onmouseleave="this.style.background=\'\'">');
      // Category (only on first row of group)
      h.push('<td style="padding:11px 14px;vertical-align:top">');
      if(pi===0) h.push('<span style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tx-5);white-space:nowrap">'+cat+'</span>');
      h.push('</td>');
      h.push('<td style="padding:11px 14px;vertical-align:top"><span style="font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--accent)">'+p.name+'</span></td>');
      h.push('<td style="padding:11px 14px;font-size:12px;color:var(--tx-3);line-height:1.45;max-width:320px">'+( p.desc||'')+'</td>');
      h.push('<td style="padding:11px 14px;vertical-align:top"><span style="font-family:var(--mono);font-weight:700;font-size:12px;color:var(--green);background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);border-radius:5px;padding:2px 9px;white-space:nowrap">'+( p.target||p.val||'—')+'</span></td>');
      h.push('<td style="padding:11px 14px;font-size:11.5px;color:var(--tx-5)">'+( p.note||p.sapNote||'—')+'</td>');
      h.push('</tr>');
    });
  });
  h.push('</tbody></table>');
  h.push('<div style="padding:9px 18px;background:var(--bg-card);border-top:1px solid var(--bd-card);font-size:11.5px;color:var(--tx-5)">'+SAP_PARAMS.length+' parameters in baseline</div>');
  h.push('</div>');
  return h.join('');
}

function toggleRule(id){
  if(App.enabledRules.has(id))App.enabledRules.delete(id);else App.enabledRules.add(id);
  const row=document.getElementById('rr-'+id);const en=App.enabledRules.has(id);
  if(row){row.className='risk-row'+(en?' enabled':'');const btn=row.querySelector('.toggle-btn');if(btn)btn.style.background=en?'var(--green)':'var(--bd-card)';const knob=row.querySelector('.toggle-knob');if(knob)knob.style.left=en?'16px':'2px';}
  renderNav();
}
function setAllRules(enable){if(enable)SOD_LIBRARY.forEach(r=>App.enabledRules.add(r.id));else App.enabledRules.clear();renderRiskLibrary();renderNav();}

function showAddRiskForm(){

  if(!area)return;
  var h=[];

function saveNewRisk(){
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var type=g('rf-type');
  var id=g('rf-id')||('CUSTOM-'+Date.now());
  var name=g('rf-name');
  if(!name){toast('Risk name is required','warn');return;}
  var rule={id:id,name:name,area:g('rf-area')||'CUSTOM',sev:g('rf-sev')||'HIGH',
            sox:document.getElementById('rf-sox')&&document.getElementById('rf-sox').checked,
            desc:g('rf-desc'),mitigation:g('rf-mit')};
  if(type==='SoD'){
    rule.f1={name:g('rf-f1name')||'Function 1',tcodes:g('rf-f1tc').split(',').map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
    rule.f2={name:g('rf-f2name')||'Function 2',tcodes:g('rf-f2tc').split(',').map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
  } else {
    rule.type='SENSITIVE';
    rule.tcodes=g('rf-senstc').split(',').map(function(x){return x.trim();}).filter(Boolean);
    rule.aobjs=[];
  }
  SOD_LIBRARY.push(rule);
  App.enabledRules.add(rule.id);
  toast('Rule "'+name+'" added','ok');
  renderRiskLibrary();renderNav();
}
function uploadRiskLibrary(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var rows=parseCSV(e.target.result);
    var added=0;
    rows.forEach(function(r){
      var rid=(r.RULE_ID||r.rule_id||r.ID||r.id||'').trim();
      var name=(r.RISK_NAME||r.risk_name||r.NAME||r.name||'').trim();
      var type=(r.TYPE||r.type||'SoD').trim();
      if(!name)return;
      if(!rid)rid='IMPORT-'+Date.now()+'-'+added;
      var rule={id:rid,name:name,area:(r.AREA||r.area||'IMPORT').trim(),
                sev:(r.SEVERITY||r.severity||r.SEV||'HIGH').toUpperCase().trim(),
                sox:(r.SOX||r.sox||'').toString().toUpperCase().indexOf('Y')===0||((r.SOX||'')+'')==='true',
                desc:(r.DESCRIPTION||r.description||r.DESC||'').trim(),
                mitigation:(r.MITIGATION||r.mitigation||'').trim()};
      if(type.toUpperCase().indexOf('SEN')===0){
        rule.type='SENSITIVE';
        rule.tcodes=((r.TCODES||r.tcodes||r.TCODE||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean);
        rule.aobjs=[];
      } else {
        rule.f1={name:(r.FUNC1||r.func1||'Function 1').trim(),tcodes:((r.FUNC1_TCODES||r.func1_tcodes||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
        rule.f2={name:(r.FUNC2||r.func2||'Function 2').trim(),tcodes:((r.FUNC2_TCODES||r.func2_tcodes||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
      }
      SOD_LIBRARY.push(rule);
      App.enabledRules.add(rule.id);
      added++;
    });
    toast(added>0?(added+' rules imported'):'No valid rules found. Check column headers.',added>0?'ok':'warn');
    renderRiskLibrary();renderNav();
  };
  reader.readAsText(file);
}

async function handleRun(){
  const sys=App.activeSys;
  // For public cloud: restore from localStorage cache first, then auto-pull if still empty
  if(sys&&sys.cloudType==='public'){
    if(Object.keys(sys.files||{}).length===0 && typeof restorePublicCloudCache==='function'){
      restorePublicCloudCache(sys);
    }
    const hasPulled=Object.values(sys.files||{}).some(function(f){return f.pulledAt||(f.rowCount||0)>0;});
    if(!hasPulled){
      const missingCreds=(sys.authMethod==='basic'&&(!sys.commUser||!sys.commPass))
        ||(sys.authMethod!=='basic'&&(!sys.tokenUrl||!sys.clientId||!sys.clientSecret));
      if(missingCreds||!sys.apiUrl){
        toast('Configure Public Cloud API credentials first','warn');
        navigate('connect');
        return;
      }
      toast('Public Cloud system — pulling data from API first...','info');
      try{
        await runPublicCloudAnalysis(sys,function(){},function(m){toast(m,'info');});
        toast('API data loaded — running analysis...','ok');
      }catch(e){
        toast('API pull failed: '+e.message.slice(0,80)+'. Proceeding with available data.','warn');
      }
    }
  }
  App.running=true;App.log=[];
  const btn=document.getElementById('run-btn');
  if(btn){btn.disabled=true;btn.textContent='Analyzing...';}
  const pa=document.getElementById('progress-area');if(pa)pa.style.display='block';
  const la=document.getElementById('analysis-log');if(la)la.style.display='block';

  function onProgress(p){App.progress=p;const pf=document.getElementById('prog-fill');if(pf)pf.style.width=p+'%';}
  function onLog(msg,type){
    App.log.push({msg,type});
    const la=document.getElementById('analysis-log');
    if(la){la.innerHTML+=`<div class="log-${type==='ok'?'ok':type==='warn'?'warn':type==='err'?'err':'info'}">${msg}</div>`;la.scrollTop=la.scrollHeight;}
  }
  try{
    App.results=await runFullAnalysis(sys,App.enabledRules,onProgress,onLog);
    // Persist scan metadata locally + to MongoDB if configured
    (function(){
      var custs=getCustomers(); var cid=getActiveCustomerId();
      var ci=custs.findIndex(function(c){return c.id===cid;});
      if(ci>=0){custs[ci].lastScan=Date.now();custs[ci].securityScore=App.results.score||0;saveCustomers(custs);}
    })();
    // Non-blocking MongoDB persist
    if(typeof DataStore!=='undefined'&&DataStore.isRemoteEnabled()){
      DataStore.saveAnalysisResult(getActiveCustomerId(), App.activeSys&&App.activeSys.id, App.results)
        .catch(function(e){console.warn('DataStore save:',e);});
    }
    toast(`Analysis complete! Risk score: ${App.results.score}/100`,'ok');
    navigate('dashboard');
  }catch(e){
    onLog('Analysis failed: '+e.message,'err');
    toast('Analysis failed: '+e.message,'err');
  }
  App.running=false;
  if(btn){btn.disabled=false;btn.innerHTML='&#9654; Run Security Analysis';}
}

function renderResLicense(){
  var r=App.results;
  if(!r){document.getElementById('content').innerHTML=noResults();return;}
  var _msg=needsUploadMsg(['AGR_USERS','AGR_1251'],r);
  if(_msg){document.getElementById('content').innerHTML='<div class="fade">'+_msg+'</div>';return;}

  // ── Merge license + usage data into enriched user objects ──
  var licArr = r.license||[];
  var unusedSummary = r.unused||[];
  var usedCount = unusedSummary.usedCount||{};   // user -> tcode -> execCount
  var unusedMap  = {};                             // user -> summary item
  unusedSummary.forEach(function(s){unusedMap[s.user]=s;});

  var LIC_COLORS = {GB:'var(--red)',GC:'var(--orange)',GD:'var(--yellow)',GE:'var(--green)'};
  var LIC_NAMES  = {GB:'Professional',GC:'Functional',GD:'Productivity',GE:'ESS'};
  var USAGE_COLORS = {Heavy:'var(--green)',Medium:'var(--yellow)',Light:'var(--orange)',Unused:'var(--tx-5)'};
  var REC_COLORS = {retain:'var(--green)',review:'var(--yellow)',downgrade:'var(--orange)',remove:'var(--red)',trim:'var(--purple)'};

  function usageTier(count){
    if(count>=10)return 'Heavy'; if(count>=3)return 'Medium'; if(count>=1)return 'Low'; return 'Unused';
  }
  function userRec(l, usum){
    var pct = usum ? usum.pct : 100;
    var tier = usum ? usageTier(usum.used>0 ? Math.round(usum.used/(usum.assigned||1)*10) : 0) : 'Unused';
    // Use avg executions if available
    var maxExec=0;
    if(usedCount[l.user]){
      var vals=Object.values(usedCount[l.user]);
      maxExec=vals.length>0?Math.max.apply(null,vals):0;
    }
    var ut = usageTier(maxExec);
    if(pct<10||ut==='Unused') return {level:'remove',  text:'Fewer than 10% of assigned t-codes used — consider removing role assignments or locking the account.'};
    if(l.license==='GB'&&ut==='Low')   return {level:'downgrade',text:'Professional license but only low-frequency usage detected. Downgrade to Functional may be possible.'};
    if(l.license==='GB'&&ut==='Medium')return {level:'review',   text:'Professional license with medium usage. Confirm that Professional-tier transactions are genuinely required.'};
    if(ut==='Heavy')                    return {level:'retain',   text:'Heavy usage justifies current license tier and role assignments.'};
    return {level:'retain',text:'Usage pattern appears appropriate for the current license tier.'};
  }
  function roleRec(roleUsers, roleId){
    var total=roleUsers.length;
    if(total===0) return {level:'remove',text:'No users assigned — remove role.'};
    var unused=roleUsers.filter(function(u){return u.usageTier==='Unused';}).length;
    var heavy =roleUsers.filter(function(u){return u.usageTier==='Heavy';}).length;
    var med   =roleUsers.filter(function(u){return u.usageTier==='Medium';}).length;
    if(unused/total>0.7)  return {level:'remove', text:unused+' of '+total+' users never use this role — remove unused assignments.'};
    if(heavy+med===0)     return {level:'downgrade',text:'No heavy/medium users — all assignments may be downgradeable.'};
    if(unused/total>0.4)  return {level:'review', text:unused+' users unused ('+Math.round(unused/total*100)+'%) — review and clean up.'};
    if(heavy/total>0.5)   return {level:'retain', text:Math.round(heavy/total*100)+'% heavy users — role is actively used.'};
    return {level:'retain',text:'Role usage is appropriate.'};
  }

  // ── Build enriched user list ──
  var users = licArr.map(function(l){
    var usum=unusedMap[l.user];
    var maxExec=0;
    if(usedCount[l.user]){
      var vals=Object.values(usedCount[l.user]);
      maxExec=vals.length>0?Math.max.apply(null,vals):0;
    }
    var ut=usageTier(maxExec);
    var rec=userRec(l,usum);
    var pctUsed=usum?Math.max(0,100-usum.pct):50;
    return {
      user:l.user, license:l.license, licenseName:l.licenseName,
      licenseDesc:l.licenseDesc, matchedOn:l.matchedOn,
      roles:l.roles, tcodeCount:l.tcodeCount,
      assigned:usum?usum.assigned:l.tcodeCount,
      used:usum?usum.used:0, pctUsed:pctUsed,
      usageTier:ut, maxExec:maxExec, rec:rec
    };
  });

  // ── Build role list from AGR data ──
  // Group detail rows by role
  var roleMap={};
  var detail=(r.unused&&r.unused.detail)||[];
  detail.forEach(function(d){
    var rolesArr=(d.roles||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
    rolesArr.forEach(function(role){
      if(!roleMap[role])roleMap[role]={id:role,users:{},tcodeCounts:{}};
      if(!roleMap[role].users[d.user]){
        var maxE=0;
        if(usedCount[d.user]){var vals=Object.values(usedCount[d.user]);maxE=vals.length?Math.max.apply(null,vals):0;}
        roleMap[role].users[d.user]={user:d.user,usageTier:usageTier(maxE),maxExec:maxE,license:(licArr.find(function(l){return l.user===d.user;})||{}).license||'GE'};
      }
    });
  });
  var roles=Object.values(roleMap).map(function(rm){
    var ru=Object.values(rm.users);
    var total=ru.length;
    var heavy=ru.filter(function(u){return u.usageTier==='Heavy';}).length;
    var med  =ru.filter(function(u){return u.usageTier==='Medium';}).length;
    var low  =ru.filter(function(u){return u.usageTier==='Low';}).length;
    var unu  =ru.filter(function(u){return u.usageTier==='Unused';}).length;
    var actPct=total>0?Math.round((heavy+med+low)/total*100):0;
    var rec=roleRec(ru,rm.id);
    return {id:rm.id,totalUsers:total,heavy:heavy,med:med,low:low,unused:unu,actPct:actPct,rec:rec,users:ru};
  }).sort(function(a,b){return b.totalUsers-a.totalUsers;});

  // ── Summary stats ──
  var counts={GB:0,GC:0,GD:0,GE:0};
  users.forEach(function(u){counts[u.license]=(counts[u.license]||0)+1;});
  var recCounts={retain:0,review:0,downgrade:0,remove:0};
  users.forEach(function(u){recCounts[u.rec.level]=(recCounts[u.rec.level]||0)+1;});
  var usageCounts={Heavy:0,Medium:0,Low:0,Unused:0};
  users.forEach(function(u){usageCounts[u.usageTier]=(usageCounts[u.usageTier]||0)+1;});
  var roleRecCounts={retain:0,review:0,downgrade:0,remove:0};
  roles.forEach(function(rl){roleRecCounts[rl.rec.level]=(roleRecCounts[rl.rec.level]||0)+1;});

  // Store in App for modal access
  App._licUsers=users; App._licRoles=roles; App._licUsedCount=usedCount;
  App._licUsageCounts=usageCounts; App._licCounts=counts; App._licRecCounts=recCounts; App._licRoleRecCounts=roleRecCounts;
  App._licTab=App._licTab||'overview';
  App._licModal=App._licModal||null;
  App._licUserSearch=App._licUserSearch||'';
  App._licTierFilter=App._licTierFilter||'all';
  App._licUsageFilter=App._licUsageFilter||'all';
  App._licRoleSearch=App._licRoleSearch||'';
  App._licRecFilter=App._licRecFilter||'all';
  App._licPage=App._licPage||0;
  App._licRolePage=App._licRolePage||0;

  // ── Render ──
  renderLicensePage();
}

function renderLicRoles(){

    h.push('<span style="font-size:9px;font-weight:700;background:'+rc+'22;color:'+rc+';border:1px solid '+rc+'44;border-radius:8px;padding:2px 7px;text-transform:capitalize;white-space:nowrap;flex-shrink:0">'+rl.rec.level+'</span>');
    h.push('</div>');
    // Usage breakdown bars
    [['Heavy',rl.heavy,'var(--green)'],['Medium',rl.med,'var(--yellow)'],['Low',rl.low,'var(--orange)'],['Unused',rl.unused,'var(--tx-5)']].forEach(function(bd){
      var pct=Math.round(bd[1]/total*100);

        '<div style="flex:1;height:5px;background:var(--bg-input);border-radius:3px;overflow:hidden"><div style="width:'+Math.max(pct,bd[1]?2:0)+'%;height:100%;background:'+bd[2]+';border-radius:3px"></div></div>'+
        '<span style="font-size:9.5px;font-family:var(--mono);color:var(--tx-5);width:22px;text-align:right">'+bd[1]+'</span>'+
      '</div>');
    });
    // Footer
    h.push('<div style="display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid var(--bd);margin-top:4px">');
    h.push('<span style="font-size:10px;color:var(--tx-5)"><b style="color:var(--tx-1);font-family:var(--mono)">'+rl.totalUsers+'</b> users · <b style="color:'+( rl.actPct<30?'var(--red)':rl.actPct<60?'var(--yellow)':'var(--green)')+';font-family:var(--mono)">'+rl.actPct+'%</b> active</span>');
    h.push('<span style="font-size:9px;color:var(--accent)">'+ic('eye',11,'var(--accent)')+' Detail</span>');
    h.push('</div></div>');
  });
  h.push('</div>');

  // Pagination
  if(totalPages>1){
    h.push('<div style="display:flex;gap:5px;justify-content:center;align-items:center;flex-wrap:wrap">');
    h.push('<button class="btn btn-ghost btn-sm" onclick="App._licRolePage=Math.max(0,App._licRolePage-1);renderLicensePage();" '+(page===0?'disabled':'')+'>‹ Prev</button>');
    for(var pi=0;pi<Math.min(totalPages,10);pi++){
      var isA=pi===page;
      h.push('<button class="btn btn-ghost btn-sm" onclick="App._licRolePage='+pi+';renderLicensePage();" style="'+(isA?'border-color:var(--accent);color:var(--accent);background:var(--accent-dim)':'')+'">'+(pi+1)+'</button>');

    h.push('</div>');
  }
  return h.join('');
