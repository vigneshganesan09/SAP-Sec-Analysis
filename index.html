<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAP Security Analyzer Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#05080f;--bg2:#090e1a;--bg3:#0f1624;--bg4:#151e2e;
  --bd:#1a2640;--bd2:#223050;
  --txt:#d8e8f8;--txt2:#7a9abf;--txt3:#3d5a80;--txt4:#243550;
  --cyan:#00c8f0;--red:#f03c3c;--orange:#f07820;
  --yellow:#e8c020;--green:#18c878;--blue:#3878f0;--purple:#9050f0;
  --font:"Segoe UI",system-ui,sans-serif;
  --mono:"Consolas","JetBrains Mono",monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);font-family:var(--font);color:var(--txt);height:100%;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fade{animation:fadeIn .25s ease}
.spin{animation:spin .9s linear infinite}
.pulse{animation:pulse 2s ease-in-out infinite}

/* Layout */
#app{display:flex;height:100vh}
#sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
#main{flex:1;overflow:auto;display:flex;flex-direction:column}
#topbar{padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{padding:20px 24px;flex:1;overflow-y:auto}

/* Sidebar */
.sb-logo{padding:14px 13px 12px;border-bottom:1px solid var(--bd)}
.sb-logo .mark{width:34px;height:34px;border-radius:9px;background:rgba(0,200,240,.1);border:1px solid rgba(0,200,240,.25);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:var(--cyan)}
.sb-logo .title{font-weight:700;font-size:13px;color:var(--txt)}
.sb-logo .sub{font-size:9.5px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.sb-sys{margin:8px 8px 2px;padding:7px 10px;border-radius:8px;transition:all .2s}
nav{flex:1;overflow-y:auto;padding:5px}
.nav-group{font-size:9px;font-weight:700;color:var(--txt4);text-transform:uppercase;letter-spacing:.12em;padding:6px 9px 3px}
.nav-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:7px;border:none;background:transparent;color:var(--txt2);font-size:12.5px;font-family:var(--font);cursor:pointer;text-align:left;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:rgba(0,200,240,.05)}
.nav-item.active{background:rgba(0,200,240,.1);color:var(--cyan);font-weight:700}
.nav-item .badge{margin-left:auto;background:rgba(240,120,32,.2);color:var(--orange);border-radius:10px;font-size:9px;padding:1px 5px;font-weight:700;font-family:var(--mono)}
.nav-item .dot{width:3px;height:14px;background:var(--cyan);border-radius:2px;margin-left:auto}
.sb-bottom{padding:6px 7px 10px;border-top:1px solid var(--bd)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-weight:600;font-size:13px;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--cyan);color:#000}
.btn-primary:hover:not(:disabled){background:#00e8ff}
.btn-secondary{background:var(--bg4);border:1px solid var(--bd2);color:var(--txt2)}
.btn-secondary:hover{background:var(--bg3)}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--txt3)}
.btn-danger{background:rgba(240,60,60,.1);border:1px solid rgba(240,60,60,.3);color:var(--red)}
.btn-success{background:rgba(24,200,120,.1);border:1px solid rgba(24,200,120,.3);color:var(--green)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:18px}
.panel{background:var(--bg3);border:1px solid var(--bd);border-radius:11px;padding:14px}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.full{grid-column:1/-1}

/* Form */
label{display:block;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--bd2);color:var(--txt);border-radius:9px;padding:8px 12px;font-size:12px;font-family:var(--mono);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,200,240,.1)}
textarea{resize:vertical;min-height:60px}

/* Table */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:11.5px;font-family:var(--mono)}
thead tr{background:var(--bg3);border-bottom:1px solid var(--bd2)}
th{padding:8px 12px;text-align:left;color:var(--txt3);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
td{padding:7px 12px;color:var(--txt);vertical-align:middle;border-bottom:1px solid rgba(26,38,64,.5)}
tr:nth-child(even) td{background:rgba(9,14,26,.4)}
tr:hover td{background:rgba(0,200,240,.03)}

/* Tags / badges */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);white-space:nowrap}
.env-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;font-family:var(--mono)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px;gap:2px}
.tab{padding:8px 15px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt3);font-size:12.5px;font-weight:400;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.tab.active{border-bottom-color:var(--cyan);color:var(--cyan);font-weight:700}
.tab .tbadge{background:rgba(240,120,32,.2);color:var(--orange);border-radius:10px;font-size:9px;padding:1px 5px;font-weight:700}

/* Sev colours */
.sev-CRITICAL,.sev-CRIT{background:rgba(240,60,60,.15);color:#ff9090;border:1px solid rgba(240,60,60,.3)}
.sev-HIGH{background:rgba(240,120,32,.14);color:#ffb060;border:1px solid rgba(240,120,32,.28)}
.sev-MEDIUM,.sev-MED{background:rgba(232,192,32,.14);color:#f8e060;border:1px solid rgba(232,192,32,.25)}
.sev-LOW{background:rgba(24,200,120,.12);color:#70efb0;border:1px solid rgba(24,200,120,.22)}
.sev-PASS{background:rgba(24,200,120,.12);color:#70efb0;border:1px solid rgba(24,200,120,.22)}
.sev-FAIL{background:rgba(240,120,32,.14);color:#ffb060;border:1px solid rgba(240,120,32,.28)}
.sev-WARN{background:rgba(232,192,32,.14);color:#f8e060;border:1px solid rgba(232,192,32,.25)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9990;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:100%;max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;backdrop-filter:blur(12px);box-shadow:0 6px 28px rgba(0,0,0,.5);display:none;align-items:center;gap:8px;animation:fadeIn .2s ease}

/* System cards */
.sys-card{padding:12px 14px;border-radius:12px;border:2px solid var(--bd);background:var(--bg2);cursor:pointer;transition:all .2s;min-width:145px;position:relative}
.sys-card:hover{transform:translateY(-1px)}
.sys-card.active{border-color-opacity:.7}
.sys-env-ribbon{position:absolute;top:0;right:0;font-size:8px;font-weight:800;font-family:var(--mono);padding:2px 8px;border-radius:0 10px 0 8px}
.sys-dot-row{display:flex;align-items:center;gap:5px;margin-top:7px}
.sys-dot{width:7px;height:7px;border-radius:2px;background:var(--bd2)}

/* Progress */
.progress-track{height:4px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:4px;transition:width .4s ease}

/* Gauge */
.kpi-card{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:15px 17px;cursor:default;transition:border-color .15s}
.kpi-card.clickable{cursor:pointer}
.kpi-card.clickable:hover{border-color:rgba(0,200,240,.3)}
.kpi-label{font-size:9.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.kpi-value{font-size:34px;font-weight:700;font-family:var(--mono);line-height:1}
.kpi-sub{font-size:10.5px;color:var(--txt3);margin-top:5px}

/* Collapsible */
.collapse-hdr{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer;user-select:none;border-radius:10px 10px 0 0}
.collapse-body{padding:14px}

/* File drop */
.file-drop-label{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;border:1px dashed var(--bd2);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;margin-top:8px;color:var(--txt3)}
.file-drop-label:hover{border-color:var(--cyan);color:var(--cyan)}

/* Connection status dot */
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}

/* Scrollable log */
.log-box{background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:12px;font-family:var(--mono);font-size:11px;max-height:200px;overflow-y:auto}
.log-ok{color:var(--green)}.log-warn{color:var(--yellow)}.log-err{color:var(--red)}.log-info{color:var(--txt3)}

/* Bar chart */
.bar-wrap{display:flex;align-items:flex-end;gap:7px;height:100px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.bar-val{font-size:9px;color:var(--txt3);font-family:var(--mono)}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s ease}
.bar-lbl{font-size:9px;color:var(--txt3);text-align:center}

/* Risk library */
.risk-row{border:1px solid var(--bd);border-radius:10px;padding:11px 14px;margin-bottom:7px;transition:all .15s}
.risk-row.enabled{border-color:rgba(240,60,60,.2);background:rgba(240,60,60,.04)}
.toggle-btn{width:32px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle-knob{width:14px;height:14px;border-radius:50%;background:white;position:absolute;top:2px;transition:left .2s}

/* SAP connect form */
.conn-card{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:11px;margin-bottom:7px}
</style>

</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sb-logo"></div>
    <div class="sb-sys"></div>
    <nav></nav>
    <div class="sb-bottom"></div>
  </div>
  <div id="main">
    <div id="topbar"></div>
    <div id="content"></div>
  </div>
</div>
<div id="toast"></div>
<script>
// ═══════════════════════════════════════════════════════════════
//  OPEN-SOURCE SAP SoD RISK LIBRARY (S/4HANA + ECC)
//  Based on: SAP GRC Risk Library, ERP Maestro Community Ruleset,
//  ISACA SAP Audit Guide, and SAP Security Notes
// ═══════════════════════════════════════════════════════════════

let SOD_LIBRARY = [
// ── FINANCIAL ACCOUNTING ──────────────────────────────────────
{id:'FI-001',name:'AP Vendor Create + Post Payment',   area:'FI',sev:'CRITICAL',sox:true,
 desc:'User can create/modify vendor master AND process outgoing payments — enables fictitious vendor fraud.',
 f1:{name:'AP Vendor Maintenance',tcodes:['FK01','FK02','XK01','XK02','MK01','MK02'],aobjs:['F_LFA1_BUK','F_LFA1_GRP']},
 f2:{name:'Payment Processing',   tcodes:['F110','FBZ2','F-53','F-58','FCH5','FCHI'],aobjs:['F_BKPF_BUK','F_BKPF_BES']},
 mitigation:'Segregate vendor master from payment. Positive pay control. Dual approval new vendors.'},
{id:'FI-002',name:'AP Vendor Create + Invoice Post',   area:'FI',sev:'CRITICAL',sox:true,
 desc:'User can create vendor master AND post vendor invoices — full procure-to-pay cycle without checks.',
 f1:{name:'AP Vendor Maintenance',tcodes:['FK01','FK02','XK01','XK02'],aobjs:['F_LFA1_BUK']},
 f2:{name:'Invoice Posting',      tcodes:['FB60','MIRO','MR8M','FB65','F-43'],aobjs:['F_BKPF_BUK','M_RECH_BUK']},
 mitigation:'Separate vendor master maintenance from invoice entry roles.'},
{id:'FI-003',name:'GL Account Create + GL Posting',    area:'FI',sev:'HIGH',sox:true,

 f1:{name:'GL Account Maintenance',tcodes:['FS00','FSP0','FSS0','OBD4'],aobjs:['F_SKA1_BUK']},
 f2:{name:'GL Journal Posting',    tcodes:['FB01','FB50','F-02','FBD1'],aobjs:['F_BKPF_BUK','F_BKPF_KOA']},
 mitigation:'Separate chart of accounts maintenance from journal entry posting.'},
{id:'FI-004',name:'Bank Account Maintain + Payment',   area:'FI',sev:'CRITICAL',sox:true,
 desc:'User can modify bank master data AND initiate bank payments — can redirect payments to fraudulent accounts.',
 f1:{name:'Bank Master Maintenance',tcodes:['FI01','FI02','FI03'],aobjs:['F_BNKA_BUK']},

 mitigation:'Strict separation of bank master from payment execution. Bank confirmation callbacks.'},
{id:'FI-005',name:'Credit Limit Set + Customer Bill',  area:'FI',sev:'HIGH',sox:true,

 mitigation:'Separate credit management from billing and collections functions.'},
{id:'FI-006',name:'Fixed Asset Create + Capitalize',   area:'FI',sev:'HIGH',sox:true,
 desc:'User can create asset master AND post capitalizations — ghost asset fraud.',
 f1:{name:'Asset Master Maintenance',tcodes:['AS01','AS02','AS05'],aobjs:['A_B_ANLKL']},
 f2:{name:'Asset Posting',           tcodes:['ABUMN','F-90','ABSO'],aobjs:['F_BKPF_BUK']},
 mitigation:'Separate fixed asset master from acquisition/capitalization postings.'},
// ── MATERIALS MANAGEMENT ─────────────────────────────────────
{id:'MM-001',name:'PO Create + Goods Receipt',         area:'MM',sev:'CRITICAL',sox:true,
 desc:'User can create purchase orders AND post goods receipts — bypasses 3-way match control entirely.',
 f1:{name:'Purchase Order Creation',tcodes:['ME21N','ME22N','ME23N','ME24'],aobjs:['M_BEST_BSA','M_BEST_EKG']},
 f2:{name:'Goods Receipt',          tcodes:['MIGO','MB01','MB31','MB0A'],aobjs:['M_MSEG_BWA','M_MSEG_WMB']},
 mitigation:'Enforce 3-way match. Separate PO from receiving. Automated matching tolerance.'},
{id:'MM-002',name:'PO Create + Invoice Verify',        area:'MM',sev:'CRITICAL',sox:true,
 desc:'User can create purchase orders AND verify invoices — full AP cycle without segregation.',
 f1:{name:'Purchase Order Creation',tcodes:['ME21N','ME22N'],aobjs:['M_BEST_BSA']},
 f2:{name:'Invoice Verification',   tcodes:['MIRO','MR8M','MRRL','MIR4'],aobjs:['M_RECH_BUK','M_RECH_WRK']},

{id:'MM-003',name:'Goods Receipt + Invoice Verify',    area:'MM',sev:'HIGH',sox:true,
 desc:'User can post goods receipts AND verify invoices — inflated GR quantities to match fraudulent invoices.',
 f1:{name:'Goods Receipt',        tcodes:['MIGO','MB01'],aobjs:['M_MSEG_BWA']},
 f2:{name:'Invoice Verification', tcodes:['MIRO','MR8M'],aobjs:['M_RECH_BUK']},
 mitigation:'Separate receiving department from accounts payable.'},
{id:'MM-004',name:'Vendor Create + PO Create',         area:'MM',sev:'HIGH',sox:true,
 desc:'User can create vendors AND raise purchase orders — purchases from unauthorized/fictitious suppliers.',

 f2:{name:'Purchase Orders',    tcodes:['ME21N','ME22N'],aobjs:['M_BEST_BSA']},
 mitigation:'Separate vendor onboarding from procurement. Vendor approval workflow.'},
{id:'MM-005',name:'Inventory Adjust + Goods Issue',    area:'MM',sev:'HIGH',sox:false,

 f1:{name:'Inventory Adjustment',tcodes:['MI07','MI10','MI04'],aobjs:['M_MSEG_BWA']},
 f2:{name:'Goods Issue',         tcodes:['MIGO','MB1A','MB11'],aobjs:['M_MSEG_WMB']},
 mitigation:'Separate inventory counting/adjustment from goods movement processing.'},
// ── HUMAN RESOURCES / PAYROLL ────────────────────────────────
{id:'HR-001',name:'HR Master Data + Payroll Execute',  area:'HR',sev:'CRITICAL',sox:true,

{id:'HR-003',name:'Bank Data Maintain + Payroll Post', area:'HR',sev:'CRITICAL',sox:true,

 f2:{name:'Payroll Posting',   tcodes:['PC00_M99_CIPE','PC00_M10_CIPE'],aobjs:['P_PYEVRUN']},

{id:'BA-001',name:'User Create + Role Assign',         area:'BASIS',sev:'CRITICAL',sox:false,
 desc:'User can create user accounts AND assign roles — creates privileged accounts without oversight.',
 f1:{name:'User Administration',tcodes:['SU01','SU10','SU05'],aobjs:['S_USR_ADM','S_USR_GRP']},
 f2:{name:'Role Assignment',    tcodes:['SU01','PFCG','SU10'],aobjs:['S_USER_AGR','S_USER_AUT']},

{id:'BA-002',name:'ABAP Develop + Transport Release',  area:'BASIS',sev:'CRITICAL',sox:false,

 f1:{name:'ABAP Development',    tcodes:['SE38','SE80','SE37','SE11','SE24'],aobjs:['S_DEVELOP']},
 f2:{name:'Transport Management',tcodes:['STMS','SE01','SE09','SE10'],aobjs:['S_TRANSPRT']},
 mitigation:'4-eye principle for transport releases. Separate DEV from transport management roles.'},
{id:'BA-003',name:'Profile Param Modify + User Admin', area:'BASIS',sev:'HIGH',sox:false,
 desc:'User can change system profile parameters AND administer users — can disable security controls then create accounts.',
 f1:{name:'Parameter Maintenance',tcodes:['RZ10','RZ11'],aobjs:['S_ADMI_FCD']},
 f2:{name:'User Administration',  tcodes:['SU01','SU10'],aobjs:['S_USR_ADM']},
 mitigation:'Separate basis configuration from user administration.'},
{id:'BA-004',name:'Debug in Production + User Admin',  area:'BASIS',sev:'CRITICAL',sox:false,
 desc:'User can debug/modify running programs AND administer users — can override any business logic.',
 f1:{name:'ABAP Debug (Change)',  tcodes:['SA38','SE38'],aobjs:['S_DEVELOP']},
 f2:{name:'User Administration',  tcodes:['SU01','SU10'],aobjs:['S_USR_ADM']},
 mitigation:'Remove debug/change (ACTVT=02) from all production users unconditionally.'},
{id:'BA-005',name:'Client Copy + Production Change',   area:'BASIS',sev:'HIGH',sox:false,

 f2:{name:'Direct Table Change',  tcodes:['SE16N','SM30','SM31'],aobjs:['S_TABU_DIS']},
 mitigation:'Restrict client administration. Production client SCC4 must be No Changes Allowed.'},
// ── SALES & DISTRIBUTION ─────────────────────────────────────
{id:'SD-001',name:'Sales Order Create + Billing',      area:'SD',sev:'MEDIUM',sox:false,
 desc:'User can create sales orders AND create billing documents — bypasses delivery/fulfillment controls.',
 f1:{name:'Sales Order',    tcodes:['VA01','VA02','VA03'],aobjs:['V_VBAK_AAT']},
 f2:{name:'Billing',        tcodes:['VF01','VF02','VF11'],aobjs:['V_VBRK_FKA']},
 mitigation:'Enforce delivery-based billing. Separate order entry from billing.'},

// ─── CSV parser ─────────────────────────────────────────────────
function parseCSV(text){
  if(!text||!text.trim())return[];
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const sep=lines[0].includes('\t')?'\t':lines[0].includes(';')?';':',';
  const hdrs=lines[0].split(sep).map(h=>h.trim().replace(/^["']|["']$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const c of line+sep){if(c==='"')inQ=!inQ;else if(c===sep&&!inQ){vals.push(cur.trim().replace(/^["']|["']$/g,''));cur='';}else cur+=c;}
    return Object.fromEntries(hdrs.map((h,i)=>[h,vals[i]||'']));
  });
}

function daysSince(ds){
  if(!ds||ds.length<8)return 9999;
  try{const d=new Date(`${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}`);return isNaN(d)?9999:Math.floor((Date.now()-d)/86400000);}catch{return 9999;}
}
function getRows(fileObj){
  if(!fileObj)return[];
  if(Array.isArray(fileObj))return fileObj;
  if(fileObj.rows)return fileObj.rows;
  return[];
}

// ─── SAP OData fetcher via CORS proxy ───────────────────────────
async function sapFetch(sys, entity, params=''){
  if(sys.mode==='demo')throw new Error('DEMO_MODE');
  const baseUrl=`http://${sys.host}:${sys.port}/sap/opu/odata/sap/ZTEST_TABLE_SRV/${entity}?$format=json&${params}`;
  if(sys.mode==='proxy'){
    const proxyUrl=(sys.proxyUrl||'http://localhost:3100').replace(/\/$/,'');
    const resp=await fetch(`${proxyUrl}/proxy`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:baseUrl,username:sys.user,password:sys.password}),
      signal:AbortSignal.timeout(20000)
    });
    if(!resp.ok)throw new Error(`Proxy HTTP ${resp.status}`);
    const env=await resp.json();
    if(!env.ok)throw new Error(`SAP HTTP ${env.status}`);
    const d=env.data;
    return d?.d?.results||d?.value||(Array.isArray(d)?d:[]);
  }
  // Direct
  const r=await fetch(baseUrl,{headers:{'Authorization':'Basic '+btoa(`${sys.user}:${sys.password}`)},signal:AbortSignal.timeout(15000)});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const j=await r.json();
  return j?.d?.results||j?.value||[];
}

async function testConnection(sys){
  if(sys.mode==='demo')return{ok:true,msg:'Demo mode — using built-in data'};
  if(sys.mode==='proxy'){
    const proxyBase=(sys.proxyUrl||'http://localhost:3100').replace(/\/$/,'');
    try{
      const ctrl=new AbortController();
      setTimeout(()=>ctrl.abort(),5000);
      const hr=await fetch(`${proxyBase}/health`,{signal:ctrl.signal});
      if(!hr.ok)return{ok:false,msg:`Proxy HTTP ${hr.status}`};
    }catch(e){return{ok:false,msg:`Proxy unreachable: ${e.name==='AbortError'?'timeout':e.message}. Run: python3 sap_proxy.py`};}
  }
  if(!sys.host)return{ok:false,msg:'No host configured'};
  try{
    await sapFetch(sys,'InputsSet','$top=1');
    return{ok:true,msg:`Connected to ${sys.sid} via ${sys.mode}`};
  }catch(e){
    if(e.message.includes('DEMO_MODE'))return{ok:true,msg:'Demo mode'};
    return{ok:false,msg:e.message};
  }
}

// ─── ANALYSIS ENGINE ────────────────────────────────────────────
function buildAuthMap(agrUsers,agrAuth){
  const roleMap={};
  agrAuth.forEach(r=>{
    const role=r.AGR_NAME||r.agr_name||'';
    const obj=(r.OBJECT||r.object||'').toUpperCase();
    const field=(r.FIELD||r.field||'').toUpperCase();
    const low=(r.LOW||r.low||'').toUpperCase();
    if(!roleMap[role])roleMap[role]={tcodes:new Set(),aobjs:new Set(),triples:[]};
    if(obj==='S_TCODE')roleMap[role].tcodes.add(low);
    else if(obj)roleMap[role].aobjs.add(obj);
    // capture obj|field|value triple for license mapping
    if(obj) roleMap[role].triples.push({obj,field,value:low});
  });
  const umap={};
  agrUsers.forEach(r=>{
    const u=r.BNAME||r.bname||'';
    const role=r.AGR_NAME||r.agr_name||'';
    if(!u)return;
    if(!umap[u])umap[u]={roles:new Set(),tcodes:new Set(),aobjs:new Set(),triples:[]};
    umap[u].roles.add(role);
    const rm=roleMap[role];
    if(rm){
      rm.tcodes.forEach(t=>umap[u].tcodes.add(t));
      rm.aobjs.forEach(o=>umap[u].aobjs.add(o));
      rm.triples.forEach(tr=>umap[u].triples.push(tr));
    }
  });
  return umap;
}

// ─── LICENSE ANALYSIS: map each user to a license type via rule file ──
function runLicense(umap, rules){
  // Build quick lookup of user authorizations (tcodes + obj/field/value)
  const out=[];
  Object.entries(umap).forEach(function(entry){
    var user=entry[0], auth=entry[1];
    var matched=null, matchedRule=null;
    // Evaluate every rule; keep the highest-ranked (lowest priority number)
    rules.forEach(function(rule){
      var ruleObj=(rule.obj||'').toUpperCase();
      var ruleField=(rule.field||'').toUpperCase();
      var ruleVal=(rule.value||'').toUpperCase();
      var hit=false;
      if(ruleObj==='S_TCODE'){
        hit = auth.tcodes.has(ruleVal) || auth.tcodes.has('*');
      } else {
        // match obj + (field optional) + value (or wildcard)
        hit = auth.triples.some(function(t){
          if(t.obj!==ruleObj) return false;
          if(ruleField && t.field && t.field!==ruleField) return false;
          if(ruleVal==='*' ) return true;
          return t.value===ruleVal || t.value==='*';
        });
      }
      if(hit){
        var rank=LICENSE_RANK[rule.ltype]||99;
        if(matched===null || rank < (LICENSE_RANK[matched]||99)){
          matched=rule.ltype; matchedRule=rule;
        }
      }
    });
    out.push({
      user:user,
      license: matched||'GE',
      licenseName: matched?(LICENSE_NAMES[matched]||matched):'Employee Self-Service',
      licenseDesc: matchedRule?matchedRule.ldesc:'No privileged authorizations matched — default minimal license',
      matchedOn: matchedRule?(matchedRule.obj+(matchedRule.value?(' = '+matchedRule.value):'')):'—',
      roles:[...auth.roles].slice(0,3).join(', '),
      tcodeCount:auth.tcodes.size
    });
  });
  // sort by license rank (most privileged first)
  out.sort(function(a,b){return (LICENSE_RANK[a.license]||99)-(LICENSE_RANK[b.license]||99);});
  return out;
}

function runSoD(umap, enabledRules){
  const violations=[];
  SOD_LIBRARY.filter(r=>!r.type&&enabledRules.has(r.id)).forEach(rule=>{
    const t1=new Set(rule.f1.tcodes.map(t=>t.toUpperCase()));
    const t2=new Set(rule.f2.tcodes.map(t=>t.toUpperCase()));
    Object.entries(umap).forEach(([user,auth])=>{
      const has1=[...t1].some(t=>auth.tcodes.has(t)||auth.tcodes.has('*'));
      const has2=[...t2].some(t=>auth.tcodes.has(t)||auth.tcodes.has('*'));
      if(has1&&has2){
        violations.push({
          user,ruleId:rule.id,name:rule.name,area:rule.area,sev:rule.sev,sox:rule.sox,
          f1:rule.f1.name,f2:rule.f2.name,
          tc1:[...t1].filter(t=>auth.tcodes.has(t)||auth.tcodes.has('*')).slice(0,4).join(', '),
          tc2:[...t2].filter(t=>auth.tcodes.has(t)||auth.tcodes.has('*')).slice(0,4).join(', '),
          roles:[...auth.roles].slice(0,3).join(', '),
          mitigation:rule.mitigation,
        });
      }
    });
  });
  return violations.sort((a,b)=>{const o={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};return(o[a.sev]||9)-(o[b.sev]||9);});
}

function runSensitive(umap, enabledRules){
  const out=[];
  SOD_LIBRARY.filter(r=>r.type==='SENSITIVE'&&enabledRules.has(r.id)).forEach(rule=>{
    (rule.tcodes||[]).forEach(tc=>{
      const tcUp=tc.toUpperCase();
      Object.entries(umap).forEach(([user,auth])=>{
        if(auth.tcodes.has(tcUp)||auth.tcodes.has('*')){
          out.push({user,ruleId:rule.id,name:rule.name,tcode:tc,sev:rule.sev,area:rule.area,sox:rule.sox,
            roles:[...auth.roles].slice(0,2).join(', '),mitigation:rule.mitigation});
        }
      });
    });
  });
  return out;
}

function runDormant(usr02, threshold=90){
  return usr02.map(u=>{
    const days=daysSince(u.TRDAT||u.trdat||'');
    const pdDays=daysSince(u.PWDLGNDATE||u.pwdlgndate||'');
    const locked=!!(u.UFLAG||u.uflag||u.LOCKED||'');
    return{
      user:u.BNAME||u.bname||'',type:u.USTYP||u.ustyp||'A',
      lastLogin:u.TRDAT||u.trdat||'Never',daysLogin:days,
      lastPwd:u.PWDLGNDATE||u.pwdlgndate||'Never',daysPwd:pdDays,
      locked,isDormant:days>threshold,pwdIssue:pdDays>90&&(u.USTYP||'A')==='A',
    };
  }).filter(u=>u.isDormant||u.pwdIssue);
}

function runParamCheck(paramRows){
  return SAP_PARAMS.map(bp=>{
    const row=paramRows.find(p=>(p.PARNAME||p.parname||'').toLowerCase()===bp.name.toLowerCase());
    const current=row?(row.PARVAL||row.parval||'—'):'Not retrieved';
    let status='WARN';
    if(!row){status='UNKNOWN';}
    else{
      const cur=(current||'').toString().trim().toLowerCase();
      const tgt=(bp.target||'').toString().trim().toLowerCase();
      if(cur===tgt){status='PASS';}
      else{
        // Numeric comparison where possible
        const cN=parseFloat(cur),tN=parseFloat(tgt);
        if(!isNaN(cN)&&!isNaN(tN)){
          const lessIsBetter=['login/min_password_lng','login/min_password_specials','login/min_password_digits','login/min_password_letters','login/password_history_size','rsau/max_diskspace/local','rdisp/gui_auto_logout'].some(n=>bp.name.startsWith(n.split('/')[0]));
          status=cN>=tN?'PASS':'FAIL';
          if(['login/fails_to_user_lock'].includes(bp.name))status=cN<=tN?'PASS':'FAIL';
          if(['login/failed_user_auto_unlock','login/disable_multi_gui_login','snc/enable','rsau/enable','auth/rfc_authority_check','login/no_automatic_user_sapstar','login/password_change_for_SSO','icm/https/verify_client'].includes(bp.name))status=cN===tN?'PASS':'FAIL';
          if(['login/accept_sso2_ticket'].includes(bp.name))status=cN===tN?'PASS':'FAIL';
        } else {status=cur===tgt?'PASS':'FAIL';}
      }
    }
    return{...bp,current,status};
  });
}

function runUnused(umap, sm20){
  const used={};
  sm20.forEach(r=>{const u=r.BNAME||r.benutzer||'';const t=(r.TCODE||r.tcode||'').toUpperCase();if(u&&t){if(!used[u])used[u]=new Set();used[u].add(t);}});
  return Object.entries(umap).map(([user,auth])=>{
    const usedSet=used[user]||new Set();
    const unused=[...auth.tcodes].filter(t=>t!=='*'&&!usedSet.has(t));
    return{user,assigned:auth.tcodes.size,used:usedSet.size,unused:unused.length,
      unusedList:unused.slice(0,6).join(', '),pct:auth.tcodes.size>0?Math.round(unused.length/auth.tcodes.size*100):0};
  }).filter(u=>u.assigned>0).sort((a,b)=>b.pct-a.pct);
}

function runDefaultUsers(usr02){
  const defaults=['SAP*','DDIC','EARLYWATCH','TMSADM','SAPCPIC','SAPRFC'];
  return usr02.filter(u=>defaults.includes((u.BNAME||u.bname||'').toUpperCase())).map(u=>({
    user:u.BNAME||u.bname||'',locked:!!(u.UFLAG||u.uflag||''),
    type:u.USTYP||u.ustyp||'A',lastLogin:u.TRDAT||u.trdat||'Never',
    sev:(u.BNAME||'').toUpperCase()==='SAP*'?'CRITICAL':'HIGH',
    finding:'Default SAP user'+((u.UFLAG||u.uflag)?'':' - NOT LOCKED'),
  }));
}

function calcScore(sod,dormant,params,sensitive){
  let sc=0;
  sc+=Math.min(sod.filter(s=>s.sev==='CRITICAL').length*12,30);
  sc+=Math.min(sod.filter(s=>s.sev==='HIGH').length*5,14);
  sc+=Math.min(dormant.filter(d=>d.daysLogin>365).length*4,10);
  sc+=Math.min(params.filter(p=>p.status==='FAIL').length*2,16);
  sc+=Math.min(sensitive.filter(s=>s.sev==='CRITICAL').length*4,14);
  return Math.min(Math.round(sc),100);
}

async function runFullAnalysis(sys, enabledRules, onProgress, onLog){
  const steps=[
    ['Connecting to SAP / loading data',null],
    ['Reading USR02 (user master)',     'USR02'],
    ['Reading AGR_USERS (role assignments)','AGR_USERS'],
    ['Reading AGR_1251 (auth values)', 'AGR_1251'],
    ['Reading profile parameters',     'PARAMS'],
    ['Building user-authorization map', null],
    ['Running SoD conflict detection', null],
    ['Checking sensitive transactions', null],
    ['Scanning dormant users',         null],
    ['Checking default users',         null],
    ['Auditing security parameters',   null],
    ['Calculating risk score',         null],
  ];
  const data={};
  for(let i=0;i<steps.length;i++){
    onProgress(Math.round(i/steps.length*100));
    const [label,tableKey]=steps[i];
    onLog(label,'info');
    await new Promise(r=>setTimeout(r,120+Math.random()*180));
    if(tableKey){
      try{
        const rows=await sapFetch(sys, ODATA_ENTITIES[tableKey]?.entity||tableKey+'Set',
                                  ODATA_ENTITIES[tableKey]?.params||'$top=5000');
        data[tableKey]=rows;
        onLog(`  ${tableKey}: ${rows.length} records from SAP`,'ok');
      }catch(e){
        if(e.message==='DEMO_MODE'||sys.mode==='demo'){
          const demoMap={USR02:DEMO_USR02,AGR_USERS:DEMO_AGR_USERS,AGR_1251:DEMO_AGR_1251,PARAMS:DEMO_PARAMS,FIORI:DEMO_FIORI};
          data[tableKey]=demoMap[tableKey]||[];
          onLog(`  ${tableKey}: ${data[tableKey].length} records (demo data)`,'warn');
        } else {
          onLog(`  ${tableKey}: ${e.message} — using demo fallback`,'warn');
          const demoMap={USR02:DEMO_USR02,AGR_USERS:DEMO_AGR_USERS,AGR_1251:DEMO_AGR_1251,PARAMS:DEMO_PARAMS,FIORI:DEMO_FIORI};
          data[tableKey]=demoMap[tableKey]||[];
        }
      }
    }
  }
  // Also check files uploaded for this system
  ['USR02','AGR_USERS','AGR_1251','PARAMS','SM20','FIORI'].forEach(k=>{
    const fd=sys.files?.[k];
    if(fd&&getRows(fd).length>0&&getRows(data[k]||[]).length===0){
      data[k]=getRows(fd);
      onLog(`  ${k}: ${data[k].length} records from uploaded file`,'ok');
    }
  });

  const usr02=getRows(data.USR02)||DEMO_USR02;
  const agrUsers=getRows(data.AGR_USERS)||DEMO_AGR_USERS;
  const agr1251=getRows(data.AGR_1251)||DEMO_AGR_1251;
  const params=getRows(data.PARAMS)||DEMO_PARAMS;
  const sm20=getRows(data.SM20)||[];

  const umap=buildAuthMap(agrUsers,agr1251);
  const sod=runSoD(umap,enabledRules);
  const sensitive=runSensitive(umap,enabledRules);
  const dormant=runDormant(usr02);
  const defaultUsers=runDefaultUsers(usr02);
  const paramResults=runParamCheck(params);
  const unused=runUnused(umap,sm20);
  let fiori=getRows(data.FIORI)||[];
  if(fiori.length===0 && (sys.mode==='demo'||!sys.host)) fiori=DEMO_FIORI;
  const license=runLicense(umap, LICENSE_RULES);
  const score=calcScore(sod,dormant,paramResults,sensitive);

  onProgress(100);
  onLog(`Analysis complete — Risk Score: ${score}/100`,'ok');
  onLog(`SoD: ${sod.length} violations | Dormant: ${dormant.length} | Params: ${paramResults.filter(p=>p.status==='FAIL').length} FAIL`,'ok');
  onLog(`License: ${license.length} users classified | ${license.filter(l=>l.license==='GB').length} Professional`,'ok');

  return{sod,sensitive,dormant,defaultUsers,paramResults,unused,license,fiori,score,
    isDemo:sys.mode==='demo'||!sys.host,
    system:{sid:sys.sid,client:sys.client,env:sys.env,name:sys.name},
    stats:{users:usr02.length,roles:new Set(agrUsers.map(r=>r.AGR_NAME||r.agr_name)).size,
      sodCount:sod.length,sensitiveCount:sensitive.length,dormantCount:dormant.length,
      defaultCount:defaultUsers.length,paramFails:paramResults.filter(p=>p.status==='FAIL').length,
      unusedCount:unused.length,soxCount:sod.filter(s=>s.sox).length,
      licenseCount:license.length,
      licenseProf:license.filter(l=>l.license==='GB').length,
      licenseFunc:license.filter(l=>l.license==='GC').length},
    ts:Date.now()};
}

function setActiveSys(id){App.activeSysId=id;renderSysCards();renderNav();}

function showAddSystem(){
  document.getElementById('sys-form-area').innerHTML=systemForm(null);
}
function showEditSystem(id){
  const sys=App.systems.find(s=>s.id===id);

function deleteSystem(id){
  App.systems=App.systems.filter(s=>s.id!==id);

  renderConnect();renderNav();

function saveSysForm(){
  const g=id=>document.getElementById(id)?.value||'';
  const id=g('sf-id');
  const sys={id:id||'sys'+Date.now(),name:g('sf-name'),sid:g('sf-sid').toUpperCase(),client:g('sf-client'),env:g('sf-env'),description:g('sf-desc'),host:g('sf-host'),port:g('sf-port'),user:g('sf-user'),password:g('sf-pwd'),proxyUrl:g('sf-proxyurl')||'http://localhost:3100',mode:g('sf-mode'),files:{},lastSync:null,status:'unchecked'};
  if(!sys.name||!sys.sid){toast('Name and SID are required','warn');return;}
  const existing=App.systems.find(s=>s.id===id);
  if(existing){const files=existing.files||{};sys.files=files;App.systems=App.systems.map(s=>s.id===id?sys:s);}
  else App.systems.push(sys);
  App.activeSysId=sys.id;
  cancelSysForm();renderConnect();renderNav();
  toast(`System "${sys.name}" saved`,'ok');
}
async function handleTestConn(id){
  const sys=App.systems.find(s=>s.id===id);
  if(!sys)return;
  toast(`Testing ${sys.sid}...`,'info');
  const r=await testConnection(sys);
  sys.status=r.ok?'ok':'err';
  toast((r.ok?'✓ ':'✗ ')+r.msg,r.ok?'ok':'err');
  renderSysCards();
}
async function handleTestConnForm(){
  const g=id=>document.getElementById(id)?.value||'';
  const sys={id:'test',name:'test',sid:g('sf-sid'),client:g('sf-client'),env:g('sf-env'),host:g('sf-host'),port:g('sf-port'),user:g('sf-user'),password:g('sf-pwd'),proxyUrl:g('sf-proxyurl')||'http://localhost:3100',mode:g('sf-mode')};
  const tr=document.getElementById('test-result');

}

function loadFileInput(input,tableId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSV(e.target.result);
    const sys=App.activeSys;
    sys.files=sys.files||{};
    sys.files[tableId]={rows,fileName:file.name,size:file.size,rowCount:rows.length,loaded:Date.now()};
    // Special: license rule file is parsed into global LICENSE_RULES
    if(tableId==='LICENSE_RULES'){
      const parsed=rows.map(function(r){
        return {
          ltype:(r.LICENSE_TYPE||r.license_type||r.LTYPE||'').toUpperCase().trim(),
          ldesc:(r.LICENSE_DESC||r.license_desc||r.LDESC||'').trim(),
          obj:(r.AUTH_OBJECT||r.auth_object||r.OBJECT||'').toUpperCase().trim(),
          field:(r.FIELD||r.field||'').toUpperCase().trim(),
          value:(r.VALUE||r.value||r.LOW||'').toUpperCase().trim()
        };
      }).filter(function(r){return r.ltype&&r.obj;});
      if(parsed.length>0){
        LICENSE_RULES=parsed;

  };

}

  document.getElementById('rf-type').value=t;

  });
  var sodF=document.getElementById('rf-sod-fields'), sensF=document.getElementById('rf-sens-fields');
  if(sodF)sodF.style.display=(t==='SoD')?'grid':'none';

function saveNewRisk(){
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var type=g('rf-type');
  var id=g('rf-id')||('CUSTOM-'+Date.now());
  var name=g('rf-name');
  if(!name){toast('Risk name is required','warn');return;}
  var rule={id:id,name:name,area:g('rf-area')||'CUSTOM',sev:g('rf-sev')||'HIGH',
            sox:document.getElementById('rf-sox')&&document.getElementById('rf-sox').checked,
            desc:g('rf-desc'),mitigation:g('rf-mit')};
  if(type==='SoD'){
    rule.f1={name:g('rf-f1name')||'Function 1',tcodes:g('rf-f1tc').split(',').map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
    rule.f2={name:g('rf-f2name')||'Function 2',tcodes:g('rf-f2tc').split(',').map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
  } else {
    rule.type='SENSITIVE';
    rule.tcodes=g('rf-senstc').split(',').map(function(x){return x.trim();}).filter(Boolean);
    rule.aobjs=[];
  }
  SOD_LIBRARY.push(rule);
  App.enabledRules.add(rule.id);
  toast('Rule "'+name+'" added','ok');
  renderRiskLibrary();renderNav();
}
function uploadRiskLibrary(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var rows=parseCSV(e.target.result);
    var added=0;
    rows.forEach(function(r){
      var rid=(r.RULE_ID||r.rule_id||r.ID||r.id||'').trim();
      var name=(r.RISK_NAME||r.risk_name||r.NAME||r.name||'').trim();
      var type=(r.TYPE||r.type||'SoD').trim();
      if(!name)return;
      if(!rid)rid='IMPORT-'+Date.now()+'-'+added;
      var rule={id:rid,name:name,area:(r.AREA||r.area||'IMPORT').trim(),
                sev:(r.SEVERITY||r.severity||r.SEV||'HIGH').toUpperCase().trim(),
                sox:(r.SOX||r.sox||'').toString().toUpperCase().indexOf('Y')===0||((r.SOX||'')+'')==='true',
                desc:(r.DESCRIPTION||r.description||r.DESC||'').trim(),
                mitigation:(r.MITIGATION||r.mitigation||'').trim()};
      if(type.toUpperCase().indexOf('SEN')===0){
        rule.type='SENSITIVE';
        rule.tcodes=((r.TCODES||r.tcodes||r.TCODE||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean);
        rule.aobjs=[];
      } else {
        rule.f1={name:(r.FUNC1||r.func1||'Function 1').trim(),tcodes:((r.FUNC1_TCODES||r.func1_tcodes||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
        rule.f2={name:(r.FUNC2||r.func2||'Function 2').trim(),tcodes:((r.FUNC2_TCODES||r.func2_tcodes||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
      }
      SOD_LIBRARY.push(rule);
      App.enabledRules.add(rule.id);
      added++;
    });
    toast(added>0?(added+' rules imported'):'No valid rules found. Check column headers.',added>0?'ok':'warn');
    renderRiskLibrary();renderNav();
  };
  reader.readAsText(file);
}
function downloadRiskTemplate(){
  var csv='RULE_ID,RISK_NAME,TYPE,AREA,SEVERITY,SOX,DESCRIPTION,FUNC1,FUNC1_TCODES,FUNC2,FUNC2_TCODES,TCODES,MITIGATION\n';

  const pa=document.getElementById('progress-area');if(pa)pa.style.display='block';
  const la=document.getElementById('analysis-log');if(la)la.style.display='block';

  function onProgress(p){App.progress=p;const pf=document.getElementById('prog-fill');if(pf)pf.style.width=p+'%';}
  function onLog(msg,type){
    App.log.push({msg,type});
    const la=document.getElementById('analysis-log');
    if(la){la.innerHTML+=`<div class="log-${type==='ok'?'ok':type==='warn'?'warn':type==='err'?'err':'info'}">${msg}</div>`;la.scrollTop=la.scrollHeight;}
  }
  try{
    App.results=await runFullAnalysis(sys,App.enabledRules,onProgress,onLog);
    toast(`Analysis complete! Risk score: ${App.results.score}/100`,'ok');
    navigate('dashboard');
  }catch(e){
    onLog('Analysis failed: '+e.message,'err');
    toast('Analysis failed: '+e.message,'err');
  }
  App.running=false;
  if(btn){btn.disabled=false;btn.innerHTML='&#9654; Run Security Analysis';}
}

// ─── Ensure jsPDF is available (lazy-load if CDN blocked) ────────
function ensureJsPDF(){
  return new Promise(function(resolve,reject){
    if(window.jspdf&&window.jspdf.jsPDF){resolve(window.jspdf.jsPDF);return;}
    // Try loading from CDN dynamically
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){
      var s2=document.createElement('script');
      s2.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js';
      s2.onload=function(){
        if(window.jspdf&&window.jspdf.jsPDF)resolve(window.jspdf.jsPDF);
        else reject(new Error('jsPDF loaded but unavailable'));
      };
      s2.onerror=function(){
        // autotable failed but core jsPDF may still work
        if(window.jspdf&&window.jspdf.jsPDF)resolve(window.jspdf.jsPDF);
        else reject(new Error('Could not load jsPDF plugin'));
      };
      document.head.appendChild(s2);
    };
    s.onerror=function(){reject(new Error('No internet — cannot load jsPDF. PDF export needs a connection; use Export JSON instead.'));};
    document.head.appendChild(s);
  });
}

    doc.setFontSize(6);doc.setTextColor(60,90,128);doc.text('RISK SCORE',170,96,{align:'center'});
    const kpis=[['SoD Violations',r.stats.sodCount,col],['SOX Relevant',r.stats.soxCount,[200,50,50]],['Sensitive Access',r.stats.sensitiveCount,[240,120,32]],['Dormant/Pwd',r.stats.dormantCount,[220,180,40]]];
    let kx=16;kpis.forEach(([l,v,c])=>{doc.setFillColor(17,22,36);doc.roundedRect(kx,148,44,20,2,2,'F');doc.setFillColor(...c);doc.roundedRect(kx,148,44,2,1,1,'F');doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(...c);doc.text(String(v),kx+22,159,{align:'center'});doc.setFontSize(6);doc.setTextColor(80,110,150);doc.text(l.toUpperCase(),kx+22,165,{align:'center'});kx+=46;});
    doc.setFontSize(7);doc.setTextColor(35,50,75);doc.text('CONFIDENTIAL — For Internal Security Review Only',W/2,H-7,{align:'center'});

    function pg(t,s){doc.addPage();doc.setFillColor(5,8,15);doc.rect(0,0,W,H,'F');doc.setFillColor(...sysRGB);doc.rect(0,0,4,H,'F');doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...sysRGB);doc.text(t,14,15);if(s){doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(60,90,128);doc.text(s,14,21);}doc.setDrawColor(26,38,64);doc.setLineWidth(.3);doc.line(14,24,W-14,24);return 30;}
    function tbl(head,body,y,cs){if(!doc.autoTable)return y+10;doc.autoTable({startY:y,head:[head],body,margin:{left:14,right:14},styles:{fontSize:7,cellPadding:2.5,font:'helvetica',textColor:[180,220,240],lineColor:[26,38,64],lineWidth:.2,fillColor:[11,18,36]},headStyles:{fillColor:[17,28,50],textColor:[90,120,160],fontStyle:'bold',fontSize:6.5,cellPadding:3},alternateRowStyles:{fillColor:[8,14,26]},columnStyles:cs||{}});return doc.lastAutoTable?.finalY||y+20;}

    // Exec
    let y=pg('Executive Summary','Priority-based remediation actions');
    [{t:'P1 — Immediate (48 Hours)',c:[240,60,60],items:['Remove SAP_ALL/SAP_NEW from all non-basis users — zero tolerance','Lock SAP*, DDIC, EARLYWATCH in all clients; change default passwords','Investigate failed logins from external IPs and block if malicious','Remove S_DEVELOP/ACTVT=02 (debug) from all production users','Set production client SCC4 to No Changes Allowed']},
     {t:'P2 — Short-term (30 Days)',c:[240,120,32],items:['Remediate all SOX-relevant SoD violations or document compensating controls','Force password reset for users with passwords older than 90 days','Lock all dormant users inactive more than 180 days','Set login/min_password_lng=8, login/fails_to_user_lock=5, login/failed_user_auto_unlock=0','Close RFC destinations with stored credentials or no authentication']},
     {t:'P3 — Medium-term (90 Days)',c:[220,180,40],items:['Enable GUI auto-logout (rdisp/gui_auto_logout=3600)','Enable SNC encryption (snc/enable=1)','Implement time-limited firefighter access for emergency situations','Right-size SAP license assignments based on actual usage patterns']}
    ].forEach(sec=>{doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(...sec.c);doc.text(sec.t,14,y);y+=5;sec.items.forEach(i=>{doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(160,200,230);doc.text('  •  '+i,14,y,{maxWidth:182});y+=5;});y+=3;});

    if(r.sod.length){y=pg('SoD Violations ('+r.sod.length+')',`${r.sod.filter(v=>v.sox).length} SOX-relevant · Source: SAP GRC Risk Library / AGR_USERS + AGR_1251`);tbl(['User','Rule','Conflict','Severity','SOX','Area'],r.sod.map(v=>[v.user,v.ruleId,v.name,v.sev,v.sox?'YES':'—',v.area]),y);}
    if(r.sensitive.length){y=pg('Sensitive Transaction Access ('+r.sensitive.length+')','High-risk T-code assignments requiring justification');tbl(['User','T-Code','Risk','Severity','SOX','Area'],r.sensitive.map(s=>[s.user,s.tcode,s.name,s.sev,s.sox?'YES':'—',s.area]),y);}
    if(r.dormant.length){y=pg('Dormant Users & Password Issues ('+r.dormant.length+')','Inactive accounts and expired passwords');tbl(['User','Type','Last Login','Days Inactive','Last Pwd Change','Pwd Days'],r.dormant.map(d=>[d.user,d.type,d.lastLogin,String(d.daysLogin)+'d',d.lastPwd,String(d.daysPwd)+'d']),y);}
    if(r.defaultUsers.length){y=pg('Default SAP Users ('+r.defaultUsers.length+')','SAP* DDIC EARLYWATCH — must be locked in all clients · SAP Note 2216306');tbl(['User','Type','Last Login','Locked','Severity','Finding'],r.defaultUsers.map(d=>[d.user,d.type,d.lastLogin,d.locked?'Yes':'NO',d.sev,d.finding]),y);}
    y=pg('Security Parameter Analysis ('+r.paramResults.filter(p=>p.status!=='PASS').length+' deviations)','vs SAP Security Baseline v1.8 — '+SAP_PARAMS.length+' parameters checked');
    tbl(['Category','Parameter','Description','Current','Target','Status'],r.paramResults.map(p=>[p.cat,p.name,p.desc,p.current,p.target,p.status]),y,{1:{cellWidth:48}});
    if(r.unused.length){y=pg('Unused Access Analysis ('+r.unused.length+' users)','Correlates SM20 audit log with role assignments');tbl(['User','Assigned','Used','Unused','% Unused','Sample Unused T-Codes'],r.unused.map(u=>[u.user,u.assigned,u.used,u.unused,u.pct+'%',u.unusedList]),y);}

    // License optimization section
    if(r.license&&r.license.length){
      y=pg('License Optimization ('+r.license.length+' users)','User license type derived from role-object-value mapping vs license rule file');
      tbl(['User','License','Description','Matched On','T-Codes','Roles'],r.license.map(function(l){return [l.user,l.license+' '+l.licenseName,l.licenseDesc,l.matchedOn,String(l.tcodeCount),l.roles];}),y);
    }
    // Fiori usage section
    if(r.fiori&&r.fiori.length){
      y=pg('Fiori Application Usage ('+r.fiori.length+' records)','From Fiori metering table');
      tbl(['User','App ID','Frequency','Last Used'],r.fiori.map(function(f){return [f.USER||f.user||'',f.APP_ID||f.app_id||'',f.FREQUENCY||f.frequency||'',f.LAST_USED||f.last_used||''];}),y);
    }
    const total=doc.getNumberOfPages();
    for(let i=1;i<=total;i++){doc.setPage(i);doc.setFontSize(7);doc.setTextColor(35,50,75);doc.text(`${i} / ${total}`,W-14,H-6,{align:'right'});doc.text('SAP Security Report — Confidential',14,H-6);}
    doc.save(`SAP_Security_${r.system.sid}_${new Date().toISOString().slice(0,10)}.pdf`);
    toast('PDF downloaded!','ok');
  }catch(e){toast('PDF error: '+e.message,'err');}
  [btn,btn2].forEach(b=>{if(b){b.disabled=false;b.textContent=b.id==='pdf-btn'?'Export PDF Report':'Export PDF';}});
}

function downloadProxy(){
  const code=`#!/usr/bin/env python3
"""SAP OData CORS Proxy - run: python3 sap_proxy.py
Set Proxy URL in app to: http://localhost:3100"""
import json,base64,urllib.request,urllib.error,ssl,sys,os
from http.server import HTTPServer,BaseHTTPRequestHandler
PORT=int(sys.argv[1]) if len(sys.argv)>1 else 3100
CORS={"Access-Control-Allow-Origin":"*","Access-Control-Allow-Methods":"GET,POST,OPTIONS","Access-Control-Allow-Headers":"Content-Type,Authorization"}
class H(BaseHTTPRequestHandler):
    def log_message(self,f,*a):print(f"  {self.log_date_time_string()} {f%a}")
    def send_cors(self,c):self.send_response(c);[self.send_header(k,v) for k,v in CORS.items()];self.send_header("Content-Type","application/json");self.end_headers()
    def do_OPTIONS(self):self.send_cors(204);self.wfile.write(b"")
    def do_GET(self):
        if self.path in("/","/health"):self.send_cors(200);self.wfile.write(json.dumps({"status":"ok","port":PORT}).encode())
        else:self.send_cors(404);self.wfile.write(b"Not found")
    def do_POST(self):
        body=json.loads(self.rfile.read(int(self.headers.get("Content-Length",0))))
        t=body.get("url","");u=body.get("username","");pw=body.get("password","")
        print(f"  -> {t[:80]}")
        try:
            tok=base64.b64encode(f"{u}:{pw}".encode()).decode()
            ctx=ssl.create_default_context();ctx.check_hostname=False;ctx.verify_mode=ssl.CERT_NONE
            req=urllib.request.Request(t,headers={"Authorization":f"Basic {tok}","Accept":"application/json"})
            with urllib.request.urlopen(req,context=ctx,timeout=15) as r:
                d=json.loads(r.read().decode())
                self.send_cors(200);self.wfile.write(json.dumps({"ok":True,"status":r.status,"data":d}).encode())
        except urllib.error.HTTPError as e:
            try:ed=json.loads(e.read())
            except:ed={}
            self.send_cors(200);self.wfile.write(json.dumps({"ok":False,"status":e.code,"data":ed}).encode())
        except Exception as e:self.send_cors(502);self.wfile.write(json.dumps({"ok":False,"error":str(e)}).encode())
print(f"\\n  SAP OData CORS Proxy on http://localhost:{PORT}\\n  Set Proxy URL in app -> http://localhost:{PORT}\\n")
HTTPServer(("0.0.0.0",PORT),H).serve_forever()
`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([code],{type:'text/x-python'}));a.download='sap_proxy.py';a.click();
  toast('sap_proxy.py downloaded — run: python3 sap_proxy.py','ok');
}
