// ─── Generic drill-down toggle (used by every result page) ───────────
// Each finding row gets a unique id; clicking the Investigate button toggles
// the detail panel below it. The panel shows structured detail + a button to
// request an AI / rule-based recommendation.
if(!window.__drilldownOpen) window.__drilldownOpen = {};

function toggleDrillDown(rowId, category, findingEncoded){
  var open = window.__drilldownOpen[rowId];
  var panel = document.getElementById(rowId);
  if(!panel) return;
  if(open){
    panel.style.display = 'none';
    window.__drilldownOpen[rowId] = false;
  } else {
    var finding = JSON.parse(decodeURIComponent(findingEncoded));
    panel.innerHTML = renderDrillDownBody(rowId, category, finding);
    panel.style.display = '';
    window.__drilldownOpen[rowId] = true;
  }
}

function renderDrillDownBody(rowId, category, finding){
  var h = [];
  h.push('<div style="padding:14px 18px;background:var(--bg-hover);border-left:3px solid var(--accent);border-radius:0 0 8px 8px">');
  // Structured detail table
  h.push('<div style="font-size:10.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Finding Detail</div>');
  h.push('<table style="width:100%;font-size:11.5px;margin-bottom:10px"><tbody>');
  Object.keys(finding).forEach(function(k){
    var v = finding[k];
    if(v===null||v===undefined||v==='') return;
    if(typeof v === 'object'){ try { v = JSON.stringify(v); } catch(e){v='[object]';} }
    var vs = String(v);
    if(vs.length>200) vs = vs.slice(0,200)+' ...';
    h.push('<tr><td style="padding:3px 8px 3px 0;color:var(--tx-5);font-family:var(--mono);font-size:10.5px;white-space:nowrap;vertical-align:top;font-weight:700">'+escapeHtml(k)+'</td>');
    h.push('<td style="padding:3px 0;color:var(--tx-1);font-family:var(--mono);font-size:11px;word-break:break-word">'+escapeHtml(vs)+'</td></tr>');
  });
  h.push('</tbody></table>');
  // AI rec button + target div
  var recId = rowId+'_rec';
  var enc = encodeURIComponent(JSON.stringify(finding));
  h.push('<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">');
  h.push('<button class="btn btn-accent btn-sm" data-cat="'+category+'" data-fid="'+enc+'" data-rid="'+recId+'" onclick="showAIRec(this.dataset.cat,this.dataset.fid,this.dataset.rid)">Get Recommendation</button>');
  h.push('<span style="font-size:10.5px;color:var(--tx-5)">'+((getAIConfig().provider==='none')?'Uses rule-based generator (configure an AI key under API Configuration for live LLM responses)':'Uses '+getAIConfig().provider+' '+(getAIConfig().model||''))+'</span>');
  h.push('</div>');
  h.push('<div id="'+recId+'"></div>');
  h.push('</div>');
  return h.join('');
}

// Helper: produces a button + target row for a result table to include drill-down.
// Returns {btn:HTML, rowHtml:HTML} given a row index, category and finding.
function drillBtn(idx, category, finding, colSpan){
  var rowId = 'dd_'+category+'_'+idx;
  var enc = encodeURIComponent(JSON.stringify(finding));
  return {
    btn: '<button class="btn btn-ghost btn-sm" data-cat="'+category+'" data-fid="'+enc+'" data-rid="'+rowId+'" onclick="toggleDrillDown(this.dataset.rid,this.dataset.cat,this.dataset.fid)" title="Investigate"><svg width="13" height="13" style="flex-shrink:0"><use href="#ic-search"/></svg></button>',
    rowHtml: '<tr class="dd-row"><td colspan="'+(colSpan||8)+'" style="padding:0;background:transparent"><div id="'+rowId+'" style="display:none"></div></td></tr>'
  };
}


// ─── Role Matrix → XLSX export ────────────────────────────────────
async function exportRoleMatrixXLSX(){
  var r = App.results;
  if(!r || !r.roleAnalysis){toast('No role analysis to export','warn');return;}
  var ra = r.roleAnalysis;
  toast('Building Excel workbook...','info');
  try {
    var XLSX = await ensureXLSX();
    var wb = XLSX.utils.book_new();

    var cust = (typeof getActiveCustomer==='function') ? getActiveCustomer() : null;
    var custName = cust ? cust.name : 'Customer';
    var custLabel = cust ? cust.name.replace(/[^A-Za-z0-9]/g,'_') : 'customer';
    var stamp = new Date().toISOString().slice(0,10);
    var sid = r.system && r.system.sid ? r.system.sid : 'SAP';

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 1: COVER (matches the layout of standard SAP role matrix files)
    // ═══════════════════════════════════════════════════════════════════
    var coverData = [
      [],[],[],[],
      ['', '', 'SAP Role Matrix'],
      [],
      ['', '', 'Customer:', custName],
      ['', '', 'System:', sid],
      ['', '', 'Environment:', (r.system && r.system.env) || ''],
      ['', '', 'Generated:', new Date().toLocaleString()],
      ['', '', 'Generated by:', 'BCS SAP Secure Studio'],
      [],
      ['', '', 'Total Roles:', ra.summary.total],
      ['', '', 'Single Roles:', ra.summary.single],
      ['', '', 'Composite Roles:', ra.summary.composite],
      ['', '', 'Roles with Risk Findings:', ra.summary.withFindings],
      [],[],[],[],[],
      [],
      ['', '', 'Change Control'],
      [],
      ['', '', 'Date', 'Updated By', 'BCS Reference', 'Update Comment'],
      ['', '', new Date().toISOString().slice(0,10), (currentUser()&&currentUser().name)||'BCS', 'Auto-generated', 'Initial export from BCS SAP Secure Studio']
    ];
    var ws1 = XLSX.utils.aoa_to_sheet(clipRows(coverData), {dense:true});
    ws1['!cols'] = [{wch:3},{wch:3},{wch:24},{wch:36},{wch:20},{wch:40}];
    XLSX.utils.book_append_sheet(wb, ws1, 'Cover');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 2: PROCESS OWNER MATRIX (template — manual fill)
    // ═══════════════════════════════════════════════════════════════════
    var ws2 = XLSX.utils.aoa_to_sheet(clipRows([
      ['Business Process','Process Owner','Owner Email ID','Secondary Owner','Email ID','Role Approver','Email ID']
    ]), {dense:true});
    ws2['!cols'] = [{wch:30},{wch:24},{wch:30},{wch:24},{wch:30},{wch:24},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws2, 'Process Owner Matrix');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 3: IAM ROLE - SAP ROLE MAPPING (composite-role registry)
    // ═══════════════════════════════════════════════════════════════════
    var iamRows = [['Application','SID','IAM Role','Description','SAP Composite Role','Description','Role Approver(s)','Email ID']];
    ra.roles.filter(function(role){return role.type==='C';}).forEach(function(role){
      iamRows.push(['S4HANA', sid, '', '', role.name, role.isDisplay?'(display/view role)':'', '', '']);
    });
    var ws3 = XLSX.utils.aoa_to_sheet(clipRows(iamRows), {dense:true});
    ws3['!cols'] = [{wch:12},{wch:6},{wch:32},{wch:40},{wch:32},{wch:40},{wch:24},{wch:30}];
    ws3['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws3, 'IAM Role - SAP Role Mapping');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 4: ROLE MAPPING (long format — the auditor's primary view)
    // Columns: Business Process | System ID | Composite Role | Description |
    //          Single Role | Description | Transaction/Fiori App - LOW | Description |
    //          Transaction/Fiori App - HIGH | Description | Type | Sensitive | Status | Topdesk | Comment
    // ═══════════════════════════════════════════════════════════════════
    var rmHeaders = ['Business Process','System ID','Composite Role','Description','Single Role','Description','Transaction/Fiori App - LOW','Description','Transaction/Fiori App - HIGH','Description','Type','Sensitive','Status','Topdesk','Comment'];
    var rmRows = [rmHeaders];

    // Build mapping of single role -> composite parents
    var singleToComposites = {};
    ra.roles.filter(function(r){return r.type==='C';}).forEach(function(composite){
      (composite.children||[]).forEach(function(child){
        if(!singleToComposites[child]) singleToComposites[child]=[];
        singleToComposites[child].push(composite.name);
      });
    });

    ra.roles.forEach(function(role){
      // For each transaction this role grants, emit one row.
      // Skip composite roles in this iteration — single roles carry the actual auth.
      if(role.type==='C') return;
      var compositeParents = singleToComposites[role.name] || [''];
      var tcodesToEmit;
      if(role.hasFullTcodeAccess){
        tcodesToEmit = [{tc:'*', desc:'ALL TRANSACTIONS — wildcard S_TCODE = *', sensitive:'Yes (wildcard)'}];
      } else {
        tcodesToEmit = (role.tcodes||[]).map(function(t){
          var isSensitive = (typeof ROLE_SENSITIVE_TCODES !== 'undefined' && ROLE_SENSITIVE_TCODES.has(t)) ? 'Yes' : '';
          return {tc:t, desc:'', sensitive:isSensitive};
        });
      }
      // Cap per-role emission to keep file sane: 500 t-codes max per single role
      if(tcodesToEmit.length > 500) tcodesToEmit = tcodesToEmit.slice(0,500);
      compositeParents.forEach(function(compName){
        tcodesToEmit.forEach(function(t){
          rmRows.push([
            '',                            // Business Process — for manual fill
            sid,                           // System ID
            compName,                      // Composite Role (or '' if standalone single)
            '',                            // Composite Description
            role.name,                     // Single Role
            role.isDisplay?'(display/view role)':'',  // Single Description
            t.tc,                          // T-code
            t.desc,                        // T-code Description (would need TSTC upload)
            '',                            // High
            '',                            // High Description
            'Transaction',                 // Type
            t.sensitive,                   // Sensitive
            '',                            // Status
            '',                            // Topdesk
            ''                             // Comment
          ]);
        });
      });
    });

    var ws4 = XLSX.utils.aoa_to_sheet(clipRows(rmRows), {dense:true});
    ws4['!cols'] = [{wch:22},{wch:8},{wch:30},{wch:32},{wch:36},{wch:32},{wch:22},{wch:36},{wch:14},{wch:22},{wch:13},{wch:11},{wch:10},{wch:10},{wch:24}];
    ws4['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws4, 'Role Mapping');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 5: ROLE MATRIX (WIDE — T-codes as rows, single roles as columns)
    // Row 0: blank, blank, role names...
    // Row 1: "Transaction", "Description", blanks
    // Row 2+: tcode, desc, X marks
    // CAP at top 250 roles (by user count or risk) and top 5000 distinct t-codes
    // to keep the file manageable.
    // ═══════════════════════════════════════════════════════════════════
    var singleRoles = ra.roles.filter(function(r){return r.type==='S';});
    // Order: roles with most users first, then roles with most t-codes
    singleRoles.sort(function(a,b){
      if(b.userCount !== a.userCount) return b.userCount - a.userCount;
      return (b.tcodeCount===-1?99999:b.tcodeCount) - (a.tcodeCount===-1?99999:a.tcodeCount);
    });
    var roleCap = Math.min(250, singleRoles.length);
    var rolesForMatrix = singleRoles.slice(0, roleCap);

    // Build the universe of t-codes appearing across the chosen roles
    var tcodeSet = new Set();
    rolesForMatrix.forEach(function(role){
      if(role.hasFullTcodeAccess) return;  // wildcard roles don't contribute specific t-codes
      (role.tcodes||[]).forEach(function(t){tcodeSet.add(t);});
    });
    var allTcodes = [...tcodeSet].sort();
    if(allTcodes.length > 5000) allTcodes = allTcodes.slice(0, 5000);

    // Header rows
    var matrixRows = [];
    var headerRow = ['', ''];
    rolesForMatrix.forEach(function(role){headerRow.push(role.name);});
    matrixRows.push(headerRow);
    var secondRow = ['Transaction', 'Description'];
    rolesForMatrix.forEach(function(){secondRow.push('');});
    matrixRows.push(secondRow);

    // Special wildcard row at the top: t-code "*" with X under any wildcard-access role
    var hasAnyWildcard = rolesForMatrix.some(function(r){return r.hasFullTcodeAccess;});
    if(hasAnyWildcard){
      var wildRow = ['*', 'ALL TRANSACTIONS (S_TCODE = *)'];
      rolesForMatrix.forEach(function(role){wildRow.push(role.hasFullTcodeAccess ? 'X' : '');});
      matrixRows.push(wildRow);
    }

    // Build a per-role t-code Set lookup for fast membership tests
    var roleTcodeSets = rolesForMatrix.map(function(role){
      if(role.hasFullTcodeAccess) return null;  // null means "wildcard, every tcode is X"
      return new Set(role.tcodes||[]);
    });

    allTcodes.forEach(function(tc){
      var row = [tc, ''];  // description column — could fill from TSTC if uploaded
      rolesForMatrix.forEach(function(role, idx){
        var set = roleTcodeSets[idx];
        row.push(set===null ? 'X' : (set.has(tc) ? 'X' : ''));
      });
      matrixRows.push(row);
    });

    var ws5 = XLSX.utils.aoa_to_sheet(clipRows(matrixRows), {dense:true});
    var cols5 = [{wch:18},{wch:32}];
    for(var i=0;i<rolesForMatrix.length;i++) cols5.push({wch:11});
    ws5['!cols'] = cols5;
    ws5['!freeze'] = {xSplit:2, ySplit:2};
    XLSX.utils.book_append_sheet(wb, ws5, 'Role Matrix');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 6: OBJECT LEVEL MAPPING — auth detail per single role
    // Columns: Single Role | Description | Authorization OBJECT | Description |
    //          FIELD | LOW | HIGH | MODIFIED | DELETED | COPIED | NEU | NODE
    // ═══════════════════════════════════════════════════════════════════
    var OBJ_ROW_CAP = 100000;  // keep the sheet within browser memory limits
    var objRows = [['Single Role','Description','Authorization OBJECT','Description','FIELD','LOW','HIGH','MODIFIED','DELETED','COPIED','NEU','NODE']];
    var objTruncated = false;
    // Prioritise: roles WITH findings first (the audit-relevant ones), then the rest
    var orderedRoles = ra.roles.filter(function(r){return r.type==='S' && r.findings.length>0;})
      .concat(ra.roles.filter(function(r){return r.type==='S' && r.findings.length===0;}));
    outer:
    for(var ri=0; ri<orderedRoles.length; ri++){
      var role = orderedRoles[ri];
      var triples = role.authTriples||[];
      for(var ti=0; ti<triples.length; ti++){
        if(objRows.length > OBJ_ROW_CAP){objTruncated = true; break outer;}
        var t = triples[ti];
        objRows.push([
          role.name, role.isDisplay?'(display/view role)':'',
          t.obj, '',
          t.field, t.value,
          '', '', '', '', '', ''
        ]);
      }
    }
    if(objTruncated){
      objRows.push(['... TRUNCATED at '+OBJ_ROW_CAP.toLocaleString()+' rows. Roles with findings are included first. Re-export with fewer roles or request the full extract via JSON export.','','','','','','','','','','','']);
    }
    var ws6 = XLSX.utils.aoa_to_sheet(clipRows(objRows), {dense:true});
    ws6['!cols'] = [{wch:36},{wch:28},{wch:18},{wch:30},{wch:14},{wch:20},{wch:18},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
    ws6['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws6, 'Object Level Mapping');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 7: SENSITIVE TRANSACTION list
    // ═══════════════════════════════════════════════════════════════════
    var senTcodeRows = [['Transaction','Description','Sensitivity Reason']];
    if(typeof ROLE_SENSITIVE_TCODES !== 'undefined'){
      [...ROLE_SENSITIVE_TCODES].sort().forEach(function(tc){
        senTcodeRows.push([tc, '', 'Standard SAP sensitive transaction (privileged access / audit-tracked)']);
      });
    }
    var ws7 = XLSX.utils.aoa_to_sheet(clipRows(senTcodeRows), {dense:true});
    ws7['!cols'] = [{wch:18},{wch:36},{wch:60}];
    ws7['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws7, 'Sensitive Transaction');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 8: SENSITIVE OBJECTS — auth objects that warrant extra scrutiny
    // ═══════════════════════════════════════════════════════════════════
    var sensitiveObjects = ['B_BUPA_GRP','F_BKPF_BLA','F_BKPF_BUK','F_BKPF_GSB','F_BKPF_KOA','F_KNA1_APP','F_KNA1_BED','F_LFA1_APP','F_LFA1_BEK','F_LFA1_BUK','F_REGU_BUK','F_REGU_KOA','M_BANF_BSA','M_BANF_EKG','M_BANF_EKO','M_BANF_FRG','M_BANF_WRK','M_BEST_BSA','M_BEST_EKG','M_BEST_EKO','M_BEST_WRK','M_MATE_BUK','M_MATE_MAR','M_MATE_MAT','M_MATE_STA','M_MATE_VKO','M_MATE_WRK','M_MSEG_BMB','M_MSEG_BWA','M_MSEG_BWE','M_MSEG_LGO','M_MSEG_WMB','M_MSEG_WWA','M_MSEG_WWE','S_DEVELOP','S_TCODE','S_TABU_DIS','S_TABU_NAM','S_TABU_LIN','S_TABU_CLI','S_USER_AGR','S_USER_AUT','S_USER_GRP','S_USER_OBJ','S_USER_PRO','S_USER_SAS','S_USER_SYS','S_USER_TCD','S_USER_VAL'];
    var senObjRows = [['Authorization Object'], ...sensitiveObjects.map(function(o){return [o];})];
    var ws8 = XLSX.utils.aoa_to_sheet(clipRows(senObjRows), {dense:true});
    ws8['!cols'] = [{wch:22}];
    ws8['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws8, 'Sensitive Objects');

    // ═══════════════════════════════════════════════════════════════════
    // Additional BCS sheets (kept for our own findings)
    // ═══════════════════════════════════════════════════════════════════
    // BCS Findings (plain English)
    var fdgRows = [['Role','Role Type','Users Affected','Severity','Issue (plain English)','What This Means','Detected Evidence']];
    ra.roles.forEach(function(role){
      role.findings.forEach(function(f){
        fdgRows.push([role.name, role.type==='C'?'Composite':'Single', role.userCount, f.sev, f.label || f.kind, f.plain||'', f.detail||'']);
      });
    });
    var ws9 = XLSX.utils.aoa_to_sheet(clipRows(fdgRows), {dense:true});
    ws9['!cols'] = [{wch:36},{wch:11},{wch:11},{wch:9},{wch:48},{wch:80},{wch:80}];
    ws9['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws9, 'BCS Findings');

    // Fiori App Mapping sheet
    var singleToComposite_exp = {};
    agrAgrsRows && agrAgrsRows.forEach(function(row){
      var parent=String(col(row,'AGR_NAME')||'').trim();
      var child=String(col(row,'CHILD_AGR')||'').trim();
      if(parent&&child){if(!singleToComposite_exp[child])singleToComposite_exp[child]=[];singleToComposite_exp[child].push(parent);}
    });
    var fioriMapRows = [['Single Role','Composite Role(s)','Has Fiori Access (/UI2/FLP)','Fiori App Components','Fiori OData Services','Service Classes','Users on Role','Risk Level']];
    ra.roles.forEach(function(role){
      if(!role.hasFioriAccess && (!role.fioriApps||role.fioriApps.length===0) && (!role.fioriServices||role.fioriServices.length===0)) return;
      var compList=(singleToComposite_exp[role.name]||[]).slice(0,5).join(', ');
      var riskTier = role.risk>=10?'CRITICAL':role.risk>=5?'HIGH':role.risk>=2?'MEDIUM':'LOW';
      fioriMapRows.push([
        role.name, compList,
        role.hasFioriAccess?'Yes':'No',
        clipCell((role.fioriApps||[]).slice(0,20).join(', ')),
        clipCell((role.fioriServices||[]).slice(0,20).join(', ')),
        clipCell((role.fioriServiceClasses||[]).slice(0,20).join(', ')),
        role.userCount, riskTier
      ]);
    });
    var ws_fiori = XLSX.utils.aoa_to_sheet(clipRows(fioriMapRows), {dense:true});
    ws_fiori['!cols'] = [{wch:36},{wch:40},{wch:22},{wch:50},{wch:50},{wch:50},{wch:9},{wch:10}];
    ws_fiori['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws_fiori, 'Fiori App Mapping');

    // Naming Convention
    var conv = ra.convention;
    var convRows = [['Segment Position','Kind','Dominant Token','Dominance %','Unique Values','Sample Values']];
    if(conv && conv.segments){
      conv.segments.forEach(function(seg, idx){
        convRows.push([idx+1, seg.type, seg.token||'', seg.share?Math.round(seg.share*100):'', seg.uniqueValues||'', (seg.samples||[]).join(', ')]);
      });
    }
    var ws10 = XLSX.utils.aoa_to_sheet(clipRows(convRows), {dense:true});
    ws10['!cols'] = [{wch:16},{wch:14},{wch:18},{wch:13},{wch:14},{wch:60}];
    XLSX.utils.book_append_sheet(wb, ws10, 'Naming Convention');

    // Summary
    var s = ra.summary;
    var summaryRows = [
      ['Metric','Value'],
      ['Total roles analysed', s.total],
      ['Single roles', s.single],
      ['Composite roles', s.composite],
      ['SAP-delivered roles', s.sap],
      ['Customer Z-namespace roles', s.customZ],
      ['Customer Y-namespace roles', s.customY],
      ['Roles with any finding', s.withFindings],
      ['Display-named roles with maintenance access', s.displayWithMaint],
      ['Roles granting full transaction access (S_TCODE = *)', s.withWildcards],
      ['Roles containing sensitive transactions', s.withSensitive],
      ['Roles with role-level SoD conflicts', s.withRoleSod],
      ['Roles deviating from naming convention', s.nameDeviations],
    ];
    var ws11 = XLSX.utils.aoa_to_sheet(clipRows(summaryRows), {dense:true});
    ws11['!cols'] = [{wch:55},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws11, 'Summary');

    var fname = 'BCS_Role_Matrix_'+custLabel+'_'+stamp+'.xlsx';
    XLSX.writeFile(wb, fname, {bookSST:true, compression:true});
    toast('Role matrix exported: '+fname,'ok');
  } catch(e){
    toast('Excel export failed: '+e.message,'err');
    console.error(e);
  }
}

// ───────────────────────────────────────────────────────────────────────
// License Detail Report — User-level + Role-level Excel export
// ───────────────────────────────────────────────────────────────────────
async function exportLicenseReportXLSX(){
  var r = App.results;
  if(!r){toast('Run an analysis first','warn');return;}
  if(!r.license || r.license.length===0){toast('No license analysis available — enable the License module and re-run.','warn');return;}
  toast('Building License Detail Excel...','info');
  try {
    var XLSX = await ensureXLSX();
    var wb = XLSX.utils.book_new();

    var cust = (typeof getActiveCustomer==='function') ? getActiveCustomer() : null;
    var custName = cust ? cust.name : 'Customer';
    var custLabel = cust ? cust.name.replace(/[^A-Za-z0-9]/g,'_') : 'customer';
    var stamp = new Date().toISOString().slice(0,10);
    var sid = r.system && r.system.sid ? r.system.sid : 'SAP';

    // Index license tier by user
    var userLicense = {};
    r.license.forEach(function(l){userLicense[l.user]=l;});

    // Get the user-role-tcode detail (already produced by runUnused)
    var detail = (r.unused && r.unused.detail) || [];
    // Get per-user-per-tcode usage counts
    var usedCount = (r.unused && r.unused.usedCount) || {};

    // Build AGR_DEFINE lookup for derived role -> master role (PARENT_AGR)
    // Also AGR_AGRS for composite -> children
    var data = r._raw || {};
    var agrDefineRows = (data.AGR_DEFINE && data.AGR_DEFINE.rows) || [];
    var agrAgrsRows   = (data.AGR_AGRS && data.AGR_AGRS.rows)   || [];

    // Map: single role -> parent (derived from / master role)
    var derivedToMaster = {};
    agrDefineRows.forEach(function(row){
      var name = String(col(row,'AGR_NAME')||'').trim();
      var parent = String(col(row,'PARENT_AGR')||col(row,'PARENT')||'').trim();
      if(name && parent) derivedToMaster[name] = parent;
    });

    // Map: single role -> composite parent
    var singleToComposite = {};
    agrAgrsRows.forEach(function(row){
      var parent = String(col(row,'AGR_NAME')||'').trim();
      var child  = String(col(row,'CHILD_AGR')||'').trim();
      if(parent && child){
        if(!singleToComposite[child]) singleToComposite[child] = [];
        singleToComposite[child].push(parent);
      }
    });

    // ═══════════════════════════════════════════════════════════════════
    // Helper: usage tier classification
    //   High >= 10 executions, Med 3-9, Low 1-2, None = 0 (unused)
    // ═══════════════════════════════════════════════════════════════════
    function usageTier(count){
      if(count >= 10) return 'High';
      if(count >= 3)  return 'Medium';
      if(count >= 1)  return 'Low';
      return 'Unused';
    }

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 1: USER-LEVEL DETAIL
    // One row per (user, granting role, t-code).
    // Cols: User ID | User Name | Email ID | Composite Role | Derived Role | Transaction | Auth Object | Value | Usage | License | Recommendation | Master Role
    // ═══════════════════════════════════════════════════════════════════
    var userHeaders = ['User ID','User Name','Email ID','Composite Role','Single Role / Derived Role','Transaction','Authorization Object','Value','Usage (High/Medium/Low)','Execution Count','License','License Tier Description','Recommendation','Master Role'];
    var userRows = [userHeaders];

    // Build per-user aggregated stats first (for recommendation reasoning)
    var userStats = {};  // user -> {total, high, med, low, unused, license}
    detail.forEach(function(d){
      if(!userStats[d.user]) userStats[d.user] = {total:0,high:0,med:0,low:0,unused:0,user:d.user};
      var t = usageTier(d.usageCount||0);
      userStats[d.user].total++;
      if(t==='High')   userStats[d.user].high++;
      else if(t==='Medium') userStats[d.user].med++;
      else if(t==='Low') userStats[d.user].low++;
      else userStats[d.user].unused++;
    });

    // Per-user recommendation
    function userRecommendation(stat, license){
      if(!stat) return 'Insufficient usage data — review manually';
      var pct = stat.total>0 ? Math.round(((stat.high+stat.med+stat.low) / stat.total)*100) : 0;
      var hasActiveUse = (stat.high + stat.med) > 0;
      if(license==='GB' || license==='Professional'){
        if(!hasActiveUse) return 'Downgrade — Professional license but zero High/Medium usage observed; consider Functional/Productivity tier';
        if(stat.high < 3) return 'Review — Professional license with only '+stat.high+' frequently-used transactions; downgrade may be possible';
        return 'Retain — Professional license justified by '+stat.high+' high-usage transactions';
      }
      if(license==='GC' || license==='Functional'){
        if(!hasActiveUse) return 'Downgrade — Functional license but no observed usage; consider Productivity or ESS tier';
        return 'Retain — Functional license justified by current usage';
      }
      if(!hasActiveUse) return 'Review — assigned but unused; lock dormant account or remove role assignment';
      return 'Retain — license appears appropriate for observed usage';
    }

    // Emit rows. For each detail row, look up license + roles + master.
    detail.forEach(function(d){
      var lic = userLicense[d.user];
      var licenseCode = lic ? lic.license : 'GE';
      var licenseName = lic ? lic.licenseName : 'Employee Self-Service';
      var licenseDesc = lic ? lic.licenseDesc : '';
      var stat = userStats[d.user];
      var tier = usageTier(d.usageCount||0);
      var rec = userRecommendation(stat, licenseCode);
      // Role-side: d.roles is a comma-joined list. Pick the first granting role.
      var firstRole = (d.roles||'').split(',').map(function(s){return s.trim();}).filter(Boolean)[0] || '';
      // Determine composite parent for the granting role
      var composites = singleToComposite[firstRole] || [];
      var compositeRole = composites.length>0 ? composites[0] : '';  // primary composite only — full mapping in Composite-Single sheet
      // Determine master role (if firstRole is derived)
      var masterRole = derivedToMaster[firstRole] || '';
      userRows.push([
        d.user,                            // User ID
        '',                                // User Name (not in USR02)
        '',                                // Email ID (would need ADR6/USR21)
        compositeRole,                     // Composite Role
        firstRole,                         // Single / Derived Role (the role that granted this t-code to this user)
        d.tcode,                           // Transaction
        'S_TCODE',                         // Auth Object (this row is about transaction access)
        d.tcode,                           // Value (the t-code value itself)
        tier,                              // Usage tier
        d.usageCount || 0,                 // raw execution count
        licenseCode,                       // License code
        licenseName + (licenseDesc?(' — '+licenseDesc):''),  // License tier description
        rec,                               // Recommendation
        masterRole                         // Master Role (PARENT_AGR if this is a derived role)
      ]);
    });

    // If no detail rows (no SM20 / no AGR_USERS uploaded), fall back to a per-user summary
    if(userRows.length === 1){
      r.license.forEach(function(l){
        userRows.push([l.user,'','','',(l.roles||'').split(',')[0]||'','','','','','','',l.license,l.licenseName,'No SM20/AGR_USERS data — usage tier not derivable','']);
      });
    }

    var ws1 = XLSX.utils.aoa_to_sheet(clipRows(userRows), {dense:true});
    ws1['!cols'] = [
      {wch:14},{wch:22},{wch:28},{wch:32},{wch:32},{wch:18},
      {wch:18},{wch:20},{wch:14},{wch:13},{wch:9},{wch:36},{wch:60},{wch:32}
    ];
    ws1['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws1, 'User-Level License Detail');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 2: ROLE-LEVEL CONSOLIDATED
    // Cols: Composite Role | Single Role | Derived Role (parent) | # Users Assigned | Usage Consolidated | License | Recommendation
    // ═══════════════════════════════════════════════════════════════════
    var roleHeaders = ['Composite Role','Single Role','Master Role (if Derived)','# Users Assigned','Usage (Consolidated)','High Usage Users','Medium Usage Users','Low Usage Users','Unused Users','License Tier (most-privileged user)','Recommendation'];
    var roleRows = [roleHeaders];

    // Build per-role aggregation. For each role in the role analysis:
    //   - Count assigned users
    //   - For each user on the role, look up their (user, tcode) detail rows for THIS role
    //     and aggregate the usage tier of the highest-used t-code that came from this role
    //   - Determine most-privileged license tier among users on the role
    var ra = r.roleAnalysis;
    if(ra && ra.roles){
      // Build role -> userList (already on each role object as role.users)
      // Pre-index detail by (user, role) to know which tcodes came from which role
      var byUserRole = {};  // "user|role" -> [{tcode, usageCount}]
      detail.forEach(function(d){
        (d.roles||'').split(',').map(function(s){return s.trim();}).filter(Boolean).forEach(function(role){
          var k = d.user+'|'+role;
          if(!byUserRole[k]) byUserRole[k] = [];
          byUserRole[k].push({tcode:d.tcode, usageCount:d.usageCount||0});
        });
      });

      ra.roles.forEach(function(role){
        if(!role.users || role.users.length===0) return;  // skip unassigned roles
        var composites = singleToComposite[role.name] || [];
        var master = derivedToMaster[role.name] || '';
        var singleCell = role.type==='C' ? '' : role.name;

        // Aggregate per user
        var userBuckets = {High:0, Medium:0, Low:0, Unused:0};
        var maxLicenseRank = 999, maxLicense = 'GE', maxLicenseName = 'Employee Self-Service';
        role.users.forEach(function(u){
          var lic = userLicense[u];
          if(lic){
            var rank = LICENSE_RANK[lic.license] || 99;
            if(rank < maxLicenseRank){maxLicenseRank=rank; maxLicense=lic.license; maxLicenseName=lic.licenseName;}
          }
          var rowsForUserRole = byUserRole[u+'|'+role.name] || [];
          // Per-user usage tier on this role = the MAX usage tier across the tcodes this role granted
          var maxTier = 'Unused';
          var maxCount = 0;
          rowsForUserRole.forEach(function(d){if(d.usageCount > maxCount) maxCount = d.usageCount;});
          maxTier = usageTier(maxCount);
          userBuckets[maxTier]++;
        });

        // Consolidated tier label
        var consolidated;
        if(userBuckets.High >= userBuckets.Medium && userBuckets.High >= userBuckets.Low && userBuckets.High > 0) consolidated = 'High (predominantly)';
        else if(userBuckets.Medium > 0 && userBuckets.Medium >= userBuckets.Low) consolidated = 'Medium (predominantly)';
        else if(userBuckets.Low > 0) consolidated = 'Low (predominantly)';
        else consolidated = 'Unused';

        // Role-level recommendation
        var rec;
        var totalUsers = role.users.length;
        var activeUsers = userBuckets.High + userBuckets.Medium + userBuckets.Low;
        if(activeUsers === 0){
          rec = 'Remove or lock — role has '+totalUsers+' assignees but none actively use the transactions it grants';
        } else if(userBuckets.Unused > 0.5 * totalUsers){
          rec = 'Review assignments — '+userBuckets.Unused+' of '+totalUsers+' users do not use this role; consider removing from inactive users';
        } else if(maxLicense==='GB' && userBuckets.High < 2){
          rec = 'Downgrade candidate — role triggers Professional license but only '+userBuckets.High+' high-usage user(s)';
        } else if(role.hasFullTcodeAccess){
          rec = 'CRITICAL — role grants S_TCODE = * (universal access); restrict to a small named privileged group only';
        } else if(role.findings && role.findings.some(function(f){return f.kind==='DISPLAY_MAINTENANCE';})){
          rec = 'Rename or restrict — display-named role actually grants Change/Create/Delete; users may not realize the privilege level';
        } else {
          rec = 'Retain — role usage and license tier appear appropriate';
        }

        // ONE ROW PER (COMPOSITE, SINGLE) PAIR — never club composites into one cell.
        // A single role inside 3 composites gets 3 rows; standalone roles get one row with blank composite.
        var emitComposites = composites.length>0 ? composites : [role.type==='C' ? role.name : ''];
        emitComposites.forEach(function(compName){
          roleRows.push([
            compName, singleCell, master,
            totalUsers, consolidated,
            userBuckets.High, userBuckets.Medium, userBuckets.Low, userBuckets.Unused,
            maxLicense + ' — ' + maxLicenseName,
            rec
          ]);
        });
      });
    }

    var ws2 = XLSX.utils.aoa_to_sheet(clipRows(roleRows), {dense:true});
    ws2['!cols'] = [
      {wch:32},{wch:36},{wch:32},{wch:9},{wch:22},{wch:8},{wch:8},{wch:8},{wch:8},{wch:36},{wch:80}
    ];
    ws2['!freeze'] = {xSplit:0, ySplit:1};
    XLSX.utils.book_append_sheet(wb, ws2, 'Role-Level License Consolidated');

    // ═══════════════════════════════════════════════════════════════════
    // Sheet 3: COVER / metadata
    // ═══════════════════════════════════════════════════════════════════
    var coverData = [
      [],[],
      ['', 'License Measurement Report'],
      [],
      ['', 'Customer:', custName],
      ['', 'System:', sid],
      ['', 'Environment:', (r.system && r.system.env) || ''],
      ['', 'Generated:', new Date().toLocaleString()],
      ['', 'Generated by:', 'BCS SAP Secure Studio'],
      [],
      ['', 'Total users analysed:', r.license.length],
      ['', 'Total user-role-tcode rows:', detail.length],
      ['', 'Total roles consolidated:', (ra && ra.roles)?ra.roles.filter(function(rl){return rl.users && rl.users.length>0;}).length:0],
      [],
      ['', 'Usage tier definition:'],
      ['', '', 'High',   '≥ 10 executions in SM20 audit window'],
      ['', '', 'Medium', '3–9 executions'],
      ['', '', 'Low',    '1–2 executions'],
      ['', '', 'Unused', '0 executions (assigned but never used)'],
      [],
      ['', 'Caveats:'],
      ['', '', 'User Name and Email ID columns are blank if ADR6 / USR21 data is not uploaded.'],
      ['', '', 'Master Role column is populated only if AGR_DEFINE.PARENT_AGR is uploaded.'],
      ['', '', 'Composite Role column is populated only if AGR_AGRS is uploaded.'],
      ['', '', 'Usage data requires SM20 audit log upload.']
    ];
    var ws3 = XLSX.utils.aoa_to_sheet(clipRows(coverData), {dense:true});
    ws3['!cols'] = [{wch:3},{wch:30},{wch:30},{wch:60}];
    XLSX.utils.book_append_sheet(wb, ws3, 'Cover');

    // Move Cover to be first sheet
    var names = wb.SheetNames;
    var coverIdx = names.indexOf('Cover');
    if(coverIdx > 0){
      names.splice(coverIdx,1);
      names.unshift('Cover');
      wb.SheetNames = names;
    }

    var fname = 'BCS_License_Detail_'+custLabel+'_'+stamp+'.xlsx';
    XLSX.writeFile(wb, fname, {bookSST:true, compression:true});
    toast('License detail exported: '+fname,'ok');
  } catch(e){
    toast('License export failed: '+e.message,'err');
    console.error(e);
  }
}


function exportRoleFindingsCSV(){
  var r = App.results;
  if(!r || !r.roleAnalysis){toast('No role analysis to export','warn');return;}
  var ra = r.roleAnalysis;
  var rows = [['Role','Type','Users','Finding Kind','Severity','Detail']];
  ra.roles.forEach(function(role){
    role.findings.forEach(function(f){
      rows.push([role.name, role.type, role.userCount, f.kind, f.sev, (f.detail||'').replace(/"/g,'""')]);
    });
  });
  var csv = rows.map(function(r){return r.map(function(c){var s=String(c); return s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0 ? '"'+s+'"' : s;}).join(',');}).join('\n');

      h.push('</div>');

  else if(tab==='existing'){
    h.push(renderRoleMatrixUploadSection());

  h.push('</div>');
  content.innerHTML = h.join('');
}

function renderRoleMatrixUploadSection(){
  var em = App.existingMatrix;

  h.push('<div style="margin-top:14px"><div class="panel" style="padding:16px;border-color:rgba(0,200,240,.18)">');

  h.push('<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">');
  h.push('<input type="file" id="existing-matrix-file" accept=".csv,.tsv,.txt" onchange="handleExistingMatrixUpload(event)" />');
  if(em){
    h.push('<span style="font-size:11px;color:var(--green2)">Loaded: '+em.length+' rows · '+em.headers.length+' columns</span>');
    h.push('<button class="btn btn-ghost btn-sm" onclick="App.existingMatrix=null;renderResRole();" style="color:var(--red)">Clear</button>');
  }
  h.push('</div>');
  h.push('</div></div>');
  if(em && em.length>0){
    h.push('<div style="margin-top:14px"><div style="font-weight:700;font-size:12.5px;color:var(--tx-1);margin-bottom:6px">Existing Matrix Preview (first 100 rows of '+em.length.toLocaleString()+')</div>');
    h.push('<div class="tbl-wrap" style="max-height:480px"><table><thead><tr>');
    em.headers.forEach(function(hd){h.push('<th>'+hd+'</th>');});
    h.push('</tr></thead><tbody>');
    em.rows.slice(0,100).forEach(function(row){
      h.push('<tr>');
      em.headers.forEach(function(hd){h.push('<td style="font-size:11px">'+(row[hd]||'')+'</td>');});
      h.push('</tr>');
    });
    h.push('</tbody></table></div></div>');
  }
  return h.join('');
}

function handleExistingMatrixUpload(ev){
  var f = ev.target.files && ev.target.files[0];
  if(!f) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var rows = parseCSV(e.target.result);
      if(rows.length===0){toast('No rows found in file','warn');return;}
      var headers = Object.keys(rows[0]);
      App.existingMatrix = {rows:rows, headers:headers, length:rows.length, fileName:f.name};
      toast('Role matrix loaded: '+rows.length+' rows','ok');
      renderResRole();
    } catch(err){toast('Failed to parse: '+err.message,'err');}
  };
  reader.readAsText(f);
}

// Generate a custom role design document
function generateCustomRoleDesign(appEntry, customPrefix, targetSystem){
  var customRoleId = (customPrefix||'Z').toUpperCase()+'_'+appEntry.module+'_'+appEntry.appId+'_CUSTOM';
  var customCatalogId = (customPrefix||'Z').toUpperCase()+'_'+appEntry.catalog.replace('SAP_','');
  return {
    customRoleId: customRoleId,
    customCatalogId: customCatalogId,
    basedOn: appEntry,
    design: {
      step1: 'Create a custom catalog ID "'+customCatalogId+'" by copying SAP standard catalog "'+appEntry.catalog+'" in Maintain Catalogs (F1541).',
      step2: 'In the copied catalog, retain only the tiles required for business scope. Remove tiles outside the authorised set.',
      step3: 'Create a custom business role "'+customRoleId+'" in Maintain Business Roles (F1534), based on SAP template "'+appEntry.bizRole+'".',
      step4: 'Assign the custom catalog "'+customCatalogId+'" to the custom business role.',
      step5: 'Configure restriction types on the business role for the "+appEntry.module+" module — limit organizational units, company codes, or cost centres as required.',
      step6: 'Use Simulate User Assignment (F1536) to validate that the role grants only the intended access before assigning to production users.',
      step7: 'Assign business role "'+customRoleId+'" to users via Maintain Business Users (F1366) or bulk via CSV upload.',
    },
    odata: appEntry.odata,
    scope: appEntry.scope,
    auditNote: 'Custom role "'+customRoleId+'" is a customer-specific derivative of SAP standard "'+appEntry.bizRole+'". Scope restricted to: '+appEntry.scope+'. Authorization check aligned to OData service "'+appEntry.odata+'".',
  };
}

// ── UI handlers ──
async function lookupFioriAppUI(){
  var input = (document.getElementById('fiori-app-input')||{}).value || '';
  var result = document.getElementById('fiori-lookup-result');
  if(!result) return;
  if(!input.trim()){result.innerHTML='<p style="color:var(--tx-5);font-size:12px">Enter an App ID or keyword.</p>';return;}
  result.innerHTML='<p style="color:var(--tx-5);font-size:12px">Searching...</p>';
  input = input.trim().toUpperCase();
  // Check local catalog first
  var found = FIORI_STANDARD_CATALOG.filter(function(a){
    return a.appId===input || a.name.toUpperCase().indexOf(input)>=0 || a.catalog.toUpperCase().indexOf(input)>=0;
  });
  // Also check system role analysis data
  var r = App.results;
  var systemRoles = [];
  if(r && r.roleAnalysis){
    systemRoles = (r.roleAnalysis.roles||[]).filter(function(rl){
      return (rl.fioriApps||[]).some(function(a){return a.toUpperCase().indexOf(input)>=0;}) ||
             (rl.fioriServices||[]).some(function(s){return s.toUpperCase().indexOf(input)>=0;});
    });
  }
  var h = [];
  if(found.length>0){
    h.push('<div style="margin-bottom:12px"><div style="font-size:10px;font-weight:700;color:var(--tx-5);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px">Standard SAP Catalog Reference ('+found.length+' match'+(found.length>1?'es':'')+')</div>');
    found.forEach(function(app){
      h.push('<div class="card" style="margin-bottom:10px;border-left:3px solid var(--accent)">');
      h.push('<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">');
      h.push('<span style="font-family:var(--mono);font-size:13px;font-weight:800;color:var(--accent)">'+app.appId+'</span>');
      h.push('<span style="font-size:13px;font-weight:700;color:var(--tx-1)">'+app.name+'</span>');
      h.push('<span style="font-size:9px;font-weight:700;background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3);border-radius:6px;padding:1px 7px;margin-left:auto">'+app.module+'</span>');
      h.push('</div>');
      h.push('<div class="g2" style="font-size:11px">');
      [['Standard Catalog',app.catalog,'var(--tx-3)'],['Standard Business Role',app.bizRole,'var(--yellow)'],['OData Service',app.odata,'var(--accent)'],['Scope',app.scope,'var(--green)']].forEach(function(row){
        h.push('<div><span style="color:var(--tx-5);font-size:9.5px;display:block;margin-bottom:2px">'+row[0]+'</span><span style="color:'+row[2]+';font-family:var(--mono);font-size:10.5px">'+row[1]+'</span></div>');
      });
      h.push('</div>');
      h.push('<div style="margin-top:10px;display:flex;gap:8px">');
      h.push('<button class="btn btn-ghost btn-sm" onclick="App._rmTab=\'design\';App._prefillApp=\''+app.appId+'\';renderRoleMgmt();setTimeout(function(){var el=document.getElementById(\'design-app-id\');if(el)el.value=\''+app.appId+'\';},100);">'+ic('sliders',11)+' Design Custom Role</button>');
      h.push('</div>');
      h.push('</div>');
    });
    h.push('</div>');
  }
  if(systemRoles.length>0){
    h.push('<div><div style="font-size:10px;font-weight:700;color:var(--tx-5);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px">Roles in Your System with this App ('+systemRoles.length+')</div>');
    systemRoles.slice(0,10).forEach(function(rl){
      h.push('<div style="padding:9px 12px;background:var(--bg-hover);border:1px solid var(--bd);border-radius:9px;margin-bottom:6px;display:flex;align-items:center;gap:10px">');
      h.push('<span style="font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--accent);flex:1">'+rl.name+'</span>');
      h.push('<span style="font-size:10px;color:var(--tx-5)">'+rl.userCount+' users</span>');
      h.push('<span style="font-size:9.5px;font-weight:700;color:'+(rl.risk>=5?'var(--red)':'var(--green)')+';background:'+(rl.risk>=5?'rgba(239,68,68,.1)':'rgba(34,197,94,.1)')+';border:1px solid '+(rl.risk>=5?'rgba(239,68,68,.3)':'rgba(34,197,94,.3)')+';border-radius:8px;padding:2px 8px">Risk '+rl.risk+'</span>');
      h.push('</div>');
    });
    h.push('</div>');
  }
  if(found.length===0&&systemRoles.length===0){
    h.push('<div class="card" style="text-align:center;padding:20px">');
    h.push('<p style="color:var(--tx-5);font-size:12.5px">No matches found for "'+input+'" in the standard catalog or system data.<br>Try a different App ID, keyword, or module name.</p>');
    h.push('</div>');
  }
  result.innerHTML = h.join('');
}

function checkCatalogActive(){
  var input=(document.getElementById('catalog-check-input')||{}).value||'';
  var result=document.getElementById('catalog-check-result');
  if(!result||!input.trim())return;
  input=input.trim().toUpperCase();
  var found=FIORI_STANDARD_CATALOG.filter(function(a){return a.catalog.toUpperCase().indexOf(input)>=0||a.bizRole.toUpperCase().indexOf(input)>=0||a.appId===input;});
  var h=[];
  if(found.length>0){
    h.push('<div style="padding:12px 14px;border-radius:10px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);margin-bottom:10px">');
    h.push(ic('check-circle',14,'var(--green)')+'&nbsp;<span style="color:var(--green);font-weight:700">Found in SAP Standard Catalog reference</span>');
    h.push('</div>');
    found.forEach(function(a){
      h.push('<div class="card" style="margin-bottom:8px">');
      h.push('<div style="font-weight:700;color:var(--tx-1)">'+a.appId+' — '+a.name+'</div>');
      h.push('<div style="font-size:11px;color:var(--tx-3);margin-top:5px">Catalog: '+a.catalog+' · Role: '+a.bizRole+'</div>');
      h.push('<div style="font-size:10.5px;color:var(--tx-5);margin-top:3px">OData: '+a.odata+' · Scope: '+a.scope+'</div>');
      h.push('</div>');
    });
    // Check in system role analysis data too
    var r=App.results;
    if(r&&r.roleAnalysis){
      var sysHas=(r.roleAnalysis.roles||[]).filter(function(rl){return rl.hasFioriAccess;});
      h.push('<div style="font-size:11px;color:var(--tx-5);margin-top:6px">'+ic('info',11,'var(--tx-5)')+'&nbsp;Your system has <b style="color:var(--tx-1)">'+sysHas.length+'</b> Fiori-enabled roles. Upload AGR_1251 and run Role Analysis for full catalog check.</div>');
    }
  } else {
    h.push('<div style="padding:12px 14px;border-radius:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25)">');
    h.push(ic('alert-triangle',14,'var(--red)')+'&nbsp;<span style="color:var(--red)">Not found in standard catalog reference — check the ID or consult SAP API Business Hub</span>');
    h.push('</div>');
  }
  result.innerHTML=h.join('');
}

function generateRoleDesignUI(){
  var appId=(document.getElementById('design-app-id')||{}).value||'';
  var prefix=(document.getElementById('design-prefix')||{}).value||'Z';
  var target=(document.getElementById('design-target')||{}).value||'Public Cloud';
  var out=document.getElementById('role-design-output');
  if(!out)return;
  appId=appId.trim().toUpperCase();
  if(!appId){out.innerHTML='<p style="color:var(--tx-5)">Enter an App ID.</p>';return;}
  var app=FIORI_STANDARD_CATALOG.find(function(a){return a.appId===appId;});
  if(!app){
    // Generate generic design
    app={appId:appId,name:'Custom App',catalog:'Z_CATALOG_'+appId,bizRole:'Z_BR_'+appId,odata:'Custom OData',scope:'Custom scope',module:'CUST'};
  }
  var design=generateCustomRoleDesign(app,prefix,target);
  var h=[];
  h.push('<div style="border-left:3px solid var(--accent);padding-left:14px">');
  h.push('<div style="font-size:13px;font-weight:800;color:var(--accent);margin-bottom:4px">'+design.customRoleId+'</div>');
  h.push('<div style="font-size:11px;color:var(--tx-5);margin-bottom:14px">Based on standard: '+app.bizRole+'</div>');
  h.push('<div style="font-size:10.5px;font-weight:700;color:var(--tx-5);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px">Custom Catalog ID</div>');
  h.push('<div style="font-family:var(--mono);font-size:12px;color:var(--accent);padding:6px 10px;background:var(--bg-input);border-radius:7px;margin-bottom:14px">'+design.customCatalogId+'</div>');
  h.push('<div style="font-size:10.5px;font-weight:700;color:var(--tx-5);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px">Implementation Steps</div>');
  var steps=Object.values(design.design);
  steps.forEach(function(step,i){
    h.push('<div style="display:flex;gap:10px;margin-bottom:9px;align-items:flex-start">');
    h.push('<div style="width:22px;height:22px;border-radius:6px;background:var(--accent-dim);border:1px solid var(--accent-rim);color:var(--accent);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</div>');
    h.push('<div style="font-size:12px;color:var(--tx-3);line-height:1.5">'+step+'</div>');
    h.push('</div>');
  });
  h.push('<div style="margin-top:14px;padding:10px 12px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:9px;font-size:11px;color:var(--tx-3);line-height:1.5">');
  h.push(ic('info',12,'var(--blue)')+'&nbsp;<strong>Audit Note:</strong> '+design.auditNote);
  h.push('</div>');
  h.push('</div>');
  out.innerHTML=h.join('');
}

// Build auth header from a stored connector config (handles all auth types + token fetch)
async function intBuildAuthHeader(conn){
  var am=conn.authType||'None';
  if(am==='None'||am==='') return {};
  if(am==='Bearer Token'&&conn.token) return {'Authorization':'Bearer '+conn.token};
  if(am==='API Key'&&conn.token) return {'Authorization':'ApiKey '+conn.token};
  if(am==='Basic'&&conn.username) return {'Authorization':'Basic '+btoa(conn.username+':'+(conn.password||''))};
  if(am==='Communication System User'&&conn.commUser) return {'Authorization':'Basic '+btoa(conn.commUser+':'+(conn.commPass||conn.password||''))};
  if((am==='OAuth2 Client Credentials')&&conn.tokenUrl&&conn.clientId){
    // Fetch token — use relay/proxy if needed
    var creds=btoa(conn.clientId+':'+(conn.clientSecret||''));
    try{
      var tr=await sapPublicFetch(conn.tokenUrl,
        {'Authorization':'Basic '+creds,'Content-Type':'application/x-www-form-urlencoded','X-Method':'POST','X-Body':'grant_type=client_credentials'+(conn.scopes?'&scope='+encodeURIComponent(conn.scopes):'')},
        'TokenFetch');
      if(tr.access_token) return {'Authorization':'Bearer '+tr.access_token};
    }catch(e){
      // Fall back to direct fetch for token endpoint
      try{
        var tr2=await fetch(conn.tokenUrl,{method:'POST',headers:{'Authorization':'Basic '+creds,'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=client_credentials'+(conn.scopes?'&scope='+encodeURIComponent(conn.scopes):'')});
        if(tr2.ok){var td=await tr2.json();if(td.access_token)return {'Authorization':'Bearer '+td.access_token};}
        else throw new Error('Token endpoint HTTP '+tr2.status);
      }catch(e2){throw new Error('OAuth2 token fetch failed: '+e2.message);}
    }
  }
  return {};
}

// Direct API call from connector — used by flow execution and quick test
async function intConnectorFetch(conn, path, method){
  var baseUrl=(conn.baseUrl||'').replace(/\/$/,'');
  var url=baseUrl+path;
  var authHdr=await intBuildAuthHeader(conn);
  // Store credentials for relay tab fallback
  window._lastSysCreds={
    authMethod: conn.authType==='Basic'||conn.authType==='Communication System User'?'basic':'oauth',
    tokenUrl:conn.tokenUrl||'', clientId:conn.clientId||'', clientSecret:conn.clientSecret||'',
    scopes:conn.scopes||'', commUser:conn.commUser||conn.username||'', commPass:conn.commPass||conn.password||'',
    apiUrl:baseUrl,
  };
  return sapPublicFetch(url, authHdr, path);
}

async function intRunTest(conn){
  var url=conn.baseUrl;
  if(!url) throw new Error('No base URL configured');
  var pingPath='/';
  if(conn.type==='SCIM')    pingPath='/Users?count=1';
  else if(conn.type==='SAP_IAM') pingPath='/sap/opu/odata/IWFND/CATALOGSERVICE;v=2/ServiceCollection?$format=json&$top=1';
  else if(conn.type==='OData2'||conn.type==='OData4') pingPath=(conn.servicePath||'')||'/sap/opu/odata/IWFND/CATALOGSERVICE;v=2/ServiceCollection?$format=json&$top=1';
  var resp=await intConnectorFetch(conn, pingPath, 'GET');
  var rowHint=resp.value?(resp.value.length+' services'):resp.d&&resp.d.results?(resp.d.results.length+' items'):'OK';
  return 'Connected — '+rowHint;
}

// ── Flow drag/drop ─────────────────────────────────────────────────
function intDropNode(event){
  event.preventDefault();
  var type=event.dataTransfer&&event.dataTransfer.getData('ntype');
  var cat=event.dataTransfer&&event.dataTransfer.getData('ncat');
  if(!type||!INT_STATE.editingFlow) return;
  var canvas=document.getElementById('flow-canvas');
  var rect=canvas.getBoundingClientRect();
  var x=Math.round(event.clientX-rect.left-80);
  var y=Math.round(event.clientY-rect.top-30);
  if(!INT_STATE.editingFlow.nodes) INT_STATE.editingFlow.nodes=[];
  INT_STATE.editingFlow.nodes.push({type:type,cat:cat,x:Math.max(10,x),y:Math.max(10,y),config:{}});
  renderIntegrations();
}

function intInitCanvas(){
  // Attach dragstart to palette nodes after render
  setTimeout(function(){
    var pals=document.querySelectorAll('.palette-node');
    pals.forEach(function(el){
      el.addEventListener('dragstart',function(e){
        e.dataTransfer.setData('ntype',el.dataset.ntype);
        e.dataTransfer.setData('ncat',el.dataset.ncat);
      });
    });
  },100);
}

var _dragNode=null,_dragOx=0,_dragOy=0;
function intNodeDragStart(e,ni){
  _dragNode=ni; _dragOx=e.clientX; _dragOy=e.clientY;
  var fn=document.getElementById('fn-'+ni);
  if(!fn) return;
  var startX=parseInt(fn.style.left)||0; var startY=parseInt(fn.style.top)||0;
  function onMove(ev){
    var dx=ev.clientX-_dragOx; var dy=ev.clientY-_dragOy;
    fn.style.left=(startX+dx)+'px'; fn.style.top=(startY+dy)+'px';
  }
  function onUp(ev){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    if(INT_STATE.editingFlow&&INT_STATE.editingFlow.nodes[ni]){
      INT_STATE.editingFlow.nodes[ni].x=Math.max(0,parseInt(fn.style.left)||0);
      INT_STATE.editingFlow.nodes[ni].y=Math.max(0,parseInt(fn.style.top)||0);
    }
    _dragNode=null;
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

function intSelectNode(ni){INT_STATE._selectedNode=ni;renderIntegrations();}
function intDeleteNode(ni){
  if(INT_STATE.editingFlow&&INT_STATE.editingFlow.nodes) INT_STATE.editingFlow.nodes.splice(ni,1);
  INT_STATE._selectedNode=null;
  renderIntegrations();
}

function intNewFlow(){
  INT_STATE.editingFlow={id:'flow_'+Date.now(),name:'New Flow',nodes:[],connections:[],createdAt:Date.now()};
  INT_STATE._selectedNode=null;
  renderIntegrations();
}
function intEditFlow(fi){
  INT_STATE.editingFlow=JSON.parse(JSON.stringify(INT_STATE.flows[fi]));
  INT_STATE.editingFlow._fi=fi;
  INT_STATE._selectedNode=null;
  renderIntegrations();
}
function intDeleteFlow(fi){
  if(!confirm('Delete flow "'+INT_STATE.flows[fi].name+'"?'))return;
  INT_STATE.flows.splice(fi,1);
  intSave();renderIntegrations();
}
function intSaveFlow(){
  var f=INT_STATE.editingFlow;
  if(!(f.name||'').trim()){toast('Enter a flow name','warn');return;}
  if(f._fi!==undefined){INT_STATE.flows[f._fi]=f;}
  else {INT_STATE.flows.push(f);}
  intSave();
  toast('Flow saved','ok');
  INT_STATE.editingFlow=null;
  renderIntegrations();
}

// ── Flow execution engine ─────────────────────────────────────────
async function intRunFlow(fi){
  var flow=INT_STATE.flows[fi];
  flow._status='running';intSave();renderIntegrations();
  INT_STATE.tab='test';renderIntegrations();
  try{
    await intExecuteFlow(flow);
    flow._status='done';flow.lastRun=Date.now();
  }catch(e){
    flow._status='error';
    INT_STATE.runLog.push({type:'err',msg:'Flow failed: '+e.message});
  }
  intSave();renderIntegrations();
}
async function intRunEditingFlow(){
  var flow=INT_STATE.editingFlow;
  if(!flow){toast('No flow to run','warn');return;}
  intSaveFlow();
  var fi=INT_STATE.flows.findIndex(function(f){return f.id===flow.id;});
  if(fi>=0) intRunFlow(fi);
}

async function intExecuteFlow(flow){
  INT_STATE.runLog=[];
  var logFn=function(msg,type){INT_STATE.runLog.push({type:type||'info',msg:msg,ts:Date.now()});};
  logFn('Starting flow: '+flow.name);
  var data=null;
  for(var ni=0;ni<(flow.nodes||[]).length;ni++){
    var node=flow.nodes[ni];
    var all=Object.assign({},FLOW_NODES.source,FLOW_NODES.transform,FLOW_NODES.output);
    var nd=all[node.type]||{label:node.type};
    logFn('Node '+( ni+1)+': '+nd.label);
    var conn=node.connector?INT_STATE.connectors.find(function(c){return c.name===node.connector;}):null;
    try{
      if(node.type==='sap-iam'||node.type==='api-request'||node.type==='odata-query'){
        if(!conn){logFn('  ⚠ No connector assigned — skipping','warn');continue;}
        var endpointPath=node.config&&node.config.endpoint||'';
        if(!endpointPath){logFn('  ⚠ No endpoint configured — skipping','warn');continue;}
        logFn('  → GET '+(conn.baseUrl||'')+endpointPath.slice(0,60));
        var resp;
        try{resp=await intConnectorFetch(conn,endpointPath,'GET');}
        catch(e){logFn('  ✗ '+e.message,'err');continue;}
        data=resp.value||(resp.d&&resp.d.results)||[];
        logFn('  ✓ '+data.length+' rows','ok');
      } else if(node.type==='scim-users'){
        if(!conn){logFn('  ⚠ No connector','warn');continue;}
        var r2=await intConnectorFetch(conn,'/Users?count=200&startIndex=1','GET');
        data=(r2.Resources||r2.value||[]);
        logFn('  ✓ '+data.length+' SCIM users','ok');
      } else if(node.type==='map-fields'){
        if(data&&node.config&&node.config.mapping){
          try{
            var map=JSON.parse(node.config.mapping);
            data=data.map(function(row){var out={};Object.keys(map).forEach(function(k){if(row[k]!==undefined)out[map[k]]=row[k];else out[k]=row[k];});return out;});
            logFn('  ✓ Mapped fields','ok');
          }catch(e){logFn('  ⚠ Mapping error: '+e.message,'warn');}
        }
      } else if(node.type==='filter-rows'){
        if(data&&node.config&&node.config.filter){
          try{
            var filterFn=new Function('row',node.config.filter.startsWith('return')?node.config.filter:'return ('+node.config.filter+')');
            var before=data.length;
            data=data.filter(function(row){try{return filterFn(row);}catch(e){return true;}});
            logFn('  ✓ Filter: '+data.length+'/'+before+' rows kept','ok');
          }catch(e){logFn('  ⚠ Filter error: '+e.message,'warn');}
        }
      } else if(node.type==='store-dataset'){
        if(data){
          var key=node.config&&node.config.datasetKey||'FLOW_DATA';
          cfgStoreDataset(key,data,'Flow: '+flow.name);
          logFn('  ✓ Stored '+data.length+' rows as '+key,'ok');
        }
      } else if(node.type==='run-analysis'){
        logFn('  → Triggering security analysis','info');
        navigate('analyze');
        logFn('  ✓ Navigate to Run Analysis','ok');
      } else if(node.type==='export-csv'){
        if(data&&data.length){
          var cols=Object.keys(data[0]);
          var csv=[cols.map(function(c){return '"'+c+'"';}).join(',')];
          data.forEach(function(row){csv.push(cols.map(function(c){return '"'+String(row[c]||'').replace(/"/g,'""')+'"';}).join(','));});
          var blob=new Blob([csv.join('\n')],{type:'text/csv'});
          var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(flow.name||'flow').replace(/\s/g,'_')+'.csv';
          document.body.appendChild(a);a.click();document.body.removeChild(a);
          logFn('  ✓ Exported '+data.length+' rows as CSV','ok');
        }
      } else if(node.type==='mongo-save'){
        logFn('  → Save to MongoDB','info');
        if(typeof DataStore!=='undefined'&&DataStore.isRemoteEnabled()){
          await DataStore.saveApiData(getActiveCustomerId(),'flow_'+flow.id,{FLOW_DATA:{rows:data||[]}});
          logFn('  ✓ Saved to MongoDB','ok');
        } else logFn('  ⚠ MongoDB not configured','warn');
      } else {

    }catch(e){logFn('  ✗ Error: '+e.message,'err');}
  }
  logFn('Flow complete.','ok');
}

async function intQuickTest(){
  var ci=document.getElementById('test-conn')&&document.getElementById('test-conn').value;
  var path=document.getElementById('test-url')&&document.getElementById('test-url').value;
  var resEl=document.getElementById('quick-test-result');
  if(ci===''||ci===null){if(resEl)resEl.innerHTML='<span style="color:var(--orange)">Select a connector first</span>';return;}
  var conn=INT_STATE.connectors[parseInt(ci)];
  if(!conn){if(resEl)resEl.innerHTML='<span style="color:var(--red)">Connector not found</span>';return;}
  var url=(conn.baseUrl||'').replace(/\/$/,'')+(path||'');
  if(resEl)resEl.innerHTML='<span style="color:var(--tx-5)">Sending…</span>';
  try{
    var path=url.replace((conn.baseUrl||'').replace(/\/$/,''),'');
    if(!path||path===url) path=url; // if url is full url, use directly
    var resp=await intConnectorFetch(conn, path.startsWith('http')?'/?_full='+encodeURIComponent(path):path, 'GET');
    var rows=resp.value||(resp.d&&resp.d.results)||[];
    if(resEl)resEl.innerHTML='<div style="color:var(--green);font-weight:700;margin-bottom:6px">✓ '+rows.length+' rows returned</div>'+
      '<pre style="background:var(--bg-hover);border-radius:6px;padding:8px;font-size:10.5px;color:var(--tx-3);max-height:200px;overflow-y:auto;white-space:pre-wrap">'+JSON.stringify(resp,null,2).slice(0,2000)+'</pre>';
  }catch(e){
    if(resEl)resEl.innerHTML='<span style="color:var(--red)">✗ '+e.message.slice(0,200)+'</span>';
  }
}

// ─── Ensure jsPDF is available (lazy-load if CDN blocked) ────────
function ensureJsPDF(){
  return new Promise(function(resolve,reject){
    if(window.jspdf&&window.jspdf.jsPDF){resolve(window.jspdf.jsPDF);return;}


    // Try loading from CDN dynamically
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){
      var s2=document.createElement('script');
      s2.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js';
      s2.onload=function(){
        if(window.jspdf&&window.jspdf.jsPDF)resolve(window.jspdf.jsPDF);
        else reject(new Error('jsPDF loaded but unavailable'));
      };
      s2.onerror=function(){
        // autotable failed but core jsPDF may still work
        if(window.jspdf&&window.jspdf.jsPDF)resolve(window.jspdf.jsPDF);
        else reject(new Error('Could not load jsPDF plugin'));
      };
      document.head.appendChild(s2);
    };
    s.onerror=function(){reject(new Error('No internet — cannot load jsPDF. PDF export needs a connection; use Export JSON instead.'));};
    document.head.appendChild(s);
  });
}

function ensureXLSX(){
  return new Promise(function(resolve, reject){
    if(typeof XLSX !== 'undefined' && XLSX.utils){return resolve(XLSX);}
    if(typeof window !== 'undefined' && window.XLSX && window.XLSX.utils){return resolve(window.XLSX);}
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = function(){
      var x = (typeof XLSX !== 'undefined') ? XLSX : window.XLSX;
      if(x && x.utils) resolve(x);
      else reject(new Error('XLSX library loaded but utils API missing'));
    };
    s.onerror = function(){reject(new Error('Could not load SheetJS (xlsx) from CDN. Are you offline?'));};
    document.head.appendChild(s);
  });
}

// Excel hard limit: 32,767 chars per cell. Clip every string cell safely below it.
function clipRows(rows){
  var MAX = 32000;
  for(var i=0;i<rows.length;i++){
    var row = rows[i];
    for(var j=0;j<row.length;j++){
      var v = row[j];
      if(typeof v === 'string' && v.length > MAX){
        row[j] = v.slice(0, MAX) + ' ...(truncated)';
      }
    }
  }
  return rows;
}
function clipCell(s){ var MAX=32000; return (typeof s==='string'&&s.length>MAX)?s.slice(0,MAX)+' ...(truncated)':s; }

// ─── Concrete remediation guidance per control area ──
// Returns an array of action strings explaining HOW to fix the gap, populated
// from the actual finding counts so the steps quote real numbers.
function getFixSteps(controlKey, r){
  var s = r.stats;
  switch(controlKey){
    case 'sod':
      var soxC = s.soxCount;
      var critC = (r.sod||[]).filter(function(v){return v.sev==='CRITICAL';}).length;
      return [
        'Run SoD Violations report in-app, sort by user-then-severity, export the top-50 SOX-relevant conflicts to a remediation tracker (Jira / ServiceNow).',
        critC>0 ? ('Convene a workshop with the role owners for the '+critC+' CRITICAL conflicts. For each one, decide: remove side A, remove side B, or document a compensating control with a named approver.') :
                   'Convene a workshop with role owners. For each conflict, decide: remove side A, remove side B, or document a compensating control with a named approver.',
        soxC>0 ? ('Treat the '+soxC+' SOX-relevant conflicts as audit-blocking. They must be remediated or have approved compensating controls before the next SOX 404 testing cycle.') :
                  'Document any compensating controls in the GRC repository and link them to the affected user IDs.',
        'For users with SAP_ALL or wide-open profiles (S_TCODE = *), build derived role assignments instead — never grant SAP_ALL standing.',
        'After remediation, re-run this analysis monthly and track the SoD count trajectory; target >=30% reduction in the first quarter.'
      ];
    case 'sensitive':
      return [
        'For each sensitive transaction (SE38, SU01, PFCG, SM30, F110, etc.) list the current holders via the in-app filter and confirm each is a named owner with documented business need.',
        'Restrict sensitive T-codes to a small "privileged" composite role; remove them from broad job roles.',
        'Enable SM20 / SAL audit filters for sensitive T-code execution so future use is logged and reviewed.',
        'Apply the four-eye principle for any sensitive change: requester != approver, and approver attested in writing.',
        'Reference: SAP Security Baseline v1.8 §4.2; SAP Note 622464 (Sensitive transactions inventory).'
      ];
    case 'dormant':
      var dInact = (r.dormant||[]).filter(function(d){return d.isDormant;}).length;
      var dPwd = (r.dormant||[]).filter(function(d){return d.pwdIssue;}).length;
      return [
        'In SU10 (mass user maintenance) select the '+dInact+' dormant accounts and lock them in a single transaction. Communicate to managers before locking.',
        'Set login/password_expiration_time to 90 (or your policy value) so passwords expire automatically; force '+dPwd+' users with stale passwords to change at next logon.',
        'Configure login/password_max_idle_initial and login/password_max_idle_productive so unused accounts auto-lock after 60 / 180 days respectively.',
        'After lock-out, hold accounts for the configured retention period (e.g. 90 days) then delete to free licenses and clean the user master.',
        'Reference: SAP Note 862989 (Password parameters); ISACA SAP Audit Guide §2.1.'
      ];
    case 'defaultUsers':
      var unlocked = (r.defaultUsers||[]).filter(function(d){return !d.locked;});
      var names = unlocked.map(function(d){return d.user;}).join(', ');
      return [
        'Immediately lock the unlocked default user(s)'+(names?' ('+names+')':'')+' via SU01 in every client of every system in this landscape (000, 066, productive, and all customer clients).',
        'Change SAP* and DDIC passwords away from defaults; store the new passwords in your privileged-access vault.',
        'Set profile parameter login/no_automatic_user_sapstar = 1 to prevent SAP* re-creation if the user record is deleted.',
        'Verify SAP* membership: should not be in any productive role; remove from SAP_ALL or composite roles if present.',
        'Reference: SAP Note 2216306 (Standard user protection); SAP Security Baseline v1.8 §3.1.'
      ];
    case 'params':
      var fails = (r.paramResults||[]).filter(function(p){return p.status==='FAIL';});
      var samples = fails.slice(0,3).map(function(p){return p.name+'='+p.current+' (target '+p.target+')';}).join('; ');
      return [
        'Use RZ10 to edit the default profile of each application server. Set each failing parameter to its target value: '+(samples||'(see Security Parameters page)')+'.',
        'After changing parameters, restart the affected SAP instances to activate them (RZ10 changes do not take effect until restart).',
        'For dynamic-changeable parameters, also use RZ11 to set the live value so it takes effect immediately without a restart.',
        'Validate via RZ11 or PAHI history that the new values are active in production after the restart.',
        'Reference: SAP Note 1731866 (Security Baseline overview); SAP Note 622464 (RZ11 parameter list); SAP Security Baseline v1.8.'
      ];
    case 'unused':
      var totalUnused = (r.unused.detail||[]).filter(function(d){return d.status==='UNUSED';}).length;
      return [
        'For the top-20 users by % unused, schedule a role-review meeting with their line manager and re-derive a least-privilege role set.',
        'Use the User-Role-Transaction Detail tab in-app to identify which roles grant the unused T-codes; consider splitting those roles into smaller functional units.',
        'Decommission unused custom roles ('+totalUnused.toLocaleString()+' unused user-transaction pairs identified) — preserves licensing tier and reduces audit scope.',
        'Implement SU24-based authorization proposals so new roles only carry T-codes that have been observed in use.',
        'Reference: ISACA SAP Audit Guide §2.4; SAP Note 113290 (Role design best practices).'
      ];
    case 'license':
      var prof = s.licenseProf||0;
      return [
        'Review the '+prof+' users classified as Professional (the highest-cost tier). For each, confirm they genuinely use the privileged T-codes that triggered the classification; otherwise restrict access to drop to Functional or Productivity tier.',
        'Cross-check dormant + Professional-licensed users — these are immediate license-reclamation candidates.',
        'Use the License Rule file (PCE format) to test re-classification scenarios before committing role changes.',
        'Run USMM to validate that the classification matches SAP\'s own measurement; reconcile gaps before contract negotiation.',
        'Reference: SAP S/4HANA Named User License Guide; PCE classification rules.'
      ];
    case 'itgc':
      var fails = (r.itgc||[]).filter(function(f){return f.status==='FAIL';});
      var topFails = fails.slice(0,3).map(function(f){return f.id;}).join(', ');
      return [
        'Open the ITGC Compliance page in-app for the per-control evidence; failed controls'+(topFails?' (start with '+topFails+')':'')+' map directly to audit findings.',
        'For each FAIL, follow the SAP Note / ISACA reference cited on the control card; most require either a parameter change, a transport release, or a role modification.',
        'Bundle related ITGC fixes (e.g. all change-management failures) into a single change request so testing happens once.',
        'Re-run this analysis after each remediation batch; the ITGC pass-count is the headline metric for the audit committee.',
        'Reference: ISACA SAP Audit Guide (full framework); SOX §404 IT controls testing methodology.'
      ];
    default:
      return ['Review the in-app detail for this control area.','Cite the listed SAP Note(s) when documenting remediation.'];
  }
}

    const strengths = [];
    (r.iso||[]).filter(function(a){return a.status==='PASS';}).slice(0,4).forEach(function(a){ strengths.push(a.id+' '+a.name+' - '+a.evidence); });
    (r.itgc||[]).filter(function(f){return f.status==='PASS';}).slice(0,3).forEach(function(f){ strengths.push('ITGC '+(f.id||'')+' '+(f.name||f.desc||'')+' passing'); });
    if((r.defaultUsers||[]).every(function(d){return d.locked;}) && (r.defaultUsers||[]).length>0) strengths.push('All detected default SAP users are locked.');
    if(strengths.length===0) strengths.push('SAP audit log (SM20) and user master data available for continuous measurement.');
    strengths.forEach(function(s){
      if(y > H-22){doc.addPage(); y = 24;}
      const lines = doc.splitTextToSize(tx('- '+s), W-2*M-4);
      lines.forEach(function(l){doc.text(l, M+2, y); y += 4.4;});
      y += 1;
    });
    y += 4; if(y > H-70){doc.addPage(); y = 24;}
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(PURPLE2[0],PURPLE2[1],PURPLE2[2]);
    doc.text('4.2  Most Material Gaps', M, y); y += 6;
    doc.setFont('helvetica','normal'); doc.setFontSize(9.2); doc.setTextColor(40,40,50);
    const mat = [];
    const soxN = (r.sod||[]).filter(function(v){return v.sox;}).length;
    if((r.sod||[]).length) mat.push((r.sod||[]).length+' SoD conflicts ('+soxN+' SOX-relevant) - initiate-approve-conceal risk across finance processes.');
    const unlockedDef = (r.defaultUsers||[]).filter(function(d){return !d.locked;}).length;
    if(unlockedDef) mat.push(unlockedDef+' default SAP user(s) not locked - well-known credentials exposed.');
    if(r.roleAnalysis&&r.roleAnalysis.summary){
      const rs = r.roleAnalysis.summary;
      if(rs.withWildcards) mat.push(rs.withWildcards+' role(s) with wildcard authorisation including S_TCODE = * - equivalent to SAP_ALL.');
      if(rs.displayWithMaint) mat.push(rs.displayWithMaint+' display-named role(s) carry Change/Create/Delete access - privilege disguised as read-only.');
    }
    const pf = (r.paramResults||[]).filter(function(p){return p.status==='FAIL';}).length;
    if(pf) mat.push(pf+' security parameters below SAP Baseline - weakened authentication and audit controls.');
    if((r.dormant||[]).length) mat.push((r.dormant||[]).length+' dormant accounts - unattended attack surface and wasted licenses.');
    mat.slice(0,6).forEach(function(s){
      if(y > H-22){doc.addPage(); y = 24;}
      const lines = doc.splitTextToSize(tx('- '+s), W-2*M-4);
      lines.forEach(function(l){doc.text(l, M+2, y); y += 4.4;});
      y += 1;
    });

    // ════════ SUGGESTED MATURITY PATH ════════
    doc.addPage(); y = 24;
    y = sectionTitle('5. Suggested Maturity Path', y);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(60,60,70);
    doc.text(tx('A phased remediation keeps quick wins in step with the structural role-model rebuild:'), M, y); y += 7;
    doc.autoTable(Object.assign({}, TBL, {
      startY:y,
      head:[['Phase','Focus','Key Activities']],
      body:[
        ['Phase 1\nFoundation','Quick Wins & Hygiene', tx('Lock or secure the '+unlockedDef+' unlocked default user(s) (SU01, login/no_automatic_user_sapstar=1). Correct the '+pf+' failing security parameters in RZ10 and restart instances. Notify managers and lock the '+(r.dormant||[]).length+' dormant accounts via SU10. Establish the documented access-control policy and role-naming standard.')],
        ['Phase 2\nGovernance','Role Model & SoD Remediation', tx('Remove wildcard authorisations (S_TCODE = *, ACTVT = *) from the flagged roles. Split roles carrying both halves of an SoD conflict; remediate the '+soxN+' SOX-relevant user-level conflicts or document compensating controls. Rename or strip maintenance access from display-named roles. Introduce SoD checks at the point of provisioning and extend recertification beyond SAP.')],
        ['Phase 3\nOptimisation & Intelligence','Least Privilege, License & Continuous Monitoring', tx('Derive least-privilege roles from observed SM20 usage and remove assigned-but-unused access. Right-size license tiers using the License Detail report (downgrade candidates and reclaimable seats). Schedule periodic BCS re-assessment, track KPIs (score trend, SoD count, ISO gaps) and enable AI-assisted remediation guidance for new findings.')]
      ],
      columnStyles:{0:{cellWidth:26, fontStyle:'bold', textColor:PURPLE},1:{cellWidth:40, fontStyle:'bold'},2:{cellWidth:108}}
    }));

    // ════════ DISCLAIMER ════════
    y = doc.lastAutoTable.finalY + 10;
    if(y > H-45){doc.addPage(); y = 24;}
    doc.setFillColor(246,246,250); doc.rect(M-3, y-5, W-2*M+6, 30, 'F');
    doc.setDrawColor(ORANGE[0],ORANGE[1],ORANGE[2]); doc.setLineWidth(1.2);
    doc.line(M-3, y-5, M-3, y+25);
    doc.setFont('helvetica','italic'); doc.setFontSize(8.6); doc.setTextColor(GREY[0],GREY[1],GREY[2]);
    const disc = 'Disclaimer: This assessment is generated automatically from the SAP extracts provided (USR02, AGR_USERS, AGR_1251, SM20, RZ11, T000 and related tables) and reflects the state of those extracts at the time of upload. The ISO/IEC 27001:2022 mapping is an analytical structuring against recognised control objectives, not a certification audit. Recommendations describe remediation options and intended fit, not a delivery commitment. Validation with the customer internal SMEs is required before executing changes in production.';
    const discLines = doc.splitTextToSize(tx(disc), W-2*M-6);
    let dy = y;
    discLines.forEach(function(l){doc.text(l, M+1, dy); dy += 4.2;});

    footer();
    doc.save('BCS_Secure_Studio_Executive_'+sid+'_'+today+'.pdf');
    toast('Executive report generated','ok');
  }catch(e){
    toast('PDF generation failed: '+e.message,'err');
    console.error(e);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Export Executive PDF';}
  }
}
