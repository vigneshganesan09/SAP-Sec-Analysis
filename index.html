    add('P3','Security Parameters','Align remaining '+(paramFail.length-critParams.length)+' parameter(s) to SAP baseline',
        'Bring session, network and audit parameters in line with SAP Security Baseline v1.8.','SAP Security Baseline v1.8',
        [
          'Group remaining parameter gaps by category (audit, network, session) and bundle into a single transport.',
          'Test the changes in QAS for at least 1 week before promoting to PRD.',
          'Update the SAP profile documentation to reflect the new baseline-aligned values.',
          'Schedule a quarterly review to catch any regression.'
        ]);
  if(unusedHigh.length>0)
    add('P3','Access Optimization','Right-size roles for '+unusedHigh.length+' user(s) using <20% of assigned t-codes',
        'Remove unused transactions to shrink the attack surface and simplify future audits.','',
        [
          'Use the User-Role-Transaction Detail tab; for each user with >80% unused, list the granting roles.',
          'For each over-broad role, derive a smaller functional role using SU24 authorization proposals based on observed usage.',
          'In PFCG, replace the broad role with the new derived role; test in QAS first.',
          'After deployment, re-run this analysis to confirm the unused-% has dropped below 20%.'
        ]);
  if(overLic.length>0)
    add('P3','License Optimization','Validate '+overLic.length+' user(s) classified as Professional (GB) license',
        'Professional licenses are the most expensive tier.','SAP Named User License Guide',
        [
          'Review the License Optimization page; sort users by license-trigger (matched-on rule).',
          'For each user, confirm they truly need the privileged T-code (e.g. SE38) that triggered the classification; otherwise restrict access.',
          'Run USMM after role adjustments to validate the new classification matches SAP\'s measurement.',
          'Reconcile any remaining over-licensing before contract renewal.'
        ]);
  if(dormantOld.length>0)
    add('P3','License Optimization','Reclaim licenses from '+dormantOld.length+' user(s) inactive 365+ days',
        'Long-dormant users still consume license entitlements.','',
        [
          'Filter the Dormant Users page for 365+ days inactive AND License = Professional/Functional.',
          'Lock the accounts (P2 action already covers this) and remove license assignment via USMM.',
          'After retention period (typically 180 days post-lock) delete the user master to free the license seat permanently.',
          'Reconcile freed licenses against current SAP contract entitlement; document savings.'
        ]);

    // ── ITGC-driven additions (with control-specific fix steps) ──
  var itgc = res.itgc||[];
  var itgcFails = itgc.filter(function(f){return f.status==='FAIL';});
  itgcFails.forEach(function(f){
    var prio = f.sev==='CRITICAL'?'P1':f.sev==='HIGH'?'P2':'P3';
    var fixGuide = (typeof itgcFixText==='function') ? itgcFixText(f) : '';
    var steps = fixGuide ? fixGuide.split(/(?<=\.)\s+/).filter(function(s){return s.trim();}) : null;
    add(prio, 'ITGC: '+f.category, f.id+' — '+f.name, f.desc+' Evidence: '+f.evidence, f.ref, steps);
  });

  return recs;

//  SAP Public Cloud / BTP — Dual Auth: OAuth2 OR Communication System User
// ════════════════════════════════════════════════════════════════════════

async function getOAuthToken(sys){
  var method = sys.authMethod||'oauth';
  if(method==='basic'){
    if(!sys.commUser||!sys.commPass) throw new Error('Missing Communication User credentials');
    return {type:'basic', credentials:btoa(sys.commUser+':'+sys.commPass)};
  }
  if(!sys.tokenUrl||!sys.clientId||!sys.clientSecret)
    throw new Error('Missing OAuth2 credentials (Token URL, Client ID, Client Secret)');
  var creds=btoa(sys.clientId+':'+sys.clientSecret);
  var resp=await fetch(sys.tokenUrl,{
    method:'POST',
    headers:{'Authorization':'Basic '+creds,'Content-Type':'application/x-www-form-urlencoded'},
    body:'grant_type=client_credentials'+(sys.scopes?'&scope='+encodeURIComponent(sys.scopes):''),
  });
  if(!resp.ok){var err=await resp.text();throw new Error('OAuth2 failed ('+resp.status+'): '+err.slice(0,200));}
  var data=await resp.json();
  if(!data.access_token) throw new Error('No access_token in OAuth2 response');
  return {type:'bearer', token:data.access_token};
}

function buildAuthHeader(tokenObj){
  if(!tokenObj) return {};
  if(typeof tokenObj==='string') return {'Authorization':'Bearer '+tokenObj};
  if(tokenObj.type==='basic') return {'Authorization':'Basic '+tokenObj.credentials};
  return {'Authorization':'Bearer '+tokenObj.token};
}

async function testPublicCloudConnection(){
  var result=document.getElementById('conn-test-result');
  if(result) result.innerHTML='<span style="color:var(--tx-5)">Testing...</span>';
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var method=g('sf-auth-method')||'oauth';
  try{
    var sys={authMethod:method,apiUrl:g('sf-api-url'),tokenUrl:g('sf-token-url'),
             clientId:g('sf-client-id'),clientSecret:g('sf-client-secret'),
             scopes:g('sf-scopes'),commUser:g('sf-comm-user'),commPass:g('sf-comm-pass')};
    var tokenObj=await getOAuthToken(sys);
    var authHdr=buildAuthHeader(tokenObj);
    var base=(sys.apiUrl||'').replace(/\/$/,'');
    var pingResp=null;
    try{pingResp=await fetch(base+'/sap/opu/odata/IWFND/CATALOGSERVICE;v=2/ServiceCollection?$top=1&$format=json',
      {headers:Object.assign({'Accept':'application/json'},authHdr)});}catch(e){}
    var ok=pingResp&&pingResp.ok;
    var msg=method==='basic'
      ?(ok?'✓ Communication User authenticated, API reachable':'✓ Credentials valid (CORS blocks direct browser ping)')
      :(ok?'✓ OAuth2 token obtained, API reachable':'✓ Token obtained (CORS blocks direct browser ping)');
    if(result) result.innerHTML='<span style="color:var(--green)">'+msg+'</span>';

// ════════════════════════════════════════════════════════════════
//  SAP Public Cloud API — fetch with CORS fallback chain
// ════════════════════════════════════════════════════════════════

var _sapProxyCache = {};
var _relayTabRef = null;
var _bridgeStatus = 'unknown';
var _relayPollTimers = {};   // reqId -> interval handle

async function sapDirectFetch(url, authHeader){
  // Support POST via X-Method header (for token endpoints via relay)
  var method='GET';
  var body=undefined;
  var headers=Object.assign({'Accept':'application/json'},authHeader);
  if(headers['X-Method']){method=headers['X-Method'];delete headers['X-Method'];}
  if(headers['X-Body']){body=headers['X-Body'];delete headers['X-Body'];}
  if(body) headers['Content-Type']=headers['Content-Type']||'application/x-www-form-urlencoded';
  var resp = await fetch(url,{method:method,headers:headers,body:body,mode:'cors',credentials:'omit'});
  if(!resp.ok){
    var errText=''; try{errText=await resp.text();}catch(e){}
    throw new Error('HTTP '+resp.status+(errText?' — '+errText.slice(0,120):''));
  }
  return resp.json();
}

async function sapProxyFetch(proxyBase, url, authHeader){
  var base=proxyBase.replace(/\/$/,'');
  // Try direct pass-through first (our bridge uses /{encoded-url})
  var encoded=base+'/'+encodeURIComponent(url);
  try{
    var resp=await fetch(encoded,{
      headers:Object.assign({'Accept':'application/json','X-Target-URL':url},authHeader),
      mode:'cors',credentials:'omit',
    });
    if(resp.ok) return resp.json();
    // Try /proxy/{path} style (npx local-cors-proxy)
    if(resp.status===404){
      var parsed=new URL(url);
      var proxyUrl=base+parsed.pathname+parsed.search;
      var resp2=await fetch(proxyUrl,{
        headers:Object.assign({'Accept':'application/json'},authHeader),
        mode:'cors',credentials:'omit',
      });
      if(resp2.ok) return resp2.json();
      throw new Error('Proxy HTTP '+resp2.status);
    }
    throw new Error('Proxy HTTP '+resp.status);
  }catch(e){
    if(e.message&&e.message.indexOf('Proxy HTTP')===0) throw e;
    throw e;
  }
}

async function autoDetectProxy(){
  var ports=[3100,8888,3000,8080,5000];
  // Probe all ports in parallel with a short timeout
  var timeout=400;
  var results=await Promise.allSettled(ports.map(function(port){
    return new Promise(function(resolve,reject){
      if(_sapProxyCache[port]===false){reject(new Error('skip'));return;}
      var ctrl=new AbortController();
      var timer=setTimeout(function(){ctrl.abort();reject(new Error('timeout'));},timeout);
      fetch('http://localhost:'+port+'/ping',{mode:'cors',signal:ctrl.signal})
        .then(function(r){clearTimeout(timer);if(r.ok){_sapProxyCache[port]=true;resolve('http://localhost:'+port);}else{_sapProxyCache[port]=false;reject(new Error('bad status'));}})
        .catch(function(e){clearTimeout(timer);_sapProxyCache[port]=false;reject(e);});
    });
  }));
  for(var ri=0;ri<results.length;ri++){
    if(results[ri].status==='fulfilled') return results[ri].value;
  }
  return null;
}

// localStorage-based relay: works on file://, http://, any browser
// Main app writes request → relay tab picks it up → writes response → main app reads it

function relayIsAlive(){
  // Check if relay tab wrote a heartbeat in the last 3 seconds
  try{
    var hb=localStorage.getItem('bcs_relay_heartbeat');
    if(!hb) return false;
    return (Date.now()-parseInt(hb))<3000;
  }catch(e){return false;}
}

async function relayTabFetch(url, authHeader, sysCreds){
  if(!relayIsAlive()) return null;
  var reqId='bcs_req_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  var reqKey='bcs_relay_req_'+reqId;
  var resKey='bcs_relay_res_'+reqId;
  try{
    localStorage.setItem(reqKey, JSON.stringify({url:url, headers:authHeader, creds:sysCreds||null, ts:Date.now()}));
  }catch(e){return null;}
  // Poll for response (every 80ms, up to 30s)
  return await new Promise(function(resolve,reject){
    var attempts=0;
    var maxAttempts=375; // 30s / 80ms
    var interval=setInterval(function(){
      attempts++;
      try{
        var res=localStorage.getItem(resKey);
        if(res){
          clearInterval(interval);
          delete _relayPollTimers[reqId];
          try{localStorage.removeItem(reqKey);}catch(e2){}
          try{localStorage.removeItem(resKey);}catch(e2){}
          var parsed=JSON.parse(res);
          if(parsed.error) reject(new Error(parsed.error));
          else resolve(parsed.json);
          return;
        }
      }catch(e){}
      if(attempts>=maxAttempts){
        clearInterval(interval);
        delete _relayPollTimers[reqId];
        try{localStorage.removeItem(reqKey);}catch(e2){}
        reject(new Error('Relay timeout — no response after 30s'));
      }
    },80);
    _relayPollTimers[reqId]=interval;
  });
}

function _isCorsError(e){
  if(!e||!e.message) return true; // unknown errors from fetch are usually CORS
  var m=e.message;
  // Real HTTP errors we should NOT retry
  if(m.indexOf('HTTP 4')>=0||m.indexOf('HTTP 5')>=0) return false;
  // CORS / network errors we should retry
  return m.indexOf('Failed to fetch')>=0||m.indexOf('NetworkError')>=0||
         m.indexOf('TypeError: Failed')>=0||m.indexOf('CORS')>=0||
         m.indexOf('Load failed')>=0||m.indexOf('fetch')>=0;
}

async function sapPublicFetch(url, authHeader, label){
  var lastErr=null;

  // ── Method 1: Direct ──
  try{
    var result=await sapDirectFetch(url, authHeader);
    _bridgeStatus='direct';
    return result;
  }catch(e){
    lastErr=e;
    if(!_isCorsError(e)) throw e; // 401/403/404 — don't retry
  }

  // ── Method 2: Saved proxy ──
  var proxyCfg=null;
  try{proxyCfg=JSON.parse(localStorage.getItem('bcs_cors_proxy')||'null');}catch(e2){}
  if(proxyCfg&&proxyCfg.enabled&&proxyCfg.url){
    try{
      var r2=await sapProxyFetch(proxyCfg.url, url, authHeader);
      _bridgeStatus='proxy';
      return r2;
    }catch(e){lastErr=e;}
  }

  // ── Method 3: Auto-detect local proxy (fast, parallel) ──
  var autoProxy=await autoDetectProxy();
  if(autoProxy){
    try{localStorage.setItem('bcs_cors_proxy',JSON.stringify({url:autoProxy,enabled:true,autoDetected:true}));}catch(e2){}
    try{
      var r3=await sapProxyFetch(autoProxy, url, authHeader);
      _bridgeStatus='proxy';
      return r3;
    }catch(e){lastErr=e;}
  }

  // ── Method 4: localStorage relay tab ──
  var relayResult=await relayTabFetch(url, authHeader, window._lastSysCreds||null);
  if(relayResult!==null&&relayResult!==undefined){
    _bridgeStatus='relay';
    return relayResult;
  }

  // All methods failed — throw structured error
  _bridgeStatus='none';
  throw new Error('CORS_BLOCKED');
}

  var h=[];

  h.push('<div>');
  h.push('<h2 style="font-size:17px;font-weight:800;color:var(--tx-1);margin:0 0 2px">Configurations</h2>');
  if(sys) h.push('<div style="font-size:11px;color:var(--tx-5);font-family:var(--mono)">'+sys.name+' &middot; '+(sys.apiUrl||'no API URL configured')+'</div>');
  h.push('</div>');
  // Dataset count badge
  var dsCount=Object.keys(CFG_STATE.datasets).length;
  if(dsCount>0) h.push('<span class="tag badge-green">'+dsCount+' dataset'+(dsCount>1?'s':'')+' loaded</span>');
  h.push('</div>');

  // ── Tabs ────────────────────────────────────────────────────────
  h.push('<div class="tabs" style="margin-bottom:14px">');
  [['runner','API Runner'],['collections','Collections'],['store','Data Store'],['bridge','API Bridge']].forEach(function(t){
    h.push('<button class="tab'+(tab===t[0]?' active':'')+'" onclick="cfgSetTab(\''+t[0]+'\')">'+t[1]+'</button>');
  });
  h.push('</div>');

  // ── Tab content ─────────────────────────────────────────────────
  if(tab==='runner'){
    h.push(cfgBuildRunner(sys));
  } else if(tab==='collections'){
    h.push(cfgBuildCollections(sys));
  } else if(tab==='store'){
    h.push(cfgBuildStore());
  } else {
    h.push(cfgBuildBridge());
  }

  h.push('</div>');
  el.innerHTML=h.join('');

  // Restore response if present
  if(CFG_STATE.response&&tab==='runner'){
    cfgRenderResponse(CFG_STATE.response);
  }
}

function cfgSetTab(t){
  CFG_STATE.tab=t;
  cfgSaveState();
  renderApiConfig();
}

// ── TAB 1: API Runner ──────────────────────────────────────────────
function cfgBuildRunner(sys){
  var h=[];
  var method=CFG_STATE.method||'GET';
  var url=CFG_STATE.url||(sys?(sys.apiUrl||'').replace(/\/$/,''):'');
  var methods=['GET','POST','PUT','PATCH','DELETE'];
  var methodColors={GET:'var(--green)',POST:'var(--blue)',PUT:'var(--yellow)',PATCH:'var(--orange)',DELETE:'var(--red)'};

  // ── Request bar ──
  h.push('<div class="card" style="padding:12px 14px;margin-bottom:10px">');
  h.push('<div style="display:flex;gap:8px;align-items:center">');
  // Method selector
  h.push('<select id="run-method" onchange="CFG_STATE.method=this.value;document.getElementById(\'run-method-lbl\').textContent=this.value;document.getElementById(\'run-method-lbl\').style.color=({GET:\'var(--green)\',POST:\'var(--blue)\',PUT:\'var(--yellow)\',PATCH:\'var(--orange)\',DELETE:\'var(--red)\'})[this.value]||\'var(--tx-1)\'" style="width:90px;font-family:var(--mono);font-weight:700;font-size:12px;padding:8px 6px;flex-shrink:0">');
  methods.forEach(function(m){ h.push('<option value="'+m+'"'+(method===m?' selected':'')+'>'+m+'</option>'); });
  h.push('</select>');
  // URL input
  h.push('<input id="run-url" value="'+cfgEsc(url)+'" placeholder="https://[tenant].s4hana.ondemand.com/sap/opu/odata/sap/APS_IAM_USR_SRV/Users" '+
    'style="flex:1;font-family:var(--mono);font-size:12px" oninput="CFG_STATE.url=this.value"/>');
  // Send button
  h.push('<button class="btn btn-accent" id="run-send-btn" onclick="cfgRunRequest()" style="min-width:80px;flex-shrink:0">Send</button>');
  h.push('</div>');

  // Auth quick-fill from system
  if(sys&&sys.apiUrl){
    h.push('<div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">');
    h.push('<span style="font-size:10.5px;color:var(--tx-5)">Quick-fill:</span>');
    h.push('<button class="btn btn-ghost btn-xs" onclick="cfgFillAuth()">Use system credentials</button>');
    h.push('<button class="btn btn-ghost btn-xs" onclick="cfgFillUrl(\''+cfgEsc(sys.apiUrl)+'\')">Base URL: '+cfgEsc((sys.apiUrl||'').replace('https://','').slice(0,32))+'…</button>');
    h.push('</div>');
  }
  h.push('</div>');

  // ── Request tabs: Params | Headers | Auth | Body ──
  h.push('<div class="card" style="padding:0;margin-bottom:10px;overflow:hidden">');
  h.push('<div style="display:flex;border-bottom:1px solid var(--bd)">');
  ['params','headers','auth','body'].forEach(function(pt){
    var label=pt.charAt(0).toUpperCase()+pt.slice(1);
    var badge='';
    if(pt==='params'){var on=CFG_STATE.params.filter(function(p){return p.on&&p.key;});if(on.length) badge='<span style="background:rgba(77,163,255,.1);color:var(--blue);font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;margin-left:4px">'+on.length+'</span>';}
    if(pt==='headers'){var on2=CFG_STATE.headers.filter(function(p){return p.on&&p.key;});if(on2.length) badge='<span style="background:rgba(77,163,255,.1);color:var(--blue);font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;margin-left:4px">'+on2.length+'</span>';}
    var active=(App._cfgReqTab||'params')===pt;
    h.push('<button onclick="App._cfgReqTab=\''+pt+'\';cfgRefreshReqPanel()" style="padding:9px 14px;background:'+(active?'var(--bg-hover)':'transparent')+';border:none;border-right:1px solid var(--bd);color:'+(active?'var(--tx-1)':'var(--tx-5)')+';font-size:12px;font-weight:'+(active?'700':'400')+';cursor:pointer;font-family:var(--sans)">'+label+badge+'</button>');
  });
  h.push('</div>');
  h.push('<div id="run-req-panel" style="padding:12px 14px;min-height:100px">');
  h.push(cfgBuildReqPanel(App._cfgReqTab||'params'));
  h.push('</div></div>');

  // ── Response area ──
  h.push('<div id="run-response" style="min-height:60px">');
  if(!CFG_STATE.response){
    h.push('<div style="text-align:center;padding:32px;color:var(--tx-5);font-size:12.5px">'+ic('send',20,'var(--tx-5)')+'<div style="margin-top:10px">Hit <strong>Send</strong> to run the request</div></div>');
  }
  h.push('</div>');

  return h.join('');
}

function cfgEsc(s){ return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function cfgBuildReqPanel(tab){
  var h=[];
  if(tab==='params'){
    h.push(cfgBuildKVTable('run-params','params',CFG_STATE.params,'Query Params'));
  } else if(tab==='headers'){
    h.push(cfgBuildKVTable('run-headers','headers',CFG_STATE.headers,'Headers'));
  } else if(tab==='auth'){
    var sys=getActiveRunnerSys();
    h.push('<div style="font-size:11.5px;color:var(--tx-5);margin-bottom:10px">Authorization header is automatically built from the system credentials.</div>');
    if(sys){
      var authMethod=sys.authMethod||'oauth';
      h.push('<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px">');
      h.push('<div><div style="font-size:9.5px;font-weight:700;color:var(--tx-5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Type</div>'+
        '<div style="font-family:var(--mono);color:var(--tx-1)">'+(authMethod==='basic'?'Basic (Communication User)':'OAuth2 Client Credentials')+'</div></div>');
      h.push('<div><div style="font-size:9.5px;font-weight:700;color:var(--tx-5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">System</div>'+
        '<div style="font-family:var(--mono);color:var(--tx-1)">'+sys.name+'</div></div>');
      if(authMethod==='oauth'){
        h.push('<div class="full"><div style="font-size:9.5px;font-weight:700;color:var(--tx-5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Token URL</div>'+
          '<div style="font-family:var(--mono);font-size:11px;color:var(--accent)">'+cfgEsc(sys.tokenUrl||'')+'</div></div>');
      }
      h.push('</div>');
      h.push('<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="cfgFillAuth()">'+ic('refresh',11)+' Fetch Token & Apply</button>');
    } else {
      h.push('<div style="color:var(--orange);font-size:12px">No Public Cloud system configured. Add one in Systems &amp; Connections.</div>');
    }
  } else if(tab==='body'){
    h.push('<textarea id="run-body" style="width:100%;height:120px;font-family:var(--mono);font-size:12px;resize:vertical" '+
      'placeholder=\'{"key":"value"}\' oninput="CFG_STATE.body=this.value">'+cfgEsc(CFG_STATE.body||'')+'</textarea>');
  }
  return h.join('');
}

function cfgBuildKVTable(id, stateKey, rows, label){
  var h=[];
  h.push('<div style="font-size:9.5px;font-weight:700;color:var(--tx-5);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px">'+label+'</div>');
  h.push('<div id="'+id+'" style="display:flex;flex-direction:column;gap:5px">');
  rows.forEach(function(row,i){
    var enabled=row.on!==false;
    h.push('<div style="display:flex;align-items:center;gap:6px">');
    h.push('<input type="checkbox" '+(enabled?'checked':'')+' onchange="CFG_STATE.'+stateKey+'['+i+'].on=this.checked;cfgSaveState()" style="width:14px;height:14px;flex-shrink:0"/>');
    h.push('<input value="'+cfgEsc(row.key||'')+'" placeholder="Key" style="flex:1;font-family:var(--mono);font-size:11.5px;padding:5px 8px" oninput="CFG_STATE.'+stateKey+'['+i+'].key=this.value;cfgSaveState()"/>');
    h.push('<input value="'+cfgEsc(row.val||'')+'" placeholder="Value" style="flex:2;font-family:var(--mono);font-size:11.5px;padding:5px 8px" oninput="CFG_STATE.'+stateKey+'['+i+'].val=this.value;cfgSaveState()"/>');
    h.push('<button onclick="CFG_STATE.'+stateKey+'.splice('+i+',1);cfgRefreshReqPanel()" style="width:24px;height:24px;border:none;background:transparent;color:var(--tx-5);cursor:pointer;font-size:14px;flex-shrink:0">×</button>');
    h.push('</div>');
  });
  h.push('</div>');
  h.push('<button class="btn btn-ghost btn-xs" style="margin-top:7px" onclick="CFG_STATE.'+stateKey+'.push({key:\'\',val:\'\',on:true});cfgRefreshReqPanel()">+ Add</button>');
  return h.join('');
}

function cfgRefreshReqPanel(){
  var panel=document.getElementById('run-req-panel');
  if(panel) panel.innerHTML=cfgBuildReqPanel(App._cfgReqTab||'params');
}

// ── TAB 2: Collections ─────────────────────────────────────────────
function cfgBuildCollections(sys){
  var h=[];
  h.push('<div style="display:grid;grid-template-columns:260px 1fr;gap:14px;align-items:start">');

  // Left: endpoint list
  h.push('<div style="display:flex;flex-direction:column;gap:6px">');
  SAP_COLLECTION.forEach(function(grp,gi){
    h.push('<div style="font-size:9.5px;font-weight:700;color:var(--tx-5);text-transform:uppercase;letter-spacing:.1em;padding:8px 0 3px">'+grp.group+'</div>');
    grp.items.forEach(function(item,ii){
      var sel=(App._cfgColSel===gi+'_'+ii);
      var ds=item.mapKey&&CFG_STATE.datasets[item.mapKey];
      h.push('<button onclick="cfgSelectCollection('+gi+','+ii+')" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;border:1px solid '+(sel?'var(--accent)':'var(--bd)')+';background:'+(sel?'var(--accent-dim)':'var(--bg-hover)')+';cursor:pointer;text-align:left;width:100%;font-family:var(--sans);transition:all .12s">');
      h.push('<span style="font-family:var(--mono);font-size:8.5px;font-weight:700;color:var(--green);background:rgba(52,211,153,.1);border-radius:4px;padding:1px 5px;flex-shrink:0">'+item.method+'</span>');
      h.push('<span style="font-size:11.5px;color:'+(sel?'var(--accent)':'var(--tx-1)')+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+item.name+'</span>');
      if(ds) h.push('<span style="font-size:9px;color:var(--green)">✓</span>');
      h.push('</button>');
    });
  });
  h.push('</div>');

  // Right: detail + run panel
  h.push('<div>');
  var sel=App._cfgColSel;
  if(sel){
    var parts=sel.split('_'); var gi=parseInt(parts[0]); var ii=parseInt(parts[1]);
    var item=SAP_COLLECTION[gi]&&SAP_COLLECTION[gi].items[ii];
    if(item&&sys){
      var fullUrl=(sys.apiUrl||'').replace(/\/$/,'')+item.path;
      var fullUrlWithParams=fullUrl+(item.params?'?'+item.params:'');
      h.push('<div class="card" style="margin-bottom:10px">');
      h.push('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px">');
      h.push('<div>');
      h.push('<div style="font-size:14px;font-weight:700;color:var(--tx-1);margin-bottom:3px">'+item.name+'</div>');
      h.push('<div style="font-family:var(--mono);font-size:10.5px;color:var(--accent);word-break:break-all">'+fullUrlWithParams+'</div>');
      h.push('</div>');
      h.push('<button class="btn btn-accent" style="flex-shrink:0;min-width:80px" onclick="cfgRunCollection('+gi+','+ii+')">Send</button>');
      h.push('</div>');
      // Params preview
      if(item.params){
        h.push('<div style="background:var(--bg-hover);border-radius:7px;padding:9px 11px;font-family:var(--mono);font-size:11px;color:var(--tx-3);word-break:break-all">?'+item.params+'</div>');
      }
      if(item.mapKey){
        h.push('<div style="margin-top:10px;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--tx-5)">');
        h.push(ic('database',11,'var(--accent)'));
        h.push('<span>Response will be mapped and stored as <strong style="color:var(--accent)">'+item.mapKey+'</strong> for security analysis</span>');
        h.push('</div>');
      }
      h.push('</div>');
      // Last response for this endpoint
      h.push('<div id="col-response" style="min-height:60px">');
      if(CFG_STATE.response) h.push(cfgBuildResponseHtml(CFG_STATE.response));
      h.push('</div>');
    } else {
      h.push('<div class="card" style="text-align:center;padding:32px;color:var(--tx-5)">No Public Cloud system configured. Add one in Systems &amp; Connections.</div>');
    }
  } else {
    h.push('<div class="card" style="text-align:center;padding:40px;color:var(--tx-5)">'+ic('list',28,'var(--tx-5)')+'<div style="margin-top:12px;font-size:12.5px">Select an endpoint from the list to preview and run it</div></div>');
  }
  h.push('</div>');
  h.push('</div>');

  // Bulk run all
  h.push('<div style="margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">');
  h.push('<button class="btn btn-accent" onclick="cfgRunAllCollections()">'+ic('zap',13)+' Run All Core Endpoints</button>');
  h.push('<span style="font-size:11.5px;color:var(--tx-5)">Runs all 4 core IAM endpoints and stores results for analysis</span>');
  h.push('</div>');

  return h.join('');
}

function cfgSelectCollection(gi,ii){
  App._cfgColSel=gi+'_'+ii;
  CFG_STATE.response=null;
  renderApiConfig();
}

// ── TAB 3: Data Store ──────────────────────────────────────────────
function cfgBuildStore(){
  var h=[];
  var ds=CFG_STATE.datasets;
  var keys=Object.keys(ds);

  h.push('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">');
  h.push('<div style="font-size:13px;font-weight:700;color:var(--tx-1)">Stored Datasets <span style="font-size:11px;color:var(--tx-5);font-weight:400">('+keys.length+' dataset'+(keys.length!==1?'s':'')+')</span></div>');
  h.push('<div style="display:flex;gap:8px">');
  if(keys.length>0){
    h.push('<button class="btn btn-accent btn-sm" onclick="cfgApplyToAnalysis()">'+ic('zap',11)+' Apply All to Analysis</button>');
    h.push('<button class="btn btn-ghost btn-sm" onclick="cfgClearAllDatasets()">Clear All</button>');
  }
  h.push('</div></div>');

  if(keys.length===0){
    h.push('<div class="card" style="text-align:center;padding:40px;color:var(--tx-5)">'+
      ic('database',32,'var(--tx-5)')+
      '<div style="margin-top:12px;font-size:12.5px">No datasets stored yet.</div>'+
      '<div style="font-size:11.5px;margin-top:5px">Run endpoints from the Collections tab to fetch and store data here.</div>'+
    '</div>');
    return h.join('');
  }

  var labelMap={USR02:'User Master (USR02)',AGR_USERS:'Role Assignments (AGR_USERS)',CATALOGS:'Business Catalogs',BIZ_ROLES:'Business Roles',PARAMS:'System Parameters',SM20:'Audit Log'};
  keys.forEach(function(key){
    var d=ds[key];
    var rows=d.rows||[];
    var cols=rows.length>0?Object.keys(rows[0]):[];
    var ts=d.savedAt?new Date(d.savedAt).toLocaleString():'—';
    h.push('<div class="card" style="margin-bottom:10px">');
    // Header row
    h.push('<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">');
    h.push('<div style="flex:1;min-width:0">');
    h.push('<div style="font-size:13px;font-weight:700;color:var(--tx-1)">'+( labelMap[key]||key)+'</div>');
    h.push('<div style="font-size:11px;color:var(--tx-5);font-family:var(--mono)">'+rows.length.toLocaleString()+' rows &middot; '+cols.length+' columns &middot; Saved '+ts+' &middot; Source: '+cfgEsc(d.source||'API')+'</div>');
    h.push('</div>');
    h.push('<div style="display:flex;gap:6px;flex-shrink:0">');
    h.push('<button class="btn btn-ghost btn-xs" onclick="cfgExportCSV(\''+key+'\')">'+ic('download',10)+' CSV</button>');
    h.push('<button class="btn btn-ghost btn-xs" onclick="cfgDeleteDataset(\''+key+'\')">'+ic('trash',10)+' Delete</button>');
    h.push('</div>');
    h.push('</div>');
    // Table preview (first 10 rows)
    if(rows.length>0&&cols.length>0){
      h.push('<div class="tbl-wrap" style="max-height:200px;overflow-y:auto">');
      h.push('<table><thead><tr>');
      cols.slice(0,8).forEach(function(c){h.push('<th>'+c+'</th>');});
      if(cols.length>8) h.push('<th>…+'+( cols.length-8)+' more</th>');
      h.push('</tr></thead><tbody>');
      rows.slice(0,10).forEach(function(row){
        h.push('<tr>');
        cols.slice(0,8).forEach(function(c){
          var v=row[c]; if(v===null||v===undefined)v='';
          h.push('<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">'+cfgEsc(String(v).slice(0,60))+'</td>');
        });
        if(cols.length>8) h.push('<td style="color:var(--tx-5)">…</td>');
        h.push('</tr>');
      });
      h.push('</tbody></table>');
      if(rows.length>10) h.push('<div class="tbl-footer"><span>Showing 10 of '+rows.length.toLocaleString()+' rows</span></div>');
      h.push('</div>');
    }
    h.push('</div>');
  });

  return h.join('');
}

// ── TAB 4: API Bridge ──────────────────────────────────────────────
function cfgBuildBridge(){
  var proxyCfg=null;
  try{proxyCfg=JSON.parse(localStorage.getItem('bcs_cors_proxy')||'null');}catch(e){}
  var proxyEnabled=proxyCfg&&proxyCfg.enabled&&proxyCfg.url;
  var alive=relayIsAlive();
  var origin=window.location.origin;
  var h=[];

  // ── Status banner ──
  if(proxyEnabled){
    h.push('<div style="padding:10px 14px;background:rgba(52,211,153,.1);border:1px solid rgba(34,197,94,.3);border-radius:var(--r-md);margin-bottom:14px;display:flex;align-items:center;gap:10px">');
    h.push(ic('check-circle',14,'var(--green)'));
    h.push('<div style="flex:1"><span style="font-size:13px;font-weight:700;color:var(--green)">Bridge active</span> <span style="font-family:var(--mono);font-size:11px;color:var(--tx-5)">'+proxyCfg.url+'</span></div>');
    h.push('<button class="btn btn-ghost btn-xs" onclick="cfgClearProxy()">Disconnect</button>');
    h.push('</div>');
  } else if(alive){
    h.push('<div style="padding:10px 14px;background:rgba(77,163,255,.1);border:1px solid rgba(59,130,246,.3);border-radius:var(--r-md);margin-bottom:14px;display:flex;align-items:center;gap:10px">');
    h.push(ic('activity',14,'var(--blue)'));
    h.push('<span style="font-size:13px;font-weight:700;color:var(--blue)">Relay tab is open</span><span style="font-size:11px;color:var(--tx-5);margin-left:4px">— but SAP is blocking requests from this browser tab origin.</span>');
    h.push('</div>');
  }

  h.push('<div style="display:flex;flex-direction:column;gap:12px">');

  // ══ OPTION 1: SAP BTP CORS — permanent fix ══════════════════════
  h.push('<div class="card" style="border-color:rgba(34,197,94,.3)">');
  h.push('<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">');
  h.push('<span style="background:var(--green);color:#0a0e1a;font-size:9px;font-weight:800;border-radius:5px;padding:2px 8px">PERMANENT FIX</span>');
  h.push('<span style="font-size:13px;font-weight:700;color:var(--tx-1)">Configure CORS in SAP BTP Cockpit</span>');
  h.push('</div>');
  h.push('<div style="font-size:12px;color:var(--tx-3);line-height:1.7;margin-bottom:12px">');
  h.push('Add your app as an allowed origin in SAP BTP. After this, all API calls work directly — no relay, no bridge, ever.');
  h.push('</div>');
  h.push('<div style="background:var(--bg-hover);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--tx-3);line-height:1.8">');
  h.push('<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px"><span style="background:var(--accent);color:#0a0e1a;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0">1</span>Go to <strong>BTP Cockpit</strong> → <strong>Communication Arrangements</strong></div>');
  h.push('<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px"><span style="background:var(--accent);color:#0a0e1a;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0">2</span>Open your <strong>Identity Access Management</strong> arrangement</div>');
  h.push('<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px"><span style="background:var(--accent);color:#0a0e1a;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0">3</span>Under <strong>Inbound Communication</strong> → Add Allowed Origin:</div>');
  h.push('<div style="display:flex;align-items:center;gap:8px;margin-left:26px;flex-wrap:wrap">');
  h.push('<code style="font-family:var(--mono);font-size:12.5px;color:var(--accent);background:var(--bg-input);border:1px solid var(--bd);border-radius:6px;padding:5px 12px;display:inline-block">'+origin+'</code>');
  h.push('<button class="btn btn-ghost btn-xs" onclick="navigator.clipboard&&navigator.clipboard.writeText(\''+origin+'\').then(function(){toast(\'Origin copied!\',\'ok\');})">'+ic('copy',10)+' Copy</button>');
  h.push('</div>');
  h.push('<div style="display:flex;align-items:baseline;gap:8px;margin-top:8px"><span style="background:var(--accent);color:#0a0e1a;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0">4</span>Click <strong>Save</strong>. Test connection — it should work immediately.</div>');
  h.push('</div></div>');

  // ══ OPTION 2: Node.js bridge (one command) ══════════════════════
  h.push('<div class="card">');

function cfgTestAndConnect(){
  var el=document.getElementById('custom-proxy-url');
  var url=el?el.value.trim():'http://localhost:3100';
  var resEl=document.getElementById('bridge-test-result');
  if(resEl) resEl.innerHTML='<span style="color:var(--tx-5)">Testing '+url+'...</span>';
  fetch(url+'/ping',{mode:'cors'}).then(function(r){
    if(r.ok){
      localStorage.setItem('bcs_cors_proxy',JSON.stringify({url:url,enabled:true}));
      if(resEl) resEl.innerHTML='<span style="color:var(--green)">✓ Connected! Bridge is running.</span>';
      toast('Bridge connected at '+url,'ok');
      setTimeout(renderApiConfig,800);
    } else {
      if(resEl) resEl.innerHTML='<span style="color:var(--red)">✗ Bridge returned '+r.status+' — is it running?</span>';
    }
  }).catch(function(e){
    if(resEl) resEl.innerHTML='<span style="color:var(--orange)">✗ Cannot reach '+url+' — start the bridge first, then try again.</span>';
  });
}

function downloadNodeBridge(){
  // Download a simple Node.js bridge script
  var script=
'// BCS SAP API Bridge — Node.js\n'+
'// Usage: node sap_bridge.js\n'+
'// Or:    npx local-cors-proxy --proxyUrl https://YOUR-TENANT.s4hana.cloud.sap --port 3100\n\n'+
'const http=require("http");\n'+
'const https=require("https");\n'+
'const url=require("url");\n'+
'const PORT=3100;\n\n'+
'const server=http.createServer((req,res)=>{\n'+
'  const cors={"Access-Control-Allow-Origin":"*","Access-Control-Allow-Headers":"*","Access-Control-Allow-Methods":"GET,POST,PUT,DELETE,OPTIONS"};\n'+
'  if(req.method==="OPTIONS"){res.writeHead(204,cors);res.end();return;}\n'+
'  if(req.url==="/ping"){res.writeHead(200,{...cors,"Content-Type":"text/plain"});res.end("BCS SAP Bridge OK");return;}\n'+
'  const target=decodeURIComponent(req.url.slice(1));\n'+
'  if(!target.startsWith("http")){res.writeHead(400,cors);res.end("Bad target URL");return;}\n'+
'  const parsed=url.parse(target);\n'+
'  const opts={hostname:parsed.hostname,port:parsed.port||443,path:parsed.path,method:req.method,\n'+
'    headers:{...req.headers,host:parsed.hostname}};\n'+
'  delete opts.headers["content-length"];\n'+
'  const proto=target.startsWith("https")?https:http;\n'+
'  const proxy=proto.request(opts,(sRes)=>{\n'+
'    res.writeHead(sRes.statusCode,{...sRes.headers,...cors});\n'+
'    sRes.pipe(res);\n'+
'  });\n'+
'  proxy.on("error",(e)=>{res.writeHead(502,cors);res.end(e.message);});\n'+
'  req.pipe(proxy);\n'+
'});\n\n'+
'server.listen(PORT,()=>console.log("BCS SAP Bridge running on http://localhost:"+PORT));\n'+
'console.log("Press Ctrl+C to stop.");\n';

  var blob=new Blob([script],{type:'text/plain'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sap_bridge.js';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
  navigator.clipboard&&navigator.clipboard.writeText('node sap_bridge.js').then(function(){
    toast('sap_bridge.js downloaded. Command copied: node sap_bridge.js','ok');
  }).catch(function(){
    toast('sap_bridge.js downloaded — run: node sap_bridge.js','ok');
  });
  localStorage.setItem('bcs_cors_proxy',JSON.stringify({url:'http://localhost:3100',enabled:true}));
}


// ── Response rendering ────────────────────────────────────────────
function cfgBuildResponseHtml(resp){
  if(!resp)return'';
  var h=[];
  var ok=resp.status>=200&&resp.status<300;
  // Status bar
  // Error state - show clear guidance before the tabs
  if(resp.error&&resp.status===0){
    h.push('<div style="padding:12px 14px;background:rgba(244,82,77,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--r-md);margin-bottom:8px">');
    var isCorsFail=resp.error&&(resp.error.indexOf('CORS')>=0||resp.error.indexOf('Failed to fetch')>=0||resp.error.indexOf('Network')>=0||resp.error.indexOf('Load failed')>=0);
    var isSapErr=resp.error&&(resp.error.indexOf('HTTP 4')>=0||resp.error.indexOf('HTTP 5')>=0);
    h.push('<div style="display:flex;align-items:flex-start;gap:10px">');
    h.push('<svg width="16" height="16" stroke="var(--red)" fill="none" style="flex-shrink:0;margin-top:1px"><use href="#ic-alert-triangle"/></svg>');
    h.push('<div style="flex:1">');
    h.push('<div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:4px">'+
      (isCorsFail?'CORS / Network Error':isSapErr?'SAP API Error':'Request Failed')+'</div>');
    h.push('<div style="font-size:12px;color:var(--tx-3);margin-bottom:8px">'+cfgEsc(resp.error.slice(0,300))+'</div>');
    if(isCorsFail){
      h.push('<div style="font-size:11.5px;color:var(--tx-3);line-height:1.6">');
      h.push('<strong>The relay tab is running but SAP is blocking its requests.</strong> This means SAP BTP has not been configured to allow cross-origin requests from this app.<br>');
      h.push('<strong>Fastest fix:</strong> Run the API Bridge locally — download it from the <strong>API Bridge</strong> tab and double-click it. It runs on localhost so SAP always accepts it.');
      h.push('</div>');
      h.push('<div style="margin-top:10px;display:flex;gap:8px">');
      h.push('<button class="btn btn-accent btn-sm" onclick="CFG_STATE.tab=\'bridge\';cfgSaveState();renderApiConfig()">'+ic('cpu',11)+' Go to API Bridge</button>');
      h.push('<button class="btn btn-ghost btn-sm" onclick="cfgShowCorsHelper()">Show all options</button>');
      h.push('</div>');
    } else if(isSapErr){
      h.push('<div style="font-size:11.5px;color:var(--tx-3)">');
      if(resp.error.indexOf('HTTP 401')>=0) h.push('<strong>401 Unauthorized</strong> — credentials are wrong or expired. Check Client ID / Client Secret in Systems &amp; Connections.');
      else if(resp.error.indexOf('HTTP 403')>=0) h.push('<strong>403 Forbidden</strong> — the Communication User does not have access to this endpoint. Check the IAM scope in BTP Communication Arrangement.');
      else if(resp.error.indexOf('HTTP 404')>=0) h.push('<strong>404 Not Found</strong> — this OData endpoint does not exist on your tenant. Try a different endpoint from the Collections tab.');
      else h.push(cfgEsc(resp.error));
      h.push('</div>');
    }
    h.push('</div></div></div>');
    return h.join('');
  }

  h.push('<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg-hover);border-radius:var(--r-md) var(--r-md) 0 0;border:1px solid var(--bd);border-bottom:none">');
  h.push('<span style="font-family:var(--mono);font-size:12.5px;font-weight:700;color:'+(ok?'var(--green)':'var(--red)')+'">'+resp.status+' '+cfgEsc(resp.statusText||'')+'</span>');
  h.push('<span style="font-size:11px;color:var(--tx-5)">'+resp.ms+'ms</span>');
  if(resp.rows!=null) h.push('<span class="tag badge-green">'+resp.rows+' rows</span>');
  // Store button
  if(resp.rows>0&&resp.mapKey){
    h.push('<button class="btn btn-accent btn-xs" style="margin-left:auto" onclick="cfgStoreResponse()">'+ic('database',10)+' Store as '+resp.mapKey+'</button>');
  } else if(resp.rawRows&&resp.rawRows.length>0){
    h.push('<div style="margin-left:auto;display:flex;align-items:center;gap:6px">');
    h.push('<input id="store-key-input" placeholder="dataset key e.g. USR02" style="width:130px;font-family:var(--mono);font-size:11px;padding:4px 7px"/>');
    h.push('<button class="btn btn-accent btn-xs" onclick="cfgStoreCustomKey()">'+ic('database',10)+' Store</button>');
    h.push('</div>');
  }
  h.push('</div>');
  // Tab bar
  h.push('<div style="display:flex;border-bottom:1px solid var(--bd);border-left:1px solid var(--bd);border-right:1px solid var(--bd);background:var(--bg-card)">');
  ['table','body','headers'].forEach(function(rt){
    var active=(App._cfgRespTab||'table')===rt;
    var label=rt==='table'?'Table'+(resp.rows?(' ('+resp.rows+')'):''):rt.charAt(0).toUpperCase()+rt.slice(1);
    h.push('<button onclick="App._cfgRespTab=\''+rt+'\';cfgRenderResponse(CFG_STATE.response)" style="padding:7px 13px;background:'+(active?'var(--bg-hover)':'transparent')+';border:none;border-right:1px solid var(--bd);color:'+(active?'var(--tx-1)':'var(--tx-5)')+';font-size:11.5px;font-weight:'+(active?'700':'400')+';cursor:pointer;font-family:var(--sans)">'+label+'</button>');
  });
  h.push('</div>');
  // Content
  h.push('<div style="border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r-md) var(--r-md);overflow:hidden">');
  var respTab=App._cfgRespTab||'table';
  if(respTab==='table'&&resp.rawRows&&resp.rawRows.length>0){
    var rows=resp.rawRows; var cols=Object.keys(rows[0]);
    h.push('<div style="max-height:320px;overflow:auto">');
    h.push('<table style="min-width:100%"><thead><tr>');
    cols.slice(0,10).forEach(function(c){h.push('<th>'+cfgEsc(c)+'</th>');});
    if(cols.length>10) h.push('<th>…</th>');
    h.push('</tr></thead><tbody>');
    rows.slice(0,200).forEach(function(row){
      h.push('<tr>');
      cols.slice(0,10).forEach(function(c){
        var v=row[c]; if(v===null||v===undefined)v='';
        h.push('<td>'+cfgEsc(String(v).slice(0,80))+'</td>');
      });
      if(cols.length>10) h.push('<td>…</td>');
      h.push('</tr>');
    });
    h.push('</tbody></table>');
    if(rows.length>200) h.push('<div class="tbl-footer"><span>Showing 200 of '+rows.length.toLocaleString()+' rows</span></div>');
    h.push('</div>');
  } else if(respTab==='body'){
    h.push('<div style="max-height:320px;overflow:auto;padding:12px;background:var(--bg-hover)">');
    h.push('<pre style="margin:0;font-size:11px;color:var(--tx-3);white-space:pre-wrap;word-break:break-all">'+cfgEsc((resp.bodyText||'').slice(0,50000))+'</pre>');
    h.push('</div>');
  } else if(respTab==='headers'){
    h.push('<div style="max-height:200px;overflow:auto;padding:12px;background:var(--bg-hover)">');
    (resp.respHeaders||[]).forEach(function(kv){
      h.push('<div style="display:flex;gap:10px;font-size:11.5px;padding:2px 0"><span style="color:var(--tx-5);font-family:var(--mono);min-width:160px">'+cfgEsc(kv[0])+'</span><span style="color:var(--tx-3)">'+cfgEsc(kv[1])+'</span></div>');
    });
    h.push('</div>');
  } else {
    h.push('<div style="padding:24px;text-align:center;color:var(--tx-5);font-size:12px">'+(resp.rawRows?'No rows parsed — check the Body tab for raw response':'No data')+'</div>');
  }
  h.push('</div>');
  return h.join('');
}

async function cfgRunRequest(){
  var url=document.getElementById('run-url')&&document.getElementById('run-url').value||CFG_STATE.url||'';
  var method=document.getElementById('run-method')&&document.getElementById('run-method').value||CFG_STATE.method||'GET';
  CFG_STATE.url=url; CFG_STATE.method=method;
  if(!url){toast('Enter a URL first','warn');return;}
  await cfgExecute(url,method,null,null,null);
}

async function cfgRunCollection(gi,ii){
  var sys=getActiveRunnerSys();
  if(!sys){toast('No Public Cloud system configured','warn');return;}
  var item=SAP_COLLECTION[gi].items[ii];
  var fullUrl=(sys.apiUrl||'').replace(/\/$/,'')+item.path;
  if(item.params) fullUrl+='?'+item.params;
  await cfgExecute(fullUrl,item.method,item.mapKey,item.mapFn,sys);
}

async function cfgRunAllCollections(){
  var sys=getActiveRunnerSys();
  if(!sys){toast('No Public Cloud system configured','warn');return;}
  toast('Running all core IAM endpoints...','info');
  var coreItems=[];
  SAP_COLLECTION.slice(0,2).forEach(function(grp){
    grp.items.slice(0,2).forEach(function(item){
      if(item.mapKey) coreItems.push(item);
    });
  });
  var count=0;
  for(var ci=0;ci<coreItems.length;ci++){
    var item=coreItems[ci];
    var fullUrl=(sys.apiUrl||'').replace(/\/$/,'')+item.path+'?'+item.params;
    try{
      await cfgExecute(fullUrl,item.method,item.mapKey,item.mapFn,sys,true);
      count++;
    }catch(e){toast('Failed: '+item.name+' — '+e.message.slice(0,60),'warn');}
  }
  toast('Bulk run complete — '+count+'/'+coreItems.length+' endpoints succeeded. Check Data Store tab.','ok');
  CFG_STATE.tab='store'; cfgSaveState(); renderApiConfig();
}

async function cfgExecute(url, method, mapKey, mapFnName, sys, silent){
  var btn=document.getElementById('run-send-btn');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  var statusEl=document.getElementById('pull-status');
  try{
    var targetSys=sys||getActiveRunnerSys();
    // Build auth header - try to get token, but if CORS blocks it relay will handle it
    var authHeader={};
    var sysCreds=null; // Pass credentials to relay so IT can auth
    if(targetSys&&targetSys.cloudType==='public'){
      sysCreds={
        authMethod:targetSys.authMethod||'oauth',
        tokenUrl:targetSys.tokenUrl||'',
        clientId:targetSys.clientId||'',
        clientSecret:targetSys.clientSecret||'',
        scopes:targetSys.scopes||'',
        commUser:targetSys.commUser||'',
        commPass:targetSys.commPass||'',
        apiUrl:targetSys.apiUrl||'',
      };
      try{
        var tokenObj=await getOAuthToken(targetSys);
        authHeader=buildAuthHeader(tokenObj);
      }catch(e){
        // Token fetch failed (likely CORS) - relay will handle auth itself
        if(!silent) console.warn('[Auth] Token fetch failed:',e.message,'— relay will handle auth');
      }
    }
    // Add manual headers
    var extraHeaders={};
    CFG_STATE.headers.forEach(function(hdr){if(hdr.on&&hdr.key)extraHeaders[hdr.key]=hdr.val;});
    var allHeaders=Object.assign({'Accept':'application/json'},authHeader,extraHeaders);

    // Build final URL with params
    var finalUrl=url;
    var activeParams=CFG_STATE.params.filter(function(p){return p.on&&p.key;});
    if(activeParams.length>0&&CFG_STATE.tab==='runner'){
      var qs=activeParams.map(function(p){return encodeURIComponent(p.key)+'='+encodeURIComponent(p.val);}).join('&');
      finalUrl=url+(url.indexOf('?')>=0?'&':'?')+qs;
    }

    window._lastSysCreds=sysCreds; // so sapPublicFetch can pass to relay
    var t0=Date.now();
    var resp=await sapPublicFetch(finalUrl,allHeaders,'Request');
    var ms=Date.now()-t0;

    // Parse rows
    var rawRows=resp.value||(resp.d&&resp.d.results)||[];
    if(!Array.isArray(rawRows)&&typeof resp==='object') rawRows=[resp];

    // Map rows if a mapping function is provided
    var mappedRows=rawRows;
    if(mapFnName&&typeof window[mapFnName]==='function'){
      try{mappedRows=window[mapFnName](rawRows);}catch(e){mappedRows=rawRows;}
    }

    var respObj={
      status:200, statusText:'OK', ms:ms,
      rows:rawRows.length,
      rawRows:rawRows,
      mappedRows:mappedRows,
      mapKey:mapKey,
      bodyText:JSON.stringify(resp,null,2),
      respHeaders:[['content-type','application/json'],['x-rows',rawRows.length]],
    };
    CFG_STATE.response=respObj;

    // Auto-store if mapKey provided
    if(mapKey&&mappedRows.length>0){
      cfgStoreDataset(mapKey,mappedRows,url);
      if(!silent) toast(''+rawRows.length+' rows fetched and stored as '+mapKey,'ok');
    } else if(!silent){
      toast(rawRows.length+' rows fetched','ok');
    }

    if(!silent){
      App._cfgRespTab='table';
      cfgRenderResponse(respObj);
    }
    cfgSaveState();
    return respObj;
  }catch(e){
    var isCors=e.message==='CORS_BLOCKED'||( e.message&&e.message.indexOf('CORS_BLOCKED')===0);
    var errObj={status:isCors?0:500,statusText:isCors?'CORS Blocked':'Error',ms:0,rows:0,rawRows:[],bodyText:e.message,respHeaders:[],error:e.message,isCors:isCors};
    CFG_STATE.response=errObj;
    if(!silent){
      if(isCors){
        cfgShowCorsHelper();
      } else {
        var errResp=document.getElementById('run-response')||document.getElementById('col-response');
        if(errResp) errResp.innerHTML='<div style="padding:14px 16px;background:rgba(244,82,77,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--r-md);font-size:12.5px;color:var(--red)">'+
          ic('alert-triangle',14,'var(--red)')+'&nbsp;<strong>'+e.message.slice(0,120)+'</strong></div>';
        toast('Request failed: '+e.message.slice(0,60),'err');
      }
    }
    throw e;
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Send';}
  }
}

async function cfgOpenRelayAndRetry(){
  var m=document.getElementById('cors-helper-modal');
  if(m&&m.parentNode) m.parentNode.removeChild(m);
  openRelayTab();
  toast('Relay tab opened — waiting for it to become ready...','info');
  // Poll for relay heartbeat (up to 8 seconds)
  var ready=false;
  for(var wi=0;wi<80;wi++){
    await new Promise(function(r){setTimeout(r,100);});
    if(relayIsAlive()){ready=true;break;}
  }
  if(!ready){
    toast('Relay tab did not respond — make sure popups are allowed and try again','warn');
    return;
  }
  toast('Relay ready! Retrying request...','ok');
  await new Promise(function(r){setTimeout(r,200);});
  if(CFG_STATE.tab==='collections'&&App._cfgColSel){
    var parts=App._cfgColSel.split('_');
    cfgRunCollection(parseInt(parts[0]),parseInt(parts[1]));
  } else if(CFG_STATE.url){
    cfgRunRequest();
  } else {
    toast('Relay is ready — press Send to run your request','ok');
  }
}

// ── Dataset management ────────────────────────────────────────────
function cfgStoreResponse(){
  var resp=CFG_STATE.response;
  if(!resp||!resp.mapKey||!resp.mappedRows||!resp.mappedRows.length){toast('No data to store','warn');return;}
  cfgStoreDataset(resp.mapKey,resp.mappedRows,'API Runner');
  toast('Stored '+resp.mappedRows.length+' rows as '+resp.mapKey,'ok');
  renderApiConfig();
}
function cfgStoreCustomKey(){
  var keyEl=document.getElementById('store-key-input');
  var key=keyEl?keyEl.value.trim():'';
  var resp=CFG_STATE.response;
  if(!key){toast('Enter a dataset key','warn');return;}
  if(!resp||!resp.rawRows||!resp.rawRows.length){toast('No rows to store','warn');return;}
  cfgStoreDataset(key,resp.rawRows,'API Runner');
  toast('Stored '+resp.rawRows.length+' rows as '+key,'ok');
  renderApiConfig();
}
function cfgStoreDataset(key,rows,source){
  CFG_STATE.datasets[key]={rows:rows,savedAt:Date.now(),source:source||'API',rowCount:rows.length};
  // Also sync to sys.files so analysis engine can read it
  var sys=getActiveRunnerSys();
  if(sys){
    if(!sys.files)sys.files={};
    sys.files[key]={rows:rows,fileName:'api-'+key.toLowerCase(),rowCount:rows.length,pulledAt:Date.now()};
    // Persist to localStorage
    try{
      var cacheKey='bcs_api_data_'+sys.id;
      var existing={};
      try{existing=JSON.parse(localStorage.getItem(cacheKey)||'{}');}catch(e){}
      // Map dataset key to cache field
      var cacheFields={USR02:'usrRows',AGR_USERS:'roleRows',CATALOGS:'catalogRows',BIZ_ROLES:'bizRoleRows'};
      if(cacheFields[key]) existing[cacheFields[key]]=rows;
      existing.pulledAt=Date.now();
      localStorage.setItem(cacheKey,JSON.stringify(existing));
    }catch(e){}
  }
  cfgSaveState();
}
function cfgApplyToAnalysis(){
  var sys=getActiveRunnerSys();
  if(!sys){toast('No active system','warn');return;}
  var count=0;
  Object.keys(CFG_STATE.datasets).forEach(function(key){
    var d=CFG_STATE.datasets[key];
    if(!sys.files)sys.files={};
    sys.files[key]={rows:d.rows,fileName:'api-'+key.toLowerCase(),rowCount:d.rows.length,pulledAt:Date.now()};
    count++;
  });
  toast(count+' dataset'+(count!==1?'s':'')+' applied to analysis engine','ok');
  navigate('analyze');
}
function cfgDeleteDataset(key){
  delete CFG_STATE.datasets[key];
  var sys=getActiveRunnerSys();
  if(sys&&sys.files) delete sys.files[key];
  cfgSaveState();
  toast('Dataset '+key+' deleted','info');
  renderApiConfig();
}
function cfgClearAllDatasets(){
  if(!confirm('Clear all stored datasets?'))return;
  CFG_STATE.datasets={};
  var sys=getActiveRunnerSys();
  if(sys){sys.files={};}
  cfgSaveState();
  toast('All datasets cleared','info');
  renderApiConfig();
}
function cfgExportCSV(key){
  var d=CFG_STATE.datasets[key];
  if(!d||!d.rows.length){toast('No data to export','warn');return;}
  var cols=Object.keys(d.rows[0]);
  var csv=[cols.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',')];
  d.rows.forEach(function(row){csv.push(cols.map(function(c){return '"'+String(row[c]||'').replace(/"/g,'""')+'"';}).join(','));});
  var blob=new Blob([csv.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=key+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('Exported '+d.rows.length+' rows as '+key+'.csv','ok');
}

// ── Auth quick-fill ───────────────────────────────────────────────
async function cfgFillAuth(){
  var sys=getActiveRunnerSys();
  if(!sys){toast('No system configured','warn');return;}
  try{
    var tokenObj=await getOAuthToken(sys);
    var header=buildAuthHeader(tokenObj);
    var authKey=Object.keys(header)[0];
    var authVal=header[authKey];
    // Set in headers array
    var existing=CFG_STATE.headers.findIndex(function(h){return h.key&&h.key.toLowerCase()==='authorization';});
    if(existing>=0) CFG_STATE.headers[existing]={key:'Authorization',val:authVal,on:true};
    else CFG_STATE.headers.unshift({key:'Authorization',val:authVal,on:true});
    cfgSaveState();
    cfgRefreshReqPanel();
    toast('Authorization header set','ok');
  }catch(e){toast('Auth failed: '+e.message.slice(0,60),'err');}
}
function cfgFillUrl(base){
  var el=document.getElementById('run-url');
  if(el){el.value=base;CFG_STATE.url=base;}
}

function cfgClearData(){
  var sys=App.activeSys;
  if(!sys)return;
  if(!confirm('Clear all pulled API data for '+sys.name+'?'))return;
  sys.files={};sys._pullErrors=[];sys._lastApiPull=null;
  CFG_STATE.datasets={};
  try{localStorage.removeItem('bcs_api_data_'+sys.id);}catch(e){}
  cfgSaveState();
  toast('All data cleared','ok');

function openRelayTab(){
  var relayHtml=(function(){
  // Relay tab uses localStorage polling — works on file://, any browser
  return '<!DOCTYPE html><html><head><title>BCS SAP API Relay</title>'+
  '<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Montserrat,sans-serif;background:#070d1a;color:var(--tx-1);padding:20px;display:flex;flex-direction:column;height:100vh;gap:10px}'+

  '<h2>&#9889; BCS SAP API Relay</h2>'+

  '<div class="stat" id="st">&#9679; Active — polling for requests</div>'+
  '<div class="log" id="lg"></div>'+
  '<script>'+
  'var n=0,lg=document.getElementById("lg"),st=document.getElementById("st");'+
  'function add(m,c){var d=document.createElement("div");d.className=c||"info";d.textContent=new Date().toLocaleTimeString()+" "+m;lg.prepend(d);}'+
  // Heartbeat every 1s so main app knows relay is alive
  'setInterval(function(){try{localStorage.setItem("bcs_relay_heartbeat",Date.now());}catch(e){}},1000);'+
  'localStorage.setItem("bcs_relay_heartbeat",Date.now());'+
  'add("Relay ready","ok");'+
  // Poll for incoming requests every 100ms
  'setInterval(async function(){'+
  '  try{'+
  '    var keys=Object.keys(localStorage);'+
  '    for(var ki=0;ki<keys.length;ki++){'+
  '      var k=keys[ki];'+
  '      if(k.indexOf("bcs_relay_req_")!==0) continue;'+
  '      var reqId=k.slice("bcs_relay_req_".length);'+
  '      var resKey="bcs_relay_res_"+reqId;'+
  '      if(localStorage.getItem(resKey)) continue;'+  // Already answered
  '      var reqData=JSON.parse(localStorage.getItem(k)||"null");'+
  '      if(!reqData) continue;'+
    '      localStorage.setItem(resKey,"__processing__");'+
  '      n++;'+
  '      st.textContent="\u25cf Active \u2014 "+n+" request"+(n!==1?"s":"")+" relayed";'+
  '      add("\u2192 "+reqData.url.slice(0,80));'+
  '      try{'+
  // Relay builds auth if credentials provided and no auth header yet
  '        var hdrs=Object.assign({"Accept":"application/json"},reqData.headers||{});'+
  '        if(reqData.creds&&!hdrs["Authorization"]){'+
  '          var cr=reqData.creds;'+
  '          if(cr.authMethod==="basic"&&cr.commUser&&cr.commPass){'+
  '            hdrs["Authorization"]="Basic "+btoa(cr.commUser+":"+cr.commPass);'+
  '            add("\u2192 Using Basic auth for: "+reqData.url.slice(0,60));'+
  '          } else if(cr.tokenUrl&&cr.clientId&&cr.clientSecret){'+
  '            try{'+
  '              var tokResp=await fetch(cr.tokenUrl,{method:"POST",'+
  '                headers:{"Authorization":"Basic "+btoa(cr.clientId+":"+cr.clientSecret),"Content-Type":"application/x-www-form-urlencoded"},'+
  '                body:"grant_type=client_credentials"+(cr.scopes?"&scope="+encodeURIComponent(cr.scopes):"")});'+
  '              if(tokResp.ok){var tokData=await tokResp.json();if(tokData.access_token){hdrs["Authorization"]="Bearer "+tokData.access_token;add("\u2192 OAuth2 token obtained");}}'+
  '              else{add("\u26a0 Token fetch HTTP "+tokResp.status,"err");}'+
  '            }catch(tokErr){add("\u26a0 Token fetch error: "+tokErr.message.slice(0,50),"err");}'+
  '          }'+
  '        }'+
  '        var method=hdrs["X-Method"]||"GET";var body=hdrs["X-Body"]||undefined;'+
  '        delete hdrs["X-Method"];delete hdrs["X-Body"];'+
  '        if(body&&!hdrs["Content-Type"])hdrs["Content-Type"]="application/x-www-form-urlencoded";'+
  '        var resp=await fetch(reqData.url,{method:method,headers:hdrs,body:body,mode:"cors",credentials:"omit"});'+
  '        if(!resp.ok){'+
  '          var errBody="";try{errBody=await resp.text();}catch(e2){}'+
  '          var errMsg="HTTP "+resp.status+" "+resp.statusText+(errBody?" — "+errBody.slice(0,200):"");'+
  '          localStorage.setItem(resKey,JSON.stringify({error:errMsg}));'+

  '          var rows=json.value?json.value.length:(json.d&&json.d.results?json.d.results.length:"?");'+

  '    }'+
  '  }catch(e){}'+
  '},100);'+
  '<\/script></body></html>';})();
  var blob=new Blob([relayHtml],{type:'text/html'});

function downloadBridge(os){
  var isWin=os==='Windows';
  var content=isWin?
'@echo off\r\ntitle BCS SAP API Bridge\r\necho BCS SAP Secure Studio - API Bridge\r\necho.\r\npython --version >nul 2>&1 || (echo Python not found - download from python.org && pause && exit)\r\necho Installing dependencies...\r\npip install flask flask-cors requests -q\r\necho Starting API Bridge on http://localhost:3100\r\necho Keep this window open while using BCS Secure Studio.\r\necho.\r\npython -c "from flask import Flask,request,Response;from flask_cors import CORS;import requests as rq;app=Flask(__name__);CORS(app,origins=[\'*\']);app.route(\'/ping\')(lambda:( \'OK\',200));@app.route(\'/<path:t>\',methods=[\'GET\',\'POST\',\'PUT\',\'DELETE\',\'OPTIONS\'])\\ndef p(t):\\n u=rq.utils.unquote(t);u=(\'https://\'+u) if not u.startswith(\'http\') else u\\n try:\\n  h2={k:v for k,v in request.headers if k.lower() not in(\'host\',\'content-length\',\'transfer-encoding\')}\\n  r=rq.request(method=request.method,url=u,headers=h2,data=request.get_data(),params=request.args,verify=True,timeout=30)\\n  rh=[(k,v) for k,v in r.headers.items() if k.lower() not in(\'transfer-encoding\',\'content-encoding\',\'connection\')]\\n  rh+=[(\'Access-Control-Allow-Origin\',\'*\'),(\'Access-Control-Allow-Headers\',\'*\'),(\'Access-Control-Allow-Methods\',\'*\')]\\n  return Response(r.content,status=r.status_code,headers=rh)\\n except Exception as e: return str(e),502\\nprint(\'BCS SAP Bridge on http://localhost:3100\');app.run(host=\'0.0.0.0\',port=3100,debug=False)"':
'#!/usr/bin/env bash\necho "BCS SAP Secure Studio — API Bridge"\npython3 -c "\nfrom flask import Flask,request,Response\nfrom flask_cors import CORS\nimport requests as rq\napp=Flask(__name__)\nCORS(app,origins=[\'*\'])\n@app.route(\'/ping\')\ndef ping(): return \'OK\',200\n@app.route(\'/<path:t>\',methods=[\'GET\',\'POST\',\'PUT\',\'DELETE\',\'OPTIONS\'])\ndef p(t):\n u=rq.utils.unquote(t); u=(\'https://\'+u) if not u.startswith(\'http\') else u\n try:\n  h2={k:v for k,v in request.headers if k.lower() not in (\'host\',\'content-length\',\'transfer-encoding\')}\n  r=rq.request(method=request.method,url=u,headers=h2,data=request.get_data(),params=request.args,verify=True,timeout=30)\n  rh=[(k,v) for k,v in r.headers.items() if k.lower() not in (\'transfer-encoding\',\'content-encoding\',\'connection\')]\n  rh+=[(\'Access-Control-Allow-Origin\',\'*\'),(\'Access-Control-Allow-Headers\',\'*\'),(\'Access-Control-Allow-Methods\',\'*\')]\n  return Response(r.content,status=r.status_code,headers=rh)\n except Exception as e: return str(e),502\nprint(\'BCS SAP Bridge on http://localhost:3100\')\napp.run(host=\'0.0.0.0\',port=3100,debug=False)\n"';
  var fname=isWin?'sap_bridge.bat':'sap_bridge.sh';
  var blob=new Blob([content],{type:'text/plain'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
  localStorage.setItem('bcs_cors_proxy',JSON.stringify({url:'http://localhost:3100',enabled:true}));
  toast(fname+' downloaded — double-click to start, then come back and Send','ok');
  renderApiConfig();
}



async function runPublicCloudAnalysis(sys,onProgress,onLog){
  var logFn=onLog||function(){};
  logFn('Step 1/5: Authenticating ('+(sys.authMethod==='basic'?'Communication System User':'OAuth2 Client Credentials')+')...','info');
  var tokenObj;
  try{
    tokenObj=await getOAuthToken(sys);
    logFn('Step 1/5: Auth OK — token obtained','ok');
  }catch(e){
    var isCors=e.message&&(e.message.indexOf('Failed to fetch')>=0||e.message.indexOf('CORS')>=0||e.message.indexOf('NetworkError')>=0);
    if(isCors){
      logFn('CORS ERROR: Browser cannot call the OAuth2 token endpoint directly. '+
            'You must run the included CORS proxy on your machine. '+
            'Download sap_proxy.py from the API Config page and run: python3 sap_proxy.py','err');
    } else {
      logFn('Auth failed: '+e.message,'err');
    }
    throw e;
  }
  var rawUsers=[],rawRoles=[],rawCatalogs=[],rawBizRoles=[];
  var errors=[];
  logFn('Step 2/5: Fetching users...','info');
  try{rawUsers=await fetchPublicCloudUsers(sys,tokenObj);logFn('Step 2/5: Users — '+rawUsers.length+' records','ok');}
  catch(e){
    var isCors=e.message&&e.message.indexOf('CORS_BLOCKED')===0;
    logFn('Step 2/5 FAILED: '+(isCors?'CORS blocked — API not reachable from browser. Run sap_proxy.py first.':e.message),'err');
    errors.push({step:'Users',cors:isCors,msg:e.message});
  }
  onProgress&&onProgress(20);
  logFn('Step 3/5: Fetching role assignments...','info');
  try{rawRoles=await fetchPublicCloudRoleAssignments(sys,tokenObj);logFn('Step 3/5: Role Assignments — '+rawRoles.length+' records','ok');}
  catch(e){
    var isCors=e.message&&e.message.indexOf('CORS_BLOCKED')===0;
    logFn('Step 3/5 FAILED: '+(isCors?'CORS blocked.':e.message),'err');
    errors.push({step:'Roles',cors:isCors,msg:e.message});
  }
  onProgress&&onProgress(40);
  logFn('Step 4/5: Fetching business catalogs...','info');
  try{rawCatalogs=await fetchPublicCloudCatalogs(sys,tokenObj);logFn('Step 4/5: Catalogs — '+rawCatalogs.length+' records','ok');}
  catch(e){
    logFn('Step 4/5 FAILED: '+e.message,'warn');
    errors.push({step:'Catalogs',msg:e.message});
  }
  onProgress&&onProgress(60);
  logFn('Step 5/5: Fetching business roles...','info');
  try{rawBizRoles=await fetchPublicCloudBusinessRoles(sys,tokenObj);logFn('Step 5/5: Business Roles — '+rawBizRoles.length+' records','ok');}
  catch(e){
    logFn('Step 5/5 FAILED: '+e.message,'warn');
    errors.push({step:'BizRoles',msg:e.message});
  }
  onProgress&&onProgress(80);
  var corsErrors=errors.filter(function(e){return e.cors;});
  if(corsErrors.length>0){
    logFn('','warn');
    logFn('CORS PROXY REQUIRED: '+corsErrors.length+' API call(s) were blocked by the browser CORS policy.','warn');
    logFn('This is a browser security restriction, not a credentials issue.','warn');
    logFn('Solution: Download and run sap_proxy.py on the same machine as your browser.','warn');
    logFn('Then configure the proxy URL in Configurations.','warn');
  }
  sys._pullErrors=errors;
  sys._publicCloudToken=tokenObj;
  sys._publicCloudCatalogs=rawCatalogs;
  sys._publicCloudBizRoles=rawBizRoles;
  sys._lastApiPull=Date.now();  // Timestamp so we know pull was attempted
  if(!sys.files) sys.files={};
  // Always store results (even 0 rows) so analysis engine knows pull was attempted
  // This prevents demo fallback when CORS blocks the call
  sys.files['USR02']    ={rows:rawUsers,    fileName:'cloud-users',  rowCount:rawUsers.length,    pulledAt:Date.now()};
  sys.files['AGR_USERS']={rows:rawRoles,    fileName:'cloud-roles',  rowCount:rawRoles.length,    pulledAt:Date.now()};
  sys.files['CATALOGS'] ={rows:rawCatalogs, fileName:'cloud-catalogs',rowCount:rawCatalogs.length, pulledAt:Date.now()};
  sys.files['BIZ_ROLES']={rows:rawBizRoles, fileName:'cloud-bizroles',rowCount:rawBizRoles.length, pulledAt:Date.now()};
  // Persist to localStorage so data survives page refresh
  try{
    var cacheKey='bcs_api_data_'+sys.id;
    var cacheObj={usrRows:rawUsers,roleRows:rawRoles,catalogRows:rawCatalogs,bizRoleRows:rawBizRoles,pulledAt:Date.now()};
    localStorage.setItem(cacheKey, JSON.stringify(cacheObj));
  }catch(e){}
  var totalPulled=rawUsers.length+rawRoles.length+rawCatalogs.length+rawBizRoles.length;
  onLog&&onLog('Pull complete: '+totalPulled+' total records (users:'+rawUsers.length+' roles:'+rawRoles.length+' catalogs:'+rawCatalogs.length+' bizRoles:'+rawBizRoles.length+')');
  onLog&&onLog('Data stored — running analysis engines...');
  return sys;
}

function restorePublicCloudCache(sys){
  // Restore API-pulled data from localStorage cache (survives page refresh)
  if(!sys||sys.cloudType!=='public') return false;
  try{
    var cacheKey='bcs_api_data_'+sys.id;
    var cached=localStorage.getItem(cacheKey);
    if(!cached) return false;
    var c=JSON.parse(cached);
    if(!c.pulledAt) return false;
    if(!sys.files) sys.files={};
    sys.files['USR02']    ={rows:c.usrRows||[],     fileName:'cloud-users',   rowCount:(c.usrRows||[]).length,     pulledAt:c.pulledAt};
    sys.files['AGR_USERS']={rows:c.roleRows||[],    fileName:'cloud-roles',   rowCount:(c.roleRows||[]).length,    pulledAt:c.pulledAt};
    sys.files['CATALOGS'] ={rows:c.catalogRows||[], fileName:'cloud-catalogs',rowCount:(c.catalogRows||[]).length, pulledAt:c.pulledAt};
    sys.files['BIZ_ROLES']={rows:c.bizRoleRows||[], fileName:'cloud-bizroles',rowCount:(c.bizRoleRows||[]).length, pulledAt:c.pulledAt};
    sys._lastApiPull=c.pulledAt;
    return true;
  }catch(e){return false;}
}

async function handlePullPublicCloudData(sysId){
  var sys=App.systems.find(function(s){return s.id===sysId;});
  if(!sys||sys.cloudType!=='public'){toast('Not a public cloud system','warn');return;}
  var method=sys.authMethod||'oauth';
  var missingCreds=(method==='oauth'&&(!sys.tokenUrl||!sys.clientId||!sys.clientSecret))
    ||(method==='basic'&&(!sys.commUser||!sys.commPass));
  if(missingCreds||!sys.apiUrl){toast('Configure API credentials first','warn');navigate('connect');return;}
  toast('Connecting to SAP Public Cloud API...','info');
  try{
    App.activeSysId=sysId;
    await runPublicCloudAnalysis(sys,
      function(pct){var pf=document.getElementById('prog-fill');if(pf)pf.style.width=pct+'%';},
      function(msg){toast(msg.slice(0,60),'info');});
    var total=Object.values(sys.files||{}).reduce(function(a,f){return a+(f.rowCount||0);},0);
    toast('Pull complete — '+total+' records loaded. Ready to analyse.','ok');
    if(typeof renderApiConfig==='function') renderApiConfig();
    else if(typeof renderConnect==='function') renderConnect();
  }catch(e){
    toast('API pull failed: '+e.message.slice(0,80),'err');
    console.error('[Pull]',e);
  }
}

var FIORI_CATALOG_CACHE={};
async function lookupFioriApp(appId,sys){
  if(FIORI_CATALOG_CACHE[appId]) return FIORI_CATALOG_CACHE[appId];
  if(sys&&sys.cloudType==='public'&&sys._publicCloudToken){
    try{
      var base=sys.apiUrl.replace(/\/$/,'');
      var url=base+'/sap/opu/odata4/sap/api_iam_group/srvd_a2x/sap/iam_group/0001/AppCollection(AppID=\''+encodeURIComponent(appId)+'\')?$format=json';
      var resp=await fetch(url,{headers:Object.assign({'Accept':'application/json'},buildAuthHeader(sys._publicCloudToken))});
      if(resp.ok){var data=await resp.json();FIORI_CATALOG_CACHE[appId]=data;return data;}
    }catch(e){}
  }
  return null;
}
