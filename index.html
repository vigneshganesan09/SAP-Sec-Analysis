*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;--bg2:#0b1120;--bg3:#111928;--bg4:#182033;--bg5:#1f2a3e;
  --bd:#1e2d44;--bd2:#253450;--bd3:#2d3f5c;
  --txt:#dde8f4;--txt2:#8aa0bc;--txt3:#4d6280;--txt4:#2d405e;
  --cyan:#00d4ff;--cyan2:#67e8f9;--cyan3:rgba(0,212,255,0.12);
  --red:#f04040;--red2:#fca5a5;--orange:#f97316;--orange2:#fdba74;
  --yellow:#f5c542;--yellow2:#fde68a;--green:#10c98a;--green2:#6ee7b7;
  --blue:#3b82f6;--purple:#a855f7;
  --font:'Mulish',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;--display:'Syne',sans-serif;
  --radius:10px;--radius-lg:16px;
}
html,body{background:var(--bg);font-family:var(--font);color:var(--txt);line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.spin-icon{animation:spin 1s linear infinite}
.fade-up{animation:fadeUp .3s ease forwards}
.scale-in{animation:scaleIn .25s ease forwards}
.pulse{animation:pulse 2s ease-in-out infinite}
input,textarea,select{font-family:var(--mono);background:var(--bg3);border:1px solid var(--bd2);color:var(--txt);border-radius:var(--radius);padding:9px 12px;font-size:12px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
button{font-family:var(--font);cursor:pointer;border:none;transition:all .15s}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.04em;white-space:nowrap}

  </style>
</head>

const s = (k) => SEV[k] || SEV.INFO;
const SevTag = ({ v, sm }) => {
  const c = s(v);

};

/* ═══════════════════════════════════════════════════════════════════
   PDF GENERATION (jsPDF + autoTable loaded from CDN)
═══════════════════════════════════════════════════════════════════ */
async function loadPDFLibs() {
  if (window.jspdf && window.jspdf.jsPDF) return window.jspdf.jsPDF;
  await new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload = res; s.onerror = rej; document.head.appendChild(s);
  });
  await new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js";
    s.onload = res; s.onerror = rej; document.head.appendChild(s);
  });
  return window.jspdf.jsPDF;
}

function getRiskColor(r) {
  const map = { CRITICAL:[220,50,50], HIGH:[220,120,40], MEDIUM:[200,160,40], WARN:[200,160,40], FAIL:[220,120,40], PASS:[30,160,100], LOW:[30,160,100] };
  return map[r] || [100,130,180];
}

async function generatePDF(results, controls, conn, riskScore) {
  const JsPDF = await loadPDFLibs();
  const doc = new JsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W = 210, H = 297;
  const now = new Date(results.timestamp).toLocaleString();

  // ── COVER PAGE ──
  doc.setFillColor(6, 9, 15);
  doc.rect(0, 0, W, H, "F");
  // Accent bar
  doc.setFillColor(0, 180, 220);
  doc.rect(0, 0, 4, H, "F");
  // Title
  doc.setFont("helvetica","bold");
  doc.setFontSize(28); doc.setTextColor(0, 212, 255);
  doc.text("SAP SECURITY", 22, 55);
  doc.setFontSize(22); doc.setTextColor(200, 220, 240);
  doc.text("GAP ANALYSIS REPORT", 22, 68);
  // Divider
  doc.setDrawColor(30, 45, 68); doc.setLineWidth(0.4);
  doc.line(22, 74, W-20, 74);
  // System info
  const meta = [
    ["System", conn?.name || "SAP System"],
    ["Host", `${conn?.host||"—"}:${conn?.port||"8080"}`],
    ["SID", conn?.sid || "—"],
    ["Client", conn?.client || "—"],
    ["Report Date", now],
    ["Benchmark", "SAP Security Baseline v1.8 / SAP Note 2034492"],
  ];
  doc.setFontSize(10); let my = 84;
  meta.forEach(([k,v]) => {
    doc.setFont("helvetica","bold"); doc.setTextColor(77, 98, 128);
    doc.text(k.toUpperCase(), 22, my);
    doc.setFont("helvetica","normal"); doc.setTextColor(200, 220, 240);
    doc.text(v, 65, my); my += 8;
  });
  // Risk score circle
  const rc = getRiskColor(riskScore > 75 ? "CRITICAL" : riskScore > 50 ? "HIGH" : riskScore > 25 ? "MEDIUM" : "PASS");
  doc.setFillColor(...rc); doc.circle(160, 100, 22, "F");
  doc.setFillColor(6,9,15); doc.circle(160, 100, 18, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(20); doc.setTextColor(...rc);
  doc.text(String(riskScore), 160, 104, { align:"center" });
  doc.setFontSize(7); doc.setTextColor(77,98,128);
  doc.text("RISK SCORE", 160, 111, { align:"center" });

  // KPI boxes
  const enabled = controls.filter(c => c.enabled);
  const kpis = [
    { label:"Controls Run",     val: String(enabled.length), color:[0,180,220] },
    { label:"Total Findings",   val: String(Object.values(results).filter(v=>Array.isArray(v)).reduce((a,b)=>a+b.length,0)), color:[220,50,50] },
    { label:"Critical",         val: String(Object.values(results).filter(Array.isArray).flat().filter(r=>r.risk==="CRITICAL").length), color:[220,50,50] },
    { label:"Param Deviations", val: String((results.securityParams||[]).filter(p=>p.status!=="PASS").length), color:[220,120,40] },
  ];
  let kx = 22; const ky = 155;
  kpis.forEach(k => {
    doc.setFillColor(17,25,40); doc.roundedRect(kx, ky, 40, 22, 2, 2, "F");
    doc.setFillColor(...k.color); doc.roundedRect(kx, ky, 40, 2, 1, 1, "F");
    doc.setFont("helvetica","bold"); doc.setFontSize(16); doc.setTextColor(...k.color);
    doc.text(k.val, kx+20, ky+13, {align:"center"});
    doc.setFontSize(7); doc.setTextColor(100,130,160);
    doc.text(k.label.toUpperCase(), kx+20, ky+19, {align:"center"});
    kx += 44;
  });

  // Footer
  doc.setFontSize(8); doc.setTextColor(40,60,90);
  doc.text("CONFIDENTIAL — For Internal Use Only", W/2, H-12, {align:"center"});
  doc.text("Generated by SAP Security Analyzer", W/2, H-7, {align:"center"});

  // ── EXECUTIVE SUMMARY PAGE ──
  doc.addPage();
  doc.setFillColor(6, 9, 15); doc.rect(0, 0, W, H, "F");
  doc.setFillColor(0, 180, 220); doc.rect(0, 0, 4, H, "F");

  const pageHeader = (title, sub) => {
    doc.setFont("helvetica","bold"); doc.setFontSize(14); doc.setTextColor(0,212,255);
    doc.text(title, 14, 18);
    doc.setFontSize(8); doc.setFont("helvetica","normal"); doc.setTextColor(77,98,128);
    doc.text(sub, 14, 25);
    doc.setDrawColor(30,45,68); doc.setLineWidth(0.3); doc.line(14, 28, W-14, 28);
  };

  pageHeader("Executive Summary", "Risk overview and prioritized remediation actions");

  // Remediation priorities
  const sections = [
    { title:"🔴  P1 — Immediate (Within 48 Hours)", color:[220,50,50], items:[
      "Remove SAP_ALL/SAP_NEW from all non-basis users (zero tolerance)",
      "Lock SAP*, EARLYWATCH in all clients; change DDIC default password",
      "Investigate and block external IPs with 20+ failed login attempts",
      "Remove S_DEVELOP/ACTVT=02 debug access from all production users",
      "Set production client 100 to No Changes Allowed (SCC4)",
    ]},
    { title:"🟠  P2 — Short-term (Within 30 Days)", color:[220,120,40], items:[
      "Remediate all SOX-relevant SoD conflicts or document compensating controls",
      "Force password reset for users with passwords older than 90 days",
      "Lock all dormant users inactive >180 days; delete after 365 days",
      "Set login/min_password_lng=8, min_password_specials=1, min_password_digits=1",
      "Set login/fails_to_user_lock=5 and login/failed_user_auto_unlock=0",
      "Close RFC destinations with stored credentials or no authentication",
    ]},
    { title:"🟡  P3 — Medium-term (Within 90 Days)", color:[200,160,40], items:[
      "Enable GUI auto-logout: rdisp/gui_auto_logout=3600",
      "Enable SNC encryption: snc/enable=1",
      "Convert all perpetual firefighter access to time-limited assignments",
      "Review and restrict S_TABU_DIS access for sensitive tables",
      "Enable comprehensive audit logging: rsau/max_diskspace/local=2000",
    ]},
  ];
  let sy = 34;
  sections.forEach(sec => {
    doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(...sec.color);
    doc.text(sec.title, 14, sy); sy += 5;
    doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(160,185,210);
    sec.items.forEach(item => {
      doc.text(`  •  ${item}`, 14, sy, {maxWidth:180}); sy += 5.5;
    });
    sy += 3;
  });

  // ── PER-CONTROL PAGES ──
  const enabledCtrl = controls.filter(c => c.enabled && results[c.resultKey] && results[c.resultKey].length > 0);
  let secNum = 1;

  for (const ctrl of enabledCtrl) {
    const data = results[ctrl.resultKey];
    if (!Array.isArray(data) || data.length === 0) continue;
    doc.addPage();
    doc.setFillColor(6,9,15); doc.rect(0,0,W,H,"F");
    doc.setFillColor(0,180,220); doc.rect(0,0,4,H,"F");

    pageHeader(`${secNum++}. ${ctrl.name}`, `${ctrl.table} · ${ctrl.entity} · ${ctrl.benchmark}`);

    // Description
    doc.setFont("helvetica","italic"); doc.setFontSize(8); doc.setTextColor(100,130,170);
    doc.text(ctrl.desc, 14, 34, {maxWidth:180});

    // Conditions
    doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(77,98,128);
    doc.text("ACTIVE CONDITIONS:", 14, 42);
    doc.setFont("helvetica","normal"); doc.setTextColor(130,160,190);
    ctrl.conditions.forEach((c, i) => {
      doc.text(`  [${i+1}] ${c.label}`, 14, 47 + i*5, {maxWidth:180});
    });

    const topY = 47 + ctrl.conditions.length * 5 + 4;

    // Count badge
    const sevC = getRiskColor(ctrl.severity);
    doc.setFillColor(...sevC.map(v=>Math.min(v,200)));
    doc.roundedRect(W-60, 28, 46, 14, 2, 2, "F");
    doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor(255,255,255);
    doc.text(`${data.length} FINDINGS`, W-37, 36, {align:"center"});
    doc.setFontSize(6); doc.setTextColor(230,230,230);
    doc.text(ctrl.severity, W-37, 40, {align:"center"});

    // Table
    const cols = (ctrl.columns || Object.keys(data[0])).slice(0,7);
    const colLabels = ctrl.colLabels || cols.map(c=>c.toUpperCase());
    const rows = data.map(row => cols.map(col => {
      const v = row[col];
      if (v === null || v === undefined) return "—";
      if (typeof v === "boolean") return v ? "Yes" : "No";
      return String(v);
    }));

    doc.autoTable({
      startY: topY,
      head: [colLabels.slice(0,7)],
      body: rows,
      margin: {left:14, right:14},
      styles: {
        fontSize:7.5, cellPadding:3, font:"helvetica",
        textColor:[190,210,230], lineColor:[30,45,68], lineWidth:0.2,
        fillColor:[11,17,32],
      },
      headStyles: {
        fillColor:[17,25,40], textColor:[100,130,160],
        fontStyle:"bold", fontSize:7, cellPadding:3.5,
        lineColor:[30,45,68], lineWidth:0.3,
      },
      alternateRowStyles: { fillColor:[8,13,24] },
      tableLineColor:[30,45,68], tableLineWidth:0.3,
      didDrawCell: (d) => {
        if (d.section === "body") {
          const val = String(d.cell.raw || "");
          const riskMap = {"CRITICAL":[220,50,50],"HIGH":[220,120,40],"MEDIUM":[200,160,40],"WARN":[200,160,40],"FAIL":[220,120,40],"PASS":[30,160,100],"LOW":[30,160,100]};
          if (riskMap[val]) {
            const [r,g,b] = riskMap[val];
            doc.setFillColor(r,g,b,0.15);
            doc.setTextColor(r,g,b);
            doc.setFont("helvetica","bold");
            doc.setFontSize(6.5);
            doc.text(val, d.cell.x + d.cell.width/2, d.cell.y + d.cell.height/2 + 0.5, {align:"center"});
            return false;
          }
          // Color days
          const daysMatch = val.match(/^(\d+)d$/);
          if (daysMatch) {
            const n = parseInt(daysMatch[1]);
            const [r,g,b] = n>365?[220,50,50]:n>180?[220,120,40]:[200,160,40];
            doc.setTextColor(r,g,b); doc.setFont("helvetica","bold"); doc.setFontSize(7.5);
            doc.text(val, d.cell.x+3, d.cell.y+d.cell.height/2+0.5);
            return false;
          }
        }
      },
    });

    // SAP note reference
    const finalY = (doc.lastAutoTable?.finalY||150) + 5;
    doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(50,70,100);
    doc.text(`SAP Note: ${ctrl.sapNote}  |  Fields: ${ctrl.fields}`, 14, Math.min(finalY, H-15));
  };

  // ── APPENDIX: PARAMETER DETAILS ──
  if (results.securityParams && results.securityParams.length) {
    doc.addPage();
    doc.setFillColor(6,9,15); doc.rect(0,0,W,H,"F");
    doc.setFillColor(0,180,220); doc.rect(0,0,4,H,"F");
    pageHeader("Appendix A: Security Parameter Detail", "Full SAP profile parameter analysis vs SAP Security Baseline v1.8");
    const rows = results.securityParams.map(p => [p.cat, p.param, p.desc, p.current, p.recommended, p.status]);
    doc.autoTable({
      startY:32,
      head:[["Category","Parameter","Description","Current","Recommended","Status"]],
      body:rows,
      margin:{left:14,right:14},
      styles:{fontSize:7,cellPadding:2.5,font:"helvetica",textColor:[190,210,230],lineColor:[30,45,68],lineWidth:0.2,fillColor:[11,17,32]},
      headStyles:{fillColor:[17,25,40],textColor:[100,130,160],fontStyle:"bold",fontSize:6.5,cellPadding:3,lineColor:[30,45,68],lineWidth:0.3},
      alternateRowStyles:{fillColor:[8,13,24]},
      columnStyles:{0:{cellWidth:20},1:{cellWidth:55},2:{cellWidth:55},3:{cellWidth:18},4:{cellWidth:18},5:{cellWidth:16}},
    });
  }

  // ── CUSTOM CONTROLS ──
  const customCtrl = controls.filter(c => c.enabled && !c.builtIn && results[c.resultKey]);
  for (const ctrl of customCtrl) {
    const data = results[ctrl.resultKey];
    if (!data || data.length === 0) continue;
    doc.addPage();
    doc.setFillColor(6,9,15); doc.rect(0,0,W,H,"F");
    doc.setFillColor(168,85,247); doc.rect(0,0,4,H,"F");
    pageHeader(`Custom Control: ${ctrl.name}`, `${ctrl.table} · ${ctrl.entity}`);
    doc.setFont("helvetica","italic"); doc.setFontSize(8); doc.setTextColor(100,130,170);
    doc.text(ctrl.desc || "User-defined control", 14, 33, {maxWidth:180});
    const cols = Object.keys(data[0]);
    const rows = data.map(r => cols.map(c => String(r[c]??"")));
    doc.autoTable({startY:40,head:[cols.map(c=>c.toUpperCase())],body:rows,margin:{left:14,right:14},styles:{fontSize:7,cellPadding:2.5,font:"helvetica",textColor:[190,210,230],lineColor:[30,45,68],lineWidth:0.2,fillColor:[11,17,32]},headStyles:{fillColor:[30,20,50],textColor:[180,140,240],fontStyle:"bold",fontSize:6.5,lineColor:[60,30,90]},alternateRowStyles:{fillColor:[8,13,24]}});
  }

  // Page numbers
  const totalPages = doc.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(40,60,90);
    doc.text(`Page ${i} of ${totalPages}`, W-14, H-6, {align:"right"});
    doc.text("SAP Security Gap Analysis — Confidential", 14, H-6);
  }

  doc.save(`SAP_Security_GapAnalysis_${conn?.sid||"SAP"}_${new Date().toISOString().slice(0,10)}.pdf`);
}

/* ═══════════════════════════════════════════════════════════════════
   CONDITION OPERATORS
═══════════════════════════════════════════════════════════════════ */
const OPERATORS = [
  {v:"older_than",   l:"Older than (days)"},
  {v:"greater_than", l:"Greater than"},
  {v:"less_than",    l:"Less than"},
  {v:"equals",       l:"Equals"},
  {v:"not_equal",    l:"Not equal to"},
  {v:"contains",     l:"Contains (comma-sep)"},
  {v:"match",        l:"Matches ruleset"},
  {v:"mismatch",     l:"Mismatches with"},
];

const SEVERITIES = ["CRITICAL","HIGH","MEDIUM","WARN","LOW","PASS"];
const CATS = ["User Management","Authorizations","System Config","Network/RFC","Monitoring","GRC/Emergency","Licensing","Custom"];

/* ═══════════════════════════════════════════════════════════════════
   CONTROL FORM COMPONENT
═══════════════════════════════════════════════════════════════════ */
function ControlForm({ initial, onSave, onCancel }) {
  const blank = { id:null, name:"", desc:"", table:"", fields:"", entity:"", cat:"Custom", severity:"HIGH", enabled:true, builtIn:false, conditions:[{ field:"", op:"greater_than", value:"", unit:"", label:"" }], sapNote:"", benchmark:"", resultKey:"", columns:[], colLabels:[] };
  const [form, setForm] = useState(initial ? {...initial} : blank);
  const [condErr, setCondErr] = useState("");

  const upd = (k, v) => setForm(f => ({...f, [k]:v}));
  const updCond = (i, k, v) => setForm(f => {
    const conds = [...f.conditions];
    conds[i] = {...conds[i], [k]:v};
    if (k==="field"||k==="op"||k==="value") {
      conds[i].label = `${conds[i].field||"Field"} ${conds[i].op||"op"} ${conds[i].value||"value"}`;
    }
    return {...f, conditions:conds};
  });
  const addCond = () => setForm(f => ({...f, conditions:[...f.conditions,{field:"",op:"greater_than",value:"",unit:"",label:""}]}));
  const remCond = (i) => setForm(f => ({...f, conditions:f.conditions.filter((_,j)=>j!==i)}));

  const validate = () => {
    if(!form.name.trim()){return "Name is required";}
    if(!form.table.trim()){return "SAP Table is required";}
    if(!form.entity.trim()){return "OData entity is required";}
    if(form.conditions.some(c=>!c.field||!c.value)){return "All conditions must have field and value";}
    return "";
  };

  const save = () => {
    const err = validate();
    if(err){setCondErr(err);return;}
    const out = {...form, id:form.id||`custom_${Date.now()}`, resultKey:form.resultKey||form.id||`custom_${Date.now()}`};
    onSave(out);
  };

  const inp = { background:"var(--bg3)", border:"1px solid var(--bd2)", borderRadius:"var(--radius)", padding:"8px 11px", color:"var(--txt)", fontFamily:"var(--mono)", fontSize:12, outline:"none", width:"100%" };
  const sel = { ...inp, cursor:"pointer" };
  const lbl = { display:"block", fontSize:10, color:"var(--txt3)", marginBottom:5, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", fontFamily:"var(--display)" };

  return (
    <div className="scale-in" style={{ background:"var(--bg3)", border:"1px solid rgba(168,85,247,.3)", borderRadius:14, padding:22, marginBottom:20 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:28, height:28, borderRadius:8, background:"rgba(168,85,247,.12)", border:"1px solid rgba(168,85,247,.3)", display:"flex", alignItems:"center", justifyContent:"center", color:"#a855f7" }}>
            <Icons.Filter size={13}/>
          </div>
          <span style={{ fontFamily:"var(--display)", fontWeight:700, color:"var(--txt)", fontSize:14 }}>
            {form.id && !form.builtIn ? "Edit Control" : form.builtIn ? "Configure Control" : "New Custom Control"}
          </span>
          {form.builtIn && <SevTag v="BUILT-IN" sm/>}
        </div>
        <button onClick={onCancel} style={{ background:"none", border:"none", color:"var(--txt3)", padding:4 }}><Icons.X size={16}/></button>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
        {/* Name */}
        <div style={{ gridColumn:"1/-1" }}>
          <label style={lbl}>Control Name *</label>
          <input style={inp} value={form.name} onChange={e=>upd("name",e.target.value)} placeholder="e.g. Super Users Without Time Restriction" disabled={form.builtIn}/>
        </div>
        {/* Description */}
        <div style={{ gridColumn:"1/-1" }}>
          <label style={lbl}>Description</label>
          <textarea style={{...inp,resize:"vertical",minHeight:56}} value={form.desc} onChange={e=>upd("desc",e.target.value)} placeholder="What risk does this control detect?"/>
        </div>
        {/* Table + Fields */}
        <div>
          <label style={lbl}>SAP Table(s) *</label>
          <input style={inp} value={form.table} onChange={e=>upd("table",e.target.value)} placeholder="e.g. AGR_USERS / USR12" disabled={form.builtIn}/>
        </div>
        <div>
          <label style={lbl}>SAP Fields</label>
          <input style={inp} value={form.fields} onChange={e=>upd("fields",e.target.value)} placeholder="e.g. BNAME,AGR_NAME,GLTGB"/>
        </div>
        {/* OData entity */}
        <div>
          <label style={lbl}>OData Entity *</label>
          <input style={inp} value={form.entity} onChange={e=>upd("entity",e.target.value)} placeholder="e.g. CustomCheckSet" disabled={form.builtIn}/>
        </div>
        {/* Category + Severity */}
        <div>
          <label style={lbl}>Category</label>
          <select style={sel} value={form.cat} onChange={e=>upd("cat",e.target.value)}>
            {CATS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label style={lbl}>Severity</label>
          <select style={sel} value={form.severity} onChange={e=>upd("severity",e.target.value)}>
            {SEVERITIES.map(v=><option key={v} value={v}>{v}</option>)}
          </select>
        </div>
        <div>
          <label style={lbl}>SAP Note</label>
          <input style={inp} value={form.sapNote} onChange={e=>upd("sapNote",e.target.value)} placeholder="e.g. 2034492"/>
        </div>
        {/* Benchmark */}
        <div style={{ gridColumn:"1/-1" }}>
          <label style={lbl}>Benchmark / Reference</label>
          <input style={inp} value={form.benchmark} onChange={e=>upd("benchmark",e.target.value)} placeholder="e.g. SAP Security Baseline v1.8 §4.1"/>
        </div>
      </div>

      {/* Conditions */}
      <div style={{ marginTop:20 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
          <label style={{ ...lbl, marginBottom:0 }}>Detection Conditions</label>
          <button onClick={addCond} style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 10px", background:"rgba(168,85,247,.1)", border:"1px solid rgba(168,85,247,.25)", borderRadius:7, color:"#a855f7", fontSize:11, fontWeight:600 }}>
            <Icons.Plus size={11}/> Add Condition
          </button>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {form.conditions.map((cond, i) => (
            <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr auto", gap:8, padding:"12px 14px", background:"var(--bg4)", borderRadius:9, border:"1px solid var(--bd)" }}>
              <div>
                <label style={{...lbl,marginBottom:4}}>SAP Field</label>
                <input style={inp} value={cond.field} onChange={e=>updCond(i,"field",e.target.value)} placeholder="e.g. TRDAT"/>
              </div>
              <div>
                <label style={{...lbl,marginBottom:4}}>Operator</label>
                <select style={sel} value={cond.op} onChange={e=>updCond(i,"op",e.target.value)}>
                  {OPERATORS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
              </div>
              <div>
                <label style={{...lbl,marginBottom:4}}>Value / Threshold</label>
                <input style={inp} value={cond.value} onChange={e=>updCond(i,"value",e.target.value)} placeholder="e.g. 90"/>
              </div>
              <div style={{ display:"flex", alignItems:"flex-end", paddingBottom:2 }}>
                <button onClick={()=>remCond(i)} disabled={form.conditions.length===1}
                  style={{ padding:"8px", background:"transparent", border:"1px solid var(--bd)", borderRadius:7, color:"var(--txt3)", opacity:form.conditions.length===1?0.3:1 }}>
                  <Icons.Trash size={13}/>
                </button>
              </div>
              <div style={{ gridColumn:"1/-1" }}>
                <label style={{...lbl,marginBottom:4}}>Condition Label (auto-fill or custom)</label>
                <input style={{...inp,fontSize:11}} value={cond.label} onChange={e=>updCond(i,"label",e.target.value)} placeholder="Human-readable description"/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {condErr && <div style={{ marginTop:12, padding:"9px 14px", background:"rgba(240,64,64,.1)", border:"1px solid rgba(240,64,64,.25)", borderRadius:8, color:"#fca5a5", fontSize:12 }}>{condErr}</div>}

      <div style={{ display:"flex", gap:8, marginTop:18 }}>
        <button onClick={save} style={{ display:"flex", alignItems:"center", gap:6, padding:"9px 18px", background:"var(--cyan)", color:"#000", borderRadius:9, fontWeight:700, fontSize:13 }}>
          <Icons.Save size={13}/> {form.builtIn ? "Save Configuration" : "Save Control"}
        </button>
        <button onClick={onCancel} style={{ display:"flex", alignItems:"center", gap:6, padding:"9px 14px", background:"var(--bg4)", border:"1px solid var(--bd2)", borderRadius:9, color:"var(--txt2)", fontSize:13 }}>
          <Icons.X size={13}/> Cancel
        </button>
      </div>
    </div>
  );
}

function DataTable({ cols, rows }) {
  return (
    <div style={{ overflowX:"auto", borderRadius:9, border:"1px solid var(--bd)" }}>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11.5, fontFamily:"var(--mono)" }}>
        <thead>
          <tr style={{ background:"var(--bg3)", borderBottom:"1px solid var(--bd2)" }}>
            {cols.map(c => <th key={c.k} style={{ padding:"9px 13px", textAlign:"left", color:"var(--txt3)", fontSize:9.5, fontWeight:700, letterSpacing:"0.09em", textTransform:"uppercase", whiteSpace:"nowrap" }}>{c.l}</th>)}
          </tr>
        </thead>
        <tbody>
          {rows.length === 0
            ? <tr><td colSpan={cols.length} style={{ padding:"32px", textAlign:"center", color:"var(--txt4)", fontFamily:"var(--font)", fontSize:13 }}>No findings</td></tr>
            : rows.map((row, i) => (
              <tr key={i} style={{ borderBottom:"1px solid rgba(30,45,68,.5)", background: i%2===1?"rgba(11,17,32,.5)":"transparent", transition:"background .1s" }}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(0,212,255,.03)"}
                onMouseLeave={e=>e.currentTarget.style.background=i%2===1?"rgba(11,17,32,.5)":"transparent"}>
                {cols.map(c => (
                  <td key={c.k} style={{ padding:"8px 13px", color:"var(--txt)", verticalAlign:"middle" }}>
                    {c.r ? c.r(row[c.k], row) : (row[c.k] ?? "—")}
                  </td>
                ))}
              </tr>
            ))
          }
        </tbody>
      </table>
    </div>
  );
}

    failedLogins:        [{k:"userId",l:"User ID",r:v=><span style={{color:"var(--cyan)"}}>{v}</span>},{k:"name",l:"Full Name"},{k:"attempts",l:"Attempts",r:v=><span style={{color:v>50?"var(--red)":v>10?"var(--orange)":"var(--yellow)",fontWeight:700}}>{v}</span>},{k:"lastAttempt",l:"Last Attempt"},{k:"srcIP",l:"Source IP",r:v=><code style={{fontSize:10}}>{v}</code>},{k:"locked",l:"Locked",r:v=>v?<SevTag v="PASS" sm/>:<SevTag v="HIGH" sm/>},{k:"risk",l:"Risk",r:v=><SevTag v={v} sm/>}],
    firefighter:         [{k:"userId",l:"User ID",r:v=><span style={{color:"var(--cyan)"}}>{v}</span>},{k:"name",l:"Full Name"},{k:"ffRole",l:"FF Role",r:v=><span style={{color:"var(--red2)",fontWeight:700}}>{v}</span>},{k:"validFrom",l:"From"},{k:"validTo",l:"To",r:v=><span style={{color:v==="9999-12-31"?"var(--red)":"var(--yellow)"}}>{v}</span>},{k:"reason",l:"Reason",r:v=><span style={{fontFamily:"var(--font)",fontSize:11,color:v==="None documented"?"var(--red)":"var(--txt2)"}}>{v}</span>},{k:"risk",l:"Risk",r:v=><SevTag v={v} sm/>}],
    licenseAssignment:   [{k:"userId",l:"User ID",r:v=><span style={{color:"var(--cyan)"}}>{v}</span>},{k:"name",l:"Full Name"},{k:"license",l:"License",r:v=><span style={{color:"var(--orange)"}}>{v}</span>},{k:"lastActive",l:"Last Active"},{k:"modules",l:"Modules"},{k:"cost",l:"Cost/mo",r:v=><span style={{color:"var(--orange)",fontWeight:700}}>${v}</span>},{k:"rec",l:"Recommendation",r:v=><span style={{fontFamily:"var(--font)",fontSize:11,color:"var(--yellow2)"}}>{v}</span>}],
  };

  const cols = colMap[ctrl.resultKey] || Object.keys((data||[])[0]||{}).map(k=>({k,l:k}));
  const rows = Array.isArray(data) ? data : [];

  return (
    <div className="fade-up" style={{ border:`1px solid ${sc.bd}`, borderRadius:12, overflow:"hidden", marginBottom:14 }}>
      <div onClick={()=>setOpen(o=>!o)} style={{ background:sc.bg, padding:"12px 18px", display:"flex", alignItems:"center", gap:12, cursor:"pointer", userSelect:"none" }}>
        <div style={{ width:30,height:30,borderRadius:8,background:`${sc.txt}22`,display:"flex",alignItems:"center",justifyContent:"center",color:sc.txt,flexShrink:0 }}>
          <CIcon size={14}/>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
            <span style={{ fontFamily:"var(--display)", fontWeight:700, color:"var(--txt)", fontSize:13 }}>{ctrl.name}</span>
            {count>0 && <span style={{ background:sc.badge, color:sc.btxt, border:`1px solid ${sc.bd}`, padding:"1px 9px", borderRadius:20, fontSize:10.5, fontWeight:700, fontFamily:"var(--mono)" }}>{count} findings</span>}
            {!ctrl.builtIn && <SevTag v="CUSTOM" sm/>}
          </div>
          <div style={{ fontSize:10.5, color:"var(--txt3)", marginTop:2, fontFamily:"var(--mono)" }}>
            <span style={{color:"var(--cyan3_text)",color:"#4d8fa0"}}>{ctrl.table}</span> · {ctrl.entity}
            {ctrl.benchmark && <> · <span style={{color:"var(--txt4)"}}>{ctrl.benchmark}</span></>}
          </div>
        </div>
        <SevTag v={ctrl.severity}/>
        <div style={{color:"var(--txt3)",marginLeft:4}}>{open?<Icons.ChevU size={13}/>:<Icons.ChevD size={13}/>}</div>
      </div>
      {open && (
        <div style={{ padding:16 }}>
          <p style={{ fontSize:12, color:"var(--txt3)", marginBottom:10, fontFamily:"var(--font)" }}>{ctrl.desc}</p>
          {ctrl.conditions?.length > 0 && (
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
              {ctrl.conditions.map((c,i)=>(
                <span key={i} style={{ background:"var(--bg4)", border:"1px solid var(--bd)", borderRadius:6, padding:"3px 10px", fontSize:10.5, color:"var(--txt2)", fontFamily:"var(--mono)" }}>
                  <span style={{color:"var(--txt3)"}}>IF </span>{c.label}
                </span>
              ))}
            </div>
          )}
          <DataTable cols={cols} rows={rows}/>
          {ctrl.resultKey==="securityParams" && (
            <div style={{ display:"flex", gap:20, marginTop:10, padding:"8px 14px", background:"var(--bg3)", borderRadius:8 }}>
              {[["PASS",rows.filter(r=>r.status==="PASS").length,"var(--green)"],["WARN",rows.filter(r=>r.status==="WARN").length,"var(--yellow)"],["FAIL",rows.filter(r=>r.status==="FAIL").length,"var(--red)"]].map(([l,v,c])=>(
                <div key={l} style={{fontSize:12}}><span style={{color:c,fontWeight:700,fontFamily:"var(--mono)"}}>{v}</span> <span style={{color:"var(--txt3)"}}>{l}</span></div>
              ))}
              <span style={{marginLeft:"auto",fontSize:11,color:"var(--txt4)"}}>SAP Note {ctrl.sapNote}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [view, setView]         = useState("dashboard");
  const [controls, setControls] = useState(DEFAULT_CONTROLS);
  const [connections, setConns] = useState([{ id:1, name:"DEV System", host:"10.10.19.103", port:"8080", sid:"DEV", client:"100", user:"SAPUSER", password:"", proxyUrl:"http://localhost:3100", mode:"proxy" }]);
  const [activeConn, setActive] = useState(1);
  const [editConn, setEditConn] = useState(null);
  const [editCtrl, setEditCtrl] = useState(null);
  const [running, setRunning]   = useState(false);
  const [progress, setProg]     = useState(0);
  const [curCheck, setCur]      = useState(null);
  const [results, setResults]   = useState(null);
  const [log, setLog]           = useState([]);
  const [toast, setToast]       = useState(null);
  const [pdfLoading, setPdfLoad]= useState(false);
  const [proxyError, setProxyError] = useState(null);
  const [ctrlSearch, setCtrlSearch] = useState("");
  const [ctrlCatFilter, setCtrlCat] = useState("All");

  const showToast = (msg, type="info") => { setToast({msg,type}); setTimeout(()=>setToast(null), 3800); };
  const addLog = (msg, type="info") => {
    const ts = new Date().toLocaleTimeString("en-US",{hour12:false});
    setLog(l=>[...l.slice(-100),{ts,msg,type}]);
  };

  const downloadProxy = (type) => {
    const files = {
      python: { content:"#!/usr/bin/env python3\n\\\"\\\"\\\"SAP OData CORS Proxy - Python version. Run: python3 sap_proxy.py\\\"\\\"\\\"\nimport json, base64, urllib.request, urllib.error, ssl, sys\nfrom http.server import HTTPServer, BaseHTTPRequestHandler\nPORT = int(sys.argv[1]) if len(sys.argv)>1 else 3100\nCORS = {\"Access-Control-Allow-Origin\":\"*\",\"Access-Control-Allow-Methods\":\"GET,POST,OPTIONS\",\"Access-Control-Allow-Headers\":\"Content-Type,Authorization\"}\nclass H(BaseHTTPRequestHandler):\n    def log_message(self,f,*a): print(f\"  {self.log_date_time_string()} {f%a}\")\n    def send_cors(self,c):\n        self.send_response(c)\n        [self.send_header(k,v) for k,v in CORS.items()]\n        self.send_header(\"Content-Type\",\"application/json\"); self.end_headers()\n    def do_OPTIONS(self): self.send_cors(204); self.wfile.write(b\"\")\n    def do_GET(self):\n        if self.path in (\"/\",\"/health\"):\n            self.send_cors(200); self.wfile.write(json.dumps({\"status\":\"ok\",\"port\":PORT}).encode())\n        else: self.send_cors(404); self.wfile.write(b\"Not found\")\n    def do_POST(self):\n        if self.path!=\"/proxy\": self.send_cors(404); self.wfile.write(b\"\"); return\n        body=json.loads(self.rfile.read(int(self.headers.get(\"Content-Length\",0))))\n        t=body.get(\"url\",\"\"); u=body.get(\"username\",\"\"); pw=body.get(\"password\",\"\")\n        print(f\"  -> {t[:80]}\")\n        try:\n            tok=base64.b64encode(f\"{u}:{pw}\".encode()).decode()\n            ctx=ssl.create_default_context(); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE\n            req=urllib.request.Request(t,headers={\"Authorization\":f\"Basic {tok}\",\"Accept\":\"application/json\"})\n            with urllib.request.urlopen(req,context=ctx,timeout=15) as r:\n                d=json.loads(r.read().decode())\n                self.send_cors(200); self.wfile.write(json.dumps({\"ok\":True,\"status\":r.status,\"data\":d}).encode())\n        except urllib.error.HTTPError as e:\n            try: ed=json.loads(e.read())\n            except: ed={}\n            self.send_cors(200); self.wfile.write(json.dumps({\"ok\":False,\"status\":e.code,\"data\":ed}).encode())\n        except Exception as e:\n            self.send_cors(502); self.wfile.write(json.dumps({\"ok\":False,\"error\":str(e)}).encode())\nprint(f\"\\n  SAP OData CORS Proxy (Python) on http://localhost:{PORT}\\n  Set Proxy URL -> http://localhost:{PORT}\\n\")\nHTTPServer((\"0.0.0.0\",PORT),H).serve_forever()\n", name:"sap_proxy.py", mime:"text/x-python" },
      bat:    { content:"@echo off\r\ntitle SAP Proxy\r\necho Starting SAP OData CORS Proxy...\r\necho Set Proxy URL to: http://localhost:3100\r\nwhere python >nul 2>&1 && python sap_proxy.py && goto :eof\r\nwhere python3 >nul 2>&1 && python3 sap_proxy.py && goto :eof\r\nwhere node >nul 2>&1 && node sap-proxy-server.js && goto :eof\r\necho ERROR: Install Python from python.org or Node.js from nodejs.org\r\npause\r\n", name:"start-proxy.bat", mime:"text/plain" },
      sh:     { content:"#!/bin/bash\necho 'Starting SAP OData CORS Proxy...'\necho 'Set Proxy URL to: http://localhost:3100'\ncommand -v python3 &>/dev/null && python3 sap_proxy.py && exit 0\ncommand -v python  &>/dev/null && python  sap_proxy.py && exit 0\ncommand -v node    &>/dev/null && node    sap-proxy-server.js && exit 0\necho 'ERROR: Install Python (python.org) or Node.js (nodejs.org)'\n", name:"start-proxy.sh", mime:"text/x-sh" },
      node:   { content:"const http=require(\"http\"),https=require(\"https\"),url=require(\"url\");\nconst PORT=process.env.PORT||3100;\nconst CORS={\"Access-Control-Allow-Origin\":\"*\",\"Access-Control-Allow-Methods\":\"GET,POST,OPTIONS\",\"Access-Control-Allow-Headers\":\"Content-Type,Authorization\"};\nfunction fwd(t,u,p){return new Promise((res,rej)=>{const q=url.parse(t),lib=q.protocol===\"https:\"?https:http;const o={hostname:q.hostname,port:q.port||(q.protocol===\"https:\"?443:80),path:q.path,method:\"GET\",headers:{\"Authorization\":\"Basic \"+Buffer.from(u+\":\"+p).toString(\"base64\"),\"Accept\":\"application/json\"},timeout:15000,rejectUnauthorized:false};const r=lib.request(o,x=>{let b=\"\";x.on(\"data\",c=>b+=c);x.on(\"end\",()=>res({status:x.statusCode,body:b}));});r.on(\"timeout\",()=>{r.destroy();rej(new Error(\"Timed out\"));});r.on(\"error\",rej);r.end();});}\nhttp.createServer(async(req,res)=>{if(req.method===\"OPTIONS\"){res.writeHead(204,CORS);res.end();return;}if(req.method===\"GET\"&&(req.url===\"/\"||req.url===\"/health\")){res.writeHead(200,{...CORS,\"Content-Type\":\"application/json\"});res.end(JSON.stringify({status:\"ok\",port:PORT}));return;}if(req.method!==\"POST\"||req.url!==\"/proxy\"){res.writeHead(404,CORS);res.end(\"Not found\");return;}let b=\"\";req.on(\"data\",c=>b+=c);req.on(\"end\",async()=>{try{const{url:t,username:u,password:p}=JSON.parse(b);console.log(\"->\",t.slice(0,80));const r=await fwd(t,u||\"\",p||\"\");let d;try{d=JSON.parse(r.body)}catch{d={raw:r.body}}res.writeHead(200,{...CORS,\"Content-Type\":\"application/json\"});res.end(JSON.stringify({ok:r.status>=200&&r.status<300,status:r.status,data:d}));}catch(e){res.writeHead(502,{...CORS,\"Content-Type\":\"application/json\"});res.end(JSON.stringify({ok:false,error:e.message}));}});}).listen(PORT,\"0.0.0.0\",()=>{console.log(\"\\nSAP Proxy running on http://localhost:\"+PORT+\"\\n\");});\n", name:"sap-proxy-server.js", mime:"text/javascript" },
    };
    const dl = (key) => {
      const f = files[key];
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([f.content], {type:f.mime}));
      a.download = f.name; a.click();
    };
    if (type === "all") { Object.keys(files).forEach(dl); showToast("All proxy files downloaded!", "success"); }
    else { dl(type); showToast(`Downloaded ${files[type]?.name||type}`, "success"); }
  };

  const conn = connections.find(c=>c.id===activeConn);

  /* ── CONNECTIONS ── */
  const saveConn = (c) => {
    if(!c.name||!c.host){showToast("Name and host required","error");return;}
    const exists = connections.find(x=>x.id===c.id);
    setConns(p=>exists?p.map(x=>x.id===c.id?c:x):[...p,{...c,id:Date.now()}]);
    setEditConn(null); showToast(`Connection "${c.name}" saved`,"success");
  };
  /* ── SMART FETCH — proxy-aware ── */
  const sapFetch = async (c, odataUrl) => {
    const mode = c.mode || "proxy";

    if (mode === "demo") throw new Error("DEMO_MODE");

    if (mode === "proxy") {
      // Route through local CORS proxy
      const proxyUrl = (c.proxyUrl || "http://localhost:3100").replace(/\/$/, "");
      const resp = await fetch(`${proxyUrl}/proxy`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: odataUrl, username: c.user, password: c.password }),
        signal: AbortSignal.timeout(15000),
      });
      if (!resp.ok) throw new Error(`Proxy HTTP ${resp.status}`);
      const envelope = await resp.json();
      if (!envelope.ok) throw new Error(`SAP HTTP ${envelope.status} — ${JSON.stringify(envelope.data).slice(0,120)}`);
      const d = envelope.data;
      return d?.d?.results || d?.value || (Array.isArray(d) ? d : []);
    }

    // mode === "direct" — works only if SAP has CORS headers or same-origin
    const resp = await fetch(odataUrl, {
      headers: { "Authorization": "Basic " + btoa(`${c.user}:${c.password}`) },
      signal: AbortSignal.timeout(10000),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const j = await resp.json();
    return j?.d?.results || j?.value || [];
  };

  const testConn = async (c) => {
    const mode = c.mode || "proxy";
    if (mode === "demo") { showToast("Demo mode — no connection needed","info"); return; }
    if (mode === "proxy") {
      const proxyBase = (c.proxyUrl || "http://localhost:3100").replace(/\/$/,"");
      showToast(`Checking proxy at ${proxyBase}…`, "info");
      try {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 4500);
        const health = await fetch(`${proxyBase}/health`, { signal: ctrl.signal });
        clearTimeout(tid);
        if (!health.ok) throw new Error(`Proxy HTTP ${health.status}`);
        setProxyError(null);
        addLog(`Proxy OK at ${proxyBase}`, "success");
      } catch (e) {
        const msg = e.name === "AbortError" ? "Timed out (4.5s) — proxy not running" : e.message;
        setProxyError({ url: proxyBase, err: msg });
        showToast("Proxy unreachable — see Setup Guide", "error");
        addLog(`Proxy unreachable: ${msg}`, "error");
        return;
      }
      showToast("Proxy OK — testing SAP…", "info");
      const sapUrl = `http://${c.host}:${c.port}/sap/opu/odata/sap/ZTEST_TABLE_SRV/InputsSet?$format=json`;
      try {
        await sapFetch(c, sapUrl);
        showToast("✓ Proxy + SAP connection OK!", "success");
        addLog("SAP connection verified via proxy", "success");
      } catch (e) {
        if (e.message && e.message.includes("SAP HTTP")) {
          showToast(`Proxy OK, SAP error: ${e.message}`, "warn");
        } else {
          showToast(`SAP unreachable through proxy`, "error");
        }
      }
      return;
    }
    const dUrl = `http://${c.host}:${c.port}/sap/opu/odata/sap/ZTEST_TABLE_SRV/InputsSet?$format=json`;
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 5000);
      const r = await fetch(dUrl, { headers: { "Authorization": "Basic " + btoa(`${c.user}:${c.password}`) }, signal: ctrl.signal });
      clearTimeout(tid);
      r.ok ? showToast("✓ Direct connection OK!", "success") : showToast(`SAP HTTP ${r.status}`, "error");
    } catch (e) {
      showToast("Direct blocked (CORS) — switch to Proxy mode", "error");
      addLog(`Direct failed: ${e.message}`, "error");
    }
  };

  /* ── CONTROLS ── */
  const saveCtrl = (ctrl) => {
    const exists = controls.find(c=>c.id===ctrl.id);
    setControls(p=>exists?p.map(c=>c.id===ctrl.id?ctrl:c):[...p,ctrl]);
    setEditCtrl(null); showToast(`Control "${ctrl.name}" saved`,"success");
  };
  const deleteCtrl = (id) => {
    if(controls.find(c=>c.id===id)?.builtIn){showToast("Cannot delete built-in controls","error");return;}
    setControls(p=>p.filter(c=>c.id!==id)); showToast("Custom control deleted","info");
  };
  const toggleCtrl = (id) => setControls(p=>p.map(c=>c.id===id?{...c,enabled:!c.enabled}:c));

  /* ── RUN ANALYSIS ── */
  const runAnalysis = async () => {
    if(!conn){showToast("Select a connection first","error");return;}
    const enabled = controls.filter(c=>c.enabled);
    if(!enabled.length){showToast("Enable at least one control","error");return;}

    const mode = conn.mode || "proxy";
    setRunning(true); setResults(null); setLog([]); setProg(0);

    addLog(`Mode: ${mode.toUpperCase()} | System: ${conn.name} (${conn.host}:${conn.port})`, "info");
    if (mode === "proxy") addLog(`Proxy: ${conn.proxyUrl || "http://localhost:3100"}`, "info");
    if (mode === "demo")  addLog("Demo mode active — using built-in sample data", "warn");
    addLog("─".repeat(50), "info");

    const out = {};
    let liveCount = 0, demoCount = 0;

    for(let i=0; i<enabled.length; i++){
      const ctrl = enabled[i];
      setCur(ctrl.id);
      setProg(Math.round(i / enabled.length * 100));
      addLog(`[${String(i+1).padStart(2)}/${enabled.length}] ${ctrl.name}`, "info");
      addLog(`     Table: ${ctrl.table} | Entity: ${ctrl.entity}`, "info");

      await new Promise(r => setTimeout(r, 200 + Math.random()*300));

      if (mode === "demo") {
        out[ctrl.resultKey] = MOCK[ctrl.resultKey] || [];
        addLog(`     ✓ Demo data loaded: ${out[ctrl.resultKey].length} records`, "success");
        demoCount++;
        continue;
      }

      const odataUrl = `http://${conn.host}:${conn.port}/sap/opu/odata/sap/ZTEST_TABLE_SRV/${ctrl.entity}?$format=json`;
      try {
        const data = await sapFetch(conn, odataUrl);
        out[ctrl.resultKey] = data;
        addLog(`     ✓ Live data: ${data.length} records`, "success");
        liveCount++;
      } catch(err) {
        if (err.message === "DEMO_MODE") {
          out[ctrl.resultKey] = MOCK[ctrl.resultKey] || [];
          demoCount++;
        } else {
          const isDemoing = !!MOCK[ctrl.resultKey];
          addLog(`     ⚠ ${err.message}`, "warn");
          if (isDemoing) {
            addLog(`     → Fallback: using demo data (${MOCK[ctrl.resultKey].length} records)`, "warn");
            out[ctrl.resultKey] = MOCK[ctrl.resultKey];
            demoCount++;
          } else {
            addLog(`     → No demo data available — skipped`, "warn");
            out[ctrl.resultKey] = [];
          }
        }
      }
    }

    setProg(100); setCur(null);
    addLog("─".repeat(50), "info");
    addLog(`Analysis complete: ${liveCount} live, ${demoCount} demo/fallback`, liveCount>0?"success":"warn");

    setResults({...out, timestamp:Date.now(), conn:{...conn}, liveCount, demoCount});
    setRunning(false); setView("results");
    showToast(liveCount > 0 ? `Analysis complete — ${liveCount} live data sources` : "Analysis complete (demo data)", liveCount > 0 ? "success" : "warn");
  };

  /* ── PDF EXPORT ── */
  const exportPDF = async () => {
    if(!results){showToast("Run analysis first","error");return;}
    setPdfLoad(true); showToast("Generating PDF…","info");
    const riskScore = calcRisk();
    try {
      await generatePDF(results, controls, results.conn, riskScore);
      showToast("PDF downloaded!","success");
    } catch(e) {
      showToast(`PDF error: ${e.message}`,"error");
    }
    setPdfLoad(false);
  };

  /* ── RISK CALC ── */
  const calcRisk = () => {
    if(!results)return 0;
    let sc=0;
    sc+=Math.min(((results.criticalAuths||[]).filter(r=>r.risk==="CRITICAL").length)*12,28);
    sc+=Math.min(((results.sodConflicts||[]).filter(r=>r.risk==="CRITICAL").length)*8,20);
    sc+=Math.min(((results.debugAccess||[]).filter(r=>r.risk==="CRITICAL").length)*10,18);
    sc+=Math.min(((results.securityParams||[]).filter(p=>p.status==="FAIL").length)*2,14);
    sc+=Math.min(((results.defaultUsers||[]).filter(r=>r.risk==="CRITICAL").length)*5,10);
    sc+=((results.clientSettings||[]).filter(r=>r.risk==="CRITICAL").length)*3;
    return Math.min(sc,100);
  };
  const riskScore = calcRisk();

  const kpis = !results ? [] : [
    {l:"Critical",  v:([...(results.criticalAuths||[]),...(results.sodConflicts||[]),...(results.debugAccess||[]),...(results.defaultUsers||[]),...(results.failedLogins||[])].filter(r=>r.risk==="CRITICAL")).length, c:"var(--red)"},

                {!results ? (
