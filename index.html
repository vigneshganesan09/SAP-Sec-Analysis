                    <div style={{width:80,height:80,borderRadius:22,background:"rgba(0,212,255,.07)",border:"1px solid rgba(0,212,255,.18)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--cyan)"}}>
                      <Icons.Shield size={34}/>
                    </div>
                    <h2 style={{fontFamily:"var(--display)",fontSize:20,fontWeight:800,color:"var(--txt)",margin:0}}>Ready to Analyze</h2>
                    <p style={{color:"var(--txt3)",fontSize:14,margin:0,fontFamily:"var(--font)"}}>Configure your controls, connect to SAP, and run the analysis.</p>
                    <div style={{display:"flex",gap:10,marginTop:8}}>
                      <button onClick={()=>setView("controls")} style={{display:"flex",alignItems:"center",gap:7,padding:"11px 22px",background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.3)",borderRadius:10,color:"#a855f7",fontWeight:700,fontSize:13}}><Icons.Sliders size={14}/>Configure Controls</button>
                      <button onClick={()=>setView("analysis")} style={{display:"flex",alignItems:"center",gap:7,padding:"11px 22px",background:"var(--cyan)",color:"#000",borderRadius:10,fontWeight:700,fontSize:13}}><Icons.Play size={14}/>Run Analysis</button>
                    </div>
                  </div>
                ) : (
                  <div style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:18}}>
                    {/* Risk gauge */}
                    <div style={{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:14,padding:"18px 14px",display:"flex",flexDirection:"column",alignItems:"center"}}>
                      <div style={{fontSize:9.5,color:"var(--txt3)",letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"var(--display)",fontWeight:700,marginBottom:10}}>Risk Score</div>
                      <Gauge score={riskScore}/>
                      <div style={{marginTop:6,fontSize:11,color:"var(--txt3)",fontFamily:"var(--mono)"}}>{riskScore>75?"Critical":riskScore>50?"High":riskScore>25?"Medium":"Low"} Risk</div>
                    </div>
                    {/* KPIs */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                      {kpis.map(k=>(
                        <div key={k.l} style={{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:12,padding:"16px 18px"}}>
                          <div style={{fontSize:10,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.09em",fontFamily:"var(--display)",fontWeight:700,marginBottom:8}}>{k.l}</div>
                          <div style={{fontSize:38,fontWeight:700,fontFamily:"var(--mono)",color:k.c,lineHeight:1}}>{k.v}</div>
                        </div>
                      ))}
                    </div>
                    {/* Control status grid */}
                    <div style={{gridColumn:"1/-1",background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:14,padding:18}}>
                      <div style={{fontFamily:"var(--display)",fontWeight:700,fontSize:12,color:"var(--txt2)",marginBottom:14,textTransform:"uppercase",letterSpacing:"0.08em"}}>Control Status Matrix</div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:9}}>
                        {controls.filter(c=>c.enabled).map(ctrl=>{
                          const d=results[ctrl.resultKey];
                          const cnt=Array.isArray(d)?d.length:0;
                          const crit=Array.isArray(d)?d.filter(r=>r.risk==="CRITICAL"||r.status==="FAIL").length:0;
                          const st=!d?"PENDING":cnt===0?"PASS":crit>0?"CRITICAL":"HIGH";
                          const sc=s(st);
                          return (
                            <div key={ctrl.id} onClick={()=>setView("results")} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",borderRadius:9,background:sc.bg,border:`1px solid ${sc.bd}`,cursor:"pointer",transition:"all .15s"}}
                              onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"}
                              onMouseLeave={e=>e.currentTarget.style.transform="none"}>
                              <div style={{flexShrink:0,color:sc.txt}}><Icons.Shield size={13}/></div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:11.5,fontWeight:600,color:"var(--txt)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontFamily:"var(--display)"}}>{ctrl.name}</div>
                                <div style={{fontSize:9.5,color:"var(--txt3)",fontFamily:"var(--mono)"}}>{ctrl.table}</div>
                              </div>
                              <span style={{fontSize:11,fontWeight:700,fontFamily:"var(--mono)",color:sc.txt}}>{cnt}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ══ CONNECTIONS ═══════════════════════════════════ */}
            {view==="connections" && (
              <div className="fade-up" style={{maxWidth:680}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                  <span style={{fontSize:12.5,color:"var(--txt3)",fontFamily:"var(--mono)"}}>{connections.length} connection(s)</span>
                  <button onClick={()=>setEditConn({})} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",background:"rgba(0,212,255,.09)",border:"1px solid rgba(0,212,255,.25)",borderRadius:9,color:"var(--cyan)",fontSize:12.5,fontWeight:600}}><Icons.Plus size={13}/>New Connection</button>
                </div>
                {editConn && <ConnForm init={editConn.id?editConn:null} onSave={saveConn} onCancel={()=>setEditConn(null)}/>}
                <div style={{display:"flex",flexDirection:"column",gap:9}}>
                  {connections.map(c=>(
                    <div key={c.id} onClick={()=>setActive(c.id)} style={{display:"flex",alignItems:"center",gap:13,padding:"13px 16px",borderRadius:12,border:`1px solid ${activeConn===c.id?"rgba(0,212,255,.35)":"var(--bd)"}`,background:activeConn===c.id?"rgba(0,212,255,.04)":"var(--bg2)",cursor:"pointer",transition:"all .15s"}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:activeConn===c.id?"var(--cyan)":"var(--bd3)",flexShrink:0,transition:"all .15s"}}/>
                      <div style={{flex:1}}>
                        <div style={{fontFamily:"var(--display)",fontWeight:700,fontSize:13.5,color:"var(--txt)"}}>{c.name}</div>
                        <div style={{fontSize:11,color:"var(--txt3)",fontFamily:"var(--mono)",marginTop:2}}>{c.host}:{c.port} · SID:<span style={{color:"var(--cyan2)"}}>{c.sid||"—"}</span> · Client:<span style={{color:"var(--cyan2)"}}>{c.client}</span> · {c.user}
                          {" "}<span style={{padding:"1px 7px",borderRadius:10,fontSize:9.5,fontWeight:700,fontFamily:"var(--display)",background:c.mode==="proxy"?"rgba(0,212,255,.12)":c.mode==="demo"?"rgba(168,85,247,.12)":"rgba(249,115,22,.1)",color:c.mode==="proxy"?"var(--cyan)":c.mode==="demo"?"#a855f7":"var(--orange)",border:`1px solid ${c.mode==="proxy"?"rgba(0,212,255,.25)":c.mode==="demo"?"rgba(168,85,247,.25)":"rgba(249,115,22,.2)"}`}}>{(c.mode||"proxy").toUpperCase()}</span>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={e=>{e.stopPropagation();testConn(c);}} style={{padding:"5px 10px",background:"var(--bg3)",border:"1px solid var(--bd2)",borderRadius:7,color:"var(--txt2)",fontSize:11,display:"flex",alignItems:"center",gap:4}}><Icons.Refresh size={11}/>Test</button>
                        <button onClick={e=>{e.stopPropagation();setEditConn({...c});}} style={{padding:"6px 8px",background:"var(--bg3)",border:"1px solid var(--bd2)",borderRadius:7,color:"var(--txt3)"}}><Icons.Edit size={12}/></button>
                        <button onClick={e=>{e.stopPropagation();setConns(p=>p.filter(x=>x.id!==c.id));if(activeConn===c.id)setActive(null);}} style={{padding:"6px 8px",background:"transparent",border:"1px solid transparent",borderRadius:7,color:"var(--txt3)"}} onMouseEnter={e=>{e.currentTarget.style.color="var(--red)";e.currentTarget.style.background="rgba(240,64,64,.09)";}} onMouseLeave={e=>{e.currentTarget.style.color="var(--txt3)";e.currentTarget.style.background="transparent";}}><Icons.Trash size={12}/></button>
                      </div>
                    </div>
                  ))}
                </div>
                {/* OData info box */}
                {conn && (
                  <div style={{marginTop:24,background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:12,padding:18}}>
                    <div style={{fontFamily:"var(--display)",fontWeight:700,fontSize:11,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>OData Service Base URL</div>
                    <code style={{display:"block",fontSize:11.5,color:"var(--cyan)",background:"var(--bg3)",padding:"10px 13px",borderRadius:8,border:"1px solid var(--bd2)",wordBreak:"break-all"}}>
                      http://{conn.host}:{conn.port}/sap/opu/odata/sap/ZTEST_TABLE_SRV/
                    </code>
                    <div style={{marginTop:10,fontSize:10.5,color:"var(--txt4)",fontFamily:"var(--mono)"}}>Auth: Basic Auth · Format: $format=json · Method: GET</div>
                  </div>
                )}

                {/* ── CORS SETUP GUIDE ── */}
                <div style={{marginTop:22,background:"rgba(0,212,255,.04)",border:"1px solid rgba(0,212,255,.2)",borderRadius:14,padding:20}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <div style={{width:28,height:28,borderRadius:8,background:"rgba(0,212,255,.1)",border:"1px solid rgba(0,212,255,.25)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--cyan)"}}>
                      <Icons.Info size={14}/>
                    </div>
                    <div>
                      <div style={{fontFamily:"var(--display)",fontWeight:700,fontSize:13,color:"var(--cyan)"}}>Why CORS Errors Happen</div>
                      <div style={{fontSize:11,color:"var(--txt3)",marginTop:1}}>And how to connect to your real SAP system</div>
                    </div>
                  </div>

                  <p style={{fontSize:12.5,color:"var(--txt2)",lineHeight:1.7,marginBottom:16}}>
                    Browsers enforce <strong style={{color:"var(--txt)"}}>Same-Origin Policy</strong> — a security rule that blocks web pages from making direct HTTP requests to a different host (your SAP server). This is <em>not</em> a bug in this app; it's browser security protecting you. The solution is a <strong style={{color:"var(--cyan)"}}>local CORS proxy</strong> — a tiny Node.js server on your machine that the browser calls, which then forwards the request to SAP.
                  </p>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:18}}>
                    {[
                      {n:"1",title:"Download the proxy",body:"Download sap-proxy-server.js (no dependencies — pure Node.js built-ins).",color:"var(--cyan)"},
                      {n:"2",title:"Run it",body:"node sap-proxy-server.js — listens on port 3100. Runs on Windows, Mac, Linux.",color:"var(--green)"},
                      {n:"3",title:"Set Proxy Mode",body:"Edit your connection → set mode to Proxy and enter http://localhost:3100.",color:"var(--yellow)"},
                    ].map(s=>(
                      <div key={s.n} style={{background:"var(--bg3)",border:"1px solid var(--bd)",borderRadius:10,padding:"14px"}}>
                        <div style={{width:24,height:24,borderRadius:"50%",background:`${s.color}22`,border:`1px solid ${s.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:s.color,marginBottom:8,fontFamily:"var(--mono)"}}>{s.n}</div>
                        <div style={{fontSize:12,fontWeight:700,color:"var(--txt)",fontFamily:"var(--display)",marginBottom:4}}>{s.title}</div>
                        <div style={{fontSize:11,color:"var(--txt3)",lineHeight:1.5}}>{s.body}</div>
                      </div>
                    ))}
                  </div>

                  <div style={{background:"var(--bg3)",border:"1px solid var(--bd)",borderRadius:10,padding:"14px",marginBottom:16}}>
                    <div style={{fontSize:10,color:"var(--txt3)",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"var(--display)",marginBottom:8}}>Quick Start Commands</div>
                    {[
                      ["Download & run (one line)","node sap-proxy-server.js"],
                      ["Custom port","PORT=3101 node sap-proxy-server.js"],
                      ["Verify proxy is running","curl http://localhost:3100/health"],
                      ["Test connection through proxy","Click Test Connection in the form above"],
                    ].map(([l,v])=>(
                      <div key={l} style={{display:"flex",gap:14,alignItems:"baseline",marginBottom:6}}>
                        <span style={{fontSize:10.5,color:"var(--txt3)",width:200,flexShrink:0}}>{l}</span>
                        <code style={{fontSize:11,color:"var(--green2)",background:"var(--bg)",padding:"2px 8px",borderRadius:5,border:"1px solid var(--bd)"}}>{v}</code>
                      </div>
                    ))}
                  </div>

                  <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                    <button onClick={downloadProxy} style={{display:"flex",alignItems:"center",gap:7,padding:"9px 18px",background:"rgba(16,201,138,.1)",border:"1px solid rgba(16,201,138,.3)",borderRadius:9,color:"var(--green2)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      <Icons.Download size={14}/>Download sap-proxy-server.js
                    </button>
                    <div style={{fontSize:11,color:"var(--txt4)"}}>No npm install needed · Pure Node.js · ~150 lines</div>
                  </div>

                  <div style={{marginTop:14,padding:"10px 14px",background:"rgba(245,197,66,.06)",border:"1px solid rgba(245,197,66,.2)",borderRadius:9}}>
                    <div style={{fontSize:11.5,color:"var(--yellow2)",fontWeight:600,marginBottom:3}}>Alternative: Configure SAP to send CORS headers</div>
                    <div style={{fontSize:11,color:"var(--txt3)",lineHeight:1.6}}>
                      In SAP ICM (transaction SMICM), add response headers:<br/>
                      <code style={{color:"var(--green2)",fontSize:10.5}}>Access-Control-Allow-Origin: *</code> and <code style={{color:"var(--green2)",fontSize:10.5}}>Access-Control-Allow-Headers: Authorization,Content-Type</code><br/>
                      Then switch the connection mode to <strong style={{color:"var(--txt)"}}>Direct</strong>. Only do this on dev systems.
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ══ CONTROLS CONFIG ═══════════════════════════════ */}
            {view==="controls" && (
              <div className="fade-up">
                {/* Header actions */}
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18,flexWrap:"wrap"}}>
                  <div style={{position:"relative",flex:1,minWidth:200}}>
                    <Icons.Filter size={13} cls="" style={{}} />
                    <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"var(--txt3)",pointerEvents:"none"}}><Icons.Filter size={13}/></div>
                    <input style={{paddingLeft:34,background:"var(--bg3)",border:"1px solid var(--bd2)",borderRadius:9,height:36}} value={ctrlSearch} onChange={e=>setCtrlSearch(e.target.value)} placeholder="Search controls by name or table…"/>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {ctrlCats.map(cat=>(
                      <button key={cat} onClick={()=>setCtrlCat(cat)} style={{padding:"5px 11px",borderRadius:20,border:`1px solid ${ctrlCatFilter===cat?"rgba(0,212,255,.4)":"var(--bd)"}`,background:ctrlCatFilter===cat?"rgba(0,212,255,.1)":"transparent",color:ctrlCatFilter===cat?"var(--cyan)":"var(--txt3)",fontSize:11,fontWeight:ctrlCatFilter===cat?700:400,cursor:"pointer"}}>
                        {cat}
                      </button>
                    ))}
                  </div>
                  <button onClick={()=>setEditCtrl({new:true})} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 16px",background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.3)",borderRadius:9,color:"#a855f7",fontSize:12.5,fontWeight:700,flexShrink:0}}><Icons.Plus size={13}/>Add Custom Control</button>
                </div>

                {/* New/Edit form */}
                {editCtrl && (
                  <ControlForm initial={editCtrl.new?null:editCtrl} onSave={saveCtrl} onCancel={()=>setEditCtrl(null)}/>
                )}

                {/* Stats strip */}
                <div style={{display:"flex",gap:14,marginBottom:16,padding:"12px 16px",background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:10}}>
                  {[
                    {l:"Total Controls", v:controls.length, c:"var(--cyan)"},
                    {l:"Enabled", v:controls.filter(c=>c.enabled).length, c:"var(--green)"},
                    {l:"Disabled", v:controls.filter(c=>!c.enabled).length, c:"var(--txt3)"},
                    {l:"Built-in", v:controls.filter(c=>c.builtIn).length, c:"var(--blue)"},
                    {l:"Custom", v:controls.filter(c=>!c.builtIn).length, c:"#a855f7"},
                  ].map(k=>(
                    <div key={k.l} style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:18,color:k.c,lineHeight:1}}>{k.v}</span>
                      <span style={{fontSize:11,color:"var(--txt3)"}}>{k.l}</span>
                    </div>
                  ))}
                </div>

                {/* Controls list */}
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {filteredCtrl.map(ctrl=>{
                    const sc=s(ctrl.severity);
                    return (
                      <div key={ctrl.id} style={{borderRadius:12,border:`1px solid ${ctrl.enabled?sc.bd:"var(--bd)"}`,background:ctrl.enabled?sc.bg:"var(--bg2)",transition:"all .15s",opacity:ctrl.enabled?1:0.55}}>
                        <div style={{padding:"13px 16px",display:"flex",alignItems:"center",gap:12}}>
                          {/* Toggle */}
                          <button onClick={()=>toggleCtrl(ctrl.id)} style={{width:36,height:20,borderRadius:10,border:"none",background:ctrl.enabled?"var(--green)":"var(--bd2)",cursor:"pointer",flexShrink:0,position:"relative",transition:"all .2s"}}>
                            <div style={{width:16,height:16,borderRadius:"50%",background:"white",position:"absolute",top:2,left:ctrl.enabled?18:2,transition:"all .2s",boxShadow:"0 1px 4px rgba(0,0,0,.4)"}}/>
                          </button>
                          {/* Info */}
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                              <span style={{fontFamily:"var(--display)",fontWeight:700,fontSize:13,color:"var(--txt)"}}>{ctrl.name}</span>
                              {ctrl.builtIn && <SevTag v="BUILT-IN" sm/>}
                              {!ctrl.builtIn && <SevTag v="CUSTOM" sm/>}
                              <SevTag v={ctrl.severity} sm/>
                              <span style={{fontSize:10.5,color:"var(--txt3)",fontFamily:"var(--mono)"}}>{ctrl.cat}</span>
                            </div>
                            <div style={{fontSize:11,color:"var(--txt3)",marginTop:3,fontFamily:"var(--mono)"}}>
                              <span style={{color:"#4d8fa0"}}>{ctrl.table}</span> · <span style={{color:"var(--txt4)"}}>{ctrl.entity}</span>
                              {ctrl.sapNote&&ctrl.sapNote!=="N/A"&&<> · Note <span style={{color:"var(--blue2)"}}>{ctrl.sapNote}</span></>}
                            </div>
                            {/* Conditions pills */}
                            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>
                              {ctrl.conditions.map((c,i)=>(
                                <span key={i} style={{background:"var(--bg4)",border:"1px solid var(--bd)",borderRadius:5,padding:"2px 8px",fontSize:10,color:"var(--txt3)",fontFamily:"var(--mono)"}}>
                                  <span style={{color:"var(--txt4)"}}>IF </span>{c.label}
                                </span>
                              ))}
                            </div>
                          </div>
                          {/* Actions */}
                          <div style={{display:"flex",gap:5,flexShrink:0}}>
                            <button onClick={()=>setEditCtrl({...ctrl})} style={{padding:"6px 10px",background:"var(--bg3)",border:"1px solid var(--bd2)",borderRadius:7,color:"var(--txt2)",fontSize:11,display:"flex",alignItems:"center",gap:4}}><Icons.Edit size={12}/>{ctrl.builtIn?"Config":"Edit"}</button>
                            {!ctrl.builtIn && (
                              <button onClick={()=>deleteCtrl(ctrl.id)} style={{padding:"6px 8px",background:"transparent",border:"1px solid transparent",borderRadius:7,color:"var(--txt3)"}} onMouseEnter={e=>{e.currentTarget.style.color="var(--red)";e.currentTarget.style.background="rgba(240,64,64,.08)";}} onMouseLeave={e=>{e.currentTarget.style.color="var(--txt3)";e.currentTarget.style.background="transparent";}}><Icons.Trash size={12}/></button>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  {filteredCtrl.length===0 && (
                    <div style={{textAlign:"center",padding:"48px 0",color:"var(--txt3)",fontSize:13}}>No controls match your filter.</div>
                  )}
                </div>
              </div>
            )}

            {/* ══ ANALYSIS ══════════════════════════════════════ */}
            {view==="analysis" && (
              <div className="fade-up" style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:20}}>
                <div>
                  <div style={{fontFamily:"var(--display)",fontWeight:700,fontSize:11.5,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:14}}>
                    {controls.filter(c=>c.enabled).length} Controls Selected — Click to Toggle
                  </div>
                  {[...new Set(controls.map(c=>c.cat))].map(cat=>(
                    <div key={cat} style={{marginBottom:18}}>
                      <div style={{fontSize:9.5,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:7,fontFamily:"var(--display)",fontWeight:700,paddingLeft:2}}>{cat}</div>
                      <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        {controls.filter(c=>c.cat===cat).map(ctrl=>{
                          const sc=s(ctrl.severity);
                          const isRun=running&&curCheck===ctrl.id;
                          const isDone=results&&ctrl.resultKey in results;
                          return (
                            <div key={ctrl.id} onClick={()=>toggleCtrl(ctrl.id)} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 14px",borderRadius:10,border:`1px solid ${ctrl.enabled?sc.bd:"var(--bd)"}`,background:ctrl.enabled?sc.bg:"var(--bg2)",cursor:"pointer",transition:"all .15s",opacity:1}}>
                              <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${ctrl.enabled?"var(--cyan)":"var(--bd2)"}`,background:ctrl.enabled?"var(--cyan)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                                {ctrl.enabled && <Icons.Check size={10} cls="" style={{strokeWidth:3,color:"#000"}}/>}
                              </div>
                              <div style={{flex:1}}>
                                <div style={{fontSize:12.5,fontWeight:500,color:ctrl.enabled?"var(--txt)":"var(--txt2)",fontFamily:"var(--display)"}}>{ctrl.name}</div>
                                <div style={{fontSize:10,color:"var(--txt3)",fontFamily:"var(--mono)",marginTop:1}}>{ctrl.table} · {ctrl.entity}</div>
                              </div>
                              <SevTag v={ctrl.severity} sm/>
                              {isRun&&<Icons.Loader size={13} cls="spin-icon" style={{color:"var(--cyan)"}}/>}
                              {isDone&&!isRun&&<Icons.Check size={13} cls="" style={{color:"var(--green)"}}/>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                  <div style={{display:"flex",gap:8,marginTop:8}}>
                    <button onClick={runAnalysis} disabled={running||!activeConn} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"13px",borderRadius:10,background:running||!activeConn?"var(--bg3)":"var(--cyan)",color:running||!activeConn?"var(--txt3)":"#000",fontWeight:800,fontSize:14,fontFamily:"var(--display)",cursor:running||!activeConn?"not-allowed":"pointer",transition:"all .2s"}}>
                      {running?<><Icons.Loader size={15} cls="spin-icon"/>Analyzing… {progress}%</>:<><Icons.Play size={15}/>Run Security Analysis</>}
                    </button>
                    <button onClick={()=>setControls(p=>p.map(c=>({...c,enabled:true})))} style={{padding:"13px 14px",borderRadius:10,border:"1px solid var(--bd2)",background:"var(--bg3)",color:"var(--txt2)",fontSize:12}}>All</button>
                    <button onClick={()=>setControls(p=>p.map(c=>({...c,enabled:false})))} style={{padding:"13px 14px",borderRadius:10,border:"1px solid var(--bd2)",background:"var(--bg3)",color:"var(--txt2)",fontSize:12}}>None</button>
                  </div>
                  {running&&<div style={{marginTop:10,height:3,background:"var(--bd)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",background:"linear-gradient(90deg,var(--cyan),var(--blue))",borderRadius:3,width:`${progress}%`,transition:"width .5s ease"}}/></div>}
                </div>
                {/* Right panel */}
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:12,padding:16}}>
                    <div style={{fontFamily:"var(--display)",fontWeight:700,fontSize:10,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Active Connection</div>
                    {conn?([["System",conn.name],["Host",conn.host],["Port",conn.port],["SID",conn.sid],["Client",conn.client],["User",conn.user]].map(([k,v])=>(
                      <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:11.5,marginBottom:6}}>
                        <span style={{color:"var(--txt3)"}}>{k}</span>
                        <span style={{color:"var(--txt2)",fontFamily:"var(--mono)"}}>{v||"—"}</span>
                      </div>
                    ))):<p style={{color:"var(--txt3)",fontSize:12}}>No connection selected.</p>}
                  </div>
                  <div style={{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:12,padding:16}}>
                    <div style={{fontFamily:"var(--display)",fontWeight:700,fontSize:10,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Summary</div>
                    {[["Enabled Controls",controls.filter(c=>c.enabled).length],["Custom Controls",controls.filter(c=>!c.builtIn).length],["Conditions Total",controls.reduce((a,c)=>a+c.conditions.length,0)]].map(([k,v])=>(
                      <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:11.5,marginBottom:6}}>
                        <span style={{color:"var(--txt3)"}}>{k}</span>
                        <span style={{color:"var(--cyan)",fontFamily:"var(--mono)",fontWeight:700}}>{v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ══ RESULTS ═══════════════════════════════════════ */}
            {view==="results" && (
              results ? (
                <div className="fade-up">
                  {/* KPI strip */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:11,marginBottom:22}}>
                    {kpis.map(k=>(
                      <div key={k.l} style={{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:10,padding:"13px 14px",textAlign:"center"}}>
                        <div style={{fontSize:34,fontWeight:700,fontFamily:"var(--mono)",color:k.c,lineHeight:1,marginBottom:5}}>{k.v}</div>
                        <div style={{fontSize:9.5,color:"var(--txt3)",textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"var(--display)",fontWeight:700}}>{k.l}</div>
                      </div>
                    ))}
                  </div>
                  {/* PDF export top */}
                  <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
                    <button onClick={exportPDF} disabled={pdfLoading} style={{display:"flex",alignItems:"center",gap:7,padding:"9px 20px",background:pdfLoading?"var(--bg4)":"rgba(240,64,64,.12)",border:`1px solid ${pdfLoading?"var(--bd2)":"rgba(240,64,64,.3)"}`,borderRadius:9,color:pdfLoading?"var(--txt3)":"var(--red2)",fontWeight:700,fontSize:13,cursor:pdfLoading?"not-allowed":"pointer"}}>
                      {pdfLoading?<><Icons.Loader size={14} cls="spin-icon"/>Generating PDF…</>:<><Icons.PDF size={14}/>Download PDF Report</>}
                    </button>
                  </div>
                  {/* All result sections */}
                  {controls.filter(c=>c.enabled&&results[c.resultKey]&&Array.isArray(results[c.resultKey])&&results[c.resultKey].length>0).map(ctrl=>(
                    <ResSection key={ctrl.id} ctrl={ctrl} data={results[ctrl.resultKey]}/>
                  ))}
                  {/* params (special) */}
                  {results.securityParams&&results.securityParams.length>0&&!controls.find(c=>c.id==="params"&&c.enabled)&&(
                    <ResSection ctrl={controls.find(c=>c.id==="params")||{name:"Security Parameters",table:"PAHI",entity:"",severity:"WARN",desc:"",conditions:[],resultKey:"securityParams",benchmark:""}} data={results.securityParams}/>
                  )}
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
                    <button onClick={exportPDF} disabled={pdfLoading} style={{display:"flex",alignItems:"center",gap:7,padding:"11px 24px",background:pdfLoading?"var(--bg4)":"var(--red)",color:"#fff",borderRadius:10,fontWeight:700,fontSize:14,cursor:pdfLoading?"not-allowed":"pointer",opacity:pdfLoading?0.6:1}}>
                      {pdfLoading?<><Icons.Loader size={15} cls="spin-icon"/>Generating…</>:<><Icons.PDF size={15}/>Download PDF Report</>}
                    </button>
                  </div>
                </div>
              ):(
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:400,gap:12}}>
                  <Icons.BarChart size={44} cls="" style={{color:"var(--txt3)",opacity:.3}}/>
                  <h2 style={{fontFamily:"var(--display)",fontSize:18,fontWeight:800,color:"var(--txt)",margin:0}}>No Results Yet</h2>
                  <p style={{color:"var(--txt3)",fontSize:13,margin:0}}>Run the analysis to see findings here.</p>
                  <button onClick={()=>setView("analysis")} style={{display:"flex",alignItems:"center",gap:7,padding:"10px 20px",background:"var(--bg3)",border:"1px solid var(--bd2)",borderRadius:9,color:"var(--txt2)",fontSize:13,fontWeight:600,marginTop:8}}><Icons.Play size={13}/>Go to Analysis</button>
                </div>
              )
            )}

            {/* ══ LOG ═══════════════════════════════════════════ */}
            {view==="log" && (
              <div className="fade-up">
                <div style={{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:12,overflow:"hidden"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:"1px solid var(--bd)",background:"var(--bg3)"}}>
                    <span style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:600,color:"var(--txt2)",letterSpacing:"0.05em"}}>EXECUTION LOG</span>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{fontSize:10.5,color:"var(--txt3)",fontFamily:"var(--mono)"}}>{log.length} entries · {log.filter(l=>l.type==="warn").length} warnings</span>
                      <button onClick={()=>setLog([])} style={{padding:"3px 10px",borderRadius:6,background:"transparent",border:"1px solid var(--bd2)",color:"var(--txt3)",fontSize:11,cursor:"pointer"}}>Clear</button>
                    </div>
                  </div>
                  <div style={{padding:16,fontFamily:"var(--mono)",fontSize:11.5,maxHeight:550,overflowY:"auto",background:"var(--bg)"}}>
                    {log.length===0
                      ?<p style={{color:"var(--txt3)",textAlign:"center",padding:"48px 0",fontFamily:"var(--font)"}}>No log entries. Run analysis to see output.</p>
                      :log.map((l,i)=>(
                        <div key={i} style={{display:"flex",gap:12,padding:"3.5px 0",borderBottom:"1px solid rgba(30,45,68,.3)"}}>
                          <span style={{color:"var(--txt4)",flexShrink:0,fontSize:10.5}}>{l.ts}</span>
                          <span style={{color:l.type==="error"?"var(--red)":l.type==="warn"?"var(--yellow)":l.type==="success"?"var(--green)":"var(--txt2)"}}>{l.msg}</span>
                        </div>
                      ))
                    }
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      </div>

      {proxyError && <ProxySetupModal err={proxyError} onClose={()=>setProxyError(null)}/>}

      {/* ══ TOAST ═══════════════════════════════════════════════════ */}
      {toast && (
        <div style={{position:"fixed",bottom:22,right:22,zIndex:9999,display:"flex",alignItems:"center",gap:10,padding:"11px 17px",borderRadius:12,
          background:toast.type==="success"?"rgba(16,201,138,.1)":toast.type==="error"?"rgba(240,64,64,.1)":toast.type==="warn"?"rgba(245,197,66,.1)":"rgba(59,130,246,.1)",
          border:`1px solid ${toast.type==="success"?"rgba(16,201,138,.3)":toast.type==="error"?"rgba(240,64,64,.3)":toast.type==="warn"?"rgba(245,197,66,.3)":"rgba(59,130,246,.3)"}`,
          color:toast.type==="success"?"var(--green2)":toast.type==="error"?"var(--red2)":toast.type==="warn"?"var(--yellow2)":"var(--blue2)",
          fontSize:13,fontWeight:600,backdropFilter:"blur(12px)",animation:"fadeUp .25s ease",boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>
          {toast.type==="success"?<Icons.Check size={14}/>:toast.type==="error"?<Icons.X size={14}/>:<Icons.Alert size={14}/>}
          {toast.msg}
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
</html>
