<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAP Security Analyzer Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#05080f;--bg2:#090e1a;--bg3:#0f1624;--bg4:#151e2e;
  --bd:#1a2640;--bd2:#223050;
  --txt:#d8e8f8;--txt2:#7a9abf;--txt3:#3d5a80;--txt4:#243550;
  --cyan:#00c8f0;--red:#f03c3c;--orange:#f07820;
  --yellow:#e8c020;--green:#18c878;--blue:#3878f0;--purple:#9050f0;
  --font:"Segoe UI",system-ui,sans-serif;
  --mono:"Consolas","JetBrains Mono",monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);font-family:var(--font);color:var(--txt);height:100%;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fade{animation:fadeIn .25s ease}
.spin{animation:spin .9s linear infinite}
.pulse{animation:pulse 2s ease-in-out infinite}

/* Layout */
#app{display:flex;height:100vh}
#sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
#main{flex:1;overflow:auto;display:flex;flex-direction:column}
#topbar{padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{padding:20px 24px;flex:1;overflow-y:auto}

/* Sidebar */
.sb-logo{padding:14px 13px 12px;border-bottom:1px solid var(--bd)}
.sb-logo .mark{width:34px;height:34px;border-radius:9px;background:rgba(0,200,240,.1);border:1px solid rgba(0,200,240,.25);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:var(--cyan)}
.sb-logo .title{font-weight:700;font-size:13px;color:var(--txt)}
.sb-logo .sub{font-size:9.5px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.sb-sys{margin:8px 8px 2px;padding:7px 10px;border-radius:8px;transition:all .2s}
nav{flex:1;overflow-y:auto;padding:5px}
.nav-group{font-size:9px;font-weight:700;color:var(--txt4);text-transform:uppercase;letter-spacing:.12em;padding:6px 9px 3px}
.nav-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:7px;border:none;background:transparent;color:var(--txt2);font-size:12.5px;font-family:var(--font);cursor:pointer;text-align:left;transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:rgba(0,200,240,.05)}
.nav-item.active{background:rgba(0,200,240,.1);color:var(--cyan);font-weight:700}
.nav-item .badge{margin-left:auto;background:rgba(240,120,32,.2);color:var(--orange);border-radius:10px;font-size:9px;padding:1px 5px;font-weight:700;font-family:var(--mono)}
.nav-item .dot{width:3px;height:14px;background:var(--cyan);border-radius:2px;margin-left:auto}
.sb-bottom{padding:6px 7px 10px;border-top:1px solid var(--bd)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-weight:600;font-size:13px;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--cyan);color:#000}
.btn-primary:hover:not(:disabled){background:#00e8ff}
.btn-secondary{background:var(--bg4);border:1px solid var(--bd2);color:var(--txt2)}
.btn-secondary:hover{background:var(--bg3)}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--txt3)}
.btn-danger{background:rgba(240,60,60,.1);border:1px solid rgba(240,60,60,.3);color:var(--red)}
.btn-success{background:rgba(24,200,120,.1);border:1px solid rgba(24,200,120,.3);color:var(--green)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:18px}
.panel{background:var(--bg3);border:1px solid var(--bd);border-radius:11px;padding:14px}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.full{grid-column:1/-1}

/* Form */
label{display:block;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--bd2);color:var(--txt);border-radius:9px;padding:8px 12px;font-size:12px;font-family:var(--mono);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,200,240,.1)}
textarea{resize:vertical;min-height:60px}

/* Table */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:11.5px;font-family:var(--mono)}
thead tr{background:var(--bg3);border-bottom:1px solid var(--bd2)}
th{padding:8px 12px;text-align:left;color:var(--txt3);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
td{padding:7px 12px;color:var(--txt);vertical-align:middle;border-bottom:1px solid rgba(26,38,64,.5)}
tr:nth-child(even) td{background:rgba(9,14,26,.4)}
tr:hover td{background:rgba(0,200,240,.03)}

/* Tags / badges */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);white-space:nowrap}
.env-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;font-family:var(--mono)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px;gap:2px}
.tab{padding:8px 15px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt3);font-size:12.5px;font-weight:400;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.tab.active{border-bottom-color:var(--cyan);color:var(--cyan);font-weight:700}
.tab .tbadge{background:rgba(240,120,32,.2);color:var(--orange);border-radius:10px;font-size:9px;padding:1px 5px;font-weight:700}

/* Sev colours */
.sev-CRITICAL,.sev-CRIT{background:rgba(240,60,60,.15);color:#ff9090;border:1px solid rgba(240,60,60,.3)}
.sev-HIGH{background:rgba(240,120,32,.14);color:#ffb060;border:1px solid rgba(240,120,32,.28)}
.sev-MEDIUM,.sev-MED{background:rgba(232,192,32,.14);color:#f8e060;border:1px solid rgba(232,192,32,.25)}
.sev-LOW{background:rgba(24,200,120,.12);color:#70efb0;border:1px solid rgba(24,200,120,.22)}
.sev-PASS{background:rgba(24,200,120,.12);color:#70efb0;border:1px solid rgba(24,200,120,.22)}
.sev-FAIL{background:rgba(240,120,32,.14);color:#ffb060;border:1px solid rgba(240,120,32,.28)}
.sev-WARN{background:rgba(232,192,32,.14);color:#f8e060;border:1px solid rgba(232,192,32,.25)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:9990;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:24px;width:100%;max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;backdrop-filter:blur(12px);box-shadow:0 6px 28px rgba(0,0,0,.5);display:none;align-items:center;gap:8px;animation:fadeIn .2s ease}

/* System cards */
.sys-card{padding:12px 14px;border-radius:12px;border:2px solid var(--bd);background:var(--bg2);cursor:pointer;transition:all .2s;min-width:145px;position:relative}
.sys-card:hover{transform:translateY(-1px)}
.sys-card.active{border-color-opacity:.7}
.sys-env-ribbon{position:absolute;top:0;right:0;font-size:8px;font-weight:800;font-family:var(--mono);padding:2px 8px;border-radius:0 10px 0 8px}
.sys-dot-row{display:flex;align-items:center;gap:5px;margin-top:7px}
.sys-dot{width:7px;height:7px;border-radius:2px;background:var(--bd2)}

/* Progress */
.progress-track{height:4px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:4px;transition:width .4s ease}

/* Gauge */
.kpi-card{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:15px 17px;cursor:default;transition:border-color .15s}
.kpi-card.clickable{cursor:pointer}
.kpi-card.clickable:hover{border-color:rgba(0,200,240,.3)}
.kpi-label{font-size:9.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.kpi-value{font-size:34px;font-weight:700;font-family:var(--mono);line-height:1}
.kpi-sub{font-size:10.5px;color:var(--txt3);margin-top:5px}

/* Collapsible */
.collapse-hdr{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer;user-select:none;border-radius:10px 10px 0 0}
.collapse-body{padding:14px}

/* File drop */
.file-drop-label{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;border:1px dashed var(--bd2);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;margin-top:8px;color:var(--txt3)}
.file-drop-label:hover{border-color:var(--cyan);color:var(--cyan)}

/* Connection status dot */
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}

/* Scrollable log */
.log-box{background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:12px;font-family:var(--mono);font-size:11px;max-height:200px;overflow-y:auto}
.log-ok{color:var(--green)}.log-warn{color:var(--yellow)}.log-err{color:var(--red)}.log-info{color:var(--txt3)}

/* Bar chart */
.bar-wrap{display:flex;align-items:flex-end;gap:7px;height:100px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.bar-val{font-size:9px;color:var(--txt3);font-family:var(--mono)}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s ease}
.bar-lbl{font-size:9px;color:var(--txt3);text-align:center}

/* Risk library */
.risk-row{border:1px solid var(--bd);border-radius:10px;padding:11px 14px;margin-bottom:7px;transition:all .15s}
.risk-row.enabled{border-color:rgba(240,60,60,.2);background:rgba(240,60,60,.04)}
.toggle-btn{width:32px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle-knob{width:14px;height:14px;border-radius:50%;background:white;position:absolute;top:2px;transition:left .2s}

/* SAP connect form */
.conn-card{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:11px;margin-bottom:7px}
</style>

</style>
</head>

// ── SHA-256 password hashing (browser SubtleCrypto) ──
async function hashPassword(password, salt){
  if(!salt) salt = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  const enc = new TextEncoder().encode(salt + ':' + password);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hex = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  return salt + '$' + hex;
}
async function verifyPassword(password, stored){
  const parts = (stored||'').split('$');
  if(parts.length !== 2) return false;
  const test = await hashPassword(password, parts[0]);
  return test === stored;
}

// ── Persistence helpers ──
function loadStore(key, fallback){
  try{var v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}
}
function saveStore(key, value){
  try{localStorage.setItem(key, JSON.stringify(value));return true;}catch(e){console.warn('save failed:',e);return false;}
}

function currentUser(){
  var s = getSession();
  if(!s || !s.userId) return null;
  return getUsers().find(function(u){return u.id===s.userId;}) || null;

  var u = currentUser(); if(!u) return false;
  var r = ROLES[u.role]; if(!r) return false;
  return r.perms.indexOf(perm) >= 0;
}

// Persist updates back to localStorage
function persistCustomers(){
  saveCustomers(getCustomers().map(function(c){
    // Need to copy current App data back if this is the active one
    if(c.id === getActiveCustomerId() && App && App.systems){
      // Strip File objects/etc. — only persist structural data + parsed rows
      c.systems = App.systems.map(function(s){
        var safeFiles = {};
        if(s.files){
          Object.keys(s.files).forEach(function(k){
            var f = s.files[k];
            // Only keep small files in localStorage; large ones aren't persisted (size limit ~5MB)
            if(f && f.rowCount){
              safeFiles[k] = {fileName:f.fileName, rowCount:f.rowCount, size:f.size||0, loaded:f.loaded, diagnostic:f.diagnostic};
              // Persist rows ONLY if small enough; otherwise mark as needing re-upload
              if(f.rows && JSON.stringify(f.rows).length < 2_000_000){
                safeFiles[k].rows = f.rows;
              } else {
                safeFiles[k]._tooLarge = true;
              }
            }
          });
        }
        return Object.assign({}, s, {files: safeFiles, password:''}); // never persist SAP passwords
      });
    }
    return c;
  }));
}

// ─── CSV parser ─────────────────────────────────────────────────
// ─── parseCSV — handles standard CSV/TSV, semicolon, and SAP "pipe-table" formats ──
function parseCSV(text){
  if(!text)return[];
  // Strip UTF-8 BOM
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  if(!text.trim())return[];
  // Pre-process: split lines, drop carriage returns
  let rawLines=text.split(/\r?\n/);

  // ── FORMAT DETECTION ───────────────────────────────────────
  // Detect SAP "pipe table" format: lots of lines that start AND end with |,
  // interspersed with --- separator lines (SE16/SE16N "ALV Grid" download)
  let pipeLineCount=0, dashLineCount=0;
  for(let i=0;i<Math.min(rawLines.length,40);i++){
    const t=rawLines[i].trim();
    if(/^\|.*\|$/.test(t)) pipeLineCount++;
    else if(/^-{20,}$/.test(t)) dashLineCount++;
  }
  const isPipeTable = pipeLineCount>=3 && dashLineCount>=1;

  let lines, sep;

  if(isPipeTable){
    // SAP pipe-table: keep only lines that look like | col | col | col |
    // First such line after the first --- separator is the header
    lines = rawLines.filter(function(l){
      const t=l.trim();
      return /^\|.*\|$/.test(t) && !/^[-|\s]+$/.test(t);
    });
    sep = '|';
  } else {
    // Strip blank lines, BUT preserve order for separator-row detection
    lines = rawLines.filter(function(l){return l.trim();});
    if(lines.length<2) return [];
    // Detect separator from first non-blank line
    const h0=lines[0];
    sep = h0.includes('\t')?'\t' : h0.includes(';')?';' : h0.includes('|')?'|' : ',';
  }

  if(lines.length<2)return[];

  // ── Parse helper: split a row honouring quotes ──
  function splitRow(line){
    const vals=[];let cur='',inQ=false;
    if(sep==='|'){
      // For pipe tables: split on |, drop the leading/trailing empties from the
      // outer | characters, and trim each cell
      const parts=line.split('|');
      // First and last element are typically empty (from leading/trailing |)
      for(let i=1;i<parts.length-1;i++) vals.push(parts[i].trim());
      return vals;
    }
    for(const c of line+sep){
      if(c==='"'){inQ=!inQ;}
      else if(c===sep && !inQ){
        vals.push(cur.replace(/^["']+|["']+$/g,'').trim());
        cur='';
      } else cur+=c;
    }
    return vals;
  }

  // ── HEADER DETECTION ──
  // Look at the first few rows; the "real" header is the first row where:
  //   • >= 2 cells are non-empty, AND
  //   • cells look like SAP column names (mostly uppercase, no spaces, no numbers-only)
  // This skips junk like ";;;;;" separator rows and "5740 Entries" banners.
  function looksLikeHeader(cells){
    const nonEmpty = cells.filter(function(c){return c && c.length>0;});
    if(nonEmpty.length<2) return false;
    // Reject lines that are mostly numeric (data row)
    const looksColumn = nonEmpty.filter(function(c){
      // A column name is short, no spaces in the middle, alpha-leading
      const u=c.trim();
      if(!u) return false;
      if(/^\d+$/.test(u)) return false;             // pure numbers
      if(/^[\d.,/-]+$/.test(u)) return false;       // dates / numbers
      if(/^[-=_*#]+$/.test(u)) return false;         // separator chars
      return /^[A-Z_][A-Z0-9_./-]*$/i.test(u) || /[A-Z]/i.test(u);
    }).length;
    return looksColumn >= Math.max(2, nonEmpty.length*0.6);
  }

  let headerIdx=0;
  for(let i=0;i<Math.min(lines.length,6);i++){
    const cells=splitRow(lines[i]);
    if(looksLikeHeader(cells)){headerIdx=i;break;}
  }

  // Parse headers, uppercase + strip whitespace/BOM/quotes
  const rawHdrs = splitRow(lines[headerIdx]);
  const hdrs = rawHdrs.map(function(h){
    return (h||'').replace(/^[\uFEFF\s"']+|[\s"']+$/g,'').toUpperCase();
  });
  // If the FIRST column is empty (e.g. AGR_USERS.csv: ";MANDT;AGR_NAME;..."),
  // we leave it as "" — the col() helper just skips empty keys
  // Note: header names with dots (e.g. "AUTH.OBJECT" -> "AUTH.OBJECT") are kept
  //       as-is; COL_ALIASES handles common variants

  // ── Parse data rows ──
  const out = [];
  for(let i=headerIdx+1;i<lines.length;i++){
    const line=lines[i];
    if(!line || !line.trim()) continue;
    // Skip separator lines (---, ===, all-pipes, all-semicolons)
    const t=line.trim();
    if(/^[-=_]+$/.test(t)) continue;
    if(/^[;,\t|]+$/.test(t)) continue;   // empty/separator row (";;;;" etc.)
    const vals = splitRow(line);
    // Skip rows that have nothing meaningful
    if(vals.every(function(v){return !v;})) continue;
    const row = {};
    for(let k=0;k<hdrs.length;k++){
      if(hdrs[k]) row[hdrs[k]] = (vals[k]||'').trim();
    }
    out.push(row);
  }
  return out;
}

// ─── Normalise a date that may be in European DD.MM.YYYY format ──
function normalizeDate(v){
  if(!v) return '';
  const s = String(v).trim();
  // Already SAP-internal YYYYMMDD?
  if(/^\d{8}$/.test(s)) return s;
  // DD.MM.YYYY
  let m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(m) return m[3] + m[2].padStart(2,'0') + m[1].padStart(2,'0');
  // YYYY-MM-DD
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1] + m[2].padStart(2,'0') + m[3].padStart(2,'0');
  // DD/MM/YYYY (UK)
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) return m[3] + m[2].padStart(2,'0') + m[1].padStart(2,'0');
  // MM/DD/YYYY (US) — ambiguous, only use if it doesn't fit DD/MM
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m && parseInt(m[1])>12) return m[3] + m[1].padStart(2,'0') + m[2].padStart(2,'0');
  return s;
}

// ─── COLUMN ALIASES — handle SAP export variations (UNAME vs BNAME, ROLE vs AGR_NAME, etc.) ──
const COL_ALIASES = {
  BNAME:      ['BNAME','USER','USERNAME','USER_ID','USERID','UNAME','BENUTZER','USR'],
  AGR_NAME:   ['AGR_NAME','ROLE','ROLENAME','ROLE_NAME','AGR','PROFILE','ROLLENNAME'],
  OBJECT:     ['OBJECT','AUTH_OBJECT','OBJ','AUTHOBJECT','AUTHORIZATION_OBJECT','BERECHTIGUNGSOBJEKT'],
  FIELD:      ['FIELD','AUTH_FIELD','FIELDNAME','FELDNAME'],
  LOW:        ['LOW','VALUE','VAL','FROM_VALUE','LOW_VALUE','VON','WERT'],
  HIGH:       ['HIGH','TO','TO_VALUE','HIGH_VALUE','BIS'],
  TRDAT:      ['TRDAT','LAST_LOGON','LAST_LOGIN','LOGON_DATE','LSTLGD','LTLDA','LASTLOGIN','LAST_LOGON_DATE','LETZTE_ANMELDUNG'],
  PWDLGNDATE: ['PWDLGNDATE','PWD_CHG_DATE','LAST_PWD_CHG','PASSWORD_DATE','PWDCNGDATE','PASS_LAST_CHG','LAST_PASSWORD_CHANGE','PASSWORT_GEAENDERT'],
  USTYP:      ['USTYP','USER_TYPE','TYPE','USRTYP','TYP'],
  UFLAG:      ['UFLAG','LOCKED','LOCK_FLAG','LOCKFLAG','LOCK','USER_LOCKED','GESPERRT'],
  PARNAME:    ['PARNAME','PARAMETER','PARAM','NAME','PARAM_NAME','PARAMETERNAME'],
  PARVAL:     ['PARVAL','PVALUE','VALUE','VAL','PARAM_VALUE','SETTING','PARAM_VAL','WERT'],
  TCODE:      ['TCODE','T_CODE','TCD','TRANSACTION','TRANSACTION_CODE','TX','REPID','TCODE_NAME'],
  FROM_DAT:   ['FROM_DAT','FROMDAT','VALID_FROM','VFROM','START','BEGDA'],
  TO_DAT:     ['TO_DAT','TODAT','VALID_TO','VTO','END','ENDDA'],
};

// Resolve a canonical column value across alias variations
function col(row, canonical){
  if(!row) return '';
  // Direct match first
  if(row[canonical] !== undefined && row[canonical] !== '') return row[canonical];
  const aliases = COL_ALIASES[canonical];
  if(!aliases) return '';
  for(const a of aliases){
    if(row[a] !== undefined && row[a] !== '') return row[a];
  }
  return '';
}

// Detect which key columns were found in a parsed table (for diagnostics)
function detectColumns(rows, expected){
  if(!rows||!rows.length) return {found:[],missing:expected,sample:{}};
  const headers = Object.keys(rows[0]);
  const found = [], missing = [];
  expected.forEach(function(canonical){
    const aliases = COL_ALIASES[canonical] || [canonical];
    var hit = headers.find(function(h){return aliases.indexOf(h.toUpperCase())>=0;});
    if(hit) found.push(canonical+' (as '+hit+')');
    else missing.push(canonical);
  });
  return {found:found, missing:missing, sample:rows[0], headers:headers};
}

function daysSince(ds){
  if(!ds) return 9999;
  const n = normalizeDate(ds);
  if(!n || n.length<8) return 9999;
  try{
    const d=new Date(n.slice(0,4)+'-'+n.slice(4,6)+'-'+n.slice(6,8));
    return isNaN(d)?9999:Math.floor((Date.now()-d)/86400000);
  }catch(e){return 9999;}
}
function getRows(fileObj){
  if(!fileObj)return[];
  if(Array.isArray(fileObj))return fileObj;
  if(fileObj.rows)return fileObj.rows;
  return[];
}

// ─── SAP OData fetcher via CORS proxy ───────────────────────────
async function sapFetch(sys, entity, params=''){
  if(sys.mode==='demo')throw new Error('DEMO_MODE');
  const baseUrl=`http://${sys.host}:${sys.port}/sap/opu/odata/sap/ZTEST_TABLE_SRV/${entity}?$format=json&${params}`;
  if(sys.mode==='proxy'){
    const proxyUrl=(sys.proxyUrl||'http://localhost:3100').replace(/\/$/,'');
    const resp=await fetch(`${proxyUrl}/proxy`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:baseUrl,username:sys.user,password:sys.password}),
      signal:AbortSignal.timeout(20000)
    });
    if(!resp.ok)throw new Error(`Proxy HTTP ${resp.status}`);
    const env=await resp.json();
    if(!env.ok)throw new Error(`SAP HTTP ${env.status}`);
    const d=env.data;
    return d?.d?.results||d?.value||(Array.isArray(d)?d:[]);
  }
  // Direct
  const r=await fetch(baseUrl,{headers:{'Authorization':'Basic '+btoa(`${sys.user}:${sys.password}`)},signal:AbortSignal.timeout(15000)});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const j=await r.json();
  return j?.d?.results||j?.value||[];
}

async function testConnection(sys){
  if(sys.mode==='demo')return{ok:true,msg:'Demo mode — using built-in data'};
  if(sys.mode==='proxy'){
    const proxyBase=(sys.proxyUrl||'http://localhost:3100').replace(/\/$/,'');
    try{
      const ctrl=new AbortController();
      setTimeout(()=>ctrl.abort(),5000);
      const hr=await fetch(`${proxyBase}/health`,{signal:ctrl.signal});
      if(!hr.ok)return{ok:false,msg:`Proxy HTTP ${hr.status}`};
    }catch(e){return{ok:false,msg:`Proxy unreachable: ${e.name==='AbortError'?'timeout':e.message}. Run: python3 sap_proxy.py`};}
  }
  if(!sys.host)return{ok:false,msg:'No host configured'};
  try{
    await sapFetch(sys,'InputsSet','$top=1');
    return{ok:true,msg:`Connected to ${sys.sid} via ${sys.mode}`};
  }catch(e){
    if(e.message.includes('DEMO_MODE'))return{ok:true,msg:'Demo mode'};
    return{ok:false,msg:e.message};
  }
}

// ─── ANALYSIS ENGINE ────────────────────────────────────────────
function buildAuthMap(agrUsers,agrAuth){
  const roleMap={};
  agrAuth.forEach(function(r){
    const role=String(col(r,'AGR_NAME')||'').trim();
    const obj=String(col(r,'OBJECT')||'').toUpperCase().trim();
    const field=String(col(r,'FIELD')||'').toUpperCase().trim();
    const low=String(col(r,'LOW')||'').toUpperCase().trim();
    if(!role||!obj) return;
    if(!roleMap[role])roleMap[role]={tcodes:new Set(),aobjs:new Set(),triples:[]};
    if(obj==='S_TCODE' && low) roleMap[role].tcodes.add(low);
    else roleMap[role].aobjs.add(obj);
    roleMap[role].triples.push({obj,field,value:low});
  });
  const umap={};
  agrUsers.forEach(function(r){
    const u=String(col(r,'BNAME')||'').trim();
    const role=String(col(r,'AGR_NAME')||'').trim();
    if(!u||!role)return;
    if(!umap[u])umap[u]={roles:new Set(),tcodes:new Set(),aobjs:new Set(),triples:[]};
    umap[u].roles.add(role);
    const rm=roleMap[role];
    if(rm){
      rm.tcodes.forEach(function(t){umap[u].tcodes.add(t);});
      rm.aobjs.forEach(function(o){umap[u].aobjs.add(o);});
      rm.triples.forEach(function(tr){umap[u].triples.push(tr);});
    }
  });
  return umap;
}

// ─── LICENSE ANALYSIS: map each user to a license type via rule file ──
function runLicense(umap, rules){
  // Build quick lookup of user authorizations (tcodes + obj/field/value)
  const out=[];
  Object.entries(umap).forEach(function(entry){
    var user=entry[0], auth=entry[1];
    var matched=null, matchedRule=null;
    // Evaluate every rule; keep the highest-ranked (lowest priority number)
    rules.forEach(function(rule){
      var ruleObj=(rule.obj||'').toUpperCase();
      var ruleField=(rule.field||'').toUpperCase();
      var ruleVal=(rule.value||'').toUpperCase();
      var hit=false;
      if(ruleObj==='S_TCODE'){
        hit = auth.tcodes.has(ruleVal) || auth.tcodes.has('*');
      } else {
        // match obj + (field optional) + value (or wildcard)
        hit = auth.triples.some(function(t){
          if(t.obj!==ruleObj) return false;
          if(ruleField && t.field && t.field!==ruleField) return false;
          if(ruleVal==='*' ) return true;
          return t.value===ruleVal || t.value==='*';
        });
      }
      if(hit){
        var rank=LICENSE_RANK[rule.ltype]||99;
        if(matched===null || rank < (LICENSE_RANK[matched]||99)){
          matched=rule.ltype; matchedRule=rule;
        }
      }
    });
    out.push({
      user:user,
      license: matched||'GE',
      licenseName: matched?(LICENSE_NAMES[matched]||matched):'Employee Self-Service',
      licenseDesc: matchedRule?matchedRule.ldesc:'No privileged authorizations matched — default minimal license',
      matchedOn: matchedRule?(matchedRule.obj+(matchedRule.value?(' = '+matchedRule.value):'')):'—',
      roles:[...auth.roles].slice(0,3).join(', '),
      tcodeCount:auth.tcodes.size
    });
  });
  // sort by license rank (most privileged first)
  out.sort(function(a,b){return (LICENSE_RANK[a.license]||99)-(LICENSE_RANK[b.license]||99);});
  return out;
}

function runSoD(umap, enabledRules){
  const violations=[];
  SOD_LIBRARY.filter(r=>!r.type&&enabledRules.has(r.id)).forEach(rule=>{
    const t1=new Set(rule.f1.tcodes.map(t=>t.toUpperCase()));
    const t2=new Set(rule.f2.tcodes.map(t=>t.toUpperCase()));
    Object.entries(umap).forEach(([user,auth])=>{
      const has1=[...t1].some(t=>auth.tcodes.has(t)||auth.tcodes.has('*'));
      const has2=[...t2].some(t=>auth.tcodes.has(t)||auth.tcodes.has('*'));
      if(has1&&has2){
        violations.push({
          user,ruleId:rule.id,name:rule.name,area:rule.area,sev:rule.sev,sox:rule.sox,
          f1:rule.f1.name,f2:rule.f2.name,
          tc1:[...t1].filter(t=>auth.tcodes.has(t)||auth.tcodes.has('*')).slice(0,4).join(', '),
          tc2:[...t2].filter(t=>auth.tcodes.has(t)||auth.tcodes.has('*')).slice(0,4).join(', '),
          roles:[...auth.roles].slice(0,3).join(', '),
          mitigation:rule.mitigation,
        });
      }
    });
  });
  return violations.sort((a,b)=>{const o={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};return(o[a.sev]||9)-(o[b.sev]||9);});
}

function runSensitive(umap, enabledRules){
  const out=[];
  SOD_LIBRARY.filter(r=>r.type==='SENSITIVE'&&enabledRules.has(r.id)).forEach(rule=>{
    (rule.tcodes||[]).forEach(tc=>{
      const tcUp=tc.toUpperCase();
      Object.entries(umap).forEach(([user,auth])=>{
        if(auth.tcodes.has(tcUp)||auth.tcodes.has('*')){
          out.push({user,ruleId:rule.id,name:rule.name,tcode:tc,sev:rule.sev,area:rule.area,sox:rule.sox,
            roles:[...auth.roles].slice(0,2).join(', '),mitigation:rule.mitigation});
        }
      });
    });
  });
  return out;
}

function runDormant(usr02, threshold=90){
  return usr02.map(function(u){
    const trdat = col(u,'TRDAT')||'';
    const pwddat = col(u,'PWDLGNDATE')||'';
    const ustyp = col(u,'USTYP')||'A';
    const days = daysSince(trdat);
    const pdDays = daysSince(pwddat);
    const locked = !!col(u,'UFLAG');
    return{
      user: col(u,'BNAME')||'',
      type: ustyp,
      lastLogin: trdat||'Never',
      daysLogin: days,
      lastPwd: pwddat||'Never',
      daysPwd: pdDays,
      locked: locked,
      isDormant: days>threshold,
      pwdIssue: pdDays>90 && ustyp==='A',
    };
  }).filter(function(u){return u.isDormant||u.pwdIssue;});
}

function runParamCheck(paramRows){
  return SAP_PARAMS.map(bp=>{
    const row=paramRows.find(function(p){return (col(p,'PARNAME')||'').toLowerCase()===bp.name.toLowerCase();});
    const current=row?(col(row,'PARVAL')||'—'):'Not retrieved';
    let status='WARN';
    if(!row){status='UNKNOWN';}
    else{
      const cur=(current||'').toString().trim().toLowerCase();
      const tgt=(bp.target||'').toString().trim().toLowerCase();
      if(cur===tgt){status='PASS';}
      else{
        // Numeric comparison where possible
        const cN=parseFloat(cur),tN=parseFloat(tgt);
        if(!isNaN(cN)&&!isNaN(tN)){
          const lessIsBetter=['login/min_password_lng','login/min_password_specials','login/min_password_digits','login/min_password_letters','login/password_history_size','rsau/max_diskspace/local','rdisp/gui_auto_logout'].some(n=>bp.name.startsWith(n.split('/')[0]));
          status=cN>=tN?'PASS':'FAIL';
          if(['login/fails_to_user_lock'].includes(bp.name))status=cN<=tN?'PASS':'FAIL';
          if(['login/failed_user_auto_unlock','login/disable_multi_gui_login','snc/enable','rsau/enable','auth/rfc_authority_check','login/no_automatic_user_sapstar','login/password_change_for_SSO','icm/https/verify_client'].includes(bp.name))status=cN===tN?'PASS':'FAIL';
          if(['login/accept_sso2_ticket'].includes(bp.name))status=cN===tN?'PASS':'FAIL';
        } else {status=cur===tgt?'PASS':'FAIL';}
      }
    }
    return{...bp,current,status};
  });
}

function runUnused(umap, sm20, roleTcodeMap){
  // Build set of (user, tcode) actually used from SM20
  const used={};
  sm20.forEach(function(r){
    const u=col(r,'BNAME')||'';
    const t=(col(r,'TCODE')||'').toUpperCase();
    if(u&&t){if(!used[u])used[u]=new Set();used[u].add(t);}
  });
  // Aggregate per-user totals (for backwards-compatible summary)
  const summary=[];
  // Detailed per-user-per-tcode rows
  const detail=[];
  Object.keys(umap).forEach(function(user){
    const auth=umap[user];
    const usedSet=used[user]||new Set();
    const tcodes=[...auth.tcodes].filter(function(t){return t!=='*';});
    const usedCount=tcodes.filter(function(t){return usedSet.has(t);}).length;
    const unusedTcodes=tcodes.filter(function(t){return !usedSet.has(t);});
    if(tcodes.length===0) return;
    summary.push({
      user:user,
      assigned:tcodes.length,
      used:usedCount,
      unused:unusedTcodes.length,
      unusedList:unusedTcodes.slice(0,6).join(', '),
      pct:Math.round(unusedTcodes.length/tcodes.length*100)
    });
    // Detail rows: for each tcode the user has, find which role(s) granted it
    tcodes.forEach(function(t){
      const wasUsed=usedSet.has(t);
      // Find which of this user's roles include this tcode
      const grantingRoles=[];
      [...auth.roles].forEach(function(role){
        const rm=roleTcodeMap&&roleTcodeMap[role];
        if(rm&&rm.has(t)) grantingRoles.push(role);
      });
      detail.push({
        user:user,
        roles:grantingRoles.slice(0,3).join(', ')||[...auth.roles].slice(0,2).join(', '),
        tcode:t,
        status: wasUsed ? 'USED' : 'UNUSED',
      });
    });
  });
  summary.sort(function(a,b){return b.pct-a.pct;});
  // Sort detail: unused first (more interesting), then by user
  detail.sort(function(a,b){
    if(a.status!==b.status) return a.status==='UNUSED'?-1:1;
    return a.user.localeCompare(b.user);
  });
  // Return summary on the array itself (legacy) but also stash detail
  summary.detail = detail;
  return summary;
}

function runDefaultUsers(usr02){
  const defaults=['SAP*','DDIC','EARLYWATCH','TMSADM','SAPCPIC','SAPRFC'];
  return usr02.filter(function(u){
    return defaults.indexOf((col(u,'BNAME')||'').toUpperCase())>=0;
  }).map(function(u){
    const name = (col(u,'BNAME')||'');
    const locked = !!col(u,'UFLAG');
    return{
      user: name,
      locked: locked,
      type: col(u,'USTYP')||'A',
      lastLogin: col(u,'TRDAT')||'Never',
      sev: name.toUpperCase()==='SAP*'?'CRITICAL':'HIGH',
      finding: 'Default SAP user'+(locked?'':' - NOT LOCKED'),
    };
  });
}

function calcScore(sod,dormant,params,sensitive){
  let sc=0;
  sc+=Math.min(sod.filter(s=>s.sev==='CRITICAL').length*12,30);
  sc+=Math.min(sod.filter(s=>s.sev==='HIGH').length*5,14);
  sc+=Math.min(dormant.filter(d=>d.daysLogin>365).length*4,10);
  sc+=Math.min(params.filter(p=>p.status==='FAIL').length*2,16);
  sc+=Math.min(sensitive.filter(s=>s.sev==='CRITICAL').length*4,14);
  return Math.min(Math.round(sc),100);
}

// ─── RECOMMENDATIONS ENGINE — derives prioritized, finding-specific actions ──
function buildRecommendations(res){
  const recs=[];
  const sodCrit=res.sod.filter(function(s){return s.sev==='CRITICAL';});
  const sodSox=res.sod.filter(function(s){return s.sox;});
  const dormantOld=res.dormant.filter(function(d){return d.isDormant&&d.daysLogin>365;});
  const dormant180=res.dormant.filter(function(d){return d.isDormant&&d.daysLogin>180;});
  const pwdOld=res.dormant.filter(function(d){return d.pwdIssue;});
  const defNotLocked=res.defaultUsers.filter(function(d){return !d.locked;});
  const sensCrit=res.sensitive.filter(function(s){return s.sev==='CRITICAL';});
  const paramFail=res.paramResults.filter(function(p){return p.status==='FAIL';});
  const unusedHigh=res.unused.filter(function(u){return u.pct>80;});
  const overLic=res.license?res.license.filter(function(l){return l.license==='GB';}):[];

  function add(prio,area,title,detail,refs){recs.push({prio:prio,area:area,title:title,detail:detail,refs:refs||''});}

  // ── P1 — Immediate (critical exposure) ──
  if(defNotLocked.length>0)
    add('P1','Default Users','Lock '+defNotLocked.length+' unlocked default user(s): '+defNotLocked.map(function(d){return d.user;}).join(', '),
        'Default SAP accounts with known credentials are an immediate breach risk. Lock them in every client and change default passwords.','SAP Note 2216306');
  if(sodCrit.length>0)
    add('P1','SoD','Remediate '+sodCrit.length+' CRITICAL segregation-of-duties conflict(s)',
        'Users hold mutually exclusive critical functions (e.g. '+sodCrit.slice(0,3).map(function(s){return s.user+' → '+s.name;}).join('; ')+'). Remove one side of each conflict or apply a documented compensating control.','');
  var sapAll=res.sod.filter(function(s){return (s.roles||'').indexOf('SAP_ALL')>=0;});
  if(sapAll.length>0)
    add('P1','Privileged Access','Remove SAP_ALL / wide-open profiles from '+new Set(sapAll.map(function(s){return s.user;})).size+' user(s)',
        'SAP_ALL grants every authorization and defeats all SoD controls. Replace with least-privilege role assignments.','');
  if(sensCrit.length>0)
    add('P1','Sensitive Access','Review '+sensCrit.length+' CRITICAL sensitive-transaction assignment(s)',
        'Transactions such as '+[...new Set(sensCrit.map(function(s){return s.tcode;}))].slice(0,6).join(', ')+' must be restricted to named owners with logging enabled.','');

  // ── P2 — Short-term (30 days) ──
  if(sodSox.length>0)
    add('P2','SOX Compliance','Document or remediate '+sodSox.length+' SOX-relevant SoD violation(s)',
        'SOX-flagged conflicts require remediation or a formally approved compensating control before the next audit cycle.','');
  if(pwdOld.length>0)
    add('P2','Passwords','Force password reset for '+pwdOld.length+' user(s) with passwords older than 90 days',
        'Stale passwords increase credential-theft risk. Enforce the change at next logon.','');
  if(dormant180.length>0)
    add('P2','Dormant Users','Lock '+dormant180.length+' user(s) inactive for 180+ days',
        'Dormant accounts are prime targets for misuse. Lock now and delete after a retention review.','');
  var critParams=paramFail.filter(function(p){return ['login/min_password_lng','login/fails_to_user_lock','login/failed_user_auto_unlock','login/no_automatic_user_sapstar'].indexOf(p.name)>=0;});
  if(critParams.length>0)
    add('P2','Security Parameters','Harden '+critParams.length+' critical login parameter(s)',
        critParams.map(function(p){return p.name+' is '+p.current+', target '+p.target;}).join('; ')+'.','SAP Security Baseline v1.8');

  // ── P3 — Medium-term (90 days) ──
  if(paramFail.length>critParams.length)
    add('P3','Security Parameters','Align remaining '+(paramFail.length-critParams.length)+' parameter(s) to SAP baseline',
        'Bring session, network and audit parameters in line with SAP Security Baseline v1.8.','SAP Security Baseline v1.8');
  if(unusedHigh.length>0)
    add('P3','Access Optimization','Right-size roles for '+unusedHigh.length+' user(s) using <20% of assigned t-codes',
        'Remove unused transactions to shrink the attack surface and simplify future audits.','');
  if(overLic.length>0)
    add('P3','License Optimization','Validate '+overLic.length+' user(s) classified as Professional (GB) license',
        'Professional licenses are the most expensive tier. Confirm each user genuinely needs the privileged transactions that triggered the classification; otherwise reduce access to lower the license requirement.','');
  if(dormantOld.length>0)
    add('P3','License Optimization','Reclaim licenses from '+dormantOld.length+' user(s) inactive 365+ days',
        'Long-dormant users still consume license entitlements. Lock and reassign their licenses.','');

  // ── ITGC-driven additions ──
  var itgc = res.itgc||[];
  var itgcFails = itgc.filter(function(f){return f.status==='FAIL';});
  itgcFails.forEach(function(f){
    var prio = f.sev==='CRITICAL'?'P1':f.sev==='HIGH'?'P2':'P3';
    add(prio, 'ITGC: '+f.category, f.id+' — '+f.name, f.desc+' Evidence: '+f.evidence, f.ref);
  });

  return recs;
}

async function runFullAnalysis(sys, enabledRules, onProgress, onLog){
  const steps=[
    ['Connecting to SAP / loading data',null],
    ['Reading USR02 (user master)',     'USR02'],
    ['Reading AGR_USERS (role assignments)','AGR_USERS'],
    ['Reading AGR_1251 (auth values)', 'AGR_1251'],
    ['Reading profile parameters',     'PARAMS'],
    ['Reading SM20 (security audit log)','SM20'],
    ['Reading Fiori metering',         'FIORI'],
    ['Reading T000 (client settings)',   'T000'],
    ['Building user-authorization map', null],
    ['Running SoD conflict detection', null],
    ['Checking sensitive transactions', null],
    ['Scanning dormant users',         null],
    ['Checking default users',         null],
    ['Auditing security parameters',   null],
    ['Calculating risk score',         null],
  ];
  const data={};
  const demoMap={USR02:DEMO_USR02,AGR_USERS:DEMO_AGR_USERS,AGR_1251:DEMO_AGR_1251,PARAMS:DEMO_PARAMS,FIORI:DEMO_FIORI,SM20:[],T000:[]};
  // Track where each table's data came from, for transparency in the report
  const sources={};
  // Determine if user uploaded ANY file for this system. If yes, this is a "real"
  // analysis — we must NOT mix in demo data for the missing tables (would produce
  // misleading results that mix the user's records with demo records).
  const hasAnyUpload = Object.values(sys.files||{}).some(function(f){return getRows(f).length>0;});
  let anyUploaded=hasAnyUpload, anyLive=false;
  for(let i=0;i<steps.length;i++){
    onProgress(Math.round(i/steps.length*100));
    const [label,tableKey]=steps[i];
    onLog(label,'info');
    await new Promise(r=>setTimeout(r,100+Math.random()*150));
    if(!tableKey) continue;

    // PRIORITY 1 — uploaded file for this system
    const fd=sys.files?.[tableKey];
    const uploaded=getRows(fd);
    if(uploaded.length>0){
      data[tableKey]=uploaded;
      sources[tableKey]='Uploaded file: '+(fd.fileName||tableKey);
      anyUploaded=true;
      onLog(`  ${tableKey}: ${uploaded.length} records from uploaded file`,'ok');
      continue;
    }

    // PRIORITY 2 — live SAP via OData (proxy/direct)
    if(sys.mode!=='demo'){
      try{
        const rows=await sapFetch(sys, ODATA_ENTITIES[tableKey]?.entity||tableKey+'Set',
                                  ODATA_ENTITIES[tableKey]?.params||'$top=5000');
        if(rows&&rows.length>0){
          data[tableKey]=rows;
          sources[tableKey]='Live SAP ('+sys.mode+')';
          anyLive=true;
          onLog(`  ${tableKey}: ${rows.length} records from SAP`,'ok');
          continue;
        }
        onLog(`  ${tableKey}: SAP returned 0 records`,'warn');
      }catch(e){
        if(e.message!=='DEMO_MODE')
          onLog(`  ${tableKey}: ${e.message}`,'warn');
      }
    }

    // PRIORITY 3 — demo fallback ONLY when no real data exists for this system
    if(hasAnyUpload || (sys.mode!=='demo' && sys.host)){
      // Real-data run: leave empty, do not mix demo records with real records
      data[tableKey]=[];
      sources[tableKey]='Not provided';
      onLog(`  ${tableKey}: not uploaded — analyses needing this table will be skipped`,'warn');
    } else {
      // Pure demo run (no uploads, no live connection)
      data[tableKey]=demoMap[tableKey]||[];
      sources[tableKey]='Demo data';
      if(data[tableKey].length>0)
        onLog(`  ${tableKey}: ${data[tableKey].length} records (demo fallback)`,'warn');
    }
  }

  // Resolve each dataset. Empty stays empty when uploads are missing — the engine
  // simply skips dependent analyses rather than producing misleading mixed results.
  const usr02   = getRows(data.USR02);
  const agrUsers= getRows(data.AGR_USERS);
  const agr1251 = getRows(data.AGR_1251);
  const params  = getRows(data.PARAMS);
  const sm20    = getRows(data.SM20);

  // ── DIAGNOSTIC: log key columns detected per table ──
  const diag = {};
  [['USR02',usr02,['BNAME','TRDAT','PWDLGNDATE','USTYP']],
   ['AGR_USERS',agrUsers,['BNAME','AGR_NAME']],
   ['AGR_1251',agr1251,['AGR_NAME','OBJECT','FIELD','LOW']],
   ['PARAMS',params,['PARNAME','PARVAL']],
   ['SM20',sm20,['BNAME','TCODE']]].forEach(function(spec){
    const name=spec[0], rows=spec[1], expected=spec[2];
    if(rows.length===0)return;
    const det=detectColumns(rows, expected);
    diag[name]=det;
    if(det.missing.length>0){
      onLog('  ! '+name+': '+rows.length+' rows but MISSING key columns: '+det.missing.join(', '),'err');
      onLog('     Headers found: '+det.headers.join(', '),'warn');
    } else {
      onLog('  ✓ '+name+': '+rows.length+' rows, columns OK: '+det.found.join(', '),'ok');
    }
  });

  // ── Validate the auth map actually got built ──
  const _testMap = buildAuthMap(agrUsers, agr1251);
  const _userCount = Object.keys(_testMap).length;
  if(agrUsers.length>0 && agr1251.length>0 && _userCount===0){
    onLog('! WARNING: AGR_USERS + AGR_1251 loaded but 0 users mapped. Check column names match.','err');
  } else if(_userCount>0){
    onLog('  ✓ Auth map built: '+_userCount+' users with '+Object.keys(_testMap).reduce(function(a,u){return a+_testMap[u].tcodes.size;},0)+' total t-code grants','ok');
  }
  const usr02FromReal = usr02.length>0 && sources.USR02 && sources.USR02.indexOf('Demo')!==0;
  // Track which analyses have the data they need (used for empty-state messaging)
  const analysisAvailable = {
    sod:        agrUsers.length>0 && agr1251.length>0,
    sensitive:  agrUsers.length>0 && agr1251.length>0,
    license:    agrUsers.length>0 && agr1251.length>0,
    dormant:    usr02.length>0,
    defaultUsers: usr02.length>0,
    params:     params.length>0,
    unused:     agrUsers.length>0 && agr1251.length>0 && sm20.length>0,
  };

  const umap=buildAuthMap(agrUsers,agr1251);
  const sod=runSoD(umap,enabledRules);
  const sensitive=runSensitive(umap,enabledRules);
  const dormant=runDormant(usr02);
  const defaultUsers=runDefaultUsers(usr02);
  const paramResults=runParamCheck(params);
  // Build role->tcodes map for the detailed unused-access report
  const _roleTcodeMap={};
  agr1251.forEach(function(r){
    const role=String(col(r,'AGR_NAME')||'').trim();
    const obj=String(col(r,'OBJECT')||'').toUpperCase().trim();
    const low=String(col(r,'LOW')||'').toUpperCase().trim();
    if(obj==='S_TCODE'&&role&&low){
      if(!_roleTcodeMap[role])_roleTcodeMap[role]=new Set();
      _roleTcodeMap[role].add(low);
    }
  });
  const unused=runUnused(umap,sm20,_roleTcodeMap);
  let fiori=getRows(data.FIORI);
  if(fiori.length===0 && !hasAnyUpload && (sys.mode==='demo'||!sys.host)) fiori=DEMO_FIORI;
  const license=runLicense(umap, LICENSE_RULES);
  const score=calcScore(sod,dormant,paramResults,sensitive);

  onProgress(100);
  onLog(`Analysis complete — Risk Score: ${score}/100`,'ok');
  onLog(`SoD: ${sod.length} violations | Dormant: ${dormant.length} | Params: ${paramResults.filter(p=>p.status==='FAIL').length} FAIL`,'ok');
  onLog(`License: ${license.length} users classified | ${license.filter(l=>l.license==='GB').length} Professional`,'ok');

  // ── ITGC Compliance ──
  // Grab T000 from uploaded files if present
  const t000Data = getRows(data.T000||(sys.files&&sys.files.T000));
  const _resForITGC = {sod:sod,sensitive:sensitive,dormant:dormant,defaultUsers:defaultUsers,paramResults:paramResults,_authMap:umap};
  const itgc = runITGC(_resForITGC, usr02, agr1251, params, t000Data);
  const recommendations=buildRecommendations({sod,sensitive,dormant,defaultUsers,paramResults,unused,license,itgc});
  return{sod,sensitive,dormant,defaultUsers,paramResults,unused,license,fiori,score,recommendations,sources,analysisAvailable,itgc,
    isDemo:!usr02FromReal,
    system:{sid:sys.sid,client:sys.client,env:sys.env,name:sys.name},
    stats:{users:usr02.length,roles:new Set(agrUsers.map(r=>r.AGR_NAME||r.agr_name)).size,
      sodCount:sod.length,sensitiveCount:sensitive.length,dormantCount:dormant.length,
      defaultCount:defaultUsers.length,paramFails:paramResults.filter(p=>p.status==='FAIL').length,
      unusedCount:unused.length,soxCount:sod.filter(s=>s.sox).length,
      licenseCount:license.length,
      licenseProf:license.filter(l=>l.license==='GB').length,
      licenseFunc:license.filter(l=>l.license==='GC').length,
      itgcCount:itgc.filter(function(f){return f.status==='FAIL';}).length,
      itgcWarn:itgc.filter(function(f){return f.status==='WARN';}).length,
      itgcPass:itgc.filter(function(f){return f.status==='PASS';}).length},
    ts:Date.now()};
}

function toast(msg,type='info'){
  const el=document.getElementById('toast');
  const colors={ok:'rgba(24,200,120,.1)',err:'rgba(240,60,60,.1)',warn:'rgba(232,192,32,.1)',info:'rgba(56,120,240,.1)'};
  const bcolors={ok:'rgba(24,200,120,.3)',err:'rgba(240,60,60,.3)',warn:'rgba(232,192,32,.3)',info:'rgba(56,120,240,.3)'};
  const tcolors={ok:'var(--green)',err:'var(--red)',warn:'var(--yellow)',info:'var(--blue)'};
  el.style.cssText=`position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;backdrop-filter:blur(12px);box-shadow:0 6px 28px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;background:${colors[type]||colors.info};border:1px solid ${bcolors[type]||bcolors.info};color:${tcolors[type]||tcolors.info}`;

  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display='none',3800);
}

      +'</div></div>';
    return;
  }
  var s=r.stats, sc=r.score;
  var col=sc>75?'var(--red)':sc>50?'var(--orange)':sc>25?'var(--yellow)':'var(--green)';
  var sysC=sysColor(r.system.env);
  var kpis=[
    {l:'Risk Score',      v:sc,            c:col,              sub:sc>75?'Critical Risk':'High Risk',    click:''},
    {l:'SoD Violations',  v:s.sodCount,    c:'var(--red)',     sub:s.sodCount+' total',                  click:"navigate('res-sod')"},
    {l:'SOX Violations',  v:s.soxCount,    c:'var(--red)',     sub:'Require remediation',                click:"navigate('res-sod')"},
    {l:'Sensitive Access',v:s.sensitiveCount,c:'var(--orange)',sub:'T-code exposures',                    click:"navigate('res-sensitive')"},
    {l:'Dormant/Pwd',     v:s.dormantCount,c:'var(--yellow)',  sub:'Users to review',                    click:"navigate('res-dormant')"},
    {l:'Default Users',   v:s.defaultCount,c:s.defaultCount>0?'var(--red)':'var(--green)',sub:'SAP*/DDIC', click:"navigate('res-default')"},
    {l:'Param Failures',  v:s.paramFails,  c:'var(--orange)',  sub:'vs SAP Baseline v1.8',               click:"navigate('res-params')"},
    {l:'Unused Access',   v:s.unusedCount, c:'var(--purple)',  sub:'Users with excess roles',            click:"navigate('res-unused')"},
    {l:'Licenses',        v:s.licenseCount||0,c:'var(--blue)',   sub:(s.licenseProf||0)+' Professional',     click:"navigate('res-license')"},
  ];
  var barMax=Math.max(s.sodCount,s.sensitiveCount,s.dormantCount,s.defaultCount,s.paramFails,1);
  function bar(v,c){var pct=Math.max(v/barMax*100,v>0?4:1);return '<div class="bar-col"><div class="bar-val">'+v+'</div><div class="bar-fill" style="background:'+c+';height:'+pct+'%"></div></div>';}
  var ang=-130+(sc/100)*260;
  var html=['<div class="fade">'];
  if(r.isDemo) html.push('<div style="margin-bottom:14px;padding:9px 14px;background:rgba(144,80,240,.07);border:1px solid rgba(144,80,240,.25);border-radius:9px;font-size:12px;color:var(--purple)">Demo data active. Configure SAP connection in Systems &amp; Connections for live data.</div>');
  html.push('<div style="margin-bottom:14px;padding:9px 14px;background:'+sysC+'0d;border:1px solid '+sysC+'35;border-radius:9px;font-size:12.5px;color:var(--txt2);display:flex;align-items:center;gap:10px">');
  html.push('<span style="font-family:var(--mono);font-weight:800;font-size:15px;color:'+sysC+'">'+r.system.sid+'</span>');
  html.push(envBadge(r.system.env,true));
  html.push('<span>Client '+r.system.client+' &middot; '+r.system.name+' &middot; '+r.stats.users+' users &middot; '+r.stats.roles+' roles</span></div>');
  html.push('<div class="g4" style="margin-bottom:16px">');
  kpis.forEach(function(k){
    html.push('<div class="kpi-card'+(k.click?' clickable':'')+'"'+(k.click?' onclick="'+k.click+'"':'')+'>');
    html.push('<div class="kpi-label">'+k.l+'</div>');
    html.push('<div class="kpi-value" style="color:'+k.c+'">'+k.v+'</div>');
    if(k.sub) html.push('<div class="kpi-sub">'+k.sub+'</div>');
    html.push('</div>');
  });
  html.push('</div>');
  html.push('<div style="display:grid;grid-template-columns:150px 1fr 1fr;gap:14px;margin-bottom:14px">');
  // Gauge
  html.push('<div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px">');
  html.push('<svg width="140" height="82" viewBox="0 0 140 82">');
  html.push('<defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#18c878"/><stop offset="50%" stop-color="#e8c020"/><stop offset="100%" stop-color="#f03c3c"/></linearGradient></defs>');
  html.push('<path d="M13 74 A57 57 0 0 1 127 74" fill="none" stroke="var(--bg4)" stroke-width="10" stroke-linecap="round"/>');
  html.push('<path d="M13 74 A57 57 0 0 1 127 74" fill="none" stroke="url(#gg)" stroke-width="10" stroke-linecap="round" opacity=".8"/>');
  html.push('<g transform="translate(70,74) rotate('+ang+')"><line y1="3" y2="-43" stroke="'+col+'" stroke-width="2.5" stroke-linecap="round"/><circle r="5" fill="'+col+'"/></g>');
  html.push('<text x="70" y="70" text-anchor="middle" fill="'+col+'" font-size="20" font-weight="700" font-family="monospace">'+sc+'</text></svg>');
  html.push('<div style="font-size:11px;color:var(--txt3);margin-top:2px">Overall Risk</div></div>');
  // Bar chart
  html.push('<div class="card"><div style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px">Finding Distribution</div>');
  html.push('<div class="bar-wrap">');
  html.push(bar(s.sodCount,'var(--red)')+bar(s.soxCount,'#c00030')+bar(s.sensitiveCount,'var(--orange)')+bar(s.dormantCount,'var(--yellow)')+bar(s.defaultCount,'#cc0020')+bar(s.paramFails,'var(--blue)')+bar(s.unusedCount,'var(--purple)'));
  html.push('</div>');
  var barLabels=['SoD','SOX','Sensitive','Dormant','Default','Params','Unused'];
  var barCols=['var(--red)','#c00030','var(--orange)','var(--yellow)','#cc0020','var(--blue)','var(--purple)'];
  html.push('<div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">');
  barLabels.forEach(function(l,i){html.push('<span style="font-size:9px;color:'+barCols[i]+'">'+l+'</span>');});
  html.push('</div></div>');
  // Top violators
  html.push('<div class="card"><div style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px">Top SoD Violators</div>');
  if(r.sod.length===0){html.push('<div style="color:var(--txt3);font-size:12px;padding:12px 0">No violations detected.</div>');}
  else{r.sod.slice(0,6).forEach(function(v,i){
    var sc2=SEV_COLOR[v.sev]||'#888';
    html.push('<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)">');
    html.push('<div style="width:20px;height:20px;border-radius:5px;background:'+sc2+'20;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:'+sc2+';flex-shrink:0">'+(i+1)+'</div>');
    html.push('<div style="flex:1;min-width:0"><div style="font-size:11.5px;font-weight:600;color:var(--txt);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+v.user+'</div><div style="font-size:10px;color:var(--txt3)">'+v.name+'</div></div>');
    html.push(sevTag(v.sev,true)+'</div>');
  });}
  html.push('</div></div></div>');
  el.innerHTML=html.join('');
}

function renderSysCards(){
  const area=document.getElementById('sys-cards');
  if(!area)return;
  area.innerHTML=App.systems.map(sys=>{
    const c=sysColor(sys.env);
    const iA=sys.id===App.activeSysId;
    const fc=Object.keys(sys.files||{}).length;
    const st=sys.status||'unchecked';
    const statusColor=st==='ok'?'var(--green)':st==='err'?'var(--red)':st==='demo'?'var(--purple)':'var(--txt4)';
    return`<div class="sys-card${iA?' active':''}" onclick="setActiveSys('${sys.id}')" style="border-color:${iA?c:'var(--bd)'}">
      <div class="sys-env-ribbon" style="background:${c};color:#000">${sys.env}</div>
      <div style="font-family:var(--mono);font-weight:800;font-size:18px;color:${c};margin-bottom:2px">${sys.sid}</div>
      <div style="font-size:12.5px;font-weight:600;color:${iA?'var(--txt)':'var(--txt2)'}">${sys.name}</div>
      <div style="font-size:10.5px;color:var(--txt3)">Client: <span style="color:var(--txt2);font-family:var(--mono)">${sys.client||'—'}</span></div>
      <div style="font-size:10px;color:var(--txt3)">${sys.mode==='demo'?'Demo Mode':(sys.host||'No host')+':'+sys.port}</div>
      <div class="sys-dot-row">
        <span style="font-size:9px;color:${statusColor}">&#9679; ${st}</span>
        <span style="font-size:9px;color:var(--txt3);margin-left:auto">${fc} file${fc!==1?'s':''}</span>
      </div>
      ${iA?'<div style="display:flex;gap:4px;margin-top:8px" onclick="event.stopPropagation()"><button class="btn btn-sm btn-secondary" onclick="showEditSystem(\''+sys.id+'\')">Edit</button><button class="btn btn-sm btn-success" onclick="handleTestConn(\''+sys.id+'\')">Test</button>'+(App.systems.length>1?'<button class="btn btn-sm btn-ghost" onclick="deleteSystem(\''+sys.id+'\')">Del</button>':'')+'</div>':''}
    </div>`;
  }).join('')+'<div class="sys-card" onclick="showAddSystem()" style="display:flex;align-items:center;justify-content:center;min-height:120px;border-style:dashed;cursor:pointer;color:var(--txt3)">+ Add System</div>';
}

function setActiveSys(id){App.activeSysId=id;renderSysCards();renderNav();}

function showAddSystem(){
  document.getElementById('sys-form-area').innerHTML=systemForm(null);
}
function showEditSystem(id){
  const sys=App.systems.find(s=>s.id===id);
  if(sys)document.getElementById('sys-form-area').innerHTML=systemForm(sys);
}
function deleteSystem(id){
  App.systems=App.systems.filter(s=>s.id!==id);
  if(App.activeSysId===id)App.activeSysId=App.systems[0]?.id;
  renderConnect();renderNav();
}

function systemForm(sys){

  h.push('<div><label>Description</label><input id="sf-desc" value="'+(s.description||'')+'" placeholder="Brief description"/></div>');
  h.push('</div>');
  h.push('<div style="margin-top:14px;margin-bottom:14px"><label>Connection Mode</label>');
  h.push('<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px">');
  modes.forEach(function(m){
    var active=(s.mode||'proxy')===m;
    var labels={proxy:'Via local proxy (recommended)',direct:'Direct SAP call (needs CORS)',demo:'Built-in sample data'};
    var icons={proxy:'Proxy',direct:'Direct',demo:'Demo'};

function togglePwd(){const i=document.getElementById('sf-pwd');const b=document.getElementById('pwd-toggle');if(i){i.type=i.type==='password'?'text':'password';if(b)b.textContent=i.type==='password'?'Show':'Hide';}}
function pickEnv(e){document.getElementById('sf-env').value=e;const ec=SYS_COLOR;['PRD','QAS','DEV','SANDBOX','UAT'].forEach(v=>{const el=document.getElementById('ep-'+v);if(el){el.style.borderColor=v===e?(ec[v]||'#7a9abf'):'var(--bd)';el.style.background=v===e?(ec[v]||'#7a9abf')+'12':'transparent';el.querySelector('div').style.color=v===e?(ec[v]||'#7a9abf'):'var(--txt3)';}});}
function pickMode(m){document.getElementById('sf-mode').value=m;['proxy','direct','demo'].forEach(v=>{const el=document.getElementById('mp-'+v);if(el){el.style.borderColor=v===m?'rgba(0,200,240,.4)':'var(--bd)';el.style.background=v===m?'rgba(0,200,240,.07)':'transparent';el.querySelector('div').style.color=v===m?'var(--cyan)':'var(--txt3)';}});
  const cf=document.getElementById('conn-fields');if(cf)cf.style.opacity=m==='demo'?'.4':'1';
  const pf=document.getElementById('proxy-url-field');if(pf)pf.style.display=m==='proxy'?'':'none';
  ['sf-host','sf-port','sf-user','sf-pwd'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=m==='demo';});}
function cancelSysForm(){const a=document.getElementById('sys-form-area');if(a)a.innerHTML='';}
function saveSysForm(){
  const g=id=>document.getElementById(id)?.value||'';
  const id=g('sf-id');
  const sys={id:id||'sys'+Date.now(),name:g('sf-name'),sid:g('sf-sid').toUpperCase(),client:g('sf-client'),env:g('sf-env'),description:g('sf-desc'),host:g('sf-host'),port:g('sf-port'),user:g('sf-user'),password:g('sf-pwd'),proxyUrl:g('sf-proxyurl')||'http://localhost:3100',mode:g('sf-mode'),files:{},lastSync:null,status:'unchecked'};
  if(!sys.name||!sys.sid){toast('Name and SID are required','warn');return;}
  const existing=App.systems.find(s=>s.id===id);
  if(existing){const files=existing.files||{};sys.files=files;App.systems=App.systems.map(s=>s.id===id?sys:s);}
  else App.systems.push(sys);
  App.activeSysId=sys.id;
  cancelSysForm();renderConnect();renderNav();
  toast(`System "${sys.name}" saved`,'ok');
}
async function handleTestConn(id){
  const sys=App.systems.find(s=>s.id===id);
  if(!sys)return;
  toast(`Testing ${sys.sid}...`,'info');
  const r=await testConnection(sys);
  sys.status=r.ok?'ok':'err';
  toast((r.ok?'✓ ':'✗ ')+r.msg,r.ok?'ok':'err');
  renderSysCards();
}
async function handleTestConnForm(){
  const g=id=>document.getElementById(id)?.value||'';
  const sys={id:'test',name:'test',sid:g('sf-sid'),client:g('sf-client'),env:g('sf-env'),host:g('sf-host'),port:g('sf-port'),user:g('sf-user'),password:g('sf-pwd'),proxyUrl:g('sf-proxyurl')||'http://localhost:3100',mode:g('sf-mode')};
  const tr=document.getElementById('test-result');
  if(tr)tr.innerHTML='<span style="color:var(--txt3);font-size:12px">Testing...</span>';
  const r=await testConnection(sys);
  if(tr)tr.innerHTML=`<div style="padding:8px 12px;border-radius:8px;font-size:12.5px;background:${r.ok?'rgba(24,200,120,.08)':'rgba(240,60,60,.08)'};border:1px solid ${r.ok?'rgba(24,200,120,.25)':'rgba(240,60,60,.25)'};color:${r.ok?'var(--green)':'var(--red)'};">${r.ok?'✓':'✗'} ${r.msg}</div>`;
}

function loadFileInput(input,tableId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSV(e.target.result);
    const sys=App.activeSys;
    sys.files=sys.files||{};
    sys.files[tableId]={rows,fileName:file.name,size:file.size,rowCount:rows.length,loaded:Date.now()};
    // ── Column detection diagnostic (per uploaded table) ──
    const expectedMap={
      USR02:['BNAME','TRDAT','PWDLGNDATE','USTYP'],
      AGR_USERS:['BNAME','AGR_NAME'],
      AGR_1251:['AGR_NAME','OBJECT','FIELD','LOW'],
      PARAMS:['PARNAME','PARVAL'],
      SM20:['BNAME','TCODE']
    };
    const expected=expectedMap[tableId];
    if(expected && rows.length>0){
      const det=detectColumns(rows, expected);
      sys.files[tableId].diagnostic=det;
      if(det.missing.length>0){
        toast(tableId+': '+rows.length+' rows BUT missing column(s): '+det.missing.join(', ')+'. Check headers.','warn');
      }
    }
    // Special: license rule file is parsed into global LICENSE_RULES
    if(tableId==='LICENSE_RULES'){
      const parsed=rows.map(function(r){
        // Accept many naming conventions, incl. PCE format (Rule id, Auth.Object, Auth.Field, Auth.Value)
        var ltype=(r.LICENSE_TYPE||r.LICENSE_ID||r.LTYPE||r['RULE ID']||r.RULE_ID||r['RULE.ID']||r.RULEID||'').toUpperCase().trim();
        var ldesc=(r.LICENSE_DESC||r['RULE DESCRIPTION']||r.RULE_DESCRIPTION||r['RULE.DESCRIPTION']||r.LDESC||r.DESCRIPTION||'').trim();
        var obj  =(r.AUTH_OBJECT||r['AUTH.OBJECT']||r.OBJECT||r.OBJ||'').toUpperCase().trim();
        var field=(r.AUTH_FIELD||r['AUTH.FIELD']||r.FIELD||'').toUpperCase().trim();
        var value=(r.AUTH_VALUE||r['AUTH.VALUE']||r.VALUE||r.VAL||r.LOW||'').toUpperCase().trim();
        return {ltype:ltype, ldesc:ldesc, obj:obj, field:field, value:value};
      }).filter(function(r){return r.ltype&&r.obj;});
      if(parsed.length>0){
        LICENSE_RULES=parsed;
        toast('License rule file loaded: '+parsed.length+' rules active','ok');
      } else {
        toast('License file parsed but no valid rules found. Check columns: LICENSE_TYPE, LICENSE_DESC, AUTH_OBJECT, FIELD, VALUE','warn');
      }
    } else {
      toast(tableId+': '+rows.length.toLocaleString()+' rows loaded','ok');
    }
    renderIngest();
  };
  reader.readAsText(file);
}

function switchRLTab(g, btn){
  App.rlTab=g;
  if(btn){
    document.querySelectorAll('#rl-tabs .tab').forEach(function(t){t.classList.remove('active');});
    btn.classList.add('active');
  }
  var grouped={};
  SOD_LIBRARY.forEach(function(r){var gr=r.type||'SoD';if(!grouped[gr])grouped[gr]=[];grouped[gr].push(r);});
  var c=document.getElementById('rl-content');
  if(c) c.innerHTML=(g==='params')?renderParamBaseline():renderRLTab(g,grouped);

function renderRLTab(g, grouped){
  var rules=(grouped&&grouped[g])||[];
  if(rules.length===0) return '<div style="padding:30px;text-align:center;color:var(--txt3);font-size:12.5px">No rules in this category. Use the <strong>+ Add Rule</strong> button to create one, or upload a library file.</div>';
  // Sort by severity then ID
  var sevOrder={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};
  rules=rules.slice().sort(function(a,b){
    var so=(sevOrder[a.sev]||9)-(sevOrder[b.sev]||9);
    return so!==0?so:String(a.id).localeCompare(String(b.id));
  });
  var h=[];
  rules.forEach(function(r){
    var en=App.enabledRules.has(r.id);
    var sevCol=SEV_COLOR[r.sev]||'#888';
    h.push('<div class="risk-row'+(en?' enabled':'')+'" id="rr-'+r.id+'" style="border:1px solid '+(en?sevCol+'40':'var(--bd)')+';background:'+(en?sevCol+'08':'var(--bg2)')+'">');
    h.push('<div style="display:flex;align-items:flex-start;gap:10px">');
    // toggle
    h.push('<button class="toggle-btn" data-rid="'+r.id+'" onclick="toggleRule(this.dataset.rid)" style="background:'+(en?'var(--green)':'var(--bd2)')+'">');
    h.push('<div class="toggle-knob" style="left:'+(en?'16':'2')+'px"></div></button>');
    // body
    h.push('<div style="flex:1;min-width:0">');
    h.push('<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">');
    h.push('<span style="font-weight:700;font-size:11.5px;color:var(--txt3);font-family:var(--mono)">'+r.id+'</span>');
    h.push('<span style="font-weight:600;font-size:13px;color:var(--txt)">'+r.name+'</span>');
    h.push(sevTag(r.sev,true));
    h.push('<span style="font-size:9.5px;color:var(--txt3);background:var(--bg4);padding:1px 6px;border-radius:10px;border:1px solid var(--bd)">'+(r.area||'')+'</span>');
    if(r.sox) h.push('<span style="font-size:9.5px;color:var(--red);background:rgba(240,60,60,.1);padding:1px 6px;border-radius:10px;border:1px solid rgba(240,60,60,.25)">SOX</span>');
    h.push('</div>');
    if(r.desc) h.push('<div style="font-size:11px;color:var(--txt3);margin-top:4px">'+r.desc+'</div>');
    if(r.f1 && r.f2){
      h.push('<div style="font-size:10.5px;color:var(--txt4);margin-top:4px;font-family:var(--mono)">');
      h.push('<span style="color:var(--orange2)">'+r.f1.name+'</span> ['+(r.f1.tcodes||[]).slice(0,4).join(", ")+'] ');
      h.push('<span style="color:var(--txt3)"> vs </span>');
      h.push('<span style="color:var(--orange2)">'+r.f2.name+'</span> ['+(r.f2.tcodes||[]).slice(0,4).join(", ")+']');
      h.push('</div>');
    }
    if(r.tcodes && r.tcodes.length){
      h.push('<div style="font-size:10.5px;color:var(--red2);margin-top:4px;font-family:var(--mono)">T-Codes: '+r.tcodes.join(', ')+'</div>');
    }
    if(r.mitigation){
      h.push('<div style="font-size:10.5px;color:var(--green2);margin-top:4px"><strong style="color:var(--txt3)">Mitigation:</strong> '+r.mitigation+'</div>');
    }
    h.push('</div>');
    // delete
    h.push('<button class="btn btn-ghost btn-sm" data-rid="'+r.id+'" onclick="deleteRisk(this.dataset.rid)" title="Delete rule" style="flex-shrink:0">&#x2715;</button>');
    h.push('</div></div>');
  });
  return h.join('');
}

function uploadRiskLibrary(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var rows=parseCSV(e.target.result);
    var added=0;
    rows.forEach(function(r){
      var rid=(r.RULE_ID||r.rule_id||r.ID||r.id||'').trim();
      var name=(r.RISK_NAME||r.risk_name||r.NAME||r.name||'').trim();
      var type=(r.TYPE||r.type||'SoD').trim();
      if(!name)return;
      if(!rid)rid='IMPORT-'+Date.now()+'-'+added;
      var rule={id:rid,name:name,area:(r.AREA||r.area||'IMPORT').trim(),
                sev:(r.SEVERITY||r.severity||r.SEV||'HIGH').toUpperCase().trim(),
                sox:(r.SOX||r.sox||'').toString().toUpperCase().indexOf('Y')===0||((r.SOX||'')+'')==='true',
                desc:(r.DESCRIPTION||r.description||r.DESC||'').trim(),
                mitigation:(r.MITIGATION||r.mitigation||'').trim()};
      if(type.toUpperCase().indexOf('SEN')===0){
        rule.type='SENSITIVE';
        rule.tcodes=((r.TCODES||r.tcodes||r.TCODE||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean);
        rule.aobjs=[];
      } else {
        rule.f1={name:(r.FUNC1||r.func1||'Function 1').trim(),tcodes:((r.FUNC1_TCODES||r.func1_tcodes||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
        rule.f2={name:(r.FUNC2||r.func2||'Function 2').trim(),tcodes:((r.FUNC2_TCODES||r.func2_tcodes||'')+'').split(/[,;]/).map(function(x){return x.trim();}).filter(Boolean),aobjs:[]};
      }
      SOD_LIBRARY.push(rule);
      App.enabledRules.add(rule.id);
      added++;
    });
    toast(added>0?(added+' rules imported'):'No valid rules found. Check column headers.',added>0?'ok':'warn');
    renderRiskLibrary();renderNav();
  };
  reader.readAsText(file);
}
function downloadRiskTemplate(){
  var csv='RULE_ID,RISK_NAME,TYPE,AREA,SEVERITY,SOX,DESCRIPTION,FUNC1,FUNC1_TCODES,FUNC2,FUNC2_TCODES,TCODES,MITIGATION\n';

async function handleRun(){
  const sys=App.activeSys;
  App.running=true;App.log=[];
  const btn=document.getElementById('run-btn');
  if(btn){btn.disabled=true;btn.textContent='Analyzing...';}
  const pa=document.getElementById('progress-area');if(pa)pa.style.display='block';
  const la=document.getElementById('analysis-log');if(la)la.style.display='block';

  function onProgress(p){App.progress=p;const pf=document.getElementById('prog-fill');if(pf)pf.style.width=p+'%';}
  function onLog(msg,type){
    App.log.push({msg,type});
    const la=document.getElementById('analysis-log');
    if(la){la.innerHTML+=`<div class="log-${type==='ok'?'ok':type==='warn'?'warn':type==='err'?'err':'info'}">${msg}</div>`;la.scrollTop=la.scrollHeight;}
  }
  try{
    App.results=await runFullAnalysis(sys,App.enabledRules,onProgress,onLog);
    toast(`Analysis complete! Risk score: ${App.results.score}/100`,'ok');
    navigate('dashboard');
  }catch(e){
    onLog('Analysis failed: '+e.message,'err');
    toast('Analysis failed: '+e.message,'err');
  }
  App.running=false;
  if(btn){btn.disabled=false;btn.innerHTML='&#9654; Run Security Analysis';}
}

// ─── Ensure jsPDF is available (lazy-load if CDN blocked) ────────
function ensureJsPDF(){
  return new Promise(function(resolve,reject){
    if(window.jspdf&&window.jspdf.jsPDF){resolve(window.jspdf.jsPDF);return;}
    // Try loading from CDN dynamically
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=function(){
      var s2=document.createElement('script');
      s2.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js';
      s2.onload=function(){
        if(window.jspdf&&window.jspdf.jsPDF)resolve(window.jspdf.jsPDF);
        else reject(new Error('jsPDF loaded but unavailable'));
      };
      s2.onerror=function(){
        // autotable failed but core jsPDF may still work
        if(window.jspdf&&window.jspdf.jsPDF)resolve(window.jspdf.jsPDF);
        else reject(new Error('Could not load jsPDF plugin'));
      };
      document.head.appendChild(s2);
    };
    s.onerror=function(){reject(new Error('No internet — cannot load jsPDF. PDF export needs a connection; use Export JSON instead.'));};
    document.head.appendChild(s);
  });
}

    const kpis=[['SoD Violations',r.stats.sodCount,col],['SOX Relevant',r.stats.soxCount,[200,50,50]],['Sensitive Access',r.stats.sensitiveCount,[240,120,32]],['Dormant/Pwd',r.stats.dormantCount,[220,180,40]]];
    let kx=16;kpis.forEach(([l,v,c])=>{doc.setFillColor(17,22,36);doc.roundedRect(kx,148,44,20,2,2,'F');doc.setFillColor(...c);doc.roundedRect(kx,148,44,2,1,1,'F');doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(...c);doc.text(String(v),kx+22,159,{align:'center'});doc.setFontSize(6);doc.setTextColor(80,110,150);doc.text(l.toUpperCase(),kx+22,165,{align:'center'});kx+=46;});
    doc.setFontSize(7);doc.setTextColor(35,50,75);doc.text('CONFIDENTIAL — For Internal Security Review Only',W/2,H-7,{align:'center'});

    function pg(t,s){doc.addPage();doc.setFillColor(5,8,15);doc.rect(0,0,W,H,'F');doc.setFillColor(...sysRGB);doc.rect(0,0,4,H,'F');doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...sysRGB);doc.text(t,14,15);if(s){doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(60,90,128);doc.text(s,14,21);}doc.setDrawColor(26,38,64);doc.setLineWidth(.3);doc.line(14,24,W-14,24);return 30;}
    function tbl(head,body,y,cs){if(!doc.autoTable)return y+10;doc.autoTable({startY:y,head:[head],body,margin:{left:14,right:14},styles:{fontSize:7,cellPadding:2.5,font:'helvetica',textColor:[180,220,240],lineColor:[26,38,64],lineWidth:.2,fillColor:[11,18,36]},headStyles:{fillColor:[17,28,50],textColor:[90,120,160],fontStyle:'bold',fontSize:6.5,cellPadding:3},alternateRowStyles:{fillColor:[8,14,26]},columnStyles:cs||{}});return doc.lastAutoTable?.finalY||y+20;}

    // Exec
    let y=pg('Executive Summary & Recommendations','Prioritized actions derived directly from the findings in this analysis');
    var recs=r.recommendations||[];
    var prioMeta={P1:{t:'P1 — Immediate (48 Hours)',c:[240,60,60]},P2:{t:'P2 — Short-term (30 Days)',c:[240,120,32]},P3:{t:'P3 — Medium-term (90 Days)',c:[220,180,40]}};
    if(recs.length===0){
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(24,200,120);
      doc.text('No issues requiring remediation were identified.',14,y);y+=8;
    } else {
      ['P1','P2','P3'].forEach(function(p){
        var group=recs.filter(function(x){return x.prio===p;});
        if(group.length===0)return;
        if(y>250){y=pg('Recommendations (continued)','');}
        doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor.apply(doc,prioMeta[p].c);
        doc.text(prioMeta[p].t,14,y);y+=5.5;
        group.forEach(function(rec){
          if(y>270){y=pg('Recommendations (continued)','');}
          doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(200,225,245);
          var titleLines=doc.splitTextToSize('• '+rec.title+'  ['+rec.area+']',182);
          doc.text(titleLines,14,y);y+=titleLines.length*4;
          doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(150,180,210);
          var dLines=doc.splitTextToSize('   '+rec.detail+(rec.refs?('  (Ref: '+rec.refs+')'):''),180);
          doc.text(dLines,14,y);y+=dLines.length*3.8+2.5;
        });
        y+=2;
      });
    }
    if(r.sod.length){y=pg('SoD Violations ('+r.sod.length+')',`${r.sod.filter(v=>v.sox).length} SOX-relevant · Source: SAP GRC Risk Library / AGR_USERS + AGR_1251`);tbl(['User','Rule','Conflict','Severity','SOX','Area'],r.sod.map(v=>[v.user,v.ruleId,v.name,v.sev,v.sox?'YES':'—',v.area]),y);}
    if(r.sensitive.length){y=pg('Sensitive Transaction Access ('+r.sensitive.length+')','High-risk T-code assignments requiring justification');tbl(['User','T-Code','Risk','Severity','SOX','Area'],r.sensitive.map(s=>[s.user,s.tcode,s.name,s.sev,s.sox?'YES':'—',s.area]),y);}
    if(r.dormant.length){y=pg('Dormant Users & Password Issues ('+r.dormant.length+')','Inactive accounts and expired passwords');tbl(['User','Type','Last Login','Days Inactive','Last Pwd Change','Pwd Days'],r.dormant.map(d=>[d.user,d.type,d.lastLogin,String(d.daysLogin)+'d',d.lastPwd,String(d.daysPwd)+'d']),y);}
    if(r.defaultUsers.length){y=pg('Default SAP Users ('+r.defaultUsers.length+')','SAP* DDIC EARLYWATCH — must be locked in all clients · SAP Note 2216306');tbl(['User','Type','Last Login','Locked','Severity','Finding'],r.defaultUsers.map(d=>[d.user,d.type,d.lastLogin,d.locked?'Yes':'NO',d.sev,d.finding]),y);}
    y=pg('Security Parameter Analysis ('+r.paramResults.filter(p=>p.status!=='PASS').length+' deviations)','vs SAP Security Baseline v1.8 — '+SAP_PARAMS.length+' parameters checked');
    tbl(['Category','Parameter','Description','Current','Target','Status'],r.paramResults.map(p=>[p.cat,p.name,p.desc,p.current,p.target,p.status]),y,{1:{cellWidth:48}});
    if(r.unused.length){y=pg('Unused Access Analysis ('+r.unused.length+' users)','Correlates SM20 audit log with role assignments');tbl(['User','Assigned','Used','Unused','% Unused','Sample Unused T-Codes'],r.unused.map(u=>[u.user,u.assigned,u.used,u.unused,u.pct+'%',u.unusedList]),y);}

    // License optimization section
    if(r.license&&r.license.length){
      y=pg('License Optimization ('+r.license.length+' users)','User license type derived from role-object-value mapping vs license rule file');
      tbl(['User','License','Description','Matched On','T-Codes','Roles'],r.license.map(function(l){return [l.user,l.license+' '+l.licenseName,l.licenseDesc,l.matchedOn,String(l.tcodeCount),l.roles];}),y);
    }
    // Fiori usage section
    if(r.fiori&&r.fiori.length){
      y=pg('Fiori Application Usage ('+r.fiori.length+' records)','From Fiori metering table');
      tbl(['User','App ID','Frequency','Last Used'],r.fiori.map(function(f){return [f.USER||f.user||'',f.APP_ID||f.app_id||'',f.FREQUENCY||f.frequency||'',f.LAST_USED||f.last_used||''];}),y);
    }
    const total=doc.getNumberOfPages();
    for(let i=1;i<=total;i++){doc.setPage(i);doc.setFontSize(7);doc.setTextColor(35,50,75);doc.text(`${i} / ${total}`,W-14,H-6,{align:'right'});doc.text('SAP Security Report — Confidential',14,H-6);}
    doc.save(`SAP_Security_${r.system.sid}_${new Date().toISOString().slice(0,10)}.pdf`);
    toast('PDF downloaded!','ok');
  }catch(e){toast('PDF error: '+e.message,'err');}
  [btn,btn2].forEach(b=>{if(b){b.disabled=false;b.textContent=b.id==='pdf-btn'?'Export PDF Report':'Export PDF';}});
}
